body:
  text: 古鹽匡菴青蓮苾芻靈乘父輯二利益存亡分二初品題利益存亡品第七二品文三初地藏正明二大辨助顯三鬼神發心初三初通示衆生善退惡增二正示習惡宜為設福三結顯修善多少自得初又三初法示爾時地藏菩薩摩訶薩白佛言世尊我觀是閻浮衆生舉心動念無非是罪脫獲善利多退初心若遇惡緣念念增益心念指六識舉動是功能由六七二識和合濁亂八識主人八識復令前五識貪聲著色嘗味嗅香觸身軟滑處處夤緣故曰無非是罪脫獲善利二句言持心不固僧護經云閻浮提人為性難信由行善而獲利益自宜進功無間乃因獲利反退初心故佛說寶雨經云菩薩見一切有情受諸苦惱雖復成就微少善根暫時非久是也若遇惡緣等謂四大毒器有穢斯充六賊狂主是境皆著無復逆流之期唯有循環之勢淪滯生死封執有為諸佛為其斂眉菩薩於茲泣血此由執心不定而致斯惡故大師云應知諸身皆由心造譬如大地一能生種種芽是也淨度三昧經云罪福相纍重數分明後當受罪福之報一一不失一念受一身善念受天上人中身惡念受三惡道身百念受百身千念千身一日一夜種生死根後當受八億五十萬雜類之身百年之中種後世裁甚為難數魂神逐種受形遍三千大千剎土體骨皮毛遍大千剎土地間無空處又處胎經云吾從無數劫往來生死道捨身復受身不離胞胎法純作白狗形積骨億須彌何況雜色狗其數不可量故賢愚經云人身難得遇惡因緣則便易失以惡多善少一日之中罪念百千善念無一故知人能伏心為道者其力最多其奈閻浮衆生雜慮紛飛不能固守善退惡增是其慣習也歟二喻顯是等輩人如履泥塗負於重石漸困漸重足步深邃初喻南洲衆生善退惡增如履淖泥之途常處生死之界既深且邃求出應難也三事明若得遇知識替與減負或全與負是知識有大力故復相扶助勸令牢腳若達平地須省惡路無再經歷若得者含幸不幸二意謂其人儻有微善即遇知識何幸如之儻無善緣終不一遇不幸甚矣知識有近遠近指父母眷屬為作福事者遠指佛菩薩等銷滅其罪者替代也負防父切音附背荷物也減負全負論作福之功有半有全使死者減罪即減負也罪若全銷即全負也下釋能負意謂此知識有大力故增一阿含說因人五力信等五力佛果十力準大論菩薩亦具十力有是力故不惟替負復能扶持相助勸令堅牢腳跟儻滑倒泥塗終難起矣又復勸其若達平穩之地應須回省前履之惡路無再經過涉歷也相扶喻教十善牢腳喻持心無退平路譬升出人天省惡譬念三塗苦再經喻莫更重入苦趣也二正示習惡宜為設福二初總示世尊習惡衆生從纖毫間便至無量此合前舉心動念等文謂何以舉心動念乃至遇惡增益耶以習惡故惡習指種子習惡指現行由有惡習種子故使習惡現行是以從纖毫而至無量也占察經云求心形狀無一區分而可得者但以衆生無明癡暗熏習因緣現妄境界令心念著於種種法上妄生種種法想謂有謂無謂彼謂此謂是謂非謂好謂惡乃至妄生無量無邊法想故光明玄云登難墜易多緣諸惡身故記云良以衆生無始熏習惡多善少致令心念多緣惡身五乘未駕先遊四趣登難墜易誰曰不然修觀行人於十界心常當循省不可不知止觀所以簡非心也二別釋二初設福存亡利益二造惡亡人增罪初二初臨終說福二死後造善設福分三初示意是諸衆生有如此習臨命終時父母眷屬宜為設福以資前路初二句示修福戒殺意以衆生有如此惡習故種現交熏因果相感若眷屬不為設福憑何以資前路乎無常偈云常求諸欲境不行於善事死王催伺命親屬徒相守諸識皆昏昧行入險城中將至琰魔王隨業而受報勝因生善道惡業墮泥犁唯有佛菩提是真歸仗處故宜設善福資前路也二設福或懸幡蓋及然油燈或轉讀尊經或供養佛像及諸聖像乃至念佛菩薩及辟支佛名字一名一號歷臨終人耳根或聞在本識此中修福有二栽果一修事福果懸幡設蓋然燈一敬三寶果轉經供像稱名普廣經云若四輩男女若臨終時若已過命於其亡日造作黃幡懸著剎上使獲福德離八難苦得生十方諸佛淨土幡蓋供養隨心所願至成菩提幡隨風轉破碎都盡至成微塵幡一轉時轉輪王位乃至吹塵小王之位其報無量然燈供養照諸幽冥苦痛衆生蒙此光明得互相見緣此福德拔彼衆生悉得休息文有此福利故為懸幡然燈也供像如前念佛如後正法念經夜摩天王為諸天說偈云若人心念佛是名善命人不離念佛故是為命中命念法念僧亦然使是名號得歷耳根納在八識終無毀壞譬之金剛入腹經久不爛要必穿腸而出故須熏聞佛種所謂法音經耳功報彌劫一歷耳根永為道種不其然乎三得益是諸衆生所造惡業計其感果必墮惡趣緣是眷屬為臨終人修此聖因如是衆罪悉皆銷滅此合前文遇知識與全負也死者既多習惡能無業纍牽纏因不爽果惡必遭殃若不修聖福之因何能免將來之果毗曇論云趣者名到亦名為道謂彼善惡業因道能運到生趣處故亦可依所造之業趣彼生處又歸向義謂所造業歸向於天及地獄也如大乘同性經楞伽王白佛云何衆生捨此壽命受彼壽命捨此故身受彼新身佛言衆生捨此身已業風力吹移識將去自所受業而受其果故圭峯大師云欲驗臨終受生自在不自在但驗尋常行心自由不自由二六時中常當省察旨哉言乎是則既造惡業必墮惡趣今得免者緣眷屬為修種種聖因故使如是衆罪如猛風之吹浮雲似大水之滅小火故知衆罪消滅乃知識大力全為負之也二死後造善若能更為身死之後七七日內廣造衆善能使是諸衆生永離惡趣得生人天受勝妙樂現在眷屬利益無量此合復相扶助等五句文謂有力知識不惟為其全負重石且能扶其達於平地正指死後為其修福也梵語末剌喃此云死如十二品生死經人死有十二品云云故法句云夫身者衆苦之本患禍之元吾我縛著生死不息皆由身歟今欲離世苦本應須為其造善也七七日如後譬夫亢陽如久必思甘雨之澤災癘若多剋待良醫之藥病得藥以身安旱霑雨而土潤故得永離惡趣得生人天若達平地矣既生天上而永處福堂或在人間而長享豪富受勝妙快樂之時亦須省其惡路固守此心無令退失善念再經惡道也優婆塞戒經云為亡追福施已命終是人福德隨所施物任用久近福德常生是福追人如影隨形或有說言終已便失是義不然何以故物壞不用二時中失非命盡失文故得資生人天受勝妙樂不惟亡者獲樂超升即現在獲益亦無量矣二造惡亡人增罪二初法示二喻合法中二初躡前正勸是故我今對佛世尊及天龍八部人非人等勸於閻浮提衆生臨終之日慎勿殺害及造惡緣拜祭鬼神求諸魍魎此承上臨終修福存亡俱獲利益而勸諭之言我今者將利益存亡事一肩擔任也臨終日者四自侵經云五欲之樂不可常得病著牀時擾動不安死命忽至身當敗壞安得久乎慎勿等者慎恆謹也人心有假修於昭昭肆於冥冥惟慎為真心故從心從真勿者禁止也慎而復禁斷斷誓不殺害矣惡緣助成殺害事者拜祭鬼神拜者俯伏致敬也人之拜詘一身為之獨指其手者手容主恭禮之所以為美也說苑云祭之為言索也索也者盡也乃孝子所以自盡於親也然祭生於報本之心心𪫟何以將之因以食道饋焉庶其或歆一精誠之教也今是拜祭鬼神魍魎詳乳記普曜經迦葉云自念祠祀來已歷八十年奉風水火神日月諸山川夙夜不懈廢心中無他念至竟無所獲值佛乃安寧是也二轉釋所以二初直釋何以故爾所殺害乃至拜祭無纖毫之力利益亡人但結罪緣轉增深重十方譬喻經云天上天下鬼神知人壽命罪福當至未至不能活人不能殺人不能使人富貴貧賤但欲使人作惡犯殺因人衰耗而往亂之語其禍福令人設祠祀耳故知空祭鬼神無纖毫之刀利益亡人也灌頂經亦云雜物之精浮遊人村既其無食作諸變怪扇動人心或有魃魅邪師以倚為福覓諸福祐欲得長生愚癡邪見殺生祠祀死入地獄餓鬼畜生無有出時可不慎之故但結罪緣轉增深重故四自侵經云有事天地水火日月山川諸鬼神者永無所益故在周旋生死之裏不能脫出羅網牢獄諸經廣明其事惜世人不能信也二復疏二初應報善者反得惡假使來世或現在生得獲聖分生人天中緣是臨終被諸眷屬造是惡因亦令是命終人殃纍對辨晚生善處文分二節初應生善處二惡牽不生聖分即七菩提分八聖道分菩薩果分即法華我等亦應有分分字同謂亡者平日自有善因應得善果之分及生人天之中秪緣臨終之時被眷屬造殺業因受殺者索命必經歷冥司對辨殃纍雖清遲延生處道世師云父母喪亡廣殺生命父亡于斯重苦母終偏增湯炭是以宛轉三界綿歷六道四趣易歸萬劫難啓痛慈母之幽靈愍逆子之酬毒正斯謂矣可不傷哉二應受惡者更增業何況臨命終人在生未曾有少善根各據本業自受惡趣何忍眷屬更為增業此中況意謂上之有善業而應生善處者尚被惡業拘牽晚生善處況其自無善根應受惡趣者今更加殺害寧不重增惡業耶譬如抱石沉淵人更投物壓之求出應難矣故優婆塞戒經云若父喪已墮餓鬼中子為追福當知即得若說殺生祠祀得福是義不然何以故不見世人種伊蘭子生栴檀樹斷衆生命而得福德若欲祀者當用香華乳酪酥果為亡追福文故下何忍二字謂忍心甚矣增業多矣二喻合譬如有人從遠地來絶糧三日所負擔物強過百斤忽遇鄰人更附少物以是之故轉復困重有人喻閻浮衆生從遠地來等譬自從無始生死曠大劫來久乏三善根之資糧腹空力怯可知矣而所負五陰重擔又強過於百斤此謂於五陰法中不知本空妄計人我具造十惡一一互具如百斤重擔此正合上臨命終人自無善根也忽遇下合各據本業等文鄰人合眷屬體心者是親友不體心者如鄰人更附少物合臨終更加殺害轉優困重合更增業也三結顯修善多少自得世尊我觀閻浮衆生但能於諸佛教中乃至善事一毛一渧一沙一塵如是利益悉皆自得此言於佛法所修善事即毛渧等亦皆自得也大悲經云若有衆生於諸佛所一發信心如是善根終不敗亡如人析一毛為百分取一分毛霑一滴水持寄我所言莫令此水而有增減如來即受彼寄置恆河中如是水滴不增不減共大水聚漸入大海假使是人住世一劫我亦得住一劫彼人至劫盡時而來我所作如是言我本寄水今有無耶如來爾時知彼水滴在大海中見知住水不增不減平等如故持還彼人阿難如來有大神通於受寄人中最尊最勝若於佛所寄付如是微細水滴經於久遠而不虧損細毛喻心意識恆河喻生死流一滴水諭一發心微少善根大海喻如來所寄人喻清信等住一劫喻如來受彼寄水終不虧損如是阿難若於佛所一發信心善根不失何況諸餘勝妙善根我說是人一切悉是趣涅槃果二大辨助顯三初大辨興問說是語時會中有一長者名曰大辨是長者久證無生化度十方現長者身合掌恭敬問地藏菩薩言大士是南閻浮提衆生命終之後小大眷屬為修功德乃至設齊造衆善因是命終人得大利益及解脫不初經家敘讚二長者正問長者如前梵語鉢底婆此云辨才辨說也展轉無滯辨別分明故曰辨才無礙有四種一義二法三詞四樂說長者具此四德故名大辨辨言大者一義中演無量義一法中演無量法一詞中演無量詞盡未來際樂說此三法門故立此嘉稱此出名下讚德久證無生者無訓為不所謂諸法不生般若不生不生不生名大涅槃如是涅槃久已證得地位高廣等覺之流因欲化度十方故現長者之身正問中是南閻浮提等因前文廣明臨終死後應宜修福故躡而問之功德指懸幡等設齊即飯僧等善因布施造像等命終下正疑問命者帝降之衷性之天根也學者要自得之氣稟於天亦謂之命清濁厚薄差而智愚賢不肖攸分矣天之氣數亦謂之命凡厥有生壽夭貧富貴賤皆前定矣此皆命之借義也君有大令曰命從令從口會意君尊如天萬物天所命萬事君所命故云命故朱文公云命猶令也此儒宗精妙之義然未知命之所以然乃乘前世業因緣中有託胎之時八識投入其中一息隨母出入命根立於此時是則識託身存命在其中故曰色心連持不斷為命若一息不還色質敗壞則魂神去矣謂之命終是則生之也非天命之而生終之也非天奪之而終乃緣會而生緣盡而終也造者造作凡諸善事之作必假身口七支構造經營然必由心而起也得利益解脫者謂陽上修福能使死者實得利益而解脫生死耶謂不得利益而不脫生死耶二地藏垂答二初許說地藏答言長者我今為未來現在一切衆生承佛威力略說是事如文二答示二初示臨終聞名悉脫長者未來現在諸衆生等臨命終日得聞一佛名一菩薩名一辟支佛名不問有罪無罪悉得解脫既言臨終得聞則平時不念可知既言聞一名等不及其餘又可知然其不問有罪無罪悉得解脫者何功力之神妙若此耶良由事急而心專也如人或就刑戮或禁狴牢成被怨賊所追或為水火所逼一心求脫斯苦故於念處即成其平時念者或言行不稱或信力輕微無相續之心有間斷之意故平日之功反緩而臨終之念速成如昔國王問那先沙門言人在世間作惡至百歲臨終時念佛死後得生佛國我不信是語那先言如持百枚大石置船上因船故不沒人雖有本惡一時念佛不入泥犁中其小石沒者如人作惡不知念佛便入泥犁文豈非事急心專故功勝平時如人入陳不惜身命名為健人故知善惡無定因緣體空跡有升沉事分優劣真金一兩勝百兩之疊華爝火微光爇萬仞之聚草即觀張鍾一名善和一名馗臨終之事便信此經解脫之言二示終後造福獲一二初略明二詳示初又二初直明終後獲一若有男子女人在生不修善因多造衆罪命終之後眷屬小大為造福利一切聖事七分之中而乃獲一六分功德生者自利我佛為俗衆說法必先戒論施論生天論以施戒乃生天之善因也無奈一切衆生不了世間所有一歸空無安隱之時多事萬端不為身計已招萬罪殃禍響應無常對至縛著相隨不離五陰六衰之獄故曰不修善因多造衆罪命終下為修福利者懸幡設蓋然鐙皆是福業回此福業資生天上福堂人間福處故云福利聖事者聖訓為正誦經供像念佛等皆法門正事能令出世獲三乘聖果故云聖事七分獲一得之甚少也然功不唐捐生者自得六分矣故往生經云亡後作福死者七分獲一餘者屬現在者兩經相同也二反顯自修悉得以是之故未來現在善男女等聞健自修分分己獲此承上文反顯自修全得利益也聞健者謂耳聰強健之時健者建也能有所建為也此勸人極早為之耳蓋健乃乾德純陽之精從人從建乃法天立志志立氣自隨之易曰天行健君子以自強不息是也故隨願往生經普廣菩薩白佛言若善男女未終之時逆修生七然鐙懸幡請僧轉經得福多不佛言其福無量又言父母親族命終受苦為其修福得福多不佛言七分獲一緣前生不信道德故若以亡者嚴身之具屋宅園林以施三寶可拔地獄之苦文案夷堅志載鄂渚王媼作寄庫令僕李大書押事聞健自修不可不為今世人有作生七者有預寄庫者毋謂癡媼村嫗妄想事而輕之忽之也二詳示二初示亡人望救二勸眷屬修齊初分二初罪福未定二審定受報初又二初求救之意無常大鬼不期而到冥冥遊神未知罪福七七日內如癡如聾或在諸司辨論業果審定之後據業受生未測之間千萬愁苦何況墮於諸惡趣等梵語薩迦耶薩此云無常大論云一切有為法盡屬因緣新新生滅故曰無常一相續法壞無常二念念生滅無常宗鏡明二種四相一約粗果報說即生老病死二約細惑業說即生住異滅與大論二無常同大鬼者按孝經援神契云泰山天帝孫主召人魂東嶽府有太保追攝生魂鄂元帥追攝死魂孟元帥酆都九曲追魂斬鬼韋元帥故青靈經云人物之死俱有鬼如冥報記載唐校尉馮翊李山龍武德中暴亡心上不冷家人未殮七日而蘇自說被冥收録升王階王命升座誦法華經山龍開經題同罪千人承福獲免王命吏放還有三人謂山龍曰王放君可不多少遺我等吏曰是前收録君使一是繩主以赤繩縛君者一是棒主以棒擊君頭者一是袋主以袋吸君氣者見君得還故乞物耳云云故華嚴經云人欲終時見中陰相若行惡業者見閻羅持諸兵杖囚執將去故云無常大鬼正法念云有於胎中死有生時命終有才行便亡有能走忽卒故云不期而到內德論云百齡易盡五福難常命川流而電逝業地久而天長是此之謂也神者大論云凡夫人憶想分別隨我心取相故計有神即中陰身也如天人陸玄暢云人稟七識識各有神心識為主在黑暗中遊行虗空所謂三塗極迍而杳杳四流無際而茫茫故云冥冥遊神罪福即十惡十善魂神既未知自己罪福何如故於七七日內如癡狂無知如耳聾無聞正初死時也或在下明死後考較諸司準道藏有攝魄追魂捉生落死賞善罰惡察過糾非嶽府顯應太保攝魂朱將軍更有勾押推勘判官管追罪人照證案主者準淨度三昧經閻羅王下有五官一鮮官禁殺二水官禁盜三鐵官禁淫四土官禁兩舌五天官禁酒此皆冥府諸司也辨論業果善惡各有三品造時心境不同各隨所作得其果報天無枉濫平直無二隨其所作天網治之故須辨論也若審定之後據業受生者如論云一切不善皆是地獄因此不善之餘生畜生餓鬼中等按冥祥記趙泰死府君令泰作水官都督知諸獄事見一城方二百餘里名為受變形城地獄考治已畢者當於此城更受變報泰入其城見數百局吏對校文書云殺生者當作蜉蝣朝生暮死劫盜者當作猪羊受人屠割淫泆者作鶴騖麞麋兩舌者作鵄梟鵂鶹捍債者為驢騾牛馬故云據業受生準正法念經及俱舍論直是罪人惡業熏心令心變異無中妄見實無閻羅在中判諸罪人也但既以業熏妄見其境罪人謂實非虗故於初死之後未審之前未測自己罪福多少千思萬慮愁憂多苦已不可言況墮諸惡趣此苦尤甚也矣二求救之時是命終人未得受生在七七日內念念之間望諸骨肉眷屬與造福力救拔統紀明七七齊瑜伽論謂人死中有身若未得生緣極七日住死而復生如是展轉生死至七七日決定得生若有生緣即不定今尋經旨極善惡無中有中有亦名中陰極善即生淨土其次生人天極惡即入地獄即日死亡不經中陰又引釋氏要覽云今人亡每七日必營齊追福謂齊七者令中有種子不轉生惡趣也今世人於七七日作功德者正所以慰亡人之望救耳二審定受報過是日後隨業受報若是罪人動經千百歲中無解脫日若是五無間罪墮大地獄千劫萬劫永受衆苦隨業受報因果不忘也法苑云有形則影現有聲則響應不見形存而影亡聲續而響乖善惡相報理路然矣幸願深信不猜來肖準經有現報生報後報不同長阿含六佛言夫不善行有不善報為黑冥行則有黑冥報夫行善法必有善報行清白行必有白報是罪人等則受黑冥報矣此乃中下之品或墮邊小之獄及餓鬼畜生展轉三塗故動經千百歲解脫無日五無間罪乃十惡上品故永無出期四始經云身行不善口行不善意行不善身壞命終極受苦報是也二勸眷屬修齊三初示營齊法復次長者如是罪業衆生命終之後眷屬骨肉為修營齊資助業道未齊食竟及營齊之次米泔菜葉不棄於地乃至諸食未獻佛僧勿得先食初勸營齊此明奉齊三寶非指過午為齊米泔菜葉不棄地者當盛於器中齊後施與畜生準佛說護淨經必須清淨手濤米洗菜亦不得以不淨手觸淨食未獻等示齊法大論引經佛金剛身不恃仰食為度衆生現有所噉其實不食為佛設食佛未食者人不能消故未獻佛僧勿得先食護淨云一切賢者施設福會於先嘗啜此食多作殘食唐作此會不如不作何故諸天不歡鬼神不喜此人於先嘗者五百世中受餓鬼苦故誡斷勿先食也二明供養力如有違食及不精勤是命終人了不得力如精勤護淨奉獻佛僧是命終人七分獲一初明不如法次明能如法精勤護淨等經云諸有設食之處一切如法作齊飯不可不慎自今已後欲得福者如法作齊食可得福德諸天歡喜百神慶悅天神擁護經不虗言福報如影響經文明示如此惜世人不知信也三結存亡利是故長者閻浮衆生若能為其父母乃至眷屬命終之後設齊供養志心勤懇如是之人存亡獲利志心勤懇即精勤護淨之意唯精能志心精者功夫造極也從米從青者初脫粟而黃猶粗也米舂近心色微若青此生意所函天真之至粹者也如是殷勤懇切自得存亡獲利大辨助顯竟三鬼神發心說是語時忉利天宮有千萬億那由他閻浮鬼神悉發無量菩提之心何故鬼神至此發心上明祭祀鬼神無益徒自令人造業鬼亦有良寧不愧耻故發心為護法鬼神耳問鬼神自發心佛與地藏教之發心答自它共離皆不可但是感應道交而論發心耳三長者禮退大辨長者作禮而退既同在會退至何處以問法時出位前禮酬唱既竟禮退歸位即表各各自住三摩地耳二閻羅興問讚歎二初品題閻羅王衆讚歎品第八二品文二初經家敘二正興問敘中三初主伴來儀爾時鐵圍山內有無量鬼王與閻羅天子俱詣忉利來到佛所閻羅宮城住處已備前文閻羅鬼官之總司無量鬼王俱為所統王來臣必隨之主到伴必衛之故俱詣忉利同到佛所此承世尊之光音地藏之威神也準智度論一切山河樹木土地城郭一切鬼神皆屬四天王管故皆隨從共來二列鬼王號所謂惡毒鬼王多惡鬼王大諍鬼王白虎鬼王血虎鬼王赤虎鬼王散殃鬼王飛身鬼王電光鬼王狼牙鬼王千眼鬼王噉獸鬼王負石鬼王主耗鬼王主禍鬼王主食鬼王主財鬼王主畜鬼王主禽鬼王主獸鬼王主魅鬼王主産鬼王主命鬼王主疾鬼王主險鬼王三目鬼王四目鬼王五目鬼王祁利失王大祁利失王祁利叉王大祁利叉王阿那吒王大阿那吒王惡毒乃鬼王之首故前列之惡毒即十惡三毒既惡且毒立斯穢稱三毒屬意為身口七惡之本本末兼明故名惡毒然此等鬼王皆是不思議菩薩大權應化以惡攻惡以毒出毒意令人人了修惡即性惡會事毒即理毒故用惡毒以為化門即大經毒鼓之喻亦外書亭毒之意列子云生之育之亭之毒之亭謂品其形毒謂成其質後人第知毒之為大不善詎知其為篤義毒轉聲為篤乃大善也多惡者一念尚具諸惡增廣多有無量外現忿怒之惡相內起慈悲之善心大諍諍即鬬諍長阿含佛告帝釋怨結之生皆由貪嫉故使衆生等刀杖相加帝釋白言實爾貪嫉之生何由而起佛言貪嫉之生皆由愛憎故祖師云但離憎愛洞然明白然世人不了五蘊本空故爭咽喉下不急之氣莊子所謂婦姑勃豀此由心為毒主口為禍器未有諍訟違形而存大化者故鬼王以大諍法門化人無諍也白虎血虎赤虎虎乃山獸亦名大蟲猛而有威慢而多暴白虎西方之獸血虎口似血盆赤虎毛如火赤鬼頭如虎故各以虎名散殃殃咎也禍也東嶽經云世間衆生不信因緣善惡果報不敬天地不孝父母不尊師長欺負神理背前面後口是心非已被嶽府曹官聖衆晨夕考較紀録罪咎致令災禍橫生官司牢獄纍歲經年不能安泰家門啾唧每遇凶衰盜賊侵欺希見太平文故致鬼王臨其家門有殃者禍者之事矣飛身飛行夜叉之類也電光眼光如電閃爍令見者怕怖狼牙狼大如狗青色善逐獸古之造式者木用槐癭棗瘤而以狼牙為柱取其靈智故字從良此鬼牙尖外向如狼之牙按白澤圖丘墓之精名狼鬼善與人鬬為桃矢鵄羽射之化為飄風脫履捉之不能化也千眼觀音千眼在手獄卒六十四眼在角此鬼千眼不知如何安立噉獸此鬼以獸為食者然鬼亦獸耳婆沙明鬼趣形狀多分如人亦有面似猪或似餘惡禽獸負石即負石擔沙填河塞海之類主耗主禍二事相因故太上云天地有司過之神依人所犯輕重以奪人算算減則貧耗多逢憂患人皆惡之刑禍隨之吉慶避之惡星災之是也昔櫟陽尉郭鄩官不得調奇蹇屯厄動與物忤至親密友亦漸疏斥常有二物狀如猿猴跳躑其旁出入相隨一夕愁寐忽來告別云吾乃主世虗耗者君以隱慝獲罪神命隨主君厄今數滿當去可安享矣主食食乃民生之祿善者享之惡者減之故散弃五穀者太上惡之收其華息世多饑饉及暴殄天物者每凍餒而死也主財嶽府有主財案主者浮陀摩尼鉢主護人財物故有財不施鬼瞰其傍而妬之然太上尤禁橫取人財者故其妻子家口漸至死喪若不死喪則有水火盜賊遺亡器物疾病口舌諸事以當妄取之直財各有所主也主畜畜有四生住有三處嶽府有管胎卵濕化及水族案者主禽主獸皆嶽府之神飛曰禽羽族之總名言為人禽制故名禽走曰獸毛蟲之總名言力多難擒圍守可獲故名獸此諸禽獸各有鬼王主之若止觀引大集十二時獸者輔行云五行中名十二肖肖似也此十二神似彼故也準大集東海琉璃山有虎兔龍南海玻璃山有蛇馬羊西海白銀山有猴雞犬北海黃金山有猪鼠牛所住之窟經各有名一一方各有二羅剎女供養三神其窟皆菩薩住處一一獸皆修聲聞慈曾於過去佛所發願一獸每一日夜遍閻浮提餘安住修慈從七月一日鼠為首二日牛乃至十三日還從鼠起此即獸王菩薩故他方恭敬也主魅魅謂魑魅老精物也詳香乳記主産東嶽懺云結秀成胎稟兩儀之造化送生保産乃二聖之綱維普濟普度九天監生明素真君多男多女九天衛房聖母元君又鬼子母姊名炙匿亦主人産生主命準經毗沙門主護四天下人命嶽府有管天下生死案判官更有保生真人碧霞元君主疾如前主險高山峻嶺大海溟淵險難之處身命所係應死者録之不應死者護之此猶險之小處準大論地獄有二部一寒冰二炎火皆以身觸受罪此名大黑暗處危難嶮道即鬼所主之處耳三目二目中間豎亞一目如摩醯狀四目額上又橫開二目與蒼頡同五目於上下中豎生一目也祁利失王等未見翻譯金光明有薩多琦黎翻大力天名義集載惡祁尼此翻火神然考立世阿毗曇的是山名論夜叉品云時閻浮提中有兩衆山恆河之南名娑多耆利山恆河之北名醯摩跋多山一切神住河南者皆名娑多耆利在河北山者皆名醯摩跋多娑多耆利領河南一切諸神醯摩跋多領河北一切諸神故名為王文今閻王界既在閻浮之南而祁利山又在恆河之南南屬離火故祁尼祁利而翻大力火神均屬火天也失字未詳叉具云叉耶秦言盡即大力盡王統領小王鬼神也阿那吒準大經八臂那吒乃天中力士則未可的指然其名既同未可知也那吒即多聞天王之長子三承力俱來如是等大鬼王各各與百千諸小鬼王盡居閻浮提各有所執各有所主是諸鬼王與閻羅天子承佛威神及地藏菩薩摩訶薩力俱詣忉利在一面𡗓已上三十四位皆是大鬼王每一王下各有眷屬小王數有百千此非他方之鬼盡住南洲也各有執者執守法也取彼有罪明正典刑指其事也天文有執法代天討罪豈得而容私乎蓋言守法之執事也太上亦云天地有司過之神依人所犯輕重以奪人算是也言主者古之制字這丶即主心之神明實主我身居其所不動而應萬物象天君奠位之形丶神也不得形則不顯故配他字乃成形故從丶而配王王君也天地萬物咸統於一王心無丶身且不能治何以治天下乎今諸鬼王內各有丶故能主萬物也如取人枷鬼提點鬼神追魂斬魄捉生落死及各案主者諸司法録事等故言各有所執所主也是諸下明來意幽冥鬼王何能上隮忉利此承我佛與地藏威神之力也一面𡗓者住足名𡗓人縱而生𡗓則戴天履地儼然正直之容故從大在地上為意敬佛尊君故𡗓而不坐也二正興問二初閻羅興問正歎二鬼王護法助揚初分五初經家提起爾時閻羅天子胡跪合掌按道明和尚所傳十殿冥王閻羅天子在五殿統紀云十王名字藏典傳記可考者六閻羅五官二名見三長齊引提謂經平等華嚴感應傳郭神亮為使者追至平等王所因誦若人欲了知偈得放回泰山譯經圖紀法炬譯金貢泰山贖罪經初江夷堅志郭生夢入冥府王揖坐謂曰我是西門王郎冥司録我忠孝正直不害物得作初江王一紀秦廣夷堅志南劍陳生既死其弟之女見二鬼導至宮殿曰秦廣王也王謂女曰欲救伯可轉入師經女寤家人來得經請僧誦千遍兄夢弟來謝曰已獲生天也今唯閻羅一王興問者大約第五殿乃正中之位統攝諸王故特加天子之名以帝釋天為父王命閻羅為天子主攝冥司所謂地下縛囉呬天是也二天子述意白佛言世尊我等今者與諸鬼王承佛威神及地藏菩薩摩訶薩力方得詣此忉利大會亦是我等獲善利故我今有小疑事敢問世尊唯願世尊慈悲宣說初敘來意等者非等餘九殿獄王也準長阿含小千世界有一千閻羅王況三千大千又況十方沙界之三千大千閻羅乎然佛出此南洲此界冥王為正亦是等慶幸之語由閻羅鬼王等竝以業緣感報三時受苦如弟子死復生經吏白王言大王為奉佛淨戒耶王曰坐我不奉佛故追罪來作此獄王今到天宮見佛聞法自然獲得增上善利故下此慶語我今下咨請雖云小疑障信則大故須問明唯願以大慈悲為我宣說此旨作與樂拔苦之因緣也三許問為說佛告閻羅天子恣汝所問吾為汝說恣縱也謂凡有所疑不必隱匿縱意問來吾無不為汝說者如洪鐘在架隨扣隨鳴表佛心慈悲無齊限也四申疑致請三初敘儀是時閻羅天子瞻禮世尊及回視地藏菩薩瞻禮敬佛求法之儀回視事有所專也何以回視之問法之儀必對佛而禮身在中央則菩薩在傍故回首視之二申請二初直歎神通而白佛言世尊我觀地藏菩薩在六道中百千方便而度罪苦衆生不辭疲倦是大菩薩有如是不可思議神通之事在六道等占察經云依本願自在力故權巧現化影應十方而於五濁惡世化益偏厚巧演說法能善開導此皆方便力也大要現梵天令除憍慢化人道令修施戒地獄代其受苦餓鬼令其飽滿修羅調伏惡心畜生使得智慧竝令俱出苦輪同到智地無量劫來不辭疲倦此智慧勇猛不思議之神通也言𠭏者人所作也其上從㞢其下從又古右字持中何也曰天下萬事皆本於心中者非他也人心天然之矩事來執吾中而往貫萬若一無過不及是謂天則今地藏以百千方便現種種神通皆本中道一心而應萬機之事度苦衆生竝歸中道其為大事因緣可思議乎哉二轉申疑事二初正陳疑本然諸衆生脫獲罪報未久之間又墮惡道未久云者如等活地獄對四天王壽人間五十年為上天一日夜縱經百年冥司秪得二日豈非才出即來深惡其不憚煩也二覆申疑事世尊是地藏菩薩既有如是不可思議神力云何衆生而不依止善道永取解脫此中問意兩關發疑一謂菩薩既有如是神力自應令彼依善道而永取解脫矣二謂六道既受大士之化亦應久依善道而永取解脫矣今不然者為地藏神力不逮歟為衆生心力不及歟梵語膩地此云依維摩經云十善是菩薩淨土衆生能依十善自然解脫生死三願說唯願世尊為我解說五答示顯德二初總示難化佛告閻羅天子南閻浮提衆生其性剛強難調難伏其性者習性也故曰剛強若是法性從本柔和剛者堅強也此非中正純粹之乾音剛乃動於血氣之剛暴譬之惡象駑馬難於調伏也二別歎方便三初以法直示二以喻釋明三以法合顯初又二初約地藏方便救拔是大菩薩於百千劫頭頭救拔如是衆生早令解脫是罪報人乃至墮大惡趣菩薩以方便力拔出根本業緣而遣悟宿世之事衆生性雖剛強難於調伏在地藏不捨大慈而頭頭救拔頭頭猶言處處謂千頭萬頭也如是衆生句正點難調伏者剛者教之以柔強者教之以和難調伏者必令調伏如王良造父善能調伏馬性必令中軌而後已今於三寶施戒必令修持清淨戒生得淨解脫故罪報之輕小者即與救拔縱犯上罪應墮阿鼻大惡趣者亦以巧方便力使拔根本業緣梵名阿浮訶那此云拔除罪根須知諸惡隨業受報而以三毒為本三毒之中貪愛為根如捉布一頭餘則盡隨智論云若不斷愛愛則潤生是故四生皆由愛起故成論云如樹根不拔其樹猶生貪根不拔苦樹常在故知生死貪愛為本若滅貪欲名第三諦十輪經云滅除一切惑障習氣猶如烈日銷釋輕冰故無常偈云明眼無過慧黑暗不過癡今根本業緣既拔自悟宿世之若譬古鏡之重揩其常光而自現矣二約衆生惡習難脫自是閻浮衆生結惡習重旋出旋入勞斯菩薩久經劫數而作度脫自者謂如此方便救拔自應頭頭解脫已今不能者乃衆生自造惡業以自縛之非菩薩之咎結惡習重緊要之語生死根元略言三結身見戒取疑廣說八十八使云云由此結惡造十習因淫習貪慢瞋詐誑怨見枉訟習受六交報是以才出三塗而旋入劇處致勞地藏久經塵劫起無量方便作度脫因緣豈非衆生惡習牽連致纍化門久不能扃耶二以喻釋明三初迷入險道譬如有人迷失本家訛入險道其險道中多諸夜叉及虎狼師子蚖蛇蝮蠍如是迷人在險道中須臾之間即遭諸毒文分三節初迷本入險有人譬惡道衆生因果不忘名有人者忍也能忍五濁之苦也常寂光土為本家十惡衆生原是如來之子三塗苦處無非常寂之家以不知真如法一不覺無明風動漂流異國墮落他鄉既忘本處便迷歸路遊行逐境險道斯臻文句釋法華險難惡道通譬九界生死因果故曰分段變易即果險難見思五住即因險難由此因緣故言惡道今據下文生人天中令受妙樂秪以三塗為險道由不依施戒生天之論致訛墮三惡道中二險道多惡以多諸夜叉等夜叉有智有通飛行捷疾譬利使邪見謗無因果智辨速疾也正心地觀云心如夜叉能噉種種功德法故虎狼等畜類愚頑以譬鈍使準俱舍論憍慢盛故生於師子虎狼中瞋恚盛故生於蚖蛇蝮蠍中則虎狼師子應俱譬慢使今約三毒為身口之本故以虎喻慢使如分別善惡經憍慠常慢人後生為猛虎故也狼譬貪使以狼求食不滿不止故曰貪狼師子表癡使由昔持戒雖嚴而無淨慧執戒慢人故墮畜類因戒力故得為獸王無慧即癡故以譬之蚖蛇蝮蠍譬瞋使蚖名守宮在壁曰蝘蜓在洲曰蜥蜴以毒盛故不觸而螫譬非理瞋楊子云蚖其肆矣蝮蜪蝝上音陶下音延也螫手則斬手螫足則斬足為害於身也蠍虎螫人毒蟲然觸則螫譬執理瞋不以蜈蚣譬戲論瞋者以三塗無戲論也三在險遭毒如是迷人謂迷真重故不識四諦以致流落十使險道之中須臾遭毒者以一念有九十剎那一剎那中九百生滅念念減損無有增長猶山瀑水不得停住亦如朝露勢不久停故曰遭毒只在須臾諸毒者準涅槃蛇有四毒見毒觸毒齧毒螫毒虎狼師子熊羆貓貍鷹之屬諸毒備具非險道而何哉二知識指迷有一知識多解大術善禁是毒乃及夜叉諸惡毒等忽逢迷人欲進險道而語之言咄哉男子為何事故而入此路有何異術能制諸毒知識指地藏所謂唯我一人能為救護故云一思益經云於墮邪道衆生生大悲心令入正道不求恩報故名導師即知識也以多解大術善禁是毒故名知識以妙方便隨機開導廣說施戒生天之論普示諦緣道品之門智慧弘深名多解方便巧妙曰大術善禁毒者說道品對治集諦之毒如多貪不淨觀等善信經有神藥樹名摩羅陀祗王厭天下萬毒有神蛇身長一百二十尺蛇行索食有黑頭蟲身長丈五與蛇相逢適舉頭嚙蟲聞藥香屈頭欲走身羅藥樹斷作兩段頭半生得走尾便臭爛諸毒聞此蛇臭衆惡毒氣悉皆消滅忽逢下明大士指出三塗莫知遇而遇之曰忽逢將入而未入曰欲進正與訛入照應語之者示其道也蓋昔已化令出苦無奈志性不定復造惡業重入三塗故憂驚而告語之咄哉喚醒之辭男子警惕之意男子名丈夫大經云能見佛性名為丈夫今既迷佛性故以男子警知本有十輪云如迷方者所逢示導是也何事者驚問也此路指三塗佛言衆生以三惡道為家故指為此以此路二種人到所謂威神業力非此二事終不能到故驚問云為是神通救苦而入為是造業感報而來耶有何異術等審難之辭謂汝有何等奇異法術力能制御諸毒耶異術表異方便對治諸惡法門助顯第一義諦二迷求出路二初迷聞退步求路是迷路人忽聞是語方知惡道即便退步求出此路忽聞者聞四諦也以昔未聞今忽聞之耳例同須達初聞佛字身毛皆豎忽見光明也知惡道者畏苦集也輔行云念念恆簡是非設起非心應以當教是心滅之非心即是險道寶雨經云謂諸有情安住世間具足顛倒墜險惡路隨於非處我今令彼諸有情等入真實路由是如來為諸有情起於大悲是也便退步止十惡修十善也求出路離三塗求人天也二知識接引告語二初接引是善知識提携接手引出險道免諸惡毒至於好道令得安樂準涅槃經具足梵行自修種種善法令諸學人漸遠惡法增長善法名善知識提携接手如前復相扶助提之携之接手挽之引出險道離三塗之苦事免諸惡毒斷習惡之結使生人天之好道得涅槃之安樂也十輪云譬如明月於夜分中能示一切失道衆生平坦正路隨其欲往皆令得至此善男子亦復如是於無明夜能示一切迷三乘道馳騁生死曠野衆生三乘正路隨其所應方便安立令得出離文據此亦應約九界因果明險道過五百由旬到涅槃寶所方為安隱今秪約三塗人天敵論者化五濁迷流之要著也先以小接次令入大方便巧逗妙化隨機毋謂是經秪生人天也點逗於此前後例之二告語二初正告迷人而語之言咄哉迷人自今已後勿履是道此路入者卒難得出復損性命是迷路人亦生感重語言者勸修善道咄哉者重警令寤以廢盡方便之力才令得免惡道故重警醒汝當深念此苦更不可重造惡業載入三塗也所以勸告者嗟惡慧之邪修自甘心於險道遇斯境界豈可緘言念彼愚癡寧容坐視況世尊悲心付囑留大願而普濟迷津菩薩如教奉行示同事而化令成佛如其見迷路而不指正途慈悲安在覩沉溺而不思拯接方便何存故語之言此生死路一入難出復損害法身慧命真險處也迷人亦感重者曩因不知訛入生死險處今忽提醒重登安樂之鄉如飄流者忽爾還家沉淵者俄然登岸豈不深感而極重哉大論云應先以眼見道而後行行時當精勤精勤行時常念如導師所教念已一心進路不順非道正此謂也二囑令轉告臨別之時知識又言若見親知及諸路人若男若女言於此路多諸毒惡喪失性命無令是衆自取其死臨別時將他化也令轉勸者冀展轉傳化化化不絶也親知稟內道未解脫者路人未受道在生死者男女表授定慧言此路者復以苦集轉教前人以路多惡毒必失性命故須知苦斷集慕滅修道毋自喪失法身慧命也已上正教轉告下示轉告意言是衆則何異同胞言取死則實切吾念重自取死句如五苦章句經云昔閻羅王有弘普之慈諸墮地獄者現身問之汝等何為是間罪人對曰我等死時不知行諸惡自然追逐送我來到是間王曰自汝所作今當受之吾不枉汝文豈非自取死耶譬如抱石投淵自沉自墜飛蛾赴火自燋自爛非天與人授也三以法合顯二初合方便救拔二合惡習難脫初又二初直以法合是故地藏菩薩具大慈悲救拔罪苦衆生生人天中令受妙樂是諸罪衆知業道苦脫得出離永不載歷此承險道之喻以法合明也具大慈悲以同體故言具與樂即拔苦拔苦即與樂故言大從理具體上起事造神通而救拔也生人天等正顯慈悲實用人天乃受道之器故須先生人天受諸快樂正合前是善知識提携接手乃至令得安樂之文是諸下明罪衆知悔諸罪衆乃所化之機知業苦是親歷之事故願脫獲出離永不載歷乎此起世經閻羅王受洋銅灌口苦後自發願言願我從今捨身已更得身時但於人間受生如來法中信解剃除鬚髮著袈裟衣既出家已願得道證不復於後世受生文閻王尚爾況其它乎故觀佛三昧經諸菩薩訶責餓鬼言汝於前身無量世時作無限罪謗誹不信墮阿鼻獄受諸苦惱不可具說汝今應當發慈悲心諸餓鬼聞已稱南無佛尋即命終生四天處悔過自責發菩提心諸佛心光不捨是等攝受是輩如羅睺羅教避地獄如愛眼耳今地藏亦然故罪苦衆生發此悔心也正合咄哉迷人乃至自取其死之文二法喻合釋二初合迷人入險如迷路人訛入險道合上譬如有人乃至即遭諸毒之文二合知識指迷二初迷人自出遇善知識引接令出永不復入合上有一知識乃至亦生感重之文二轉告他人逢見他人復勸莫入自言因是迷故得解脫竟更不復入合上臨別之時乃至無令是衆自取其死之文合方便救拔竟二合惡習難脫二初喻合若載履踐猶尚迷訛不覺舊曾所落險道或致失命如墮惡趣直合上難調難伏結惡習重旋出旋入之文謂既出三塗已生人天自應精勤修習無奈習惡未除重造惡業更入三塗猶尚迷本訛入險道竟不覺舊日曾所漏落之險難惡道或有落險不失命者以夙微善出險亦速或有入險致失命者如墮惡趣相似不惟不拔根本業緣併迷宿世之事矣二法合地藏菩薩方便力故使令解脫生人天中旋又載入若業結重永處地獄無解脫時地藏等三句遠合前菩薩以方便力乃至遣悟宿世之事近合地藏菩薩具大慈悲乃至令受妙樂之文旋又載入句合前自是衆生結惡習重乃至而作度脫之文故央掘云我亦不為負債之人如申頭羅速往速反與今文雅合申頭羅者外國幻人作飛人戲令空中來去往反至速業結重者造上品十惡一類既結此業寧望解脫乎蓋於無我法中執有造業既迷真諦自違寂理故云縛從自縛解從自解若於法法求空自然門門解脫閻羅正歎竟二鬼王護助二初惡毒擁護二主命助修初分二初鬼王護世二如來讚喜初又二初敘己行處爾時惡毒鬼王合掌恭敬白佛言世尊我等諸鬼王其數無量在閻浮提或利益人或損害人各各不同然是業報使我眷屬遊行世界多惡少善惡毒為衆鬼王首故率先陳白先敘鬼數住處數無量者絓是九州房廟萬國之靈水府山精風師雨伯三千眷屬五百徒黨其為數也無能量之若論住處有正邊不同正處在閻浮提五百由旬之下閻羅所統邊處不定有威德者住山谷空中海邊皆有宮殿無威德者依不淨糞穢草木冢墓屏廁故塸皆無舍宅竝在閻浮提中或利益下明鬼行業準長阿含佛告比丘一切男女生時皆鬼神隨逐守護今人何故有為鬼神所觸嬈者有不為鬼神所觸嬈者以世人為非法行邪見作十惡業如是百千人乃有一神護耳若修善法見正信修十善業如是一人有百千神護故有為鬼神觸嬈有不為觸嬈故善者利人處多惡者損人處多夫論鬼神之法特喜妖邪冥密之中或處幽巖乍依高隴絶㵎深叢之裏荒郊野芿之中異種音聲特奇形勢搖動凡識恐怖愚情假使威光虗僞怪相擅作威福妄行損增萬別千差所行不等然是下明鬼感報準正法念經明其因行乃由貪嫉邪倿諂曲欺誑積財不施乘是業因報生鬼道惡心熏種殊難悛革故我之眷屬遊行世間多惡少善外書云鬼神者其禍福發揚之驗乎世者也宜律師問天人陸玄暢云涪州相思寺古跡曰此迦葉佛時山神羅子明是佛弟子生憎破戒者發願作惡鬼噉破戒人因願受身作此山神所主土地七千餘里年噉萬人以上迦葉教化調伏受五戒因不噉人恐後心變故佛留跡又南海循州北山興寧縣界靈龕寺多有靈跡此文殊弟子為此山神多造惡業文殊愍化遂識宿命請留跡禮事得離諸惡文殊為現今者是於貞觀三年山神命終生兜率天別有一鬼來居即舊神親家大造諸惡舊神憐之請文殊為現小跡後神又從正法故大小跡現二護人修為二初所歷善處過人家庭或城邑聚落莊園房舍或有男子女人修毛髮善事乃至懸一幡一蓋少香少華供養佛像及菩薩像或轉讀尊經燒香供養一句一偈初明鬼神遊處竊原世人造善於幽得報於顯世謂陰德人咸信矣造惡於顯得報於幽斯理灼然寧不信耶故聖人陳福以勸善示禍以戒惡夫殃福蓋有其根不可無因而妄致善惡當收其報必非無應而徒已蓋準長阿含二十佛告比丘一切人民所居舍宅皆有鬼神無有空者云云況有行空諸天遊世衆鬼冥祥記載普趙泰字文和清河貝丘人心痛而死二人引至太山南入黑門有絳衣人坐大屋下以次呼名問生時所作罪福汝等實言此恆遣六部使者常在人間疏記善惡具有條狀不可得虗故太上云天地有司過之神又有三台北斗神君三尸神竈神凡人有過大則奪紀小則奪算故不可不慎也次明所修善事無論多少乃至極小如毛極細如髮之善事又無論其營建精蘭裝塑聖像乃至懸掛一幡一蓋燒散少香少華供養佛菩薩像如趙泰按行地獄出獄門見有二人賫文書來語獄吏言有三人其家為其於塔寺懸幡燒香救解其罪可出福舍俄見三人自獄而出已有自然衣服完整在身南詣開光大舍泰亦隨入金玉牀上見一神人殊好非常府君恭敬作禮泰問何人吏曰號名世尊度人之師有願令惡道中人皆出聽經時有百萬九千人皆出地獄故大品云一華散空乃至畢苦其福不盡論云言至畢苦者二死盡也蓋言成佛散華之福猶尚不盡文燒香之福其例實多或轉讀地藏本經及諸大乘經燒香供養不論全部全卷乃至一句一偈荊溪云一句一偈增進菩提一色一香永無退轉正此謂也歟哉二令護惡事我等鬼王敬禮是人如過去現在未來諸佛敕諸小鬼各有大力及土地分便令衛護不令惡事橫事惡病橫病乃至不如意事近於此舍等處何況入門我等句示鬼王敬善敕諸下示遣護却惡問鬼是惡儔何能見作毫善敬禮如三世佛耶答所言佛者修一切善法而得今男女修諸善事佛果斯栽故鬼神敬之如過去莊嚴劫之千佛現在仁賢劫之千佛未來星宿劫之千佛一體無二也抑豈敬禮如佛現在能却諸惡以由諸王即敕小鬼各有大力者及土地分者便令擁衛門戶分內所司之地云土地分即今方隅社令是也惡事橫事如羅雲忍辱經云願與福違夜常惡夢妖怪首尾飛禍縱橫今既修福無惡橫之事所生常安衆禍消滅矣惡病橫病者梵語迦摩羅此云黃病又惡垢亦癩病珊若婆此云廢風病一發不起阿薩闍此云不可治病弘明集云必死之病雖聖莫蠲可療之疾待醫方愈上皆不治之惡病也更有瘟災疫氣相染相侵或耗家財或致喪命如宋司馬文宣頗信佛法弟喪月餘忽一鬼附其靈座時南林靈味二寺僧與鬼言論欵曲鬼云昔為尊貴以犯衆惡受此鬼身去寅年有四百部鬼大行疾癘所應鍾災者不忤道人耳而犯橫極衆多濫福善故使我來監察則橫病所觸皆不修善所致今既修福身強少病財福榮尊也不如意者家業衰耗事不諧偶所處不寧心常恐怖今既修福鬼神衛護尚不令諸惡近其住處況縱之使入門耶二如來讚喜佛讚鬼王善哉善哉汝等及與閻羅能如是擁護善男女等吾亦告梵王帝釋令衛護汝何故如來讚喜蓋鬼王率多凶惡如鬼子母千子五百在天上嬈害諸天五百在世間嬈諸人民極嫉害惡令人祠祀烹殺使入地獄今諸鬼王與閻羅天子既能如此擁護修善男女使無橫事惡病及不如意事不許近舍可謂善之至矣故一善其改惡以護世一善其却橫以增禧故雙歎之吾今亦告語統小千世界之大梵主攝欲界之桓因均以天力衛護汝等轉鐵牀洋銅之現厄脫幽冥主攝之宿緣竝由護法衛善而致之也二主命助修二初當機白事二如來發本初分三初主命述意二世尊讚勸三鬼王受命初又二初陳我業緣主命二轉釋人不會意初復分二初經家敘名說是語時會中有一鬼王名曰主命惡毒陳事既竟主命越班白己事者何也夫世人之生也有命而已矣其修善者謂之衛生其作惡者謂之戕生春秋成公篇云民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍今世人不會鬼王護人之意唯循惡趂毒可謂自戕生命逆天甚矣然命之所重在生死之間生也命存死也命絶寶雨經云如因風力有出入息能令一切有情活命然命之生死如日月之出沒而業之善惡如形影之追隨故於生死之際必須修善衛生主命白事意在斯乎然言主者不過司命存亡非能與奪人命令生之死之獄府主死生案者是其職事耳二鬼王陳事二初陳己所主事白佛言世尊我本業緣主閻浮人命生時死時我皆主之首舉業緣者以一切衆生隨自業轉若造作增上慳貪身語意惡行往生琰摩界中感饑渴業經百千歲不聞水名豈能得見況復得觸此餓鬼之最劣者若惡中兼布施因生鬼道中大有威德為諸鬼王雖威德為王恆為諸天驅役守門防邏導從給使亦繫往業其主命之職亦循業而為之故云我本業緣主南洲人命其生時死時乃吾之專司而不能違也二明人不會意在我本願甚欲利益自是衆生不會我意致令生死俱不得安意者思量之稱謂我心思量要如此無奈人不體心拂戾我意既觸吾心便不護彼故令生者死者俱不得安樂乃人自取殃禍非我之過咎也二轉釋人不會意二初禁生時殺害二勸死時修善初又二初修善得樂何以故是閻浮提人初生之時不問男女或欲生時但作善事增益舍宅自令土地無量歡喜擁護子母得大安樂利益眷屬轉釋之意在何夫人託胎皆乘夙業修行道地經云人行不純或善或惡當至人道父母合會精不失時子來應生其母胎通無所拘礙心懷歡喜父時精下即失中陰則入胞胎故勸此時但作善事益舍宅之威光增土地之歡喜舍於中舍息也宅擇也擇吉處而營之也土吐也吐生萬物也地諦也五土所生莫不信諦也準長阿含初生之人互相是非地膚不現共取粳米食之其身粗醜有男女形互相瞻視遂生欲想共在屏處為不淨行餘人呵責自悔過言我所為非即身投地女人見其投地不起即便送食故世間便有不善夫主之名以送飯與夫遂名為妻其後衆生遂為淫泆為自障蔽遂造屋舍以此因緣始有舍名淫泆轉盛遂成夫妻有餘衆生壽行福盡從光音天命終來生此間在母胎中因此世間有處胎名此夫妻舍宇胎産之源也土地乃護宅護身之主既歡喜已自來擁護令子母均得大安併利益眷屬利益有二生時子母無恙初令合門歡喜子既增隆福善後能昌熾門闌夙行善者彌增福壽夙行惡者亦消其罪也二作惡受殃二初直示勿殺或已生下慎勿殺害取諸鮮味供給産母及廣聚眷屬飲酒食肉歌樂絃管能令子母不得安樂殺害一事今古同憐無非體天道好生之心存人生難得之命豈可為我口體之養誕兒之慶傷生杌命剖腹刮鱗違天之仁干神之怒乎故雲棲大師曰生子不宜殺生人無子則悲有子則喜不思一切禽獸亦各愛其子慶我子生令他子死於心安乎夫嬰孩始生不為積福而反殺生造業亦太愚矣昔周豫學士嘗煮鱔見其鞠身向上而以首尾就湯剖之見腹中有子乃知鞠身避湯者以愛子之故烏呼雖人畜不同愛子之心一也何得慶我母子之生使彼母子抱苦就終含悲向盡既受屠割復嬰煎熬苦痛難言徹骨入髓當此之時吾之一點仁心蚤殄彼之無窮怨氣長存欲求不索報於來生吾未之信也廣聚眷屬等所以慶己子之生也主命禁勿殺者所以增子之福壽也古云酒是和神之藥肉為充饑之膳古今同味今何見鄙良以肉由殺命酒能亂神不食是理寧可為非鴦掘經佛言一切衆生生死輪轉無非父母兄弟姊妹猶如伎兒變易無常自肉他肉則是一肉是故諸佛悉不食肉況飲酒斷智慧種食肉斷慈悲種來種尚斷安保現種之不斷乎若遵主命之訓不惟消災謝過併能集福延齡請細思之毋泥俗習歌樂如前絃管絲竹之音併此亦誡者蓋飲酒食肉亂性而傷慈歌樂管絃蕩情而逸志既違天地之仁德大乖主命之慈心減舍宅之威光觸土地之護意子母不得安樂其過也將誰歸二轉釋其意二初産時惡鬼噉血何以故是産難時有無數惡鬼及魍魎精魅欲食腥血轉釋之意謂有惡鬼欲食腥血也以生時在地之血惡露臭處鬼魅來嬈癎邪所中死尸所觸蠱道顛鬼各伺犯之如四交道所墮肉段烏鵄鵰狼各來爭之諸邪妖鬼欲得兒便周匝圍繞亦復如是護淨經云餓鬼常守捕婦女産藏血不淨以為飲食分別善惡經偈云好調嬈老小乞兒與病人後為臊餓鬼食産乳惡露鬼之惡業殊可憐愍矣二我令土地荷護三初護令安樂是我早令舍宅土地靈祇荷護子母使令安樂而得利益主命自謂我既主人之命人之將生干係在我故先令土地荷護子母是使其如背負物不可失墜一般故云荷護醯摩跋陀翻舍主恐是護宅神名安樂利益者使安隱而生聽呱聲之報父有添丁之喜家無斷火之憂固土地之荷護實主命之遣令準道藏人間生男女時九天玄女遣天神於空中稱唱奉恭生男唱奉一千六百聲欲其在家之奉親出仕之奉君也生女唱恭一千六百聲令其歸夫家時恭敬其公姑與夫也奉恭欲唱吉凶只在片時此之謂也二不知設福如是之人見安樂故便合設福答諸土地翻為殺害集聚眷屬初句點産家男女既見産育安樂應思安樂之故功由土地便合設福善之業以酬宅主之恩今翻殺害生靈聚集眷屬飲酒食肉歌樂絃管觸神之怒失思甚矣先明萬曆三十三年槐亭蔡公諱承植守嘉興禁諭殺牲祀神其略曰鬼神享用與人間不同人好酒肉便以酒肉祀神譬如蛆蟲噉糞便以糞貢人豈不得罪於人蓋神明清淨聞人間酒肉污穢厭惡不暇豈肯鑒嘗故郊祀者止用淡酒承祭者戒酒戒葷意可知已至於餓鬼不能飲水何能食肉目連救母事可鑒已凡祀神明宜焚香設齊并誦金剛經一卷神自鑑納陰司極重此經若仍前殺牲污神不惟無益且遭罪譴余謂蔡明府真是現宰官身為萬鬼萬民說法了也惜世人不知信奉自取過咎奈之何哉三結示殃損以是之故犯殃自受子母俱損犯殃等者經云有夜叉羅剎常喜噉人胎能令人無子傷害於胞胎及生時奪命為其作嬈害則生子夭殤乃由人殺害自致非土地不護也二勸死時修善二初陳己本意二示人不會初又二初示善惡俱超又閻浮提臨命終人不問善惡我欲令是命終之人不落惡道何況自修善根增我力故法句經云命如華果熟常恐會零落已生皆有苦孰能致不死古云生則八識扶持死則四大離散迅矣百齡終歸磨滅巡環三界運轉靡停故經云有始有終既生則滅誰能禁其不死耶但臨終之時平時所造善惡之業其相俱時頓現隨業趣生法句云人作善惡殃福隨人雖更生死不可得免然在我本意不問其生平作善作惡俱令生於善處不令落於惡道也者何況其人原不作惡自修施戒彼既善根修成令我亦增威熾其感報之時必生天上人間矣二明鬼神變惡是閻浮提行善之人臨命終時亦有百千惡道鬼神或變作父母乃至諸眷屬引接亡人令落惡道何況本造惡者淨度三昧經云若人造善惡業生天墮獄各有迎人病欲死時眼自見來迎應生天上者天神持天衣伎樂來迎應生它方者眼見尊人為說妙言若為惡墮地獄者眼見兵士持刀𥍿矛戟索圍繞所見不同口不能言各隨所作各得其果文故知臨終之時實有惡鬼嬈亂即使向行善者尚難却其播弄或變作父母兄弟伯叔姑姨令心著愛精神瞀亂鬼即以似父母等身引入惡道何況本造惡者蓋世人將死天帝行下文書死期未到太山鬼神促令造罪令落惡道當知即此輩播弄更有誰乎故大論引分別業經佛告阿難行惡人好處生行善人惡處生阿難曰是事云何佛言惡人今世罪業未熟宿世善業已熟故今雖為惡而生好處或臨死時善心心數法生亦生好處行善人生惡處者今世善未熟過去惡已熟故今雖為善而生惡處或臨死時不善心心數法生亦生惡處故俱舍云若人臨終起邪見心是人以先不善為緣故墮地獄是則即使無鬼引接尚難必其善者決生善處惡者定生惡處況本造惡之人自然引入惡道矣二示人不會二初亡者神識惛昧世尊如是閻浮提男子女人臨命終時神識惛昧不辨善惡乃至眼耳更無見聞臨終識惛者人身中識神或時頓去或去有先後唯第八識最後去亦何有知涅槃云如人捨命受大苦時宗親圍繞號哭懊惱其人惶怖莫知依救雖有五情無所知覺肢節戰動不能自持身體虗冷暖氣欲盡見先所修善惡報相如日垂沒山陵堆阜影現東移理無西逝衆生業果亦復如是故臨終時諸根黯然識不能辨眼耳雖在何能見聞二眷屬當為修福二初多善緣離惡道苦是諸眷屬當須設大供養轉讀尊經念佛菩薩名號如是善緣能令亡者離諸惡道諸魔鬼神悉皆退散當須設供者事之要處也譬船行險處急宜著力稍有錯時人船俱失良由前陰將絶中陰身起中陰有二種一善業果二惡業果因善業故得善覺觀因惡業故得惡覺觀隨業因緣向受生處五戒經云生死險難實可驚怖故須設大供養轉經稱名供言大者謂傾己資財竭力營辦然於供養之際須離謂實之心若香若華體是法界能供所供性本真空稱量出生順性常住普獻三寶等供十方雖曰施財是真法供故名為大念佛菩薩若光明疏云觀心既然觀佛亦爾故言念佛此指理觀今但稱名也大品云若有一人稱南無佛乃至畢苦其福不盡大論問云何但空稱名字便得畢苦其福不盡答是曾聞佛功德能度人老病死苦若多若少供養及稱佛名字得無量福文故大悲經云若能至誠心念佛功德乃至一華散於空中於未來世作天梵王其福不盡以其不盡終至涅槃今既資以供經稱名之善緣自能令亡者離三塗惡道變形魔鬼不却而自退散矣二少善緣除無間罪世尊一切衆生臨命終時若得聞一佛名一菩薩名或大乘經典一句一偈我觀如是輩人除五無間殺害之罪小小惡業合墮惡趣者尋即解脫上言設供讀經稱名三種功德資冥福離惡道却鬼神多福之功也今但於佛菩薩秪一名而已於經典只一句一偈而已即能除極重五無間罪一偈天竺但數字滿三十二即為一偈號阿耨窣覩婆或輸盧迦波此亦有大因緣故臨終得聞上品大罪既除其小小中下惡業合當墮邊小獄者當下解脫超升如赫日銷霜寧有餘愆故華嚴云寧受地獄苦得聞諸佛名不受無量樂而不聞佛名所以於往昔無數劫受苦流轉生死中不聞佛名故問云何但聞佛名便得道耶答有衆生福德淳熟結使心薄若聞佛名即時得道如新淨白氈易為受色聞佛名福功叵量矣主命述意竟二世尊讚勸佛告主命鬼王汝大慈故能發如是大願於生死中護諸衆生若未來世中有男子女人至生死時汝莫退是願總令解脫永得安樂此如來讚勸之文言大慈則同諸佛之心發大願則同菩薩之念今既以佛心為心能發如是大願即是佛菩薩矣今故勸汝凡未來世中男女臨生死時汝莫退救護之願不間有罪無罪大惡小惡總令解脫三塗得在人天安樂真不負我今日之叮嚀矣三鬼王受命二初明已擁護鬼王白佛言願不有慮我畢是形念念擁護閻浮衆生生時死時俱得安樂如文二願生信受但願諸衆生於生死時信受我語無不解脫獲大利益世記經佛言一切男子女人初始生時皆有鬼神隨逐擁護若其死時彼守護鬼攝其精氣其人則死故主命願人生時死時慎勿殺害應修善緣大集云若修慈者當捨身命時見十方佛手摩其頂蒙手觸故心安快樂尋得往生清淨佛土故雲棲有祭先不宜殺生以資冥福夫八珍羅於前安能起九泉之遺骨而使之食乎無益而有害智者不為也二如來發本三初發遠本爾時佛告地藏菩薩是大鬼王主命者已曾經百千生作大鬼王於生死中擁護衆生是大士慈悲願故現大鬼身實非鬼也凡論本跡本同而跡異蓋從本垂跡跡不異本因跡顯本本不離迹本迹雖殊不思議一故舉百千劫已前為本是與佛無二道也今此鬼身乃慈悲願上所現譬一月在天影臨衆水若執影為真則失本矣故曰現大鬼身實非鬼也昔生公說法虎丘有一鬼現身日來聽法生公諭其託生鬼答以詩云做鬼經今五百秋也無煩惱也無愁生公勸我為人去只恐為人不到頭今大鬼王經百千生豈非乘願力來現鬼身而說法也者二記劫國却後過一百七十劫當得成佛號曰無相如來劫名安樂世界名淨住其佛壽命不可計劫當得成佛者初住百界作佛也無相者不但無生住異滅之相無相亦無故名無相然以鬼相而成無相非頑同太虗空無一物無相即相也以後之無相而觀鬼相非猙獰凶惡示有諸怖相即無相也今日之鬼相即不思議之妙有它世之無相即不思議之真空有即空故有不可得空即有故空不可名空有既亡中道不立若鬼若佛其名安寄若相無相其體奚存名號既爾劫界亦然孰謂鬼神恆受驅使不安樂乎劫劫本自安樂孰謂鬼神攝屬冥司不淨住乎界界由來淨住孰謂鬼壽所有日月秪五百歲乎佛壽不可計劫故知以本而驗跡跡還同本以因而望果果不異因發本之意妙在斯乎三結度人地藏是大鬼王其事如是不可思議所度天人亦不可限量其事不可思議者約本而歎跡也如阿難救𦦨口經云其中為於主宰統領上首之者皆是住不可思議解脫菩薩慈悲誓願分形布影示現化身在六道中同類受苦設於方便為善知識成熟利樂一切有情證大涅槃文是則主命鬼王等及閻羅天子亦豈實業受生三時受苦者哉又復應知一切皆是浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體若了此意則於諸聖權實化門思過半矣大章第四明成佛因分二初示成佛正行二顯成佛助道今初品題稱佛名號品第九二品文分三初地藏為說利益二如來許救罪苦三大士正稱佛名今初爾時地藏菩薩摩訶薩白佛言世尊我今為未來衆生演利益事於生死中得大利益唯願世尊聽我說之大士特說此佛名品者由前來多番說稱念佛菩薩名不問有罪無罪悉皆消滅得生人天乃至畢苦今故略出十名以為杓音標鵠次顯多佛以至沙河也為未來衆生有二意一體佛天宮付囑之心二顯己南洲救拔之念佛慈未艾我願無窮良由過去者已獲超淪現在者今沾至化唯是未來衆生罔知出要偏造惡緣若不垂超脫之方乃甘與淪胥之苦如詒厥孫謀所慮深遠故云為未來衆生演利益事利益有世間出世間之不同及藏通別圓之不等今是出世上利圓教果益然言於生死中得大利益者夫論生死乃衆生大患如佛說四不可得經佛言世有四事不可以護致一曰年幼顏色煒燁衆人愛敬一旦忽耄頭白齒落欲使常少不老者終不可得二謂身體強健謂為豪強疾病卒至衆患難喻欲免常安無病終不可得三謂欲求長壽五欲永存非常對至如風吹雲冀念長生終不可得四謂父母兄弟恩愛榮樂宿對卒至如湯消雪欲求不死終不可得古今以來天地成立無免四難之患以斯四苦佛興於世文今欲脫此四苦莫過稱佛名號之利益矣大經云假使一月常以衣食供養一切衆生不如有人一念念佛所得功德十六分之一假使鍛金為人車馬運載乃至衆寶各滿百數以用布施不如發一心向佛舉足一步所得功德無量無邊文以故東土倡始於遠公西京大盛於善導吾祖疏觀經而論十疑四明鈔妙宗而修大悲永明萬善同歸慈雲二門要行展轉沿習代不乏人至明萬曆間雲棲和尚出德業充符聲名洋益純提淨土戶曉家傳蓋由此法門能橫截惡道直造本源是故西天東土咸稱異妙方便功德不可思議誠非餘行可及然須諦信不疑精勤無間行住坐臥之中春夏秋冬之內穢心滌蕩淨念聯綿有不脫苦超升者佛祖皆為誑語矣故今地藏說此救世妙法令未來衆生出苦有方也二如來許救罪苦二初敦逼速說佛告地藏菩薩汝今欲興慈悲救拔一切罪苦六道衆生演不思議事今正是時唯當速說初述所說事謂汝欲救六道衆生起此無緣同體慈悲誠拔苦之要門乃利生之妙術神丹點鐵至理革凡功德巍巍誠難思議汝欲說者今正是時如來化緣將熄滅度靡常不此申救更待何時故敦逼其速說也二讚慰無憂吾即涅槃使汝早畢是願吾亦無憂現在未來一切衆生此示敦逼之意涅槃奘三藏翻圓寂德無不備稱圓障無不盡稱寂肇公云泥洹盡諦者豈直結盡而已則生死永寂滅故謂之盡矣然吾即涅槃句人不忍聞如遊行經天人等皆歎言如來滅度何其駛哉世尊滅度何其疾哉大法淪翳何其速哉羣生長衰世間眼滅譬如大樹根拔枝條摧折又如斬蛇宛轉回遑莫知所湊是時諸天亦復皆於空中徘徊騷擾悲號躃踊是也然機薪既盡孰能留應火之不亡耶使汝早畢是願者亦縱辭也大士之願何能蚤畢甚言此法之妙縱吾即入涅槃縱使汝早畢是願吾亦不憂現在未來一切衆生矣何也有此稱名之法人人可不墮苦竝趣人天修行終至成佛無疑能體佛心而達佛意善繼志而述事者莫過我地藏慈尊矣故許令速說而讚慰之也三大士正稱佛名二初稱名二結益初分二初別出十名自為十一無邊身佛乃至第十大通山王佛今初為二初稱名二顯益下九例此地藏菩薩白佛言世尊過去無量阿僧祇劫有佛出世號無邊身如來若有男子女人聞是佛名暫生恭敬即得超越四十劫生死重罪何況塑畫形像供養讚歎其人獲福無量無邊佛佛皆指過去者自地藏發心已來所值之諸佛也凡所舉佛名皆後遠於前顯己發心遠且久也有佛出世四字慶幸之語觀經疏云若佛出世方能闡智慧日識三寶之光明開甘露門知十號之妙味因說生解於寶適悅故喻如優曇華時一現耳無邊身者三身皆有此意唯識論云一自性身謂諸如來真淨法界具無邊際真實功德是一切平等實性即自性身亦名法身此法身之無邊也又云自受用身謂諸如來三無數劫修習無量福德資糧所起無邊真實功德此報身之無邊也華嚴云清淨妙法身湛然應一切應即應身一切即無邊此應身之無邊也故知三身即一一即三身也下顯益男子女人標能聞機初聞佛名暫生恭敬者暫謂歷時不久生謂當下發心恭謂束身翹仰敬謂心無異緣即此一念微解無非本性佛法故於暫生恭敬心中早已成名字佛超越四十劫生死重罪復奚疑哉然此聞名暫敬但得理性初開便能超極重罪又何況塑畫形像而嚴餝之陳羅香華而供養之梵唄功德而讚歎之其人所獲之福自然量不可測邊莫能窮唯佛與佛乃能知見耳二寶性如來又於過去恆河沙劫有佛出世號寶性如來若有男子女人聞是佛名一彈指頃發心歸依是人於無上道永不退轉恆河沙劫較前更多矣寶性者蓮華面經云諸佛如來是衆生寶寶有七種而金寶居首真諦釋金四義一色無變二體無染三轉作無礙四令人富以譬法身常淨我樂四德乃性寶也顯益中聞是佛名一彈指等者三乘之士歷僧祇劫而功行無成念佛之門於彈指頃而位階不退異哉奇功也發心歸依希有經廣較三歸功德云教四天下及六欲天得四果不如三歸依功德多故增一阿含佛說偈云諸有歸依佛不墮三惡趣盡漏處人天便當至涅槃此憑自性佛寶以歸寶性故於無上之道永不退轉此唯約圓教才聞佛名以根利故或超入十信即淨六根或頓入初住開佛知見故位不退從初信至七信見思粗垢任運先落見圓真諦理行不退在八九十信入假位中起四門諸行斷內外塵沙備俗諦理念不退在圓初住去念念進趣果海任運流入真源故智論云無生忍法即是阿惟越致地若約得意為言名字即佛橫具三不退云云問才聞寶性佛名彈指發心歸依何能於無上道得永不退轉耶答北齊悟中論而頓入初住南嶽證法華而位登十信其例可識奚復疑斯準觀經疏引涅槃云一切衆生即是佛如貧女舍寶衆物具存力士額珠圓明頓在但未遇智者點示其處日受貧窮之厄時懷失珠之憂才聞指示即知本有貧女發藏受用靡窮力士見珠歡喜無量故知衆生解後與佛毫無差忒永不退轉自應仰信也三波頭摩勝如來又於過去有佛出世號波頭摩勝如來若有男子女人聞是佛名歷於耳根是人當得千返生於六欲天中何況志心稱念波頭摩亦名鉢特摩此云紅蓮華勝者佛地論云四蓮以紅蓮為勝故央掘云第一鉢曇摩清淨柔軟義塵水所不污是故稽首禮顯益中千返生六欲天中者何以蓮華處泥不染出水恆芬表聞名者雖生欲天實不著粗弊五塵以解離聞性本空生天亦寂以空處即假權示天身以度實生著欲之者聞名尚爾況志心稱念者乎他日必證波頭摩勝矣佛蓮千瓣表千法明門故云千返四師子吼佛又於過去不可說不可說阿僧祇劫有佛出世號師子吼如來若有男子女人聞是佛名一念歸依是人得遇無量諸佛摩頂授記長阿含十六佛告迦葉婆羅門云所謂師子者是如來至真等正覺於大衆中廣說法時自在無畏故號師子汝謂如來師子吼時不勇悍耶勿造斯觀如來師子吼勇悍無畏故云譬如師子吼蠕動皆怖畏如來震法音降伏諸外道則佛號師子吼正取說法之相也故今一念歸依便得遇無量諸佛各與摩頂授記將來必得種智說法如師子吼其有聞者或喜或怖穴處者隱縮水居者深入山藏者潛伏廄象振鎖狂逸而去鳥飛空中高翔而遠逝矣五拘留孫佛又於過去有佛出世號拘留孫佛若有男子女人聞是佛名志心瞻禮或復讚歎是人於賢劫千佛會中為大梵王得授上記拘留孫梵名也此云所應斷此約五住二死斷處立名又翻作用莊嚴此約修因證果為名此非賢劫第九減至六萬歲時出世之佛準萬佛名經有無量七佛之名若謂下有賢劫之語應是賢劫首佛則於上過去之言既妨復於下恆沙之劫有礙也顯益中聞佛名屬意是顯正因佛性瞻禮屬身是顯緣因佛性讚歎屬口是顯了因佛性由此三因種緣故於賢劫千佛會中皆為大梵天王修四等心行業清淨普為三有請轉法輪故於佛佛之下親受上妙之記即以梵身成大覺果法苑曰今據賢劫一代分為壞空成住就此今住劫有千佛出現三佛已往今是第四依立世阿毗曇論十一劫是未來八劫是過去今釋迦佛當第九劫內成佛問此賢劫中成壞空劫佛不出世唯取住劫此住劫中未來唯十一小劫何得頓有九百九十六佛一時出世耶答實如所難會意稍難今依二經略知途路藥王藥上經云佛言我曾往昔無數劫時於妙光佛末法之中出家學道聞是五十三佛名心生歡喜復教它人令得聞持展轉相教乃至三千人異口同音一心敬禮即得超越無數億劫生死之罪其前千人者華光佛為首下至毗舍浮佛於莊嚴劫得成為佛過去千佛是也此中千佛者拘留孫佛為首下至樓至如來於賢劫中次第成佛後千佛者日光如來為首下至須彌相佛於星宿劫中當得成佛若依佛名經過去九十一劫有佛名毗婆尸如來過去三十劫有佛出世名尸棄如來即此劫中復有佛出世名毗舍浮如來問此九十一劫為大為小答是大劫也何以得知依舊婆沙論云釋迦菩薩因地從毗婆尸佛以來種相好業至今第九住劫以經九十一大劫故舊俱舍論云由禮底沙佛精進力故即得超九大劫究竟成佛故知九劫既大餘九十一劫寧不是大耶既是大劫故千佛出世無所疑也又依立世阿毗曇二十住劫中過去八劫已有三佛出世釋迦當現在第九劫出世即以前九劫已有四佛出世未來猶有十一劫焉知不有多佛出世準此義意縱是小劫多佛出世亦自無妨良由衆生根有強弱故感見不同恐後賢致疑略示梗槩耳六毗婆尸佛又於過去有佛出世號毗婆尸若有男子女人聞是佛名永不墮惡道常生人天受勝妙樂毗婆尸亦名維衛此云勝觀俱舍論云三無數劫滿逆次逢勝觀此由釋迦於勝觀佛初種相好故然若以此為過去莊嚴劫千佛中之後三佛則拘留孫為賢劫中之首佛更無疑矣須知應依前論不可近指以毗婆尸佛甚多安可專指釋迦種相初逢之勝觀也顯益中聞是佛名即不墮三惡道此非易事準論釋迦世尊初阿僧祇從此常離女身及四惡趣準妙玄釋籤第三僧祇始離五障方乃不墮常生人天者如戒疏初僧祇得五種功德一生人天二生貴家三男身四根具五知宿命文句云不生三惡位不退不生邊地諸根完具不受女身即行不退常識宿命即念不退文故知不墮惡道常生人天誠非易易者今圓根最利故才聞佛名即解自性故能頓得人天勝妙樂者詳長阿含世記經雖生人天唯以法喜禪悅為樂如大莊嚴論佛說偈云無病第一利知足第一富善友第一親涅槃第一樂此乃受即不受無受即受也七寶勝如來又於過去無量無數恆河沙劫有佛出世號寶勝如來若有男子女人聞是佛名畢竟不墮惡道常在天上受勝妙樂梵名囉怛曩毗婆囉怛曩翻寶毗婆翻勝寶之勝者必是何物華嚴云如海中有四珠一切衆寶皆從之生若無此四珠一切寶物漸就滅盡諸小龍神不能得見唯娑竭羅龍王密置深寶藏中此深寶藏有四種名一名衆寶積聚二名無盡寶藏三名遠熾然四名一切莊嚴聚此雖寶中之勝然是世寶次第以對常樂我淨出世之寶此之四德唯佛與佛乃能證得如娑竭羅龍王密置寶藏是也餘人未證如小龍神不能得見是也此四德出生不資如一切衆寶皆從之生是也故光明玄云如世珍寶凡情所貴乃則如理究竟可貴之寶名於凡情可重之寶故佛號寶勝也顯益大意如前光明流水品十千魚得聞寶勝之名尚盡生忉利況男女聞名寧有不得勝妙樂者八寶相佛又於過去有佛出世號寶相如來若有男子女人聞是佛名生恭敬心是人不久得阿羅漢果佛名寶相者亦約相寶以譬性寶華嚴云又大海中有四熾然光明大寶一名日藏二名離潤三名火珠四名究竟無餘若大海無此四寶四天下金剛圍山乃至非想非非想處皆悉漂沒即大論所謂消水珠是也日藏表大圓鏡智離潤表妙觀察智火珠表平等性智究竟表成所作智若如來法海無此四智饒益衆生三界六道悉皆漂沒故大師云無去無來法性實相實相尊貴故名寶相是也顯益中聞佛名已生恭敬心則身不瞻禮口不讚歎審矣而男女輩不久之間得阿羅漢果功德深矣若約三藏論如經日藏光明能變海水為酪今謂世第一十五心見道十六心入須陀洹果轉賢為聖正如變水為酪離潤光明能變海酪為酥今言見道後起於修道斷欲界九品思中前六品盡入斯陀含正如變酪為酥火珠光明能然海酥以三果斷欲界後三品思盡永不來欲界受生正如燒然海酥究竟無餘光明能然海酥永盡無餘以四果斷上下五分俱盡無復餘思永不受後世之生正如然海酥永盡無餘矣今約藏教以對圓位則初信至七信三界見思任運斷盡與藏教第四果阿羅漢齊故妙玄云同住四住此處為齊若伏無明三藏則劣正斯之謂今本約圓為正所以先約三藏小果者欲開藏教之阿羅漢成圓佛之阿羅漢果也九袈裟幢佛又於過去無量阿僧祇劫有佛出世號袈裟幢如來若有男子女人聞是佛名者超一百大劫生死之罪此約莊嚴標相以彰佛德洪名心地觀云袈裟即是如來寶幢之相著袈裟時生寶幢想能滅衆罪生諸福德猶如良田能善增長菩薩道故猶如甲胄煩惱毒箭不能害故以如來因修萬行致此果德莊嚴故男女聞名頓超百劫生死之罪十大通山王佛又於過去有佛出世號大通山王如來若有男子女人間是佛名者是人得遇恆河沙佛廣為說法必成菩提山王即須彌山七金環拱峙立海中故特稱王大者高八萬四千由旬通者光明四面照映此喻報身佛也小般若云譬如有人身如須彌山王是身為大不須菩提言甚大大師云此即非果而果因大故果大得法五陰成就法身故言大如須彌以譬性色色大故般若大如山大神亦大習果既圓報果亦滿故言大身則大通是般若因山王是報身果四智究竟莊嚴也顯益中凡有聞此佛名者得遇恆河沙佛為說法者因聞大通之般若故感諸佛為說般若令全性以起修既聞山王之果體故感諸佛授記令從因而至果聞一佛名而得修性一如因果成就佛力不可思議果報亦不可思議矣三總指諸佛又於過去有淨月佛山王佛智勝佛淨名王佛智成就佛無上佛妙聲佛滿月佛月面佛有如是等不可說佛淨月者佛真法身猶若虗空應物現形如水中月月喻佛身法身如空心光皎潔從真垂應影現水中此明三身一體也山王梵名勢禮捺囉惹此云山王大方等陀羅尼經華聚菩薩讚佛云世尊金色如金山猶如日光照世間能拔一切諸苦惱我今稽首大法王同智勝即一切種智大品云薩婆若秦言一切智相是聲聞辟支佛智道種智是菩薩智一切種智是諸佛智以一切種類相貌皆知故於諸智稱勝淨名王五住二死淨盡淨自在故立此勝稱集一切福德三昧經東方去此三十二剎國名普無垢佛號淨名王釋迦於久遠阿僧祇劫為最勝仙從聞集一切福德三昧後生彼國今得成佛智成就以權實二智悉成就故無上者尊極之號也有所斷者名有上士既無所斷名無上矣如佛說無上處經云若衆生於佛無上處起信向心者於天人中得無上果妙聲正法念云山谷曠野其中多有迦陵頻伽出妙音聲如是美音若天人緊那羅等無能及者唯除如來音聲故曰妙聲滿月月面二佛大意相同如經云如十五日月圓滿具足衆星中王最上最勝佛面清淨圓滿亦如月耳有如是等不可說佛者不復具出劫數及聞名利益故總結之則知地藏自發心來迄至今日其所值如釋迦者各各付囑度脫亦如今日天宮不可得而思議矣稱名竟二結益二初生時稱名益又二初約一多況益世尊現在未來一切衆生若天若人若男若女但念得一佛名號功德無量何況多名夫道與俗反名與實乖得其趣者玄會幽理何以然耶如俗中祖考不許述其名字而法門佛名稱揚獲福無量良以諸佛如來大慈愍物降靈在俗濟度為先有心希仰無不蒙益或以口稱或以心念或以身禮三業加敬三毒清涼漸拔有根出於界繫有斯大德稱者得福彼流俗者與上相違十輪云若念一佛則見一佛若念多佛則見多佛若念小身佛則見小身佛若念大身佛則見大身佛若念無量身佛則見無量身佛等故以一佛況多名也二約生死得利是衆生等生時死時自得大利終不墮惡道圓澄法師云六道凡夫三乘賢聖性覺寶光各各圓滿本不名諸佛亦不名衆生但此心不守自性隨迷悟之緣作業受苦名曰衆生修道證真遂名諸佛佛愍衆生妄想執著而不證得猶是稱法界性說念佛門儻得其門則等諸佛於一朝不得其門則徒修因於曠劫故凡衆生於生死時果能念佛或一佛或多佛各自得諸大利終不墮於惡道但此是大士所值之佛親承供養得諸利益者然諸經論唯讚西方阿彌陀佛接引娑婆願力偏重是以普賢行願獨指彌陀為至若人於生死時果能真誠稱念感應尤多所謂不動步而歸淨土安俟階梯非思量而證彌陀豈存言念悟迷只在自心超沉豈由他法諦信力行自見功程耳二臨終稱名益三初示稱名滅罪若有臨命終時家中眷屬乃至一人為是病人高聲念一佛名是命終人除五無間罪餘業報等悉得銷滅乃至一人念一佛名者此從多人多佛略至極少也大悲經云一稱南無佛名者以是善根入涅槃界不可盡也更何疑五無間罪之不銷耶極重逆罪既銷餘之中下業報豈不悉滅哉除者去之也非聽除而不銷也昔大智律師發願常生娑婆作大導師復見慧布法師云方土雖淨非吾所願由是於淨土門略無歸向見修淨業復生輕謗後遭重病神識迷茫頓覺前非深自剋責仍覽天台十疑論初心菩薩未得無生忍要須常不離佛又智論云具縛凡夫有大悲心願生惡世救苦衆生無有是處譬如嬰兒不得離母又如弱羽只可傅枝自是盡棄平生所學專尋淨土教門十餘年來未嘗暫捨又唐法照大師往五臺竹林寺見文殊在西普賢在東為衆說法照作禮問曰末代凡夫智識淺劣佛性心地無由顯現未審修何法門最為其要文殊曰諸修行門無如念佛我因念佛故得一切種智又問當云何念文殊曰此世界西有阿彌陀願力難思汝當繫念令無間斷命終決定往生說已為照摩頂而退慧日法師求黑觀音感現光相所說略同故念佛一門斷斷不可不信也二釋滅無間疑是五無間罪雖至極重動經億劫了不得出承斯臨命終時他人為其稱念佛名於是罪中亦漸銷滅疑云無間業重何得一人稱一佛名即得銷滅耶如增一經云衆生三業造惡臨終憶念如來功德者必離惡道趣得生天上正使極惡之人以念佛故亦得生天故知無間罪業雖重經劫難出承臨終念佛之力則倒惑不起法性現前故能滅也故華嚴經云設聞如來名及與所說法不生信解亦能成種況今眷屬信心為稱佛名豈有不滅者乎譬如師子筋為琴絃一奏一切餘絃悉斷亦如牛羊驢馬諸乳同置一器若以一滴師子乳投之悉化為水今既行菩提心為其念佛銷滅重罪何俟致疑三況自稱福罪何況衆生自稱自念獲福無量滅無量罪此況結者正勸人自念為勝以它人代念滅罪尚爾何況自念者哉故大論二十四問臨終時少許時心云何能勝終身行力答是心雖少而力猛利如火如毒雖少能成大事是垂死時心決定猛健故勝百歲行力是後心名大心以捨身及諸根事急故念佛時罪皆成福如耆婆攬草無非藥者普能愈病釋摩男所執一切砂礫皆變為寶全心滿日無非佛境所觀罪福即是實相既純實相覓罪福了不可得復何論有量無量耶今且順俗故言自稱自念獲福滅罪尤勝於前倍倍矣
