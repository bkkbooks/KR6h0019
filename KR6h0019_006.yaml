body:
  text: 古鹽匡菴青蓮苾芻靈乘父輯二見聞利益流通謂見地藏之像聞地藏之名無不獲大利益例同觀音聞名見身心念者皆能滅苦見身致禮即身業機聞名故稱即口業機身口由心即意業機機感既成冥顯自應如地草木一雨均霑無不獲潤流通之益功叵量矣初品題見聞利益品第十二二品文分二初釋迦現相歎德事二觀音請說為流通初分二初頂門放光證事爾時世尊從頂門上放百千萬億大毫相光自爾時至告諸大衆皆經家所敘之文恰於地神護法品後放光者為證前起後令諸衆生覩相悟心各各自知一段不思議本有之常光也從頂二句總標梵名烏瑟膩沙此云佛頂而言門者禪祕要經云人身三分為中原頭為殿堂頂為天門故曰頂門蓋頭為一身之主頂乃一首之尊故大論阿私仙人云頭中頂相無能見上若天若人無有勝者表一切種智超因極果也門有能通當體二義由此地藏妙像嘉名瞻禮稱念而進於極果者能通之功也此頂人人本具略不假借則六道與地藏總是一身衆生與如來原非兩體當下即是奚假從門而入當體之意也上者從頂放光表自極智體上起此大光明用其體原一生佛同具故而用不一隨機施設故此即一念三千至理互具互遍故有百千萬億大毫相光即表三德大即法身以遍滿故毫相即解脫外實內空故光即般若照了萬法故身大故毫光亦大毫空故大光亦空光照故大毫亦照三一不相離一三非可混不竝別縱橫生佛同具證既總標已下別明之所謂白毫相光大白毫相光瑞毫相光大瑞毫相光玉毫相光大玉毫相光紫毫相光大紫毫相光青毫相光大青毫相光碧毫相光大碧毫相光紅毫相光大紅毫相光緑毫相光大緑毫相光金毫相光大金毫相光慶雲毫相光大慶雲毫相光千輪毫光大千輪毫光寶輪毫光大寶輪毫光日輪毫光大日輪毫光月輪毫光大月輪毫光宮殿毫光大宮殿毫光海雲毫光大海雲毫光毫相是一即用之體光色不同即體之用法華文句以五色譬五道青譬地獄因果黃譬餓鬼赤譬畜生白譬人天修羅分屬四趣仍闕黑色小色像譬二乘大色像譬通菩薩短色像譬別菩薩長色像譬佛因果諸文開合隨意正法念加長短等此由法華九界同歸三乘咸會故文句作此引用今就地藏偏哀六道三塗故且譬五道事有專屬耳白毫相光三十二相之一梵語叔離此云白色西方正色也白乃本質居衆色之先白可受彩起諸光之色攬而可識曰相熾然如焰曰光大輪云白毫眉間峙白光踰琉璃在因行布施時適可前人意起自在業因緣又咨嗟歌誦間居之德故有眉間白毫外具八楞中空右旋三十二相功德增為千倍乃成額上白毫相一千毫相功德增為百倍乃成一頂骨相是故如來最為尊勝今從極頂放毫相光全彰不思議事也言大者較前尤為勝妙下倣此瑞毫相光以玉為信曰瑞又祥瑞也天以人君有德將錫之歷年錫之五福先出此為信今表六道乘地藏力三塗清升人天成佛故現此祥瑞之毫光也玉毫相光玉乃天地精英具溫潤之德文賦山有玉而增潤琢磨可能成器此表五道離火宅之燥增性山之潤出三塗之非器入四聖之瑚璉也紫毫相光梵名羅差或勒叉此云紫色乃黑赤之間色以表雜類衆生獲益止觀云衆生稟益不同或雜益不雜益是也青毫相光梵名尼羅此云青色東方屬木由水而生似黑而淺色則揚矣以表地獄黑業由之生氣滿盈發菩提樹之枝柯矣碧毫相光說文謂石之青美增韻云深青色此表地獄中利根如調達在獄樂如三禪闍王入拍毱地獄暫入即出之類紅毫相光梵名阿盧那此云赤色南方屬火氣盛而明從大火為意但視紅微晦故特言紅紅從糸從工乃女工紡績織紝功力也此表畜生由聞名見像即發心加行所迷正因由之而顯同紅字之功力矣緑毫相光緑瀏也泉水上視瀏然緑色是青黃之間色總表獄鬼同入法流也金毫相光梵名伊尼延此云金色金有五色黃金為長久埋不變百陶不輕以表餓鬼雖久埋惡趣而佛性不失中道藏開頓離枵虗也慶雲毫相光西京雜記云瑞雲曰慶雲曰景雲雲五色曰慶或曰卿此表離五住煩惱顯五分法身之祥徵也千輪毫光此下輪光較散光尤勝蓋表說圓法被圓根入圓門獲圓益故十輪云輪者如滿月光清涼無礙遍諸虗空照觸一切無障境界逸雅訓綸言彌綸周匝也精薀云車所由以運轉者以其形圓也而其妙尤在中虗矣言千者千輻之轂表六道一念千如至此顯著圓轉無礙也寶輪毫光與上同此重寶字如契經云若剎帝利種紹灌頂位於十五日齊沐升殿東方忽有金輪寶現其輪千輻具足轂輞舒妙光明來應王所定是金輪王此表五道具圓根者蒙地藏以法水灌頂超入圓向金輪將紹法王之位也其間或入鐵輪乃至摩尼輪不可定判日輪毫光現日天子宮殿也日實也光明盛實表菩薩智光無私照也大論云如日天子憐愍衆生與七寶宮殿俱繞四天下從初至終常不懈息日光普照無憎無愛隨其高下深淺悉照菩薩亦如是從初發心為度衆生無有懈息出於世間住五神通處於虗空放智慧光明滅邪見戲論譬如朝露見日則消是也月輪毫光現月天子宮殿也月缺也滿則缺也此表大士具智斷二德故能除五道熱惱益四衆清涼然此二輪正表大士權實二智照理鑑機也宮殿毫光光現宮殿也釋宮如題殿乃堂之高大者具岧嶤高聳之奇昭輪奐周明之美表三塗超出人天顯五道同歸佛果故現高顯之相也海雲毫光以光雲遍覆如海無垠此表生佛一如依正不二染淨同源苦樂無異如海莫測邊涯如雲原無分別故知情生分別法法條然智入一無事事平等終於海雲良有以也二口輪出音歎事於頂門上放如是等毫相光已出微妙音告諸大衆天龍八部人非人等聽我今日於忉利天宮稱揚讚歎地藏菩薩於人天中利益等事不思議事超聖因事證十地事畢竟不退阿耨多羅三藐三菩提事初二句結前出微下正告如是者指歎之詞以佛頂毫光勝妙第一故指而歎言有如是耶然如名不異是曰無非則生佛同由實相是非竝契真如此我佛付囑之本心亦大士領命之初意淨穢總入一光依正同成一色故經家敘出不思議境而歎言如是故知最初放光表極聖三密而說法為要故光從口出此表六道剋就圓因將趣極果而證入為要故光從頂放光相似同意各有攸歸也大衆是總天龍等是別皆所告之機聽我者不惟事關深遠化涉始終且又囑人天於未來絶不類尋常之小事必須專心承聽方曉叵量威神於人天下結歎四章利益等事結名章以稱名讀經人天俱解脫故不思議事結體章然體屬理今何指事當知始終所依迷悟竝具即理之事故獨當不思議事超聖二句結宗章宗必因果同成故不退菩提結用章地藏巧施方便為令成就菩提若準法華四一初句歎教一設教被機人天得益故次句歎理一竝由理具方有事用故三四二句歎行益行必超因能證果故第五句歎人一既得畢竟菩提世出世間第一人故皆言事者與法華如來為一大事因緣故出現於世同蓋世出世間內外善惡大小聖凡無一不事事者但作用不同譬之琴瑟箜篌音韻似一吹彈者異耳然觀結歎文意似都指後何也蓋由觀音所問之事與前逈異特顯四章之妙通貫前後以後形前愈彰深致不可以前劣後優隨文失指也二觀音請說為流通二初當機述請二如來讚許初中二初經家提名敘儀說是語時會中有一菩薩摩訶薩名觀世音從座而起胡跪合掌此見賓主擊揚之妙契師弟敲唱之相應世尊所以對衆而結歎意啓觀音乘讚而躡問故佛說是語時觀音即起白佛啐啄同時斯之謂矣西音名阿那婆婁吉低輸此云觀世音觀是能觀之智以三智照正性察本末也世音是所觀之境萬像隔別類音殊唱菩薩弘慈俱令脫苦境智合標名觀世音秣羅矩吒國印度最南海濱此南大海中名補陀落迦山有石天宮觀自在菩薩常住處二大士述歎請說三初述前所歎功德又二初述地藏威神白佛言世尊是地藏菩薩摩訶薩具大慈悲憐愍罪苦衆生於千萬億世界化千萬億身所有功德及不思議威神之力世尊欲稱揚衆事觀音接口便問其由則知所問所答者皆不外乎是矣然必假觀音者以志同道合均與閻浮提有大因緣也如讚地藏具大慈悲乃至不思議神力此亦觀音之實事耳準悲華經乃過去無諍念王第一太子名曰不眴受寶海梵志所勸遂發弘誓故寶藏佛言汝觀天人及三惡道一切衆生生大悲心欲斷衆生諸苦惱故欲斷衆生諸煩惱故欲令衆生住安樂故今當字汝為觀世音汝行菩薩道時已有百千無量億那由他衆生得離苦惱汝為菩薩時已能大作佛事云云以其德業相齊方能發起故假大士承機申請也二述諸佛讚德我聞世尊與十方無量諸佛異口同音讚歎地藏菩薩云正使過去現在未來諸佛說其功德猶不能盡諸佛同讚之言有意無文其意有二遠則指佛在伽羅帝耶山諸牟尼仙所依處大集會上廣為讚歎一也近則指佛在忉利天宮十方諸佛同集分身地藏偕臨正當釋迦讚地藏衆事之時安知諸佛不同讚乎二也何故正使三世諸佛說其功德猶不盡耶以地藏行山高逾須彌願海深過溟壑況智慧神通皆不思議奚能稱量耶二述今欲讚益事向者又蒙世尊普告大衆欲稱揚地藏利益等事向者之指亦有遠近遠指讚歎品初之文近指放光後告衆之事三正請為衆揚德唯願世尊為現在未來一切衆生稱揚地藏不思議事令天龍八部瞻禮獲福此明稱揚地藏之意正為天龍八部瞻禮獲福耳良由一切衆生妄著我人隋慢成性封迷纍劫不識三尊愚蠢㳂流罕逢十聖寧知命如風燭難可駐留形同石火豈容長久況復五濁交侵四蛇常逼不禮三寶難越四流是故行者常須作意不得自墮恐無常忽至瞻禮無門譬鼠入角路窮何趣故佛偈云命如風中燈不知滅時節今日復明日不覺死輪至冥冥從業緣不知生何道況瞻禮佛菩薩時則滅無量生死之罪而集百千善緣之福如增一阿含云禮佛有五功德一端正二得妙聲三多饒財四生處高貴五生天上故使人天瞻禮地藏自然獲福矣二如來讚許四初讚德二初讚娑婆有緣功德佛告觀世音菩薩汝於娑婆世界有大因緣若天若龍若男若女若神若鬼乃至六道罪苦衆生聞汝名者見汝形者戀慕汝者讚歎汝者是諸衆生於無上道必不退轉常生人天具受妙樂因果將熟遇佛授記初總讚若天下別讚標娑婆有緣乃機感偏宜然大士化緣無剎不現也大因緣者謂生起助成有不思議極大之功止觀云善知識者是大因緣所謂化導令得見佛如無盡意問云以何因緣名觀世音佛以七難二求答出其事別行疏云因緣甚多略言境智若就衆生則以善惡兩機為因聖人靈智慈悲為緣若就聖人觀智慈悲為因衆生機感為緣此即因聖緣凡因凡緣聖大槩不出四悉檀云云別讚中以三雙六隻之機及六道罪福之感以顯大因緣也天龍上下一對男女內外一對神鬼幽顯一對略其中間剎帝利婆羅門及出家在家二衆聲聞緣覺菩薩故云乃至然偏舉天龍等以皆有生老病死也聞名等即普門品聞名及見身能滅諸有苦是戀慕者以大士威神具大悲施無畏故令羣生眷戀思慕長阿含云歡喜欲見憶念不忘生戀慕心是也戀慕不已即申讚歎然威神之力歎莫能窮詳普門品是諸下明效驗既蒙利益畢竟成佛雖現身應物列四八之殊其說法被機分十九之異而大士本意在阿耨菩提常生人天等明其未成佛道之間畢竟不墮惡趣人天受樂修集善因因圓果熟遇佛授記此皆大因緣事也故大品云菩薩摩訶薩欲知諸法因緣當學般若波羅蜜則雖普度衆生入涅槃界譬如幻師度幻弟子彼此離情絶見矣二讚聽宣地藏功德汝今具大慈悲憐愍衆生及天龍八部聽吾宣說地藏菩薩不思議利益之事初三句正點能聽宣利益事此應具引別行疏中慈悲普之文以大士凡見一切苦惱衆生起大慈悲令菩提芽生故云三業致請蒙脫苦芽四弘為誓使霑上樂即是真身拔苦應身與樂耳何言今具耶秪為憐愍未來衆生得得聽宣地藏益事故點汝今二字也三誡聽汝當諦聽吾今說之三願聞觀世音言唯然世尊願樂欲聞悉如文四正告二初長行二重頌初分三初別示不思議事文有八段一轉天人衰相乃至第八安水陸險道一一稱不思議者是大士甚深行處從性流出也今初分二初五衰相現佛告觀世音菩薩未來現在諸世界中有天人受天福盡有五衰相現或有墮於惡道之者三界諸天各乘宿業宿福深厚增進聖倫前福薄劣惡業仍牽涅槃云天上雖無大苦惱事然其身體柔軟細滑見五相時極受大苦如地獄苦等無差別如蜜和毒藥初美後苦準新婆沙論諸天命終先有二種五衰相現一小二大小五衰者一身出惡聲二身光微昧三浴水著身四著境不捨五身虗眼瞬大五衰者一衣服今穢二華冠光萎三兩腋流汗四體生臭氣五不樂本座小五相現若不歸依求救大五衰現必從天死退下正法念經云業盡懷憂惱捨離諸天女退時大苦惱不可得譬喻故須求救也或有墮惡道者隨其業力墮五趣中如折伏羅漢經云昔忉利天有一天壽垂盡有七種瑞現光滅華萎色變衣塵腋汗身瘦及離本座即自思惟壽終下生鳩夷那竭國疥癩母猪腹中作豚即其例也二見聞轉報二初示增天福如是天人若男若女當現相時或見地藏菩薩形像或聞地藏菩薩名一瞻一禮是諸天人轉增天福受大快樂永不墮三惡道報初示怖相修因若男女天等當小大衰相現時或見地藏像及聞大士名身心竝運瞻禮咸臻勝福既修衰相則滅是諸下明轉報增福如天帝釋小大衰相忽現心生怖畏作是念言誰能救我如是衰厄我當歸依便自了知除佛世尊無能救護尋詣佛所求哀請救佛為說法便得見諦令彼衰相一時皆滅歡喜踴躍作愛語伽陀大仙應當知我即於此座還得天壽命唯願尊憶持今於地藏瞻禮者轉衰增福亦如是耳準長阿含云使彼諸天增益五福一天壽二天色三天名稱四天樂五天威德永不墮惡道者如前作豚之天愁苦不知何計餘天語言唯佛能脫卿之罪即到佛所作禮發問佛言欲得離豚身常誦三自歸天即歸依却後七日下生維耶離作長者子始生墮地亦跪三歸年向七歲於道邊戲遇身子目連兒為作禮請佛到家佛為說經兒及父母親屬皆得阿惟越致以此觀之若瞻禮地藏豈止永不墮惡亦能頓入聖階故知懺悔功力能致身心俱樂二況施供利何況見聞菩薩以諸香華衣服飲食寶貝瓔珞布施供養所獲功德福利無量無邊以上見像聞名單事瞻禮增福受樂不墮惡趣何況見聞復申供養乎故所獲功福無量無邊也如彌勒菩薩所問經論問云何布施果報答布施有一種果所謂受用果復有二種果所謂現在受果未來受果復有三種果即此二種復加般若今獲功福正與般若相應故如虗空無邊量也二轉臨終惡業二初臨終聞名離苦復次觀世音若未來現在諸世界中六道衆生臨命終時得聞地藏菩薩名一聲歷耳根者是諸衆生永不歷三惡道苦二眷屬塑像轉報二初修塑像因何況臨命終時父母眷屬將是命終人舍宅財物寶貝衣服塑畫地藏形像二轉現未報二初病人知因或使病人未終之時眼耳見聞知道眷屬將舍宅寶貝等為其自身塑畫地藏菩薩形像悉如前二承功報轉二初重病尋愈增壽是人若是業報合受重病者承斯功德尋即除愈壽命增益何故須為病人於地藏處修供塑像以能愈病益壽也止觀云怖畏惡道人命無常一息不追千載長往幽途綿邈無有資糧苦海悠深船筏安寄年事稍去風刀不奢豈可晏然坐待酸楚譬如野干失耳尾牙詐眠望脫云云故為修福當下除殃抑豈愈病更益遐齡譬之服五石者不止病差兼得身充也二命盡滅障生天是人若是業報命盡應有一切罪障業障合墮惡趣者承斯功德命終之後即生人天受勝妙樂一切罪障悉皆銷滅業報命盡者乃福命俱盡也然雖福命俱盡功福修之不爽故應有五逆之罪障十惡之業障合墮惡趣受苦者因承賣宅塑像功德即生人天受樂併前罪業二障悉皆消滅無餘如大經耆婆語闍王言修一善心能破百萬種惡如少金剛能壞須彌亦如小火能燒一切如少毒藥能害衆生小善亦爾能壞大惡雖名小善其實是大為是義故應須懺悔人能為此則善資冥福矣三示先亡生界二初述思憶之事復次觀世音菩薩若未來世有男子女人或乳哺時或三歲五歲十歲已下亡失父母乃至亡失兄弟姊妹是人年既長大思憶父母及諸眷屬不知落在何趣生何世界生何天中乳哺時者嬰孩在襁褓也乳胸汁肉囊也兒所飲汁乃母血所化兒未生在身為血既生血上升為乳五道受生經云兒生三歲凡飲一百八十斛乳古三升當今一升除其胎中食血分說文云哺咀也從口甫聲正母嚼與之時如易林云烏食穀張口受哺逸雅云小兒氣急曰哺哺露也哺而寒露乳食不消生此疾也今大人食多受寒胸口作餲哺臭是也自乳哺至三歲等雖失親前後不同而無知大小何異年既長大而思憶者乃孝子之良心有不容己者梵動經云我身四大六入從父母生乳哺養育衣食成長摩捫擁護然有終其身而不一思身所從來鞠育劬勞者盍思羔羊跪乳慈烏反哺雛竊穀被寉捕子念母忍饑可以人而不如禽獸乎今所以思憶者蓋不知眷屬落在何趣升沉莫測也不知生何世界中邊難定也不知生何天中散定罔諳也故寤寐思之欲知其趣耳二示修敬之功三初先亡解脫二具告生界三現獲妙報初又二初修勝因是人若能塑畫地藏菩薩形像乃至聞名一瞻一禮一日至七日莫退初心聞名見形瞻禮供養莫退初心一悟是最要之誡今世之人擇善固執者吾旦旦慕之而未遇如營福者始欲為多末遂減少其學道者初期剋進後乃怠疲所謂靡不有始鮮剋有終有始有卒者其惟聖人乎故經云魚子菴羅華菩薩初發心三事因中多及其結果少誡厥初心莫退深有以也二得樂報二初墮惡趣者解脫是人眷屬假因業故墮惡趣者計當劫數承斯男女兄弟姊妹塑畫地藏形像瞻禮功德尋即解脫假因業者假即因成相續相待之三假也以虗妄不實故名為假止觀云因成約外塵內根相續但約內根相待豎待滅無之無橫待三無為之無心一切凡夫未階聖道介爾起計悉皆是見以有見故三假苦集煩惱隨從結業蕪蔓生死浩然故云墮惡趣中計當劫數此言眷屬因業受生也承斯下藉福超升尋即解脫者由機速應速利益速也譬如父母念子心重多智之財具大勢力衆子在難即能拔之今地藏菩薩慈悲心重權實智深聖財充足神力自在隨其眷屬墮惡趣者當下即解脫矣二生人天者增因生人天中受勝妙樂者即承斯功德轉增聖因受無量樂古德云已生善道增益功勳未脫苦輪早生淨土正二文之意轉增聖因則入三乘之位受出世之樂矣如增一阿含佛告比丘凡夫之人不作功德不得四事供養復不免三惡道苦是謂身心俱不樂作功德阿羅漢四事供養無所乏短復免三惡道苦是謂身心俱樂今既增聖因則身心俱樂矣二具告生界二初念名菩薩現身是人更能三七日中一心瞻禮地藏形像念其名字滿於萬遍當得菩薩現無邊身具告是人眷屬生界塑像瞻禮外竭殷勤一心稱名內勤恭敬機感傾誠現身速應所謂菩薩清涼月常遊畢竟空衆生心水淨菩提影現中感應之無差也問今有其人矣纍年不蒙寸效何也答須知一心有事有理二途無取胡能感聖譬如臨鏡背視對谷吞聲奚能致影響乎無邊身者約事則無邊即邊約理則邊即無邊今以禮像稱名事一之心契入如虗空無邊理一心內如空谷答響明鏡現形故現無邊之身具告所生之界也二夢神領見眷屬或於夢中菩薩現大神力親領是人於諸世界見諸眷屬上是顯機顯應故於稱禮之際現身告知其界此屬冥機冥應故於夢中相告即同善見律天人現夢乃實夢也然須了知善惡凡聖之事無非是夢初由夢人不知夢眷屬生界故塑地藏夢像夢中瞻禮稱名夢裏現身告界故曰如夢勤加空名惑絶回觀世間皆夢中事唯大覺朗然稱大夢覺耳三現獲妙報更能每日念菩薩名千遍至於千日是人當得菩薩遣所在土地鬼神終身衛護現世衣食豐益無諸疾苦乃至橫事不入其門何況及身是人畢竟得菩薩摩頂授記此中修因既勝感果亦勝較前逈不同矣土地鬼神即主土穀護人民者亦有護宅護身者今皆令永護其身現得三樂後得妙記一衣食豐益則長幼安享矣二無諸疾苦則身心調適矣三絶諸橫事則居諸寧靜矣此現世人中之報事猶小耳至其人畢竟得菩薩摩頂安慰親授記莂則真因剋就妙果斯臻世出世間無不成就威神利益為若此也四成度生證果二初述發心度人復次觀世音菩薩若未來世有善男子善女人欲發廣大慈心救度一切衆生者欲修無上菩提者欲出離三界者此是大菩薩心習行般若波羅蜜故能發起度人之心然慈悲本具昔著我人故分彼此今知同體故發等心以大慈故念衆生得樂亦與樂事以大悲故愍衆生受苦亦脫苦境故言救度一切衆生遍緣法界名廣普度羣迷曰大欲修無上菩提者此明自求佛果正止觀推無作四諦了己法性與一切法無二無別上求下化發菩提心也出離三界者即圓教初信至七信見思先去長別三界苦輪也二明修因成願是諸人等見地藏形像及聞名者至心歸依或以香華衣服寶貝飲食供養瞻禮是善男女等所願速成永無障礙文分三節初見聞歸依二或以下竭誠供養三是善下願事成就準上文發菩提心乃上品悉地事也如蘇悉地經云能令種種悉地成就增益福德乃至成滿法王子法況餘世事故不惟所願速成并永無障緣阻礙也五成欲求願事二初述所求願事復次觀世音若未來世有善男子善女人欲求現在未來百千萬億等願百千萬億等事願念在內事相據外約世出世間則有百千萬億或求現生果遂或期他世從心準十輪經云此善男子隨所在處若諸有情或為多聞淨信淨戒淨慮神通般若解脫妙色聲香味觸利養名聞功德華果樹林牀敷舍宅等是也二明修因成就二初願求成就但當歸依瞻禮供養讚歎地藏菩薩形像如是所願所求悉皆成就準密部諸儀皆明三品五品悉地今準十輪云或為種種世出世間諸利樂事於追求時為諸憂苦之所逼切有能至心稱名念誦歸敬供養地藏菩薩摩訶薩者此善男子功德妙定威神力故令彼一切皆離憂苦意願滿足是也二夢感摩頂復願地藏菩薩具大慈悲永擁護我是人於睡夢中即得菩薩摩頂授記歸供合法求懇如心故感大士夢中授記此即適發心與記也摩頂示慰於極果授記獲證於圓因若非信力堅固安有如是瑞相六發現生智慧二初述宿障根鈍復次觀世音菩薩若未來世善男子善女人於大乘經典深生珍重發不思議心欲讀欲誦縱遇明師教視令熟旋得旋忘動經年月不能讀誦是善男子等有宿業障未得消除故於大乘經典無讀誦性男女二衆舉受法之機大乘經典乃方等之法帝王之道載於冊曰典故五帝之書曰五典國之常經也從冊在六音几上尊崇之意敬若天然乃可開吾之天我佛法中亦能開吾第一義天也深生珍重者以佛法如如意珠能出生衆寶故珍敬而愛重也言發不思議心者何羅雲忍辱經云佛之明法與俗相背俗之所珍道大所賤故著欲之人不好我無欲之行文今既珍重發心讀誦則心法一體其誰能思議其心之深淺哉此明發心勝次正明根鈍明師者能備了性相行位因果堪為人中模範者此千生萬劫殊難遭遇今幸遇之而教其閲視經典令熟讀而熟誦之其奈根性魯鈍旋得熟之旋又忘之經年纍月不能對本而成讀背本而成誦也下示根鈍意宿業障未消故於經典無讀誦性耳根鈍如前宿業障有多因緣蓋讀誦經典是了因種由宿不誦習而了因無種溈山云今生空過來世窒塞是也或往昔不能親近佛法不敬沙門婆羅門障人說法障人學經障人讀誦障人書寫乃至沉湎糵失智慧種故今生縱遇明師教習不能讀誦也二示修因發慧二初修因又二初對像陳心如是之人聞地藏菩薩名見地藏菩薩像具以本心恭敬陳白聞名見像陳白本心者以地藏之名從智慧而生而大士之像由功德而立故稱名供像即發慧性然須恭敬始能感動以誠能動物不誠未有能動者也況大士乎哉二求慧方軌三初修敬法更以香華衣服飲食一切玩具供養菩薩假物將意藉事顯心香取清遠潛通華表圓滿悅懌衣服見寂忍不捨飲食顯慧命常存玩具彰游戲神通故借斯儀表我誠敬也二服水法以淨水一盞經一日一夜安菩薩前然後合掌請服回首向南臨入口時至心鄭重用淨水者藉緣發慧也以智者樂水水有流通滌穢之用潤物滋生之功今藉以滌宿障潤愚𤍜滋讀性通慧門也故神水經云水在河中為河水水在井中為井水水入佛鉢為佛水入腹中為真水以清治濁以正治邪衆邪斷絶知水為真今故用之一盞表一道清淨一日夜表制心一處目表智明夜表愚暗也安菩薩前求加被進取合掌請服表一心佩戴回首向南表背坎向離逸雅云鄭町音庭上聲也其地多平町町然也則表冥契平等大慧者矣三戒慎法服水既畢慎五辛酒肉邪淫妄語及諸殺害一七日或三七日此示助開慧性故須慎五辛等楞伽大慧問彼諸菩薩等志求佛道者酒肉及與葱飲食為云何佛答云一切肉與葱及諸韭蒜等種種放逸酒修行常遠離五辛者梵網云大蒜廣韻作胡荽茖葱上音格山葱也慈葱葱之正名蘭葱小蒜興渠蒠蒺也即阿魏夫葷辛是二義葷臭辛辣葷而非辛阿魏是辛而非葷芥薑是是葷是辛五辛是也梵語摩偷或𡨧唎皆翻酒有穀酒果酒藥酒不同若俗衆以酒為必用之物如漢書云酒者天之美祿所以養天下享祀祈福扶衰養疾在法衆為必誡之物如大莊嚴論云佛說身口意三業之惡行唯酒為根本復墮惡行中制肉如前邪淫諸惡業中惟淫業為最邪念一萌邪緣相湊種種善願由此消種種惡孽由茲起故森羅鐵榜必以淫為萬惡首也竟不思月下華間為樂有限那得知鐵牀銅柱受苦無窮然庸夫俗子顯蹈明行罔知顧忌至學士文人讀書講道侈談情種胡可屈指也妄殺害等如前一七三七明誡慎期限必求轉鈍為利去愚成智一七不發三七未有不蒙感應但除狐疑不信及不致誠者此剋期求感之意也二發慧是善男子善女人於睡夢中具見地藏菩薩現無邊身於是人處授灌頂水其人夢覺即獲聰明應是經典一歷耳根即當永記更不忘失一句一偈發慧之相不易卒至若非精誠致感何由冥應赴機言睡夢者有睡而不夢有睡而夢者準迦旃延論云不染汙心眠夢是謂眠不睡相應染汙心眠夢是謂睡眠相應今是染污心眠夢具見等表勝身應圓根也若非深成觀行何能見無邊身故大師云入觀如夢出觀如覺四明判歸似位或是鄰極之似或是鄰真之似今以觀行見無邊身即是鄰真之似表初住八相成道分身百界等授灌頂水即是鄰極之似法水灌頂紹法王位此雖因心感果初必至後夢中授記剋證無難容有鄰極之似矣梵名毗灑迦此云灌頂以五智如來之水灌其頂門如剎帝利澆頭王子必紹大寶之位此明夢中瑞相下正明發慧其人指上鈍根求慧男女夢覺者夢是無明顛倒之法觀是覺智悟理之法於迷能解故言夢覺須知佛名如大夢覺今觀行如佛義言夢覺或發似解或入分真皆有夢覺之義即獲聰明者非同世人耳聰目明如王充之過市成覽楊雄之遇目輒通乃謂既感夢覺即父母所生肉耳徹聞三千大千世界種種音聲即父母所生肉眼徹見三千大千世界種種之色深信觀成故發勝慧正在六根清淨位矣大論云如經說一切衆生無知佛心者若佛以神力令知乃至蜫蟲亦能知今地藏大士以神力令其人知安往而不知故一切經典歷耳根而永記更不忘失一句一偈乃轉其旋得旋忘之宿障也問一佛說之經動有八萬四千之卷何能盡憶而不忘失乎答菩薩與聞持陀羅尼力故能受堅憶念陀羅尼力故不忘大論云佛說法雨從佛口出除行般若波羅蜜菩薩更無能受者今既能受大士般若之力歟七轉惡相遂求二初述其晝夜惡事復次觀世音菩薩若未來世有諸人等衣食不足求者乖願或多病疾或多凶衰家宅不安眷屬分散或諸橫事多來忤身睡夢之間多有驚怖衣食不足等人所最苦者如王舍城燈指長者生時指光如燈故名由昔以金補塔中泥像一指得之其家巨富如毗沙門後因羣賊劫掠財物罄盡妻拏捨棄僮僕逃失素親厚者反如怨讐強從乞食輒遭輕懱於是歎云諸貧窮者行來進止言說俯仰盡是𠍴過貧窮之人如起尸鬼如遇死病難可療治貧亦如是多諸艱難又復能生饑寒怨憎輕躁遍狹憂愁慘毒嫌責罪負如是衆苦從貧窮生嗚呼怪哉貧有大力能使所親捨我極速故陸機云親落落而日稀友靡靡而愈索徐文長云業曠家人棄門寒結客稀故於一貧一富之間交情於是乎見矣此由宿世之慳貪致有今生之禍患耳橫事忤身忤逆也違戾也即法華橫罹其殃也睡夢驚怖如周禮之觭夢觭音雞奇怪夢列子之懼夢也光明云惡異衆邪蠱道變怪相續臥見惡夢晝則愁憂文句云惡夢者心靈潛密業現其中夢見不適意事文故多驚怖也二修善消滅安樂如是人等聞地藏名見地藏形至心恭敬念滿萬遍是諸不如意事漸漸消滅即得安樂衣食豐益乃至於睡夢中悉皆安樂至心恭敬徹到源底也聞名不惑於名見相不著於相冥契真實中基方曰至心若以如是心念滿萬遍則萬惑全祛萬德圓顯故凡有不如意事漸至消滅即得安隱而快樂也昔之衣食不足今反豐饒盈益乃至睡夢驚恐亦悉得身心安泰而和樂矣轉禍為祥捷於桴鼓誠不思議之事也八安水陸險道夫人出入行來不離跋涉艱險陸則登車坐馬水則駕艇乘槎未免魚龍虎豹之患安禁臨深履薄之憂若能稱地藏之名便可免顛溺之難文分二初述經歷惡事復次觀世音菩薩若未來世有善男子善女人或因治生或因公私或因生死或因急事入山林中過渡河海乃及大水或經險道初標當事之人次明所歷之處治生者荀子云少而理曰治少謂舉其要而有條理謂之治易曰天地之大德曰生謂治其資生之事也公私者或為公家或因私營公平正也私生於自營然而徇之則是禽獸逐逐於欲也從八從某古私字別而去之廓然天地萬物同體矣自營也古人洞察心術之微特為不不之形示人以意是天道是地道今也反之非天地正大之情從吾軀殼上起營吾營也去吾去也為仁由己而由人乎哉或因生死者或報産生死亡不得不入乎其間也急事者急難之事或官府拘拿或盜賊劫奪或水火忽來或冤家偶遇凡有倉卒急遽患難之事皆是也當此之時必要入乎高山茂林必須渡乎濬河大海或涉大水之洋或奉公差遣或為私營求不免經過乎險難之道矣若論私營即該經商貿易越海求珍如賢愚經云田殖百倍商估千倍仕宦萬倍入海吉還得無量倍故入乎海也二示稱名利益是人先當念地藏菩薩名萬遍所過土地鬼神衛護行住坐臥永保安樂乃至逢於虎狼師子一切毒害不能損之此顯稱名之益是人通指九界以初地菩薩尚不免虎狼之難況降斯以下者乎必萬遍者舉極數見至誠也故所過土地之處自得無量大鬼善神擁衛保護於行住坐臥四威儀中永保安樂而無虞也逢虎狼等十輪云若諸有情為諸毒蛇毒蟲所螫或被種種毒藥所中及諸虎狼師子有能至心稱名一切皆得離諸怖畏保全身命此由地藏菩薩善入諸佛燈炬明定之力令彼佛土所有一切衆邪蠱毒諸惡蟲獸悉皆消滅故名不可思議事也二總說利益無盡佛告觀世音菩薩是地藏菩薩於閻浮提有大因緣若說於諸衆生見聞利益等事百千劫中說不能盡此結地藏偏向閻浮之意十輪云歸敬地藏者所求皆滿足具足施功德悲愍諸衆生假使百劫中讚說其功德猶尚不能盡故皆當供養正同今文故略明之共有八種不思議事也三結勸大士流布是故觀世音汝以神力流布是經令娑婆世界衆生百千萬劫永受安樂此二大士均與南洲有大因緣故藉以流通可謂同聲相應同氣相求則閻浮提六道衆生何患罪障之不消功福之不萃自然於百千萬劫永受人天三乘之安樂矣十輪偈云地藏真大士施諸衆生樂救脫三有苦雨無量種雨如是無上真經誠是衆生之眼目暗室之明燈貧窮之寶藏病疾之良醫何可不急與流通者哉長行竟二重頌何意有偈頌耶龍樹毗婆沙云一隨國土天竺有散華貫華之說如此間序後銘也二隨樂欲有樂散說或樂章句三隨生解或於散說得解或於章句得解四隨利鈍利者一聞即悟鈍者載說方悟此順四悉檀益故有重頌也分三初總頌神力難盡爾時世尊而說偈言吾觀地藏威神力恆河沙劫說難盡見聞瞻禮一念間利益人天無量事如來之眼同於千日照察古今同於掌果故曰吾觀等如佛告天帝釋云是地藏菩薩摩訶薩有無量無數不可思議殊勝功德之所莊嚴一切世間聲聞獨覺所不能測此大菩薩如如意珠雨衆財寶隨所希求皆令滿足云云故於見聞瞻禮暫生一念其利益人天有無量事故於恆沙劫說亦難盡威神之力也矣二別頌不思議事六長行有八章今略第二第五故唯六章今初頌轉衰相若男若女若龍神報盡應當墮惡道至心歸依大士身壽命轉增除罪障釋提桓因問經云釋提桓因及忉利諸天遣樂神般遮翼問訊世尊佛報言使汝帝釋及忉利天壽命延長快樂無患所以然者諸天世人及阿須倫諸衆生等皆貪壽命安樂無患故今亦云壽命轉增并除罪障耳二頌示生界少失父母恩愛者未知魂神在何趣兄弟姊妹及諸親生長以來皆不識或塑或畫大士身悲戀瞻禮不暫捨三七日中念其名菩薩當現無邊體示其眷屬所生界縱墮惡趣尋出離若能不退是初心即獲摩頂受聖記文有三節初二行頌思憶事次三行頌告生界皆如文三一行頌得現報受記準首楞嚴有四種記謂未發心適發心現前無生皆與記今是發心記此約世諦說也若淨名云從如生得記從如滅得記如無生滅則知無記思益願不聞記名大品受記是戲論此皆約第一義諦說也但他經記善不記惡記男不記女今皆記者同法華之開顯也三頌成度生欲修無上菩提者乃至出離三界苦是人既發大悲心先當瞻禮大士像一切諸願速成就永無業障能遮止諸願成就如前無業障遮止者即別圓出假位中教化衆生不被塵沙之惑無漏之業障礙化導也四頌發現智二初頌宿障根鈍有人發心念經典欲度羣迷超彼岸雖立是願不思議旋讀旋忘多廢失斯人有業障惑故於大乘經不能記梵語多羅秦言岸大論云若聞多字即知一切法此彼岸不可得已到波羅蜜之彼岸也業障惑即是三道夫根性有利鈍為行有進怠今既發心念經為度羣迷竝躋彼岸是亦精進之流固非懈怠者但立願雖妙其如根性實鈍乃旋得旋忘且多廢失此由習因不深夙業障重闕多聞誦習之功故少記憶之性也二頌修因發慧四初頌修因供養地藏以香華衣服飲食諸玩具二頌服水以淨水安大士前一日一夜求服之悉如文三頌戒慎發殷重心慎五辛酒肉邪淫及妄語三七日內勿殺害至心思念大士名問五辛雖臭不損物命何故食者能障聖道即墮無間耶答性殊穢濁能生多過楞嚴云熟食發淫生啖增恚十方天仙嫌臭遠離餓鬼䑛吻常與鬼住福德日銷長無利益故雜阿含云食五辛人觸穢三寶死墮糞屎地獄出作野干猪狗若得人身其體腥臭故天竺沙門覺稱云吾國食肉五辛者驅出城外僧鏡録云竺曇猷禮天台石梁遇聖僧謂曰汝母懷妊時行經葱園胎氣犯穢不可住寺仙傳云樂子萇舉家飲仙酒升天獨從子墜地天神言此人茹蒜故不得往是故道藏云誦黃庭經忌食五辛道士受法忌淹穢五辛今諸師家多忽此事故載詳出之四頌發慧即於夢中見無邊覺來便得利耳根應是經教歷耳聞千萬生中永不忘以是大士不思議能使斯人獲此慧初正頌後結示此由大士總持深廣能令鈍者利愚者慧故名不思議事唐高僧傳記隋襄州景空寺有岑闍黎姓楊臨原人於寺西繖蓋山泉側造誦經堂每誦金光明經感得四天王來聽後讀藏經皆悉不忘今豈不然乎五頌轉惡相二初頌晝夜惡事貧窮衆生及疾病家宅凶衰眷屬離睡夢之中悉不安求者乖違無稱遂如文二頌修因安樂至心瞻禮地藏像一切惡事皆消滅至於夢中盡得安衣食豐饒神鬼護衣食豐饒係鬼神所主如外書說天平吏主豐臘判官主儉今既至心瞻禮地藏聖像則衣食增益使儉者豐闕者饒矣六頌安水陸二初頌經歷惡事欲入山林及渡海毒惡禽獸及惡人惡神惡鬼并惡風一切諸難諸苦惱妙臂經明蛇毒有一牙二牙三牙四牙不同遭一二牙毒猶可治若三牙死多生少四牙決死不救惡人即嘯聚緑林之輩斷道抄掠之儔惡神即嶽瀆山林一切諸神擅作威福者惡鬼即羅剎食人之鬼惡風者請觀音云黑風洄波仁王般若有六色風黑赤青天地火也別行疏云風以黑怖之甚也僧護經云疾風猛浪沒溺破壞餓鬼所噉險之甚矣餘如文二頌稱名利益但當瞻禮及供養地藏菩薩大士像如是山林大海中應是諸惡皆消滅寶雨經云云何菩薩如師子吼譬如師子哮吼之時惡獸野干各於方處驚駭馳走一切惡獸無能損壞是也應驗傳云外國百餘人從師子國泛海向扶南忽遇惡風墮鬼國便欲盡食一舶衆人怖稱觀音中有一小乘沙門不肯稱名鬼索此沙門狼狽學稱亦得免難觀音應驗既爾地藏利益亦然故稱名瞻禮諸惡消滅也三結頌普告流布三初勸聽地藏神力觀音至心聽吾說地藏無盡不思議百千萬劫說不周廣宣大士如是力至心如前所以勸至心聽者事既無盡不可思議若不冥三諦極致何能窮邊徹底以盡大士之奧藏耶無盡即圓三諦如云即色是空非色滅空此圓空無盡也如云一切諸法因緣果報無盡乃至悉能含受一切佛法故名無盡此圓假無盡也如云法若盡若不盡皆是無盡相即是空空則無有盡與不盡故知非盡非無盡是真無盡義此圓中無盡也如此無盡可思議乎哉故百千萬劫塵說剎說熾然說亦不能周悉其事故我今於天龍大會之中廣為宣揚地藏如是威神之力也如是二字亦指三諦不然何能顯地藏種種因緣莫不即空假中故號不思議如是之力耶二總頌聞瞻利樂地藏名字人若聞乃至見像瞻禮者香華衣服飲食奉供養百千受妙樂若能以此回法界畢竟成佛超生死前四句結上聞名瞻像等必受人天妙樂後二句結上回向法界必超生死成佛以具有四悉檀利益故也所以爾者以地藏名字等作世界分別說能令人得歡喜之益若各各為人說名相等能令人得生善之益若天人五衰相現乃至跋涉險道稱名禮像轉禍為祥令人得破惡之衆若將上事回向第一義諦能令人得入理之益然一一皆回法界者蓋地藏但有名字名字性空不住內外中間但垂影像像性亦離等於鏡相空華香華等供體是因緣不離中道佛性百千劫中受妙樂者受陰空洞畢竟無能受者皆回法界之力也故止觀云若推一法即洞法界達邊到底究竟橫豎事理具足上求下化備在其中方稱發菩提心菩提名道道能通到橫豎彼岸名發心波羅蜜故得畢竟成圓教法身之佛永遠超分段變易生死故須一一向法界也三結勸音告布是故觀音汝當知普告恆沙諸國土是故者承上八種事故而言也謂如此無盡不思議事非爾觀音莫能知之莫能告之故勸當知普告也言普告則應通九界言諸國則豈局同居故知地藏法門包法界而無外極橫豎而向歸也者三囑纍流通上名別者別在此經也此名通者經經囑纍也既屬今經雖通仍別矣初品題囑纍人天品第十三二品文為二初化主憂天人囑纍二空藏問瞻禮福利初復二初世尊摩頂付囑二地藏互跪承旨初又二初呼名大讚功德二初敘舉臂摩頂爾時世尊舉金色臂又摩地藏菩薩摩訶薩頂爾訓為即即是與觀音說見聞利益已訖更將人天囑纍地藏之時世界又大會既聞地神觀音兩番流通歡喜已竟宜聞囑纍人天生善之時為人又聞上不思議利益之事已破諸惡法墮苦之緣時衆更欲聞囑纍地藏救拔則永對治諸惡之時對治又聞上兩番不思議事得道者已竟更聞囑纍大會之衆無不悟理之時第一義有四悉檀因緣復申囑纍故言爾時舉金色臂者金色本黃表乎中道臂有提拔之功正顯提携六道竝歸中道一性故復舉之前摩頂慰勞度生辛苦今摩頂囑纍救拔勞煩前一手摩無量頂乃表一多自在今一臂摩一頂以表本同一道則顯六道九界更無二道也二歎衆德叵思而作是言地藏地藏汝之神力不可思議汝之慈悲不可思議汝之智慧不可思議汝之辨才不可思議正使十方諸佛讚歎宣說汝之不思議事千萬劫中不能得盡世尊特於人天大會連呼地藏之名者誠愛之深託之重也如國大王將崩儲君幼稚頑劣欲託孤大臣輔弼必執手頻呼愛卿以子幼而國大日久而心長中有滿腔說不盡之意故我佛舉臂摩頂雙喚其名也汝之神力下佛自讚德如國王託事亦先讚老臣之德今閻浮衆生志性無定若不假超羣之器具安能救沙界於冥陽故下所讚衆德不越能化三輪初句讚身輪現通諸聖罔測名為神八自在我名為力不可思議者準大論有五事不可思議謂衆生多少業果報坐禪人力諸龍力諸佛力佛力最不可思議菩薩入於禪定生不可思議神通即如意疾遍神通也故一念中悉到十方諸佛世界作無量身一切賢聖不能行不能到故不可思議然身輪現通必由意輪鑑機而起意輪即是慈悲與拔若欲與拔必須現通故曰身輪由意此即地藏大慈大悲實能一時遍施與拔故不可思議然雖內鑑外現若無智慧辨才安能赴機說法故知慧辨正讚口輪蓋身之神通非智慧不轉故龍樹菩薩云以智慧力故能轉一切諸法所謂小能作大大能作小能以千萬無量劫為一日又能以一日為千萬劫是菩薩世間之主所欲自在何願不滿以是因緣故菩薩乘神通力能速疾超越十方世界得非智慧為神通之本乎十輪云智慧深廣猶如大海辨才無滯如水激輪故不可思議此由大士圓具祕密三輪故能垂形沙界我佛讚德詎曰徒然正使下引同諸佛正對假說言假使則意涉浮泛言正使則詞彰真實然地藏大士何能使十方諸佛讚歎耶如大論云若有菩薩具足十地六波羅蜜十力四無所畏四無礙智十八不共法等無量清淨佛法為衆生故久住生死不取阿耨菩提而廣度衆生如是菩薩諸佛讚歎正今諸佛同聲讚歎之意也然又何故讚說其事千萬劫不能盡耶亦如論云菩薩出於三界變化無央數身入於生死教化衆生如是希有事皆從甚深般若波羅蜜生正今讚歎不盡之意也二呼名載囑人天二初長行二偈頌長行分二初火宅衆生勿令墮苦二少善衆生勿令退失初又二初正以三界天人付囑地藏地藏記吾今日在忉利天中於百千萬億不可說不可說一切諸佛菩薩天龍八部大會之中載以人天諸衆生等未出三界在火宅中者付囑於汝無令是諸衆生墮惡趣中一日一夜何況更落五無間及阿鼻地獄動經千萬億劫無有出期前呼名愛語喜聲也今呼名苦語悲聲也前乃讚德今為囑事故爾記吾等囑令勿忘末後之說如父遺命孝子銘骨勿諼也大會等者藉衆證明顯是大事非細故也此與法華長者付業聚會親族不同何也彼教久化之機至此大功克就聚衆付業推門落臼更有何難此付未調之衆為令佛種不斷似救子於水火竟不知如何了局故不同也言載以者以將也前已將人天付囑今重將此衆纍爾也未出等者自我佛入滅之後洎彌勒道成之前於其中間凡在三界五欲火宅中者今得得交付囑託於汝總令是輩不墮三惡道乃至一日夜最少之時況不急救援令更落無間阿鼻大地獄中極受苦痛經千萬億劫難期出獄之時哉寄語諸賢毋負佛恩早求出苦急渡生津勉旃勉旃二復明生性無定分形地藏是南閻浮提衆生志性無定習惡者多縱發善心須臾即退若遇惡緣念念增長以是之故吾分是形百千億化度隨其根性而度脫之此文不過復疏前事明吾所以付囑之意是南閻等遠提業感品中一切衆生未解脫者性識無定等文近提利益存亡品地藏所白我觀是閻浮衆生等文以是下顯提佛自分身潛映地藏化身二段文此正同付法藏經云一切衆生志性無定隨所染習若近惡友便造惡業流轉生死無有邊際若近善友敬心聽法必離三塗受最勝樂如華氏國白象聞法生慈見殺增害豈況於人而不染習但善類登山理為難上惡如崩墜實可易行是以天宮間曠來蹤蓋寡地獄籠樊往人爭湊故吾分形化度織此之由耳二少善衆生勿令退失二初種少善擁護勿退地藏吾今殷勤以天人衆付囑於汝未來之世若有天人及善男子善女人於佛法中種少善根一毛一塵一沙一渧汝以道力擁護是人漸修無上勿令退失初二句重提前事然觀殷勤二字不覺泣數行下夫殷者盛也勤者勞也心之委曲也此以下事上之心身盛勞而心委曲孜孜奉以周旋不敢稍有𨂫弛也者𨂫音託弛音始𨂫落無檢局弛廢不尊禮度也漢武帝紀𨂫弛之士今我佛為未來衆生降尊就卑屈上湊下不覺言之至此乎未來下示付囑之意謂一切衆生同有佛性闡提雖惡性善具存儻於未來之世其有天人善男女等不昧原初之念於佛法無上福田能下小種以立善根不論毛塵沙渧汝當以權智道力擁護是等少善之人漸令修習阿耨菩提如菩薩本行經云若有人能於佛法少作微善如毛髮許所生之處受報弘大無有窮盡文故知施福由心豈關施物巨細故囑汝擁護勿令中間有退失也如處胎經云盲龜浮木孔時時猶可值人一失命根億劫復難是海水深廣大三百三十六一針投海中求之尚可得一失人身命難得過於是故知一退其失非細今願地藏當如慈母之育嬰孩必使成立毋稍懈怠致令夭亡是吾今日於忉利大會將人天衆殷勤囑汝之苦心也二念佛經碎獄生天二初隨業墮落惡趣復次地藏未來世中若天若人隨業報應落在惡趣經云假使百千劫所作業不亡因緣會遇時果報還自受故知影形相隨誰能逃避昔有人死至閻王所考厥罪惡應墮鐵城而人姊子乃王正妃勸王念我親弟勿治其罪王囑其住我宮內不可外出被獄吏所捉其人不覺自詣鐵城王不能救隨業受報不容絲毫勉強也矣準業報差別經墮四惡趣各有十業云云二神力方便救拔臨墮趣中或至門首是諸衆生若能念得一佛名一菩薩名一句一偈大乘經典是諸衆生汝以神力方便救拔於是人所現無邊身為碎地獄遣令生天受勝妙樂臨墮至門首者若一到獄急難得出故於臨入之時即令念佛免苦如譬喻經云昔有國王弒父自立有阿羅漢知王餘命不過七日命終必墮阿鼻一劫受苦尋往化之教至心稱南無佛七日莫絶臨去重告慎勿忘此王便叉手一心稱說晝夜不廢至七日命終魂神竟至阿鼻乘前念佛知是地獄即便大聲稱南無佛獄中罪人聞稱佛聲一時同稱猛火即滅皆得解脫出生人中後阿羅漢重為說法得須陀洹又觀佛三昧經云佛告比丘我滅度後若稱我名南無諸佛所獲福德無量無邊大慈經佛告阿難南無佛者此是決定諸佛世尊名號音聲故稱言南無諸佛增一經云衆生三業造惡臨終憶念如來功德者必離惡道趣得生天上正使極惡之人以念佛故亦得生天文一菩薩名者如文殊遍吉觀音勢至等蒙度脫者不勝枚舉矣一句一偈者普賢觀經云若誦大乘經思第一義甚深空法於一彈指頃除百萬億那由他恆河沙劫生死之罪冥報記載王生將墮地獄忽遇一僧云是地藏菩薩教令熟誦若人欲了知偈可免地獄少頃喚至王前王問有何功德答云唯持一偈王令誦之聲徹地獄罪人聞聲竝蒙解脫即令放回勉其修善豈非地藏神力現身碎獄生天受樂之驗歟故知念佛菩薩名及誦經偈皆得超淪受勝妙之樂也二偈頌爾時世尊而說偈言現在未來天人衆吾今殷勤付囑汝以大神通方便度勿令墮在諸惡趣現未天人性既無定或造惡業重落三塗總藉地藏展大神通用異方便必令度脫毋使流轉也二地藏互跪承旨二初經家敘儀爾時地藏菩薩摩訶薩胡跪合掌二大士領命二初安慰世尊白佛言世尊唯願世尊不以為慮皆如文二度脫衆生二初少善解脫生死未來世中若有善男子善女人於佛法中一念恭敬我亦百千方便度脫是人於生死中速得解脫現前介爾之心甚小甚微故曰一念佛說四自侵經云未見羣類苟懷一介志不轉易假使有人至心欲度當諦思計一心行道當知無常假借是身萬物歸空皆非我所曉知無者則度天下十方人民故知千念萬念始乎初念只此一念即感地藏慈悲喜護愍傷萬姓萌類之兆令其於生死速得解脫更何疑哉二深修不退道果何況聞諸善事念念修行自然於無上道永不退轉此中況意謂一念甚微之恭敬尚蒙解脫生死況乎凡聞諸善念念無間修行者哉四自侵經云道人觀察可否之事內自省身譬如夢幻喻如軍征百萬之衆恃怙名將以却怨敵道人伏心制意修法奉道順行戒禁身意清白布恩施德除棄忿怒憍奢諍訟專精行道無得無礙志在軌迹若將帥衆也先自正心爾乃身行身心俱正則無所失以無所失得道絶去故十輪云照行善者猶如朗日故令自然於無上道永不退轉也二空藏問瞻禮福利二初述贊問福利二許說示利益初又二初經家提名說是語時會中有一菩薩名虗空藏梵語誐誐曩獻惹此云虗空藏此經始文殊發問謂非大智莫識地藏端倪終空藏收科以非太虗安泯大士化跡乃攝有歸空全假即空意也而空藏問福利者乃從空談有全空即假意也空假不二當體即中圓融妙行同歸祕藏故終乎虗空藏也準虗空藏菩薩經此娑婆西過八十恆河沙世界有佛剎名一切香集依其中衆生成就五濁佛名勝華敷藏如來彼有菩薩名虗空藏頂上有如意寶珠無量釋迦毗楞伽寶而為圍繞此珠光明蔽餘光明悉滅無餘所有功德唯除如來餘無及者準密部即毗盧如來四親近菩薩中寶波羅蜜流出南方寶生部者是此菩薩也二當機發問二初因聞歎致請二願為衆略說初又二初述聞神力叵思白佛言世尊我自至忉利聞於如來讚歎地藏菩薩威神勢力不可思議經初光音遍及空藏即集天宮故始終備聞如來讚歎地藏之事勢力者如思益云我投足之處震動三千大千世界及魔宮殿觀經云以智慧光普照一切令離三塗得無上力故言勢力不思議者此是菩薩甚深行處雖施為萬有令衆生得益咸獲本然初無實法如化人現作化事不過令人得樂空藏終篇意在斯也二因問福利幾種未來世中若有善男子善女人乃及一切天龍聞此經典及地藏名字或瞻禮形像得幾種福利準地持福即布施持戒忍辱依禪依精進修行施戒四無量等是名福分蓋善名福利感報恬愈今既讀經聞名瞻形禮像必有所得福利不審有幾種耶須知福利由心心能造福心尚叵得福利奚存然化門引物悕向福利為要況密部中凡供養門皆攝入虗空庫藏則福利之事尤空藏之專司而應問者也二願為衆略說唯願世尊為未來現在一切衆等略而說之必求略說者導物生善之要門也書有作善降祥之訓易明積善餘慶之言若不詳陳乎福利未免阻絶其善門故願略說耳至若嚴禱祀以徼福鬼神隨因果而悕報冥寞此利心之邪求詎可同年而語哉二許說示利益二初誡聽許說佛告虗空藏菩薩諦聽諦聽吾當為汝分別說之夫善說法者無說無示善聽法者無得無聞何有分別諦聽之異指乎然若一向冥真恐成斷見若一向順有恐成常見斷常遍邪違中道遠矣要於拈空非空之際談有不有之時不涉言詮而舌根恆轉無離音響而聞性原空所謂善能分別諸法相於第一義而不動乃如來分別之指空藏諦聽之意耳二分別利益二初見像聞經供讚利益二聞經禮形讚歎利益初又二初總示修因若未來世有善男子善女人見地藏形像及聞此經乃至讀誦香華飲食衣服珍寶布施供養讚歎瞻禮如文二別列益數得二十八種利益一者天龍護念二者善果日增三者集聖上因四者菩提不退五者衣食豐足六者疾疫不臨七者離水火災八者無盜賊厄九者人見欽敬十者神鬼助持十一者女轉男身十二者為王臣女十三者端正相好十四者多生天上十五者或為帝王十六者宿智命通十七者有求皆從十八者眷屬歡樂十九者諸橫消滅二十者業道永除二十一者去處盡通二十二者夜夢安樂二十三者先亡離苦二十四者宿福受生二十五者諸聖讚歎二十六者聰明利根二十七者饒慈愍心二十八者畢竟成佛初句總標下乃別列天龍乃造化之權衡為陰陽之管轄國藉保綏之德黎民仰覆護之功今既讀經持名瞻禮供養故感天龍護之念之令善果聖因由之增長家緣世事用是克諧故首舉之示福利之本也二三四三益事迹相連果由因而增進因藉果而積集因果相資自然菩提不退如十輪經地藏白佛言我當濟度此四洲渚世尊弟子一切苾芻及苾芻尼塢波索迦塢波斯迦令其增長覺分聖諦光明增長趣入大乘聖道增長成熟有情大慈大悲增長五眼灌頂生天涅槃如是善果日日增長集者聚集大論云值遇經法修善持戒布施禮敬等種涅槃因緣文如是聖上之因莫不聚集善果聖因既日增集自然道心牢強誓力勇健於位行念自無退轉矣增者從微至著以期滿足集者自少至多所冀成就於此兩楹之間菩提不退也五衣食豐足助道備也衣以蔽形食以支命身安道隆賴是衣食此雖小緣能辨大事凍餒不安道法焉在故十輪云一切皆得如法所求衣服寶貝醫藥牀敷及諸資具無不備足六疾疫不臨修道之要病乃退道之緣能令色力減損準長阿含乃他方世界有鬼神來此間鬼神放逸淫亂不能護人他方鬼神侵嬈此世間人撾打捶杖接其精氣使人心亂故有疾疫之災十輪云若諸有情惡鬼所持成諸病者有能供養地藏菩薩一切皆得解脫無畏身心安適故疾疫不臨也七離水火災病為內障災為外障左傳以人火曰火天火曰災篆文川中加一川與川同川壅為災說文從宀屋也火其屋為灾故從火宀下為意今謂潢潦之水燎原之火損物傷生竝是天災十輪云若諸有情為火所焚為水所溺有能供養地藏菩薩一切皆得離諸危難安隱無損此不必引大三災之水火也八無盜賊厄離宿怨對也十輪云若諸有情為諸怨賊軍陳及餘種種諸怖畏事之所纏繞身心慞惶懼失身命有能供養恭敬地藏菩薩一切皆得離諸怖畏保全身命九人見欽敬地持云菩薩種姓具足故衆所敬重供養讚歎言必受行無所違犯今既供養地藏菩薩故致斯福利十神鬼助持尤末世修道善利長阿含二十云若有修行善法見正信行修十善業如是一人有百千神護今既供養地藏菩薩故得神鬼助持修行無障也十一女轉男身十二為王臣女十三端正相好皆如前十四多生天上準辨意經五事生天即是五戒十輪云隨其所應安置生天涅槃之道十六宿智命通達命元由也士有百行智為其首由讀經稱名了因之力也十七有求皆從十輪云若諸有情或為種種世出世間諸利樂事於進求時若能恭敬供養地藏菩薩意願滿足十八眷屬歡樂此修行外護知識十輪云若諸有情愛樂別離怨憎合會有能恭敬供養地藏菩薩一切皆得愛樂合會怨憎別離十九諸橫消滅如前二十業道永除以修讀經等無漏之業故三界有漏業道一并永除滅矣二十一去處盡通地持云人具足故男相成就堪為一切功德法器於一切時自在遊處一切衆生往來同事人間曠野隨意無礙今既修供地藏菩薩故得行來出入到處通達也二十二夜夢安樂如前已上皆自身福利二十三先亡離苦乃上資祖禰也下明當來福利二十四宿福受生思益經云菩薩有四法得先因力不失善根一見他人闕不以為過二於怒人常修慈心三常說諸法因緣四常念菩提今承持誦供養地藏宿世之福或受生天上人間竝享如意福樂也二十五諸聖讚歎以修勝福善譽遐流大論云菩薩聞甚深不可思議佛法能定心信樂不生疑悔如是菩薩諸佛所歎今既信受地藏不思議事故感諸聖讚歎也二十六聰明利根如荀子云目不兩視而明耳不兩聽而聰今由一心讀經成法行機故義理入耳不俟更聞經書過目寧須載讀默識心通根性越倫也二十七饒慈愍心此利生之要行以慈有五利刀不傷毒不害火不燒水不沒瞋惡見喜地持云菩薩以安隱樂饒益衆生非安隱樂教令除斷是也二十八畢竟成佛此是究竟利益滙江河淮濟而注之海同成鹹味鎔瓶盤叉釧而入於爐盡作精金此我佛付囑之心地藏承命之意所謂唯此一事實餘二則非真故兩文皆以此終焉二聞經禮形讚歎利益二初總示修因復次虗空藏菩薩若現在未來天龍鬼神聞地藏名禮地藏形或聞地藏本願事行讚歎瞻禮此中修因與上似同何故列作二文須知上加種種供養緣了兼修此但聞禮讚歎了因獨進以此小異故別列之正顯聞益尚爾況思修兼行乎二別列益數得七種利益一者速超聖地二者惡業消滅三者諸佛護臨四者菩提不退五者增長本力六者宿命皆通七者畢竟成佛前後之益俱約圓論一速超聖地即指圓十地之聖種性以圓人根利智猛故於住行向位速得超入聖地也二惡業銷滅惡業對善業論既聞地藏不思議事則了修染修惡全體即是性染性惡故於五品觀行圓伏五住進入信位見思先亡則分段生死從斯永離故知雖舉惡業自得三障圓銷三諸佛護臨既在似位已鄰真因得佛法之氣分感諸佛之護臨臨蒞下也與上帝臨汝意同從品衆也從臥無為也上之臨下不自用而用人故能聽物之為而不自為也今諸佛臨下正如月之臨江固不庸心於其間也四菩提不退如前五增長本力即修因外熏增真如本力以深行菩薩具足悲智二增故彌增本力也六宿命皆通準諸論說謂於生處自性能知過去宿命及知他心若諸有情施他種種大妙飲食由彼業力能引此智如阿摩晝經云無明永滅大明法生暗冥消滅光曜法生故能憶宿命無數劫事七畢竟成佛地持云菩薩依智故攝受正福種種巧便為諸衆生乃至無上菩提若報若報因若報果一切依福起福依智起此二具足最勝最上得無上菩提若福智不具終不能得今修讀經持名之智及瞻形禮像之福故致成佛此名因攝果攝自他之利益也別流通竟二總流通二初因果聖凡聞讚致歎爾時十方一切諸來不可說不可說諸佛如來及大菩薩天龍八部聞釋迦牟尼佛稱揚讚歎地藏菩薩大威神力不可思議歎未曾有十方至八部等結上雲集之衆諸佛菩薩在光前集乃發起之根源天龍八部在光後集正發起之衆也聞釋迦下總結上來所歎不思議事然餘人亦有讚歎今獨言釋迦者有二意一舉主攝伴如羣辟之言出於王命皆曰王綸是也二歸功化主如三公謨猷功成之後歸美天王是也餘如文二天主衆會供養禮退是時忉利天雨無量香華天衣珠瓔供養釋迦牟尼佛及地藏菩薩已一切衆會俱復瞻禮合掌而退忉利天王獨供者既是檀越又在其宮故得專之也香表因通果海成就五分法身華表圓因剋果具足四十一位天衣從樹而生輕細自然表證寂滅之忍珠瓔別行疏云或衆寶瓔珞或衆寶珠今是衆寶珠成故曰珠瓔表得四勝法大集云戒定慧陀羅尼以為瓔珞莊嚴法身是也然珠瓔在頸頸是所嚴表中道性德此行稱性如瓔珞在頸而能嚴也皆言雨者則是從正空中道第一義天繽紛而下也無量者因果之法竝由一心了達此心本具河沙性功德法有何限量以此無量諸法供養釋迦能說之教主以及地藏能行之願王心有所專故不言餘衆已者謂能供之物皆冥實際所供之主本住三摩能所既空感應斯泯賓主鎔融而一際財法絶寂而無垠故云已也上是申供下乃禮退一切衆會即前所集之衆今將各還本住俱復瞻仰重師道而戀戀靡忘重申禮拜尊經法而心心無間合掌表十界一體而退顯萬類同歸然而不同諸經結皆大歡喜者以見在會大衆從此重增勝心效地藏之僧那救三塗而不了遵迦文之囑纍弘是典而彌窮上同聖母之愁憂却類天王之悲歎則聞法之大喜固內蘊襟懷而濟世之殷憂已外彰眉宇經家不敘斯語者意見乎言之表也後跋原夫大士悲願分形劫量叵測今之九華者太倉之一粟也每購山志未得稽考應蹟末由相傳是新羅國王太子二十四歲擕白犬善聽航海而來止九子山石洞有年時有閣老閔公素懷善念每齊百僧必虗一位因請洞僧足數乃乞一袈裟地公許衣遍覆九峰遂盡喜捨其子求出家即道明和尚是公後亦離俗網反禮其子為師故今侍像左道明而右閔公織此故也公里族諱號亦未詳世行唐詩選名英華集中有金地藏送童子還家詩其曰空門寂寞汝思家禮別雲房下九華愛向竹欄騎竹馬懶於金地布金沙添瓶㵎底休招月煮茗甌中罷弄華好去不須頻下淚老僧相伴有煙霞附刊紙尾公諸同好云經讚附佛升忉利為報慈親放光地藏集分身緣感業宣陳廣說弘因歷劫度沈淪第一卷獄名啓問苦楚堪哀如來讚歎福門開鬼主悉皆來佛號奇哉存沒離塵埃第二卷地藏請較布施因緣堅牢護法歎功玄聞見利無邊囑纍人天世世廣流傳第三卷陳九陶先生贈言併序附匡菴運遐法師頽齡善病日夕注經不休同門全彰法師年富力強遊燕甫還遽以微眚示寂輒為全師慨傷深為運師愈快云全彰法師健無比都門往返六千里佛法傾動諸公卿方欲奏加國師禮陡嬰微恙遂西歸法臘才逾知命耳惜乎楞嚴說法堂幾回欲建仍拋圮匡菴運師係法兄全師却是運師弟全師忽辭運師去運師長病大仙矣長病得毋僥幸乎又復注經勞不已注經弘願銘肺肝孜孜深闡而曲體考盡千函大藏經載無疑義與剩理脉脉陰叨佛護持病魔疊疊能強起地藏經今得解之解地藏經世罕此瀝心嘔血醒時流敷演欺人莫浪恃登壇集衆每宣揚恭聽伊誰不歡喜一從釋迦涅槃後是經今始得知已莫大功德在後頭豈僅目前報增紀更兼師長𦦨口遺歷久未獲壽於梓二帙運師傾鉢資齊刊頓貴洛陽紙他年入藏不須憂幸值當今係聖主寄聲恭賀景老人嗣法有此爭氣子寓武原禾人陳鏞拜草跋寶池真常禪德偶得此科注歡喜踊躍即欲廣流布于世不辭鯨浪犬牙之危險頓發崎陽緬赴京洛時沈疴新痊而形氣未復原然勇志奮起如此可謂為弘法利生忘軀命矣因屬余以訓點刊行之事余素歸地藏菩薩間又讀誦此經每憾闕注疏之久也而今幸遇希有勝緣實所謂如暗得燈如貧得寶喜感交生不知手之舞之足之蹈之只願早流行之以成常師志而普與衆共利於是不暇顧謭陋漫污和點以鋟梓云時元祿三庚午載十月上旬沙門妙幢淨慧謹跋
