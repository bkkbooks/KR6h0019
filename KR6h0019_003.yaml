body:
  text: 古鹽匡菴青蓮苾芻靈乘父輯三示業報差別二初品題地獄名號品第五二品文二初普賢請説爾時普賢菩薩摩訶薩白地藏菩薩言仁者願為天龍四衆及未來現在一切衆生説娑婆世界及閻浮提罪苦衆生所受報處地獄名號及惡報等事使未來世末法衆生知是果報次於業緣業感之後而問地獄業報差別之相故云爾時梵名邲蒲必切音弼輸跋陀或三曼跋陀此云普賢準悲華經乃過去無諍念王第五王子名無所畏以行勝諸菩薩故故寶藏佛改字普賢文句云伏道之頂其因周遍曰普斷道之後鄰於極聖曰賢光疏云真似之位地地相隨無位不有如普賢修普賢行滿位鄰尊極此似則高記云已證名真未證名似普賢等覺望極名似故立賢名此品發起假普賢者以見行彌法界方能悲願偏弘以普賢是所信如來藏又表證出纏法身正令一切衆生達阿鼻依正全處極聖自心毗盧身土不逾下凡一念方了本源成其極智極智返照不異初心也然二大士德位相亞智行相齊豈不知地獄名與事乎蓋以地藏分身冥界教化泥犁當衆發明誰不信受故特興問耳仁者慈育之尊稱仁為心德之統體以天地之大德曰生人函生理自然惻怛慈愛與物皆春故字意從人從二二象上天下地人能克己渾然與天地一體廓然太公矣天表諸佛地表衆生人心參合其中直令生佛一體故言仁者願為天龍等因聞不問男女等罪行業感悉同受之故稱無間後又聞一切衆生未解脫等故願請地藏為此輩説也罪苦衆生乃能受報者所受報處通則指六道別唯在地獄惡報等事受報時所歷之境略言有九種若聞法兩舌亂他墮耽耳狗中聞法心不餮采墮長耳驢中慳貪獨食墮餓鬼中出生為人貧餓惡食飼人墮豬豚蜣蜋中劫奪人物墮羊中人生剝皮噉肉喜盜人物墮牛馬中出生為人下使喜作妄語傳人惡墮地獄煬銅灌口拔舌犁耕喜飲酒醉墮沸屎泥犁出為猩猩為人頑愚為上鞭下無所告訴墮地獄中出為水牛貫鼻負重償殃者廣明之則有無量使未來下明地獄正意衆生所以受苦者由不知果報耳夫空無所有無相無願是道之要慧不可為新學人説聞無所有便曠其心不復修戒言一切空當何所作夫善知識欲教新學漸語魔事令護魔因緣生死罪苦五道分明令信罪福事事了了乃可語道故使未來衆生知果報耳二地藏承答三初謙恭許説地藏答言仁者我今承佛威神及大士之力略説地獄名號及罪報惡報之事承佛威神者教主極聖仰承固是言及大士之力者何普賢是佛嫡子尊無敵也行願力深故以大士尊稱之傳曰通古今然辨否謂之士士事也從十象事之多宇宙內皆吾職分之事從一一以貫之也故孔子曰推一合十為士今普賢萬行亦然由一而十乃至由千而萬了萬行之一性度衆生於一心能建立極大之事故云大士略説者謙遜之辭也二答釋獄報二初答地獄名號二答罪報惡事初分二初總示獄處仁者閻浮提東方有山號曰鐵圍其山黑邃無日月光長阿含十九世記經地獄品佛告比丘此四天下有八千天下圍繞其外復有大海水周匝圍繞八千天下復有大金剛山繞大海水金剛山外復有第二大金剛山二山中間窈窈冥冥日月神天有大威力不能以光照及於彼八大地獄故云黑邃邃深遠也黑而且邃暗之極者矣故立世阿毗曇論云世尊説有大地獄名曰黑暗各各世界外邊悉有皆無覆蓋此中衆生自舉手眼不能見雖復日月及大威神所有光明不照彼邑諸佛出世大光遍照因此光明互得相見住在兩山世界鐵圍外邊名曰界外文以在閻浮提東故曰東方有山等也二別開獄名二初正主地獄有大地獄號極無間又有地獄名大阿鼻無間阿鼻二大地獄或合或離自古難定準長阿含及觀佛三昧經合為一獄經自問答何名阿鼻地獄此云無間地獄此經與楞嚴為二獄經云九情一想下洞火輪身入風火二交過地輕生有間重生無間純情即沉入阿鼻獄此經出不同譯師各異致使二獄離合不同私謂譬如二姓共居一宅一門出入各有眷屬外人觀之不無同異同出一門何妨説一既是二姓何妨説二以二獄同在一處受罪略同故使一二不定阿言無鼻言遮或言救合名無遮無救準十輪經説五逆罪為最極惡復有四種大罪同於四逆犯根本罪云云若人犯一一罪者身壞命終皆墮阿鼻地獄佛告僧護有九種人常處阿鼻大地獄中一食僧物二佛物三殺父四殺母五殺阿羅漢六破和合僧七破比丘淨戒八犯淨行尼九作一闡提是九種人恆在地獄正法念經謂阿鼻地獄苦千倍過前十大地獄壽經一劫又觀佛三昧海經云阿鼻地獄縱廣八千由旬七重鐵城七層鐵網刀林劍林等各各七重各有十八寒氷等獄是則下之四角飛刀等皆阿鼻之眷屬也故立世阿毗曇明更生八地獄竟第九即明外園隔地獄品熱灰糞屎等皆在其中則下文以眷屬立科千古定論後賢不可不知二眷屬等獄二初獄數無限又二初列名復有地獄名曰四角復有地獄名曰飛刀復有地獄名曰火箭復有地獄名曰夾山復有地獄名曰通槍復有地獄名曰鐵車復有地獄名曰鐵牀復有地獄名曰鐵牛復有地獄名曰鐵衣復有地獄名曰千刃復有地獄名曰鐵驢復有地獄名曰洋銅復有地獄名曰抱柱復有地獄名曰流火復有地獄名曰耕舌復有地獄名曰銼首復有地獄名曰燒腳復有地獄名曰啖眼復有地獄名曰鐵丸復有地獄名曰諍論復有地獄名曰鐵鈇復有地獄名曰多嗔皆言復有者乃阿鼻大獄之眷屬也其類甚多故以二字點之四角者正法念處經云有人實非沙門自謂沙門若聞婦女歌舞戲笑莊嚴具聲不善觀察心生愛染漏失不淨身壞命終墮於合大地獄鐵末火處是合地獄第十六處所謂熱鐵四角地獄周圍鐵壁五百由旬從上雨火雨鐵一切身分分散為末常煮常燒準立世阿毗曇云黑繩地獄一切皆鐵晝夜燒然是中罪人獄卒捉持撲令臥地隨黑繩界斫以鐇斧鐇音番廣刀斧也或為八角或六角或四稜復有從項至足細斷如蔗節昔在人中自作殺他斬斫手腳鼻耳割其背肉等於中受生也飛刀者即刀輪地獄觀佛三昧海經五云刀輪地獄者四面刀山於衆山中積刀如磚虗空中有八百萬億極大刀輪隨次而下猶如雨滴立世所謂劍雨鐇斧等雨隨所著處身分斷絶頭首分離如斫木札布散狼藉昔在人中行鬬戰事與人刀杖遣令鬬戰聚集多人肆意殺害由此業根於彼中生火箭準觀佛三昧經即五百億鐵機地獄有一鐵牀縱廣正等四百由旬上安諸音忌連針也間皆有萬億鐵弩鐵弩鏇頭百億鋒刃罪人生鐵機上萬億鐵關從下動鐵低昂無量鐵弩同時皆張一一鐵箭射罪人心一日一夜六百億生死立世云世界愚癡衆生為貪欲故不孝父母不敬師長不順善教殺害衆生飼音寺俗作飼諸姦人故受此報也夾山者三法度云衆合地獄者罪衆生畏地獄卒無量百千走入山間入已前後自然生火遮彼兩山自合如磨血流如河骨肉爛盡彼於此間喜磨衆生為首正法念云二山堅鞭鐵𦦨火然兩廂作勢一時俱來拶地獄人拶已磨之其身散盡無物可見如是磨已而復還生復以二山如前拶磨如是復拶復磨無量百千年歲此由衆業所致通槍槍矟也又剡木傷盜曰槍立世云罪人已度糞屎地獄見劍葉地獄心起愛著如菴羅林是劍林路有諸鏘刺七首剃刀刀劍鋒刃遍布其地罪人行此林路備受鑽刺等苦由殺生增上業報以鬬戰為首所感鐵車楞嚴云思報結息則為火車案賢愚經釋迦始起慈心正在此獄鐵牀準楞嚴淫習則有鐵牀銅柱雜藏經云今身淫泆死入地獄臥之鐵牀或抱銅柱獄鬼然火以燒其身故觀佛三昧經云罪人命終坐鐵床上如鴈王翔落黑暗處刀輪上下斬銼其身鐵牛詳下鐵衣立世云有時獄卒罵詈怖畏受罪之人惡人起起莫動時無量罪人大驚竦倚猶如幡林是時無數千萬赤鐵袈裟及赤鐵衣從空來下罪人叫喚衣來衣來是衣至已各各纏褁皮肉筋骨悉燋爛已鐵衣自去由昔人中鞭打捶撻有命衆生復有出家破戒受用國土衣服及以腰繩以此業報於中受生古德云現見袈裟離體將來鐵褋纏身蓋謂此也千刃準觀佛三昧經云自有衆生不順師教興惡逆心不知恩養盜師害師汙師淨食坐師牀座捉師鉢盂罵師謗師打師殺師以諸毒藥持以飲師若沙門婆羅門作諸非法無有慙愧剝像破塔劫法寶物殺伯叔父母兄弟姊妹如是罪人命終坐於大劍牀上百億劍刃刃皆出火燒刺其身空中火輪從上而下直劈其頂其身碎裂為數千段鐵驢如下洋銅如上抱柱準觀佛三昧經云世間愚癡衆生染愛邪淫命終生銅柱頭猛火𦦨熾焚燒其身驚怖下視見鐵牀上有端正女若是女人見端正男心生愛著從銅柱上欲投於地銅柱貫身鐵網絡頸鐵㭰諸蟲唼食其軀落鐵牀上男女俱時六根火起有鐵觜蟲從眼而入從男根出若汙戒者別有萬億諸小蟲輩如瘭音標又音漂疽病也疽蟲蟲有十二觜觜頭出火唼食其軀此邪淫報一日一夜九百億生死流火三法度論名大哭地獄謂大鐵山遍火然四絶無行處惡獄卒無慈瞋恚言欲何所趣無事與事以火燒鐵杵擊破其頭彼於此間困苦萬民故生彼中據首楞嚴味報二相中二者吐氣飛為猛火焦爛骨髓是也耕舌如後銼首三法度論云活地獄者獄卒以利刀斧解剝銼斬罪衆生如斬銼羊頭皮肉解散立世云昔在人中有命衆生拍破其頭或魚蛇蜈蚣等種種等業受碎頭報燒腳立世論名熱灰罪人從大地獄出見外熱灰如平坦空地見相起心我應往彼於是罪人往到彼中腳踐熱灰皮肉即爛譬如蠟塊投猛火中隨其舉腳皮肉還復或至膝至至頸或沒不現昔在人中取有命衆生置火中熱灰中熱沙中或邪淫它婦過世法則或出家破戒行住坐臥僧伽藍中或踏踐四支提境界及履支提影以此業報於中受生啖眼起世經云刀葉林小地獄中以無量諸不善業果報故有鐵觜烏忽然生出飛向地獄衆生兩髆之上安立腳已即以鐵𭪿啄彼罪人兩眼而去正法念云罪人入大劍樹鐵林之中有鐵鷲鳥啄破其眼而飲其汁是本與酒惡業果報鐵丸如前鐵鈇長阿含云出鐵丸地獄慞惶馳走求自救護宿對所牽不覺忽至釿斧地獄縱廣五百由旬獄卒怒捉罪人撲熱鐵上以熱鐵釿斧斫其手足耳鼻身體苦毒辛酸悲號叫喚偈云夫士之生斧在口中所以斬身由其惡言應毀者譽應譽者毀口為惡業身受其罪諍論多嗔雖分二獄同成一因諍論起於貪嫉以貪嫉故遂多瞋恚由因感果故生此中三法度論云復因惡罪手自然生鐵爪鋒利若刃形如半月各各生怨結意彼曾迫我我今復逼迫由此生恚更相爴與攫同爪持也截如刈竹葦彼於此間結恨心死故生彼中須知一切諸法皆是虗誑衆生愚癡瞋罵加害乃至奪命五陰皆空無我無人取相鬬諍橫加毒害起此重罪故墮三塗受無量苦是故菩薩語衆生言汝等莫於根本空中鬬諍人身尚不可得何況值佛今既墮地獄悔恨晚矣二指廣地藏白言仁者鐵圍之內有如是等地獄其數無限如是等指上鐵圍山中諸地獄也數無限者一一獄中各有小獄不能盡陳也言有者以凡夫妄起愛取取有為境故有因有果有苦有樂故唯識論云一切如地獄同見獄卒等能為逼迫事皆是罪人惡業心現並無心外實銅狗鐵蛇等事世間一切事法亦復如是二獄名不同二初列名更有叫喚地獄拔舌地獄糞尿地獄銅鎖地獄火象地獄火狗地獄火馬地獄火牛地獄火山地獄火石地獄火牀地獄火梁地獄火鷹地獄鋸牙地獄剝皮地獄飲血地獄燒手地獄燒腳地獄倒刺地獄火屋地獄鐵屋地獄火狼地獄叫喚準長阿含列八熱大地獄第四叫喚第五大叫喚各有十六遊增以獄卒捉罪人擲大鑊中熱湯涌沸又擲大𨫼上反覆煎熬故號咷叫喚而復大號咷叫喚也而正法念云黑繩地獄有處名等喚彼處惡燒受苦無間舉在嶮岸無量由旬熱炎黑繩束縛繫已後推墮鐵刀熱地之上鐵狗噉食一切身分分分分離唱聲吼喚據此叫喚二獄只在第二黑繩獄中槩是八獄相連故總説耳長阿含云由嗔恚懷毒造諸惡行故墮叫喚地獄由習衆邪見為愛網所牽造異陋行墮大叫喚地獄拔舌糞尿如後銅鎖觀佛三昧云黑繩地獄者八百鐵鎖八百鐵山豎大鐵幢兩頭繫頸獄卒羅剎驅㖑罪人令負鐵山鐵繩上走不勝落地墮鑊湯中羅剎驅起渴急飲鐵吞石一日一夜經歷是苦九十萬遍此由愚癡衆生七衆弟子九十六種梵志等法説非法非法説法或犯輕戒久不懺悔所致耳火象如僧護前進見一白象熾火燒身佛言汝見象者是地獄人迦葉佛時是出家人為僧當厨諸檀越等將諸供養向寺施僧或食後來檀越白言大德日猶故未可打犍椎集僧施食比丘惡口答白衣言諸比丘等猶如白象食不能飽向食已竟停留後日以是因緣入於地獄受白象身火燒受苦至今不絶正法念又云若人作如是心象若醉時能多殺人我則得勝為令象鬬與酒令飲墮叫喚獄中有大象生身皆𦦨然一切身分皆能打觸取彼人已觸破身分破碎墮落唱聲大唱故生火象也火狗起世經云熱沸灰河兩岸所有諸狗身黑紫色垢膩可畏噉彼地獄衆生身肉臠臠咬食三法度論云火鐵然地驅罪衆生熬令熟熟已復驅出為惡狗所食食肉盡風吹使生還復如故此間養蠶煮炙故生彼中火馬火牛準正法念有人若見牸牛騲馬等淫道心生分別此與婦女不異而行淫欲以是墮合大地獄生於團處見彼牛馬如前憶念人婦女想欲心熾盛走向牛馬彼人既近牛馬根門惡業因故入彼根門即入其腹滿中熱火彼處受苦火山火石準起世經獄名衆合衆生生於兩山名為白羊口食熾然極猛火𦦨彼等入彼山內兩山相磨相打相揩如是合磨打揩各訖還本住處譬如毗佉䨲共囉毗佉䨲此二是閃電名相合相磨相揩相打已各還本處又守獄者以大鐵石熾然猛𦦨撲彼地獄衆生令其仰臥熱鐵石上更取別石以覆其上如世間磑磨已復磨大磨作粖復更細磨重研作塵唯見膿血流出空有髓骨塵粖而在火牀同前鐵牀火梁地獄中鐵梁鐵柱無非是火或取罪人懸梁而燒或以鐵梁壓身而燒也火鷹同前鐵鷹正法念名烏丘山其山𦦨然𦦨高五千由旬彼有鐵樹樹有鐵烏烏身𦦨然滿彼樹上罪人到彼𦦨烏破其頭者取腦取眼取鼻取頰取心取肺取小大腸者是衆烏食地獄人分分皆食罪業力故食已還生鷹烏事同鋸牙起世經云守獄者取彼衆生撲著熱鐵地上以鐵黑繩拼度其身即以鐵鋸鋸彼身破破已復破乃至大破既鋸其體何必不鋸其牙此由口四惡業所致剝皮立世云在更生黑繩二獄中間有地獄名大巷或有罪人褫皮在地還割其肉以積皮上昔在人中屠膾為業殺羊豬牛鹿以自活命或捕魚鳥等由此業報彼中受生飲血準正法念合地獄第八別處名為朱誅朱誅若人偷盜邪行若羊若驢以無人女是故淫之或在浮圖或近浮圖以是惡業墮於惡處常有惡蟲朱誅朱誅噉食其肉復飲其血既飲血已斷筋飲髓或令罪人自飲其血如經明妄語地獄十八處十七名血髓飲彼處有河名熱血洋水彼河熱沸以熱銅汁白鑞汁和雜其中長阿含名膿血地獄自然膿血熱沸涌出罪人馳走而自食之燒手燒腳一類之事八熱獄第六燒炙第七大燒炙通身俱燒皮肉燋爛今從別業但燒手腳此由宰殺生靈斷手斷足炮燒煮炙故墮此獄倒刺樓炭經云撓撈河縱廣二萬里河兩邊有鐵樹立世云逆刺睒浮梨一切皆鐵晝夜燒然樹高一由旬刺長十六寸獄卒捉罪人臂牽上刺樹而復牽下牽上刺向下牽下刺向上腹著樹皮肉即盡背脅亦爾受此殘害昔在人中邪淫婦女或婦人欺背夫主復有種種增上業報於彼中生火屋鐵屋二獄同各從所重名之火屋純鐵所成鐵屋大火所熾起世經云時獄卒取彼衆生擲置鐵屋室中熾然大熱逼切難忍衆惱和合遂大叫喚彼中更有鐵房鐵輦鐵閣鐵樓其中炭火沸涌盈益長阿含名燒炙其事大同火狼樓炭經云從撓撈河得出入狼野干縱廣二萬里起世經云以諸不善業果報故於彼獄出生狐狼粗惡可畏咬彼地獄衆生身肉腳踏口掣臠臠而食云云二指廣如是等地獄其中各各復有諸小地獄或一或二或三或四乃至百千其中名號各各不同初句結上衆獄其中下謂此等獄中又各自有小地獄以為眷屬或一二三或至百千名號差別莫可指陳也二答罪報惡事三初正示惡業感報二別明獄報差別三結顯業感苦器初分三初標示業感地藏菩薩告普賢菩薩言仁者此中皆是南閻浮提行惡衆生業感如是獨指閻浮衆生者以志性無定習造惡業感此地獄也那先比丘經云如世間火熱不如泥犁中火熱如持小石著世間火中至暮不消取大石著泥犁火中即消亦如有人作惡死在泥犁中數千萬歲其人不死此並由善惡業力致消與不消故云業感如是二釋業力大二初正舉業力甚大能敵須彌能深巨海能障聖道此釋業感之由止觀云招果為因亦名為業十法界業起自於心但使有心諸業具足力者堪任力用也佛言一切壯無過心心是怨家常欺誤人心取地獄心取餓鬼心取畜生心取人天作形貌者皆心所為其力最多以須彌之高廣能抵敵之溟壑之汪洋能濬深之聖道之虗通能障礙之皆衆生業力使然非甚大而何山海二句舉例能障聖道有漏業能障三乘聖道無漏業能障佛性中道光明文句云三障障佛第一義天之所捨離故知業力甚深而廣大也二誡勸是故衆生莫輕小惡以為無罪死後有報纖毫受之父子至親岐路各別縱然相逢無肯代受承上能障聖道之故而誡勸之人世間中頗有是念些小之過誰為計算惟無三昧經佛告阿難人生世間所以不得道者但坐思惟穢念多故一念來一念去一日一宿有八億四千萬念念念不息一念善者得善果報一念惡者得惡果報如響應聲如影隨形是故善惡罪福各別如閻羅王告罪人云人生在世間時罪過小且輕死在地下泥犁大且重故涅槃云莫輕小惡以為無殃水滴雖微漸盈大器良以纖芥之惡歷劫不亡毫釐之善積世長存福成則天堂自至罪積則地獄斯臻此乃必然之數無所容疑夫父子天性相關親之極至者也然父修善而子作惡則父生天而子墮苦途路既岐遭逢難必縱使偶遇父安肯以天堂之樂易子地獄之苦乎子善父惡情理亦然如賴吒和羅經云善惡隨人如影隨身人生獨生死亦獨死身作善惡身獨當之無有代人者故佛説四自侵經云不計無常而反貪愛言有父母兄弟妻子中外親族老病死來善惡苦樂獨自當之無有代者故勸勿以小惡為輕而故造也三願仁聽言二初地藏勸聽我今承佛威力略説地獄罪報之事唯願仁者暫聽是言如文二普賢釋意普賢答言吾已久知三惡道報望仁者説令後世末法一切惡行衆生聞仁者説使令歸佛普賢謂地藏願我暫聽略説罪報之言吾豈不知惡道苦事乎但仁者久化幽關為地獄教主對衆宣説人必信之方能使令歸佛耳無常偈云有生皆必死造業苦切身唯有佛菩提是真歸仗處勸令歸佛問地藏之正意也二別明獄報差別二初總示地藏白言仁者地獄罪報其事如是此文可兩屬作結上則指前地獄名號其事如是起下即指或有地獄等如是如是今為下文總示義更較妥二別明或有地獄取罪人舌使牛耕之或有地獄取罪人心夜叉食之或有地獄鑊湯盛沸煮罪人身或有地獄赤燒銅柱使罪人抱或有地獄使諸火燒趁及罪人或有地獄一向寒氷或有地獄無限糞屎或有地獄純飛𨪏鏫或有地獄多攢火槍或有地獄唯撞胸背或有地獄但燒手足或有地獄盤繳鐵蛇或有地獄驅逐鐵狗或有地獄盡駕鐵騾初獄如八師經云兩舌惡口妄言綺語譖人無罪謗毀三尊死入地獄獄中鬼神拔出其舌以牛犁之煬銅灌口求死不得取心夜叉食者觀佛三昧經云諸罪人生灰河中諸劍樹間有一羅剎以叉叉其心出與夜叉食以昔時偷盜師長父母罪因緣故一日一夜五百億生死受苦無量鑊湯煮身前經云鑊湯地獄有十八鑊一一鑊縱廣四十由旬滿中沸鐵五百羅剎鼓大石炭燒其銅鑊火𦦨相承六十日不滅閻浮提日滿十三萬歲鑊沸如星化成火輪此由毀佛禁戒殺生祠祀為噉肉血焚燒山野生燖衆生以火焚燒生鑊湯中速疾消爛唯餘骨在鐵叉撩出鐵狗食之嘔吐在地尋復還活獄卒驅㖑還令入鑊赤燒銅柱如前火燒趁及罪人趁丑慎切嗔去聲逐也從也起世經云阿毗大獄諸衆生輩以不善業果報經無量時見獄東門忽開獄衆見聞開門走向彼處走已復走大速疾走我等今者決應得脫如是走時身諸支節轉復熾然南西北門亦復如是一向寒氷樓炭經云從狼野干出走入寒氷縱廣二萬里人悉入其中風四面起寒氷長阿含云二金剛山間有大風起名曰僧佉風吹人肌膚皮肉筋骨入髓中便死以諸不善業果報而生其中無限糞屎地獄經云沸屎獄有十八隔各八千由旬十八鐵城一一有十八隔隔中四壁百萬億劍樹皆生鐵蟲口吐熱屎有情飲屎此蟲唼舌啖心以前世破八齋戒及不淨惡業故純飛𨪏鏫觀佛三昧經云罪人落黑暗處有鐵烏㭰距長利從山飛來抓啄罪人痛急疾走足下𨪏鏫穿骨徹髓經五百萬億歲今言純飛則滿獄皆是矣此由兵家結寨四角藏埋鐵𨪏鏫害人故生此中多攢火槍與通槍同唯多火耳唯撞胸背準楞嚴經觸報中歷聽則能為撞為擊則此觸果由觸因得也但燒手足起世經云從磑疊小地獄出詣向斛量五百由旬小地獄中守獄者取地獄輩以熱鐵斛遣其量火燒手燒腳耳鼻肢節今從別業別報故但燒手足鐵蛇鐵狗如前盡駕鐵騾如僧護比丘見一驢猛火燒身佛言實非是驢迦葉佛時出家人當厨分僧飲食恆自長受二三人分持律比丘如法訶責答言我當僧厨甚大勞苦汝不知恩狀似如驢但養一身何不默然以是入地獄中驢身受苦今言盡駕大約罪人騎鐵驢上火燒其身耳三結顯業感苦器仁者如是等報各各獄中有百千種業道之器無非是銅是鐵是石是火此四種物衆業行感如是等報總指上事由一切衆生恆生三種不善思惟思惟五欲思惟瞋害思惟欺誑皆以無明為因而得生起身壞命終墮於惡趣器者即衆生日用之器皿今銅鐵石火乃地獄苦具皆罪人業行所感非天與人授也業行雖多十惡攝盡三毒為因七支為緣施行惡業構造苦器還為自身受用不能避者故光記云破戒心成能造地獄種種苦具宿豫嚴待無有一物從外而起故唯識論云如地獄中無地獄主而地獄衆生依自然業見地獄主與種種苦而起心見此是地獄處此夜時晝時以惡業故見狗見烏或見山壓以此文證善惡熏心令心易見實無地獄然而心外雖無地獄惡業成時強自妄見故決定毗尼云我説地獄諸苦事實無惡趣可來往刀杖鉾矟衆苦具亦無有能造作者由分別故而見有無量苦毒通其身猶如分別諸幻焰於此分別悉皆空其斯之謂歟三結示指廣若廣説地獄罪報等事一一獄中更有百千種苦楚何況多獄我今承佛威神及仁者問略説如是若廣解説窮劫不盡罪報百千苦楚都由一念所成如正法念云云何惡業無量種種皆因於心相續流轉如河滲流漂諸衆生令墮惡業果報之地在於地獄受極苦惱此諸衆生云何如是為心所誑為愛所誑故感百千種報楚毒其身也何況多獄者但説阿鼻一獄便有種種罪報苦事況多獄乎我今承佛威神敬答仁者之問不過略説如是事耳若欲廣解獄名罪報及一一苦具縱窮一劫之壽亦不能盡何也衆生業力不可思議蓋由心業畫師自業畫作業果地分種種異心別處受苦有百千億那由他數怖畏惡事無有相似不可譬類秪由衆生昔時觸境生著起愛今觸境穢惡受苦故苦報苦事苦器殊難悉舉明所化機竟大章第三明度脫緣分二初化主放光讚歎二閻王興問讚歎寶雨經云云何菩薩能令稱歎善男子如月出現能使人間城邑聚落諸剎帝利婆羅門等若男若女悉皆稱讚菩薩如是如月出現為一切世間天人阿素洛健達縛等悉皆稱讚初又二初世尊讚歎功德二地藏利益存亡今初先品題如來讚歎品第六二品文二初如來歎慈悲事二普廣請利益事初二初敘光聲稱歎爾時世尊舉身放大光明遍照百千萬億恆河沙等諸佛世界出大音聲普告諸佛世界一切諸菩薩摩訶薩及天龍鬼神人非人等聽吾今日稱揚讚歎地藏菩薩摩訶薩於十方世界現大不可思議威神慈悲之力救護一切罪苦之事上明能化主及所化機正畢世尊乘時讚歎以明度脫之緣故言爾時舉身放光者顯大地同成智地會羣生咸入無生如大品從足下千輻相輪中放六百萬億光明足十指兩踝膝䏶腰腹背臍心胸肩臂指項口齒鼻孔眼耳毫相肉髻各各放六百萬億光明從是諸光出大光明遍照十方如恆河沙等諸佛世界若衆生遇此光者必得阿耨菩提今所放光亦復如是故云舉身放大光明遍照萬億沙界大音聲乃三十二相梵聲相新婆沙論云如來梵聲佛喉藏中有妙大種能發悅意和雅梵音如羯羅頻迦鳥及發深遠雷震聲如帝釋鼓大論云如梵天王五種聲而從口出一甚深如雷二清徹遠聞聞者悅樂三入心敬愛四諦了易解五聽者欲聞無厭故云出大音聲告諸菩薩者為流通是經告天龍等為擁護是經也聽者耳之力人之外誘接於目為多然不若耳之入人深益人多也何也視散而聽收古人妙契是理制字從耳從壬古挺字從德耳氣一提則所聽者德心為之主矣故須收視返聽聽吾今日稱揚讚歎現者起也雖知諸法無性佛種却從緣起衆生以此因而感地藏以此緣而應大者其性廣博多所含容大師子吼大益凡聖也不可思議者體相用三皆叵思議徒欲言之言則傷其實徒欲思之思則喪其真何也既言諸法無性則無四性計矣而又佛種從緣令得四悉檀益此則用從體起用還冥理體藉用彰體自空寂即體即用任運與拔體用即非體用與拔即非與拔此唯圓教悉檀之益故曰大不可思議威神之力但慈悲之道救拔為先菩薩之懷愍濟為用常應遍遊地獄代其受苦故云救護一切罪苦之事二令方便護經吾滅度後汝等諸菩薩大士及天龍鬼神等廣作方便衛護是經令一切衆生證涅槃樂大經謂如來實不畢竟入於涅槃今言吾滅度後何也蓋以機薪盡而應火亡順波旬而現滅也方便言廣作者方便乃菩薩二利之器不可須臾暫離故維摩云無方便慧縛有方便慧解謂不以愛見心莊嚴佛土成就衆生於空無相無作法中以自調伏而不疲厭是名有方便慧解不則縛矣勸衛護是經者以是衆生之良藥譬如栴檀能療人病一切衆生莫不願得有人大得栴檀香樹束薪賣之無有買者此經能令人得道無不度者吾般泥洹後留在世間無有視者亦如旃檀束薪賣之無買者也故須廣作方便衛護流通令一切罪苦衆生塞無明源拔生死根出三塗之惡道證三德之寂光庶不負大士威神慈悲之力救護罪苦之心也二普廣請利益事二初當機請説説是語已會中有一菩薩名曰普廣合掌恭敬而白佛言今見世尊讚歎地藏菩薩有如是不可思議大威神德唯願世尊為未來世末法衆生宣説地藏菩薩利益人天因果等事使諸天龍八部及未來世衆生頂受佛語文分二節初經家敘威儀今見下述讚請利益有一菩薩即承命衛經之人其名曰普廣從心發智智彌法界曰普以智導行行滿虗空曰廣心是境體普廣是用心即法身普即般若廣即解脫由此大士久證三德廣濟羣生雖用不離體而體藉用彰故從用立名若廣明其事即同觀音十普云云今見下先述前所歎威德大論問諸佛出於三界不著世間無有我及我所視外道惡人菩薩阿羅漢一等無異云何讚歎菩薩答佛雖無吾我無有憎愛於一切法心無所著憐愍衆生以大慈悲心引導一切故分別善人而有所讚亦欲破惡魔所願以佛讚歎故無量衆生愛樂菩薩恭敬供養後皆成就佛道是故諸佛讚歎菩薩云何讚歎以地藏菩薩久遠劫來能觀諸法畢竟空亦能於衆生有大慈悲行生忍不見衆生行法忍不著諸法雖知涅槃是無上實法而不取證雖知衆生如幻如化而能起身口意業可謂志願弘曠有大悲心行如是事甚為希有今既已見世尊讚歎其不可思議大威神德已然利益天人因果等事更願垂於未來故請説之世尊説法不出施論戒論生天論正修名因已得名果下文章章約人天以明因果若表別教三賢十地詳今家教部天龍等能頂受之人佛語所頂受之法領納於心名受人身以頂為尊今云頂受敬之極信之深也佛語不受何言可受耶二世尊垂答二初如來正答分三初誡聽許説爾時世尊告普廣菩薩及四衆等諦聽諦聽吾當為汝略説地藏菩薩利益人天福德之事誡諦聽者以是不思議威神慈悲事也福者天道佑善也善則順天和氣日相湊泊從示從畐會其意耳德者固有之善也直心為德性命本來之正學問易簡之功洪範陳五福福壽富貴康寧好德考終論語示五德溫良恭儉讓若吾教中準四天王經於六齋日使者太子天王勤伺衆生施行吉凶若於此日淨心守齋歸敬禮供地藏菩薩諸天為遣善神營衛門戶凶疫衆邪陰謀消滅夜無惡夢縣官盜賊水火災變終而不害臨其尋終迎其魂神上生天上天上福德所願自然七寶宮殿在意所之壽終下生侯王之家顏色煒煒見者心歡逢佛值法必得泥洹斯皆五戒十善斂情攝欲六齋使然五利益人天福德事也二承旨願聞普廣白言唯然世尊願樂欲聞如文三廣明利益二初教主説利益二普廣請經名初又二初廣説利益之事二總結威神之力益事中復分二初通示聞名等益二別示久病等益初又二初供養得福二譏毀獲報得福分四初聞名讚禮福佛告普廣菩薩未來世中若有善男子善女人聞是地藏菩薩摩訶薩名者或合掌者讚歎者作禮者戀慕者是人超越三十劫罪修善者稱善男女作惡者稱惡男女如閻羅王誨勑罪人云汝等今去為人家作子當念孝順報父母恩曼年盛時當忍惡為善篤信三尊守戒奉道修諸功德莫復作惡還來至此夫善人性之天然精粹者也其發恰好美若不可勝言無一不由中出者故從美轉注以心示人天根之學復從二言者何言心聲也出言善人亦以善應之人心同處可以見天心也今言由聞地藏之名而合掌等得其善名也蓋大士之名萬行萬德莊嚴自最初一念救母孝思便為六道救苦發心根源已深廣無涯際矣逮今十一大劫已來若欲分別窮劫不盡故合掌等皆超劫罪如耆婆攬草無非藥者普能愈病一切具足如如意珠盡滿其願合掌表權實一體九界是權佛界是實今既開顯生佛一體此身業供養或讚相好微妙或歎功德深洪此口業供養稽首著地五輪俱圓了性空寂感應道交乃三業普供眷戀係慕心心無間或想菩薩之威德或申自己之悲哀此意業供養也是人點上聞名合掌等者均能超越三十劫之重罪此非不思議威神慈悲之力歟二塑畫形像福普廣若有善男子善女人或彩畫形像或土石膠漆金銀銅鐵作此菩薩一瞻一禮者是人百返生於三十三天永不墮於惡道假如天福盡故下生人間猶為國王不失大利初修因彩畫等即法華云若人為佛故建立諸形像云云彩色也用五色縇染百福之相也土石膠漆者或以淨土範塑為相或以堅石巧琢為形準優婆塞戒經不許用膠此土有牛皮魚腸二膠得失意罪而此經用者外國用樹膠耳白芨之類有言大豆汁本草黑豆也可代膠清若光宅聽許用牛皮膠終是不淨之物後得不淨果報蓋以畫相無膠色久脫落灰布無漆身不堅牢此像設之斷不可闕者金銀銅鐵價雖貴賤不同體乃堅剛不異鎔鑄為像永遠莊嚴修跋拏翻金準大論出山石沙赤銅中説文云金有五色黃金為長久埋不變百陶不輕阿路巴翻銀準大論出燒石中爾雅白金謂之銀銅赤金銀之次也阿嚕力經云多唎路訶注云三金謂金銀銅從金從同色與金相似而德大有間矣古文取意制字示不可以貌取人也鐵黑金也從夷取常鐵為意常鐵鍊久而得其精純雖百鍊而不耗謂之真剛鐵於金品最下而致用為多民利不可闕也已上明造像準戒經不淨錢不任造像可換取如法淨錢造像又不許造半身像善相不起墮落生死作此菩薩一瞻一禮者他人以此衆物作地藏菩薩勝相或有善男女等見之或但瞻而不禮或有瞻而禮者此明修因甚少下明得果極大是人即作像瞻禮者皆百返生於三十三天且永不墮惡道之中以造像本是天業故感生天上造像功德經云若人臨終發言造像乃至如麥古猛切大麥也能除三世八十億劫生死之罪有十一功德一世世眼目清潔二生處無惡三常生貴家四身如紫磨金色五豐饒珍玩六生賢善家七生得為王八作金輪王九生梵天十不墮惡道十一後生還能敬重三寶故下即云假如天福等妙樂云豈是欲界人天善根故後賢講是經者斷不可準正法念經所列忉利之三十三必依吾所引灌頂呪經者此千古不磨之定案也不失大利通言之謂雖生人中作王猶不失作像瞻禮之大利若深推其意必以成佛為大利如經云如是諸人等漸漸積功德具足大悲心皆已成佛道是也故妙樂云今經欲收無始微善咸趣菩提若已發心隨有毫善莫非緣因今經既同法華福利自叵思議三厭女供像福二初厭女身供像轉報二厭醜病禮像獲福初分二初明供像若有女人厭女人身盡心供養地藏菩薩畫像及土石膠漆銅鐵等像如是日日不退常以華香飲食衣服繒綵幢幡錢寶物等供養初二句興供意厭女身故同藥師願中若有女人為女百惡之所逼惱極生厭離願捨女身蓋女人因淫業而致乘愛心而來陷人之坑阱積穢之丘陵超日月經明示五礙一不得作梵天王清淨垢染不同故二不得作帝釋少欲多欲差殊故三不得作魔王剛強懦弱相異故四不得作轉輪王仁慈嫉妬逈絶故五不得作佛身萬德煩惱各別故玉耶經中大彰十惡一初生父母不喜二舉養視無滋味三心常畏人四父母憂嫁五父母生離六畏夫喜怒七懷産甚難八少為父母檢録九中為夫壻禁制十老為兒孫所呵故女中智者常生厭離也盡心下供養法蘇悉地經廣明供事不同凡供養門乃普賢毗首羯磨所作出虗空庫藏法中依大圓鏡智及成所作智而為之也盡心二字須玩下諸供物皆事財施也若不離自心竭盡為之則一切法趣事趣財是趣不過則事全是理財即是法矣像設如前如是日日不退可謂心心堅固念念精勤華香飲食衣服義如前明繒綵即五色綵縀繒字有二音咨登切音增與矰同繒繳以射鳧雁箭有綸者古詩未必逢矰繳是也慈陵切音情帛也贈神曰繒今從情聲幢梵語脫闍資中翻幢熏聞引爾雅云闍謂之臺而言脫者積土脫落也今所不取蓋是梵語但名義集既以寺塔壇幢聯貫而立則臺義非謬然説文云幢旌旗之屬輔行又云幡者旌旗之總名今佛法供具相狀似彼故云幡則幢幡一類幡之大者為幢幢翳也容也施之車蓋童童然以隱蔽形容則似車之蓋故楚曰幬關東西曰幢凡造幡法切不得安佛菩薩像及名號等幡是供具供於所供如何復以像名為之錢寶物等衆生之性命切己難忘能捨命財心無吝惜內息慳貪獲福無量矣二轉報果三初明轉女身是善女人盡此一報女身百千萬劫更不生有女人世界何況復受轉報事難惟在精誠今既盡心供養而又日日不退故畢此一期果報之身從斯百千萬劫更不生有女人世界即指西方極樂一向無有女人何況復來三界受女身耶二願不轉女除非慈願力故要受女身度脫衆生如摩耶夫人以大幻願智法門永為千佛之母此以順愛法門度衆生也又婆須密多女説離欲際法門一切衆生隨類見我令得一切三昧此以逆愛法門度衆生也並以慈受三昧誓願之力示為女身先以欲鈎牽後令入佛智正此意也三結不受女承斯供養地藏力故及功德力百千萬劫不受女身供養地藏乃現行精進及功德力是善習熏起種現交熏功業成辦故於百千萬劫永不受女人身二厭醜病禮像獲福三初瞻禮復次普廣若有女人厭是醜陋多疾病者但於地藏像前志心瞻禮食頃之間醜臭穢也陋鄙惡也此方黃帝時有嫫母齊國有無鹽女梁鴻之妻孟光皆天下之醜女而賢慧者也準業報差別經以十業故得醜陋報一好行忿怒二好懷嫌恨三誑惑於它四惱亂衆生五於父母所無愛敬心六於賢聖所不生恭敬七侵奪賢聖資生田業八於佛塔廟斷滅燈明九見醜陋者毀訾輕賤十習諸惡行亦以十業得多病報一好喜打拍一切衆生二勸他令打三讚歎打法四見打歡喜五惱亂父母六惱亂賢聖七見怨病苦心大歡喜八見怨病愈心生不樂九於怨病所與非治藥十宿食未消而復更噉以是二十種業感此醜病女身相貌醜陋為夫君之嫌憎遭衆士之譏呵身多疾病致自心之憂苦招眷屬之輕陵三惡並集一世多愁寧不長懷厭棄乎能感之機識此之由但於下明修因食頃一飯食時以少顯多以短形長耳二轉報二初相貌圓滿是人千萬劫中所受生身相貌圓滿此顯暫時瞻禮之功不可思議圓則無喎邪之惡相滿則鮮窊曲之醜形相貌既得圓滿身軀自無疾病二貴姓受生是醜陋女人如不厭女身即百千萬億生中常為王女乃及王妃宰輔大姓大長者女端正受生諸相圓滿不厭女身情愛未忘瞻禮之功纖毫不爽故於萬億生中常為王家之女如波斯匿之勝鬘阿闍世之術達矣王妃妃合也嬪御之貴次於后者又天子後宮嫡庶皆稱妃如末利韋提希是也宰輔大姓乃天子股肱元勳阿衡或生剎帝利大姓或婆羅門大姓長者女如須達多之有蘇曼維摩詰之有月上也端正等梵名阿波羅提目伽此言端正別行疏云女人端正七德之初但端正無相者或早孤少寡相祿不佳今明貌與相相扶彌顯其德端則招夫寵愛相則招於祿敬若愛帶慢何謂為德愛而敬之故是相也今既端正圓滿相彌妙矣三結成由志心故瞻禮地藏菩薩獲福如是志心二字義深意重貫於前後勿輕看過夫人之轉報誠非易事譬耕夫之忽臨帝座如溷者之俄登天府平地之福匪伊所思今所獲福誠由志心志者心之所至也其醜女以瞻禮而感地藏以慈力而應均是心也若各各性計不忘則能所條然凡聖岐矣安能感應道交轉報獲福耶惟瞻禮之際了能所之皆空故感應之時致假中之叵議則醜婦與地藏無二無別功並由於志心故增一阿含云若欲禮佛者當來及過去當觀空無法是名禮佛義勒那三藏七種禮不可不知四伎樂讚供福復次普廣若有善男子善女人能對菩薩像前作諸伎樂及歌詠讚歎香華供養乃至勸於一人多人如是等輩現在世中及未來世常得百千鬼神日夜衛護不令惡事輒聞其耳何況親受諸橫文分二節初能供之機如是下所獲之福能者信善之實信而不實者不能為之矣伎字説文從女支聲婦人小物樂工也從人支聲訓與也樂者天子之要事可以觀風考俗使民蕩穢滌邪故禮樂不可須臾去身若禮記云夔始制樂以賞諸侯自黃帝咸池以下代制於樂不過據此土言之耳歌詠者尚書云詩言志歌永言詩序曰情動於中而形於言言之不足故嗟歎之嗟歎之不足故詠歌之歌者樂之聲也直陳其德也準山海經帝俊八子始為歌若吾教中即梵唄也尋西方之有唄猶東國之有讚讚者從文以結章唄者短偈以流頌比其事義名異實同今既作五聲八音之樂矣及申歌詠讚歎之頌矣復陳香華供養之物矣不惟信心自為更以普勸他作或一或多隨緣轉化如是之人自應獲福故即云如是等輩云云然作樂供像何以得鬼神衛護耶準禮記曰禮樂之行乎陰陽通乎鬼神漢書云夫樂者聖人所以感天地通鬼神況乾闥緊那皆天帝樂神今既伎樂歌詠於地藏寧不感帝釋遣乾緊令人衛護耶然惡事不聞耳者又從何致乎曰不聞禮云夫樂清明象天廣大象地終始象四時周旋象風雨今既作樂供像自感天地清明氣象四時和焉風雨時焉安有惡事輒聞於耳故曰樂者樂也君子樂得其道小人樂得其欲況今獲福實從信心得來何況親身受諸橫哉若準法華妓樂頌德開人天業自應早成佛道矣二譏毀報獲二初正示二結況示中二初示譏毀相復次普廣未來世中若有惡人及惡神惡鬼見有善男子善女人歸敬供養讚歎瞻禮地藏菩薩形像或妄生譏毀謗無功德及利益事或露齒笑或面背非或勸人共非或一人非或多人非乃至一念生譏毀者初舉譏毀之類次明譏毀之相梵名鳩那羅此云惡人亦云不好人惡神大即指波卑夜正翻云惡小即指嶽瀆山川內惡者一流惡鬼大指鳩槃荼等小即指倚草附木妄作威福之類夫惡有三種一曰惡二曰大惡三曰惡中惡此之三類各有三惡云云見有等明造毀之端佛言清濁異流明愚異趣忠相讐邪常嫉正故著欲之人不好我無欲之行於是惡類遂生嫉心所以嫉之者惡人恐以彼善形我之惡也惡神恐其出界失我之眷屬也惡鬼恐其齋戒失我之血肉也懷私雖異為惡是同曾子云人之好善福雖未至去禍遠矣人之為惡凶雖未至去禍近矣辨魔書云見善養育如雨露之被草木遇惡勦絶若鷹鸇之逐鳥人何不努力修善而甘為惡人惡神惡鬼哉譏者嘲誚之言毀者謗壞之事譏生忌嫉之心毀起貪恨之念故知心為起惡之源口乃召禍之本徒謗聖賢枉壓良善從虗妄以搆詞自無端而肆毒初乃輕言譏激後遂重語讟誣自作闡提撥無因果宣言此輩徒竊善名歸供讚禮實無功德唐喪資財何有利益那知泥木靈像遠有所表敬誠殷禮獲福無邊輕心毀謗招罪彌劫愚癡無知阻退善根或露齒而輕笑或面是而背非自己非之復勸人共非或勸得一人或再勸多人而共非之此言多譏毀惡乃至一念言少譏毀惡那知衆罪皆從此起譬夫決江之流濫觴於甕口參天之樹發蘖乎毫芒唇口是弓心慮如弦音聲如箭一念如機長夜空發徒染身口顧斯後報可不慎哉二顯譏毀報二初直墮阿鼻如是之人賢劫千佛滅度譏毀之報尚在阿鼻地獄受極重罪狷音喧輕也頑成性估侸上音顛下音孺輕薄也為情不知佛道正真弘深而以世間輕薄淺近之言欲設嫉心謗毀道根如是之人如折翅鳥不能飛行當知是輩於未來世永不能至人天善處矣梵名劫簸秦言分別時節陀秦翻為賢以多賢人出世故名賢劫也此現在賢劫共有千佛出世今我釋迦方是第四佛餘有九百六佛一一出而滅可謂歲月彌之矣今言千佛滅度已而譏毀之報尚在阿鼻大獄受極重之罪終無底止矣興起行經云世人所作行或作善惡事此行還歸身終不朽敗亡以謗法之人極大罪業墮三惡道難可出離可不慎哉二轉生惡道過是劫已方受餓鬼又經千劫復受畜生又經千劫方得人身縱受人身貧窮下賤諸根不具多被惡業來結其心不久之間復墮惡道歷劫沉淪永失生天之路隨緣受報竟無出苦之期謗無法味感報枵虗之餓鬼不識正道受形旁背之畜生梵名闍黎哆云餓鬼此道遍在諸趣以諂誑心意作下品五逆十惡感此道身梵名底栗車云畜生此道亦遍諸處以愚癡貪欲作中品五逆十惡感此道身此二道中經劫長遠方始為人言方言縱亦非必定之辭縱然得復人身餘業猶然未盡由昔斷滅法財今感貧窮之報因曩毀敬尊容此招下賤之身兼復諸根殘闕以致九結纏心從冥入冥隨苦至苦大乘論堅意菩薩云誹謗大乘法決定墮惡道焚燒甚苦痛業報罪信爾若從地獄出復受餘惡報諸根常缺陋永不聞法音設使得聞者復生於謗法以謗法因緣還墮於地獄噫可不誡歟二結况是故普廣譏毀他人供養尚獲此報何況別生惡見毀滅是故二字緊承永墮阿鼻彌劫經生而況出也善人供養惡輩譏毀尚獲彌劫之殃況別生惡見如彌犁車毀滅佛法其罪有甚於此矣故寶雨經云若誹謗者是名愚人墮於惡處受諸苦惱又為一切世間天人阿素洛等之所輕賤故知誹謗之罪實居衆罪之先二別示久病等益五初久病惡相乃至五齋誦感報初分三初示病中惡相又二初示相復次普廣若未來世有男子女人久處牀枕求生求死了不可得或夜夢惡鬼乃及家親或遊險道或多魘寐共鬼神遊日月歲深轉復尫瘵眠中叫苦慘悽不樂者佛説醫經云人身中本有四病一地二水三火四風智論云四大為身常相侵害一一大中百一病起冷病有二百二水風起故熱病有二百二地火起故蓋由四大難調六腑更反以有報身忽嬰疚疾今乃連年纍月枕臥牀席不能起居乃殺戮之餘殃致病惱之久迫求生而勢不能生求死而事難即死夢惡鬼等因病迫心神思瞀亂夜多惡夢驚悸重增唯識論明四夢一無明習氣二善惡先徵三四大偏增四巡遊舊識今夢惡鬼惡相先徵也及見家親巡遊舊識也遊險道則四大偏增鬼神遊乃無明習氣也烏蘇慢此云厭眠內不祥伏合人心論衡曰臥厭不寤故曰魘寐久寐不醒鬼神共遊綿歷歲深形骸困劣尫音汪弱也即瘠病之人瘵音債勞瘵即五勞七傷之類眠中叫苦等者以身為苦器陰是坯瓶四大浮虗互相乖反稟形人世逢穢濁之時受質偽身居怖畏之境幽冥無量鬼神以及家親眷屬依房依廟附嶽附丘凡有含靈並皆祗響致使神爽冥昧識慮昏茫至於寤寐多有恐怖所以眠內不安晨昏叫苦心中煎迫動靜慘悽皆病中之苦相也二釋意此皆是業道論對未定輕重或難捨壽或不得愈男女俗眼不辨是事此釋久病惡相由業道之冤對耳故佛告阿闍世王一切諸法皆為緣對世人所為作各自見其行行善得善報行惡得惡報是故大王當捨惡從善今既業緣對至將非性命無逃但未定其罪之輕重豈便判其人之死生故應死者或難即時捨壽未應死者尚爾淹滯難愈恐是五音呪詛或招三世冤優字彙補音尤出道藏魂繫陰司災生陽世人間俗陋之眼焉能辨此業對之事哉二明修福脫罪二初正示方軌二況顯利益初分三初對像讀經但當對諸佛菩薩像前高聲轉讀此經一遍夫人節宣不謹感於寒熱等證世醫藥餌可能療治今是惡業報病須藉法力方祛蓋諸佛心者慈悲為體能作醫王善療衆生身心之病經是法藥菩薩是瞻病之人故須對像讀經然祇轉一遍者金丹一粒點鐵成金至理一言革凡成聖何俟多轉乎二為病捨物或取病人可愛之物或衣服寶貝莊園舍宅對病人前高聲唱言我某甲等為是病人對經像前捨諸等物或供養經像或造佛菩薩形像或造塔寺或然油燈或施常住世人之病有二種四大是身病三毒是心病身病可用藥心病須修福法句經云人作善惡殃福隨人雖更生死不可得免故須經福以禳之可愛物華美而貴重者今割其愛斷病之根也衣服著以嚴身寶貝蓄而致富莊園供遊玩之觀舍宅安子孫之所並我受用不可闕少此明所捨之物對病人下宣唱捨物對病高唱者令知代施功德憶持在心不忘經云一切諸物悉皆分散唯此願王不相捨離是也梵語那莽此云某甲甲是天干之首第一之數不妨乙丙行列也或供下修福之法供經像者法是佛母佛從法生三世如來皆供養法像是世尊遺容雖泥木塑刻見者皆生佛想與真無異故供者得福造佛菩薩形像者準造像福報經功德殊多今略舉一二經云天下人民能作佛形像者世世所生之處眼目淨潔面貌端正身體手足常好柔軟生於天上亦復淨潔諸天中勝紫磨金色端正無比作菩薩像功德亦爾塔寺如前雜寶藏經云造立塔寺命終生忉利天然油燈者施燈經佛告舍利弗有人於塔廟形像奉施燈明乃至以少燈炬如此福德唯佛能知成佛一人可愛物等總施招提供養衆僧此言隨行一種即感勝報非事事要做也三脫罪知命如是三白病人遣令聞知假令諸識分散至氣盡者乃至一日二日三日四日至七日已來但高聲白高聲讀經是人命終之後宿殃重罪至於五無間罪永得解脫所受生處常知宿命代病捨物必三白令聞知者欲令洞聞於心深知我有如是功德也假令者謂藉斯施福病去身安何善如之借使大限難逃世緣永絶當諸識分散氣絶之時亦應七日之中高聲唱施讀經其人必解脫重罪而超升矣諸識分散者處胎經云爾時世尊將欲示現識所趣向道識俗識有為識無為識有漏識無漏識華識果識報識無報識天識龍識乃至人非人識上至二十八天識下至無救地獄識文此泛指也若的就一人應指八箇識神為諸識也氣盡者所謂風先火次魂神去矣身虗體冷形骸蕭索也宗鏡問諸根壞日識遷離時捨此故身別受餘質去來之識相狀云何答顯識經云佛告賢護識之運轉遷滅往來猶如風大無色無形不可顯現而能發動萬物示衆形狀云云是人下明轉障託生宿殃重罪五無間罪永得解脫正顯施福殊勝三寶功深不惟脫罪受生且能常知宿命自然深知因果罪福分明從明入明必階佛果已二況顯利益何況善男子善女人自書此經或教人書或自塑畫菩薩形像乃至教人塑畫所受果報必獲大利況者譬擬也謂代其捨施獲福尚爾矧自行之何可比擬中邊分別論明大乘修行有十第一是書寫涅槃云於惡世中書寫經卷亦勸他人令得書寫具足能解盡其義味塑畫形像造像經云作佛菩薩形像其福無量無窮盡時不可稱數如是四天下江河海水尚可升量作佛形像其福其多多四天下江河海水過出十倍後世所生常護佛道作佛形像死後不復入於地獄畜生餓鬼諸惡道中故所得果報必獲大利也三結勸修功德是故普廣若見有人讀誦是經乃至一念讚歎是經或恭敬者汝須百千方便勸是等人勤心莫退能得未來現在千萬億不可思議功德承上功德故言是故對經名讀以未熟故背本名誦以文熟故根有利鈍時有久近耶是經者地藏經也言是者以全體即是更無二故今家六即顯是以全心是經經外無心全經是心心外無經故曰是經一念讚歎者前以一念譏毀供養尚獲彌劫之殃一念讚歎是經必感多生之福恭敬讀誦者獲福與讚歎同功汝須下佛勸誡普廣應須以百千方便勸是等讀誦讚歎恭敬者如大方廣總持經云佛滅度後若有法師善隨樂欲為人説法能令菩薩學大乘者及諸大衆有發一毛歡喜之心乃至暫下一滴淚者當知皆是佛之神力以此證知其讀誦讚歎恭敬者安知非佛神力故須方便勸之勤心莫退者如堅意經佛告阿難其有好心善意之人聞佛明法一心而聽能一日可不能一日半日可不能半日一時可不能一時半時可不能半時須臾可其福不可量不可訾也汝當廣為諸比丘僧比丘尼優婆塞優婆夷白衣人民説之暫聽尚爾況恭敬乎況讚歎乎況讀誦乎故勸勤心莫退能得不可思議功德於現未故也二夢寐見鬼三初夢見惡境二勑遣讀經三存亡得益初分三初示相復次普廣若未來世諸衆生等或夢或寐見諸鬼神乃及諸形或悲或啼或愁或歎或恐或怖此中之夢與前夢不同前是自身業對此為遠屬陰纏皆實夢也孫真人云凡夢皆緣夢魂役物其神至於軀體不能流通夜則魂夢虗爭將吉以報吉將凶以報凶故東萊呂氏云形接為事神遇為夢今乃形接而神遇故有夢事也周禮占六而夢夢之吉凶平居驚愕思念覺時道之喜悅恐懼之六夢也寐者昧也目閟神藏也莊子云其寐也魂交是矣見諸鬼神此係多生親屬託夢現形乃平居正夢也諸形者男女老少不同人鬼面貌不一悲啼等即驚愕恐懼之夢準醫書乃陰氣所乘故見鬼神肺氣盛則夢哭泣飛揚心氣盛則夢喜笑恐畏今是親屬致感非關陰陽虗實悲啼愁歎親鬼乞憐之狀也二釋意此皆是一生十生百生千生過去父母男女弟妹夫妻眷屬在於惡趣未得出離無處希望福力救拔當告宿世骨肉使作方便願離惡道多生眷屬故現諸形未接生前安能念及乎父母男女如前弟第也相次第而上也妹昧也猶日始入歷時少尚昧也夫妻匹敵之義也士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也在於惡趣等或沉地府或墜鬼倫經歷長途出離寡助既失望福救之處乃遠告多世之親此鬼神無聊之極思有求之苦境也故知為過去父母等作福如餉遠人然正法念經云若為亡人修福行布施生鬼道者鬼容得福以鬼知悔前身慳貪故為施時彼則歡喜若生餘道多無得力今此輩求作方便願離惡道恐是餓鬼之類耶二勑遣讀經普廣汝以神力遣是眷屬令對諸佛菩薩像前志心自讀此經或請人讀其數三遍或七遍何故令普廣以神力遣眷屬讀經耶以世間愚人識恩分者少生前六親尚有不顧況隔數世之親乎即有念及者既未識面縱形夢寐想不及此故勑普廣以神力冥資速令憶念使恭對佛菩薩像前或自讀經或請人讀其經數至三七者何皆陽數也三乃天地人之數自一而再重之三才備矣一之二陽生陰也二生三陰陽參和也三生萬物生生無窮矣七少陽之數也此亦二三變體二得五成七進得乎九則為老陽轉獄鬼於陰司生人天之陽世故唯取三七之數不取六八者以陰數坎陷非超冥之道耳三存亡得益如是惡道眷屬經聲畢是遍數當得解脫乃至夢寐之中永不復見解脫者離惡道也或生天上人間或進三乘聖道亡親既獲超升自不現形夢寐矣三下賤求悔三初標能懺人復次普廣若未來世有諸下賤等人或奴或婢乃至諸不自由之人覺知宿業要懺悔者下賤等辨意經云五事常生卑賤為人奴婢一憍慢不敬二親二剛強無恪心三放逸不禮三尊四盜竊以為生業五負債逃避不償然下賤對尊貴言奴婢對大家言各有不同若以四方言之北單越無僕使之殊故無貴賤餘三方有貴賤以有君臣民庶之別大家僕使之殊故有貴賤別類也總束貴賤合有六品一貴中之貴謂輪王等二貴中之次謂粟散王等三貴中之下謂百僚等四賤中之賤謂臺奴豎子等五賤中之次謂僕隸等六賤中之下謂姬妾等粗束如是細分難盡諸不自由者非下賤奴婢之流乃皂隸門館之類月有請受日藉資生聞呼喚而來仰其鼻息聽發遣而去承其聲光身不自從非丈夫矣宿業者佛告波斯匿王凡人處世尊卑貴賤貧富苦樂皆由宿行而致斯果若世之愚頑無覺知者抑豈甘之且謂得之若稍黠慧有覺知者豈惟哀之誠欲脫之若欲離脫必須懺摩滌蕩悔過𠍴尤光明云繫屬於他常有怖畏不得自在而造諸惡故須行懺悔也梵語懺摩此云悔過華梵雙標也輔行云懺悔秪是三善業耳二釋所悔法志心瞻禮地藏菩薩形像乃至一七日中念菩薩名可滿萬遍一七者世數極於七也如一日念之不應念之七日必遂所求故十輪經云一日稱地藏功德大名聞勝俱胝劫中稱餘智者德能解諸衆生一切煩惱縛故須稱名滿萬遍者表祛萬惡集萬善也三結轉報益如是等人盡此報後千萬生中常生尊貴更不經三惡道苦此正顯地藏大威神力如佛告辨意有五事得為尊貴衆人所敬一施惠普廣二禮敬三寶及衆長者三忍辱無有瞋恚四柔和謙下五博聞經戒今七日稱名豈止千萬生中尊貴不經惡道即佛果必可期也四新産獲福二初舉種類新産復次普廣若未來世中閻浮提內剎利婆羅門長者居士一切人等及異姓種族有斯産者或男或女但舉南洲者北洲産於樹下亦無惡露苦惱東西二洲欲事既少生育應稀唯有南洲女人多産多苦以一切諸衆生母欲生子時身體遍痛受大苦惱數坐數起不能自安故特標閻浮人耳剎利等人雖貴賤不埒生時善惡誰知三十八箇七日滿足必須胎産男女此由宿業因緣以隨陰陽變化故周易八卦乾陽為父坤陰為母生震坎艮之三男巽離兌之三女化生萬物也準增一阿含若當為女於母左脅倚脊向腹而住若當為男於母右脅倚腹向脊而住故知男女皆乘愛而生以淫欲而正性命也二示經名利益二初誦經念名七日之中早與讀誦此不思議經典更為念菩薩名可滿萬遍何故早與讀經稱名耶準護諸童子呪經如來初成正覺有一大梵天王來詣佛所作禮説偈言有夜叉羅剎常喜啖人胎能令人無子傷害於胞胎男女交會時使其意迷亂懷妊不成就及生時奪胎皆是諸惡鬼為其作嬈害我今説彼名願佛聽我説第一名彌酬迦乃至第十五名藍婆此十五鬼神常遊行世間為嬰孩小兒作於恐怖及説恐怖形相云云今故早讀本願經及與地藏名則令善神擁衛門戶惡鬼自遠遁矣三脫殃增壽是新生子或男或女宿有殃報便得解脫安樂易養壽命增長若是承福生者轉增安樂及與壽命文分二節初轉宿報宿殃報者準瑜伽論云又於胎藏中或由先業力故或由母不避不平等力所生隨順風故令此胎藏或髮或毛或皮及餘支分變異而生今既誦經稱名便令新生男女宿殃之報盡得解脫也安樂易養者胎藏極成滿時其母不堪持此重胎於第四日內風便發生大苦惱又此胎藏業報所發生分風起令頭向下足便向上胎衣纏褁而趣産門其正出時胎衣遂裂分之兩腋出産門時名正生位生後名觸謂眼觸等但生時有多種不同或順生或逆生甚有一足先下謂之踏蓮生母腸同出謂之盤腸生此最險惡命在須臾今既誦經念名則安然快樂生養甚易壽命增長者大梵復白佛言此諸女等欲求子息保命長壽者常當繫念修行善法於月八日十五日受持八戒清淨洗浴誦我所説陀羅尼呪者所生童子安隱無患盡其形壽命不中夭今既誦經稱名自不為惡鬼嬈害故得壽命增長也若是下增現福承福生者修行道地經云人行不純或善或惡至三十八七日在母腹中隨其本行自然風起宿行善者便有香風可其身意柔軟無瑕正其骨節令其端正莫不愛敬又母腹風起或上或下轉其兒身而令倒懸頭向産門其有福者時心念言我投浴池水中遊戲如墮高牀華香之處也惡者反是今又早為誦經稱名又承宿福而生故應安樂者轉增安樂應壽命者重增壽命矣五齋誦感報二初標齋日之意復次普廣若未來世衆生於月一日八日十四日十五日十八日二十三二十四二十八二十九日乃至三十日是諸日等諸罪結集定其輕重世之持齋者有三長齋月六齋十齋不同今先定齋日之數準文殊菩薩善惡宿曜經每月一日梵云鉢闍底下唐言梵王是建名日宜為善業苦節修行布施等事並吉八日二十三日是力戰日婆娑善神下宜力用之事十四日二十九日是勇猛日藥芻神下二十四日是凶猛日嚕達囉尼神下二十八日是最勝日鉢折底神下唐云天魔神十五日三十日是吉相日必多盧神下唐云魂靈神宜祭先亡及布施供養父母尊者諸天持齋戒施食及諸祭祠吉故取此十日為齋日也但乃至二字自古講者皆云超略之辭今日數已至二十九而又超至三十日譯師不通甚矣非也含蓄深意人不知也余考乃字古訓為難意而用為語辭之難心之難不可象也故象口氣逶迤上出難之又難也其字示人以意今言一日至三十日如是十日無間至難至難也若不信此解若為通此二字乎是諸下三句明是日意準佛祖統記引提謂經明三長齋佛謂提謂長者曰四時交代歲終三覆以校一月六奏諸天帝釋太子使者閻羅鬼神俱用正月五月九月旦日案行王民龍鬼鳥獸為善惡者與四王一月六奏使無枉錯覆校衆生罪福多少福多者勑司命下閻羅五官除罪增祿故使持是三長齋引四天王經明六齋帝釋勑四王各治一方白月八日遣使者案察衆生善惡十四日遣太子十五日王親臨黑月三日亦如是若王親下星宿鬼神俱時隨從如遇修行齋戒諸天相慶即為注祿增算引十齋經明十齋每月十齋日持佛菩薩號乞福滅罪於六齋日加月旦等四日如本經今國律令諸州十直日不得行刑正據此義又淨度三昧經云八王日立春春分乃至立冬冬至諸天帝釋鎮臣三十二人四鎮大王司命司祿五羅大王八王使者盡出四布覆行復值四王十五日三十日所奏案校人民立行善惡地獄王亦遣輔臣小王同時俱出有罪即記前齋八王日犯過福強有救安隱無他用福原赦到後齋日重犯罪數多者減壽條名剋死歲月日時關下地獄地獄承文書即遣獄鬼録名獄鬼無慈死日未到強催作惡令命促盡福多者增壽益算天遣善神營護其身移下地獄拔除罪名除死定生後生天上已上齋法各出佛經各宜遵奉永處福堂毋得故違自取殃咎故詳示於此二釋讀經之益三初舉閻浮罪狀南閻浮提衆生舉止動念無不是業無不是罪何況恣情殺害竊盜邪淫妄語百千罪狀南洲之人心識無定況意根中善惡無記三性生成法則但凡夫之人起惡念時多舉即是動止即是靜動靜之間念起不一安般經云一彈指頃心有九百六十轉仁王經云一念有九十剎那一一剎那中復有九百生滅菩薩處胎經云一彈指頃有三十二億百千念念念成形形形有識一念善有無量善果報一念惡有無量惡果報故云舉止動念無不是業但凡夫造業凡動身口皆由心使若心不善方能損物若內有善方能順福雖復損益不同然三業之本以心為源故動念成業念善是福念惡成罪然檢點自心於二六時中大約罪多於福也何況縱恣六情任造三業耶遺教經云縱此心者喪人善事譬之駑馬極力控制尚難調伏若縱其奔逸損物無疑殺害竊盜邪淫身三惡業妄語該口四業如前百千罪狀即一殺業有上中下乃至貪嗔癡亦有上中下細舉不勝故總云百千須知結罪由心業有輕重如嗔重則罪重嗔輕則罪輕成論云或以事重故有定報或以心重故有定報如人以深厚纏毒殺害蟲蟻重於輕心殺人若心無嗔雖殺上境乃至父母亦不成逆故知諸業例有輕重雖分輕重然受報時纖毫不爽可恣任其情乎二示齋日讀經能於是十齋日對佛菩薩諸賢聖像前讀是經一遍東西南北百由旬內無諸災難當此居家若長若幼現在未來百千歲中永離惡趣六齋十齋增減不同大論六十五云六齋日諸天來觀人心十五日三十日上白諸天又六齋日是惡日令人凶衰若有是日受八戒持齋布施聽法是時諸天歡喜小鬼不得其便利益行者故止觀取齋日建首有以也但持齋法稍有不同闡義引祭統云齋之為言齊也齊不齊以致齊者也及其將齋也防其邪物訖其嗜欲耳不聽樂今釋氏以不過中食為齋亦取其防邪訖欲齊不齊之義也故請觀音疏云齋者只是中道也中後不得食者表中道法界外更無別法也故若在釋門緇素皆過午不食為齋近世通行白衣唯不茹葷飲酒為齋故不同也法句經云祠祀種禍根日夜長枝條唐苦敗身本法齋度世仙故於六十齋期應持齋布施讀誦本願經耳此正明讀經下明利益讀經中初明方無災難若有一人果於齋日每讀經一遍則使四方百由旬境內並無災難地反物為音么天反時為災所謂蠲除災是也次明家離惡趣讀經秪一遍耳何獲報之殊勝耶正顯地藏不思議利益事也然今非無讀經者竟不獲報何也曰此有二意一方內之人及居家之屬前生罪惡深重則是定業難逃二誦經者心或不同志心者誦經得力故能轉宿殃不志心者誦力既淺福不勝罪故難轉也三釋現世福利能於十齋日每轉一遍現世令此居家無諸橫病衣食豐益橫病者乃疫癘流行福衰忽染雖是惡鬼妄作禍福即係自無善力所招今既誦經永絶橫病衣食豐益最是要事光明云依因衣食諸結惱熱藥師云為衣食故造諸惡業今因齋日轉經故感豐饒之報不惟無業亦且增福即使貧無衣食者亦致豐益之報矣經之利益可思議耶説利益事竟二總結威神之力二初正結地藏利益是故普廣當知地藏菩薩有如是等不可説百千萬億大威神力利益之事結如是等一句顯上所明者乃舉其槩耳如地藏十輪及占察善惡二經廣詳其事二別示閻浮有緣二初略示有緣閻浮衆生於此大士有大因緣因緣秪是感應異名大者皆欲令其開示悟入佛之知見大事因緣也故大士金口親云但於佛法中所為善事一毛一渧一沙一塵我漸度脫使獲大利大利者即法華所謂無量珍寶不求自得即菩提涅槃也如是大因緣非始今日於無量阿僧祇劫來於閻浮提隨機化物種熟脫三時時不廢譬子墮水火父母騷擾救之子有疾病父母心偏愛之以南洲衆生罪業偏重故也故南洲衆生亦獨於大士信心不置故上下貴賤緇素男女無一不從地藏菩薩求其救拔水火療治疾病譬如磁石吸鐵應感同時有大因緣深可省悟二廣明聞益是諸衆生聞菩薩名見菩薩像乃至聞是經三字五字或一偈一句者現在殊妙安樂未來之世百千萬生常得端正生尊貴家此言聞名見像者明旋復之功也原夫生佛同一覺體覺海之性澄圓圓澄之覺元妙不覺無明風動妄分見覺聞知局於區宇隔別成礙於是見不超色聞不出聲今旋其妄聞聞菩薩之名旋其妄見見菩薩之像則令所聞之名契入真空之境名亦無名所見之像會同法性之身像何可像名無名而真聞了了像無像而真見昭昭如是則隨拈經中或三箇字當下破三惑消三障成三智證三德顯三身或拈五箇字隨處破五住出五道立五根長五力成五分也一偈則一門超出一句則一性圓明如是二四六八隨行增數現在則獲殊妙安樂念念與本願同流心心共菩薩俱現未來之世常得相好端嚴清正在處恆生尊貴之家如佛告波斯匿王云仁慈謙順敬長愛小則為貴人凶惡強梁憍恣自大則為賤人又曰三界輪轉無有定品積善仁和生於豪尊習惡放恣便生卑賤以此觀之人不可作惡應自修之世尊説利益竟二普廣請經名二初結顯請意爾時普廣菩薩聞佛如來稱揚讚歎地藏菩薩已胡跪合掌復白佛言世尊我久知大士有如此不可思議神力及大誓願力為未來衆生遣知利益故問如來唯然頂受初經家敘儀次陳所請意胡跪者音義指歸云不合二胡跪蓋梵世遺種居五竺間蔥嶺之北諸戎羌今經律多翻互跪以三處翹渠遙切聳故名互跪即右膝著地也以右膝有力跪能久起止便故著地令安若女尼體弱佛聽長跪也言久知者則普廣亦地藏一流人自具有不思議神力及大誓願力故能知之既知而又問者正冀如來於大會宣揚令未來衆生知地藏菩薩利益如此故問之耳唯然乃應答無疑之速辭近指上文遠則照映前文汝等諸菩薩當記是經廣宣流布之語然彼時定自在王但承命流通不請經名者審知地藏神力之事未竟一也逆知普廣復有請詳利益之事二也故知主賓酬唱更互發𫾻譬之砧磓相扣上下相應故下唯然頂受之語二正請經名二初請世尊當何名此經使我云何流布當何云何皆設疑之詞自説經以來讚歎地藏功德除佛一人無能及者夫名之所以為名召其實者也今地藏實德既言不可思議則不以名而名之矣故云當何名此經名既不立使我等又依何法門而流布耶故云使我云何流布周禮泉行曰布言世間之錢如泉水之流通而散布也經之流布亦如是耳二答二初答經名佛告普廣此經有三名一名地藏本願亦名地藏本行亦名地藏本誓力經經名如綸貫又解本願者心所欲得名願視欲為深且專願乎外盡人欲也惟天理為性之欲乃人本心從原教人反求其本欲其可欲之善也而從頁胡結切何也心求得之俯首以停思不則貪也已矣癡也已矣此雖儒釋然地藏之本願亦豈外於是乎無非欲人復還本元覺性同歸祕藏是大士本時之願也本行即本昔之行故吾約此準妙玄本門十妙以明本地十不思議文義始暢方顯中間近成種種不思議事皆迹中之願行也本誓力者梵語僧那此云弘誓一云僧那大誓僧涅自誓僧那言鎧僧涅言著名著大鎧正言𦙽那訶翻甲𦙽蘇于切捺陀翻被翻衣謂被甲衣甲密部中明三十二甲云云即大品大誓莊嚴也梵名娑羅此云力陰持入經云彼力應以何為義答無能壞為力義有所益為力義有膽為力義能得依為力義今地藏自元初發心以來不為天魔沮壞一力也在所利益衆生二力也有膽偏化地獄三力也能為六道得依四力也此地藏本時誓願之力故名本誓力經二結流布緣此菩薩久遠劫來發大重願利益衆生是故汝等依願流布此顯地藏之名亦從本願而立因大願故利益衆生是故汝等亦應依其本願而流布之故集家單以本願立題深有以也二普廣禮退普廣聞已合掌恭敬作禮而退恭敬二字每見講家置論使後生末學不知何所取義乎今略明制字之原以見心學之在是也古恭字敬德之容手容主恭故指兩手交為義人之平居散其手其心放貌以之惰斂其手其心必收貌以之莊內外合者也俗書不知即此是心復加以心作恭是謂心有內外也古敬字主一也古人聚精會神之學貌而敬者強捉於外其中竊發將不能自持口云敬者其行必惰空言胡能勝實惡若何而致力耶曰勿忘勿助長也從己力切音急行之亟也者教之以勿忘也緩則無功裁覺昏沉速自喚醒裁覺散亂速自絶斷久者教之以勿助長也急則拘迫胸中有物礙之血氣弗舒何以能久心吾形之主也敬者非它吾心自為主也何待別借一心來治此心雖畏勿畏雖休勿休綿綿若存天德周流心常活而毋死悚為起敬戒為持敬畏為克敬肅為嚴敬穆為玄敬欽為聖敬一敬德之生孰淺深也茲惟聖學囦原觀古人之心畫則知其心學矣何可為文字之學障性靈塞悟門竟不一究心焉那知字學誠能豁性靈開悟門故略示之毋謂余好搜冥索隱而衒奇也
