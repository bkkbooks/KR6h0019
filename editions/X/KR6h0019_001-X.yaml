body:
  text: 古鹽匡菴青蓮苾芻靈椉父輯委釋經題已如上說次譯師唐于闐國三藏沙門實叉難陀譯唐代名李氏有天下之號以其奮迹晉陽為陶唐氏故都故國號唐焉李淵之祖虎佐西魏周閔帝受西魏禪追封唐國公虎生昞昞生淵皆襲封唐公遂以立國于闐正云瞿薩怛那唐言地乳以王未有嗣禱毗沙門像額上剖出嬰兒不飲人乳神前之地忽然隆起其狀如乳神童飲吮徂兗切前上聲遂至成立故以名國又云渙那於遁豁且子余切音疽屈丹皆此國之異名也大集月藏經世尊付囑難勝天子千眷屬及散脂大夜叉等毗沙門王共護于闐國土故多聖賢繼跡乃譯師本生處也三藏梵名俱舍此云藏如世庫藏以積錢財法之三藏以蘊文義三名各含一切文理故名為藏阿含即定藏毗尼即戒藏阿毗曇即慧藏也沙門正言室摩那拏此言功勞謂修道有功而多勞又言息心瑞應云息心達本源故號為沙門是也然諸經譯人皆云法師今稱沙門者譯主之謙德也實叉難陀唐翻學喜時因天后明揚佛日敬重大乘以華嚴舊經處會未備遠聞于闐有斯梵本發使迎請實叉與經同來赴洛重譯三隨文演義為三序正流通初品序分分身集會訖較量布施九品正說分地神護法品訖經三品流通分問含笑放光可名發起問答因地長者發心聖女救母理合入正又地神護法見聞利益應屬正文唯囑累一品可曰流通今皆不然其義何居答吾祖智者云分文本是人情人情咸謂序未辯道流通歇末不得論於因果夫三段者不可杜斷隔絕序本序於正通正本正於序通通本通於正序各有三義初中後善若其杜絕豈得名善何容序無滋味流通歇末耶今文殊因眾集既多故問昔行願世尊答出疇事正分身集會之弄引那言非序其地神護法見聞利益正流通要事何言猶屬正宗盍觀大師之言乎眾生得道根性不定序中說正亦應無妨流通有正彌是督厲宣行不乖經意今準祖誥豈順人情釋序二初品題忉利天宮神通品第一釋品如綸貫後倣此次序分分二初通序諸經皆有故亦名證信序有此五事人方信故亦名經前序諸經初標故又名經後序集家安立故二爾時十方下別序別在此經故亦名發起序發起正說故證信又二初舉五事證信二點三月所為初中四初所聞法體如是大師深悟法華闡明妙旨以五重而解首題以四釋而消文句今經既同醍醐釋文那容薄味況諸經之首唱乃法華之極談南嶽三轉讀文天台一念觀具理既一體文合四番第後代人情效簡而末世根鈍憚煩今故處中或三二一貴在得意無煩筆墨如是者信成就也佛法大海信為能入心有淨信能入法海故不信者言是事不如是如牛皮未柔不可屈折信者言是事如是如牛皮已柔隨用可作信則所言之理順順則師資之道成故首標之又如名不異是曰無非阿難傳佛所說圓經譬之瀉水分瓶無異文下之理允當無非則文如而理是故言如是只此如是莫不皆同以不思議性識即諸法實相體離四句相絕百非心佛眾生三無差別抑豈我佛迹中經初為然即本經初亦復如是大論云過去法如即是未來現在法如現在法如即是過去未來法如未來法如即是過去現在法如所以者何一如無異故是則地藏菩薩元初發心以來迨今天宮受囑皆以圓如是而自修亦以圓如是而利它種熟脫三時時不廢與我佛本迹之事莫不皆如皆是方名今經開顯之如是也行人能以此圓常正諦觀一念具心即此具心所起修惡即是性惡名惡法界無法不收體是三德復名三諦稱諦而觀照境不異名如境觀雙亡永絕過非曰是如是信之信成就矣二能聞之人我聞我聞者聞成就也此海阿難自表親承有在永異外道我以主宰為義十六見之首五利使之元故凡夫小乘於人法中著我而阿難為傳法菩薩於法華預授記之儔傳此圓經合順二空何亦言我須知凡夫人具足見慢名字三我阿難已無見慢隨俗名字以無我無聞化道則絕故雖知無我為傳化道隨世假說如以金錢易銅買賣之法人無笑者聞者耳根不壞聲在可聞處作心諦聽因緣和合故能聞應言耳聞以我是聞主聞是我用主是假人用是實法若解主義聞義自顯但主是總論緣起聞乃別從說聽不無少異此是阿難直提法性真我心聞令人直下悟入耳然真我無我無不我心聞無聞無不聞為傳化不絕故云我聞聞則成就已三聞持之時一時此應紀歲月今云一時者葢兩土正朔不同說經前後有異故以一時總攝耳然一者乃道之統體天德之純形氣之元數之始易之奇生天生地萬物以茲未有不始於一故伏羲卦爻倉頡文字咸起於一一為字之大母在上若天葢形在下若地載形在中若人負荷形旹者變易也造化密移人疇覺之其可見者莫如日故取日之所之乃是會意以天體至大運用之妙存乎日也佛世論時有二一迦羅名短時實時示內弟子依時而食護明相等二三摩耶名長時假時外道執時為實故顯時是假輔行云諸經既多乃通言一時則該乎長短攝彼精麤是已今言覺皇法運將竟天宮嘉會之時聽者感佛為說說者應機而談說聽事訖總名一時大要令根熟六道歸一心之時大師云若前思後覺斯二非一思覺妄斷豁悟之時今亦然耳四佛及住處佛在忉利天天台明六即佛今約究竟即佛有三依一切智有丈六佛依道種智有丈六尊特佛依一切種智有法身佛三佛不得一異非一異而一異今既開顯總秘密藏同一圓佛一異俱忘暫時曰在久停名住一往語耳今準大論以住釋在住者四儀之一佛為能住忉利天為所住以住處有二一境界處游歷之境為化在俗之流二依止處為統出家之眾今指境界處也然能住有四謂天梵聖佛天住謂六欲因即施戒善心梵住從初禪至非想因即四無量心聖住三乘人因即三三昧佛住首楞嚴百八三昧等然必依諦而住故丈六佛住真諦合身佛住真中法身佛住中道是則吾人於一心中圓修三觀念念不休時時住於三諦即觀行住故知能了神解心性念念菩提果圓介爾起意大用現前無得無依非取非捨從真起行體用相收以行契真卷舒一際自然心心合道念念冥真矣忉利天見品題二點三月所為何故立此科以為母說法句文屬證信意含發起通不能收別不可攝故別立之然此句乃如來上升忉利三月安居之宗源正為地藏為母發願之張本一以遮外道六師之疑謗次以起後世四眾之孝思語雖略點意實包羅爾為母說法準觀佛三昧海經是父王白佛當往忉利天為母說法佛言當如輪王行法問訊檀越按增一阿含經乃帝釋所請謂諸佛皆上升忉利為母說法如來亦應為聖母說法於是如來與千比丘於安達羅國曲女城邊升忉利天為母說法以報生身之恩梵語摩訶摩耶唐言大術或云大幻長阿含名大化妙玄云摩耶是千佛之母是大權法身上地豈有凡夫能懷那羅延菩薩耶故晉譯華嚴摩耶夫人答善財云我已成就大願智幻法門得此法門故為盧舍那如來母於閻浮提迦毗羅城淨梵王宮從右脇生悉達太子顯現不可思議自在神力此約小乘明父母等若約圓宗都如幻現如佛告月氏天子言其菩薩者不念於生亦無所起用本願故現有所生天問菩薩不念所生亦不往生云何如來垂念所生之親上忉利天一時三月如來不為從王后摩耶而由生乎佛告天子菩薩不從王后摩耶所生從智慧度無極生所以者何其三十二大人相十力四無所畏十八不共乃至虗空佛眼神足善權斯諸功德悉為不從王后摩耶而生則從智慧度無極生此即佛升忉利為聖后所說之法經有三卷皆稱本之談二別序發起當文不關餘經故云別文分三段初果因集讚序二是時如來下現相集眾序三爾時釋迦下問答釋疑序若約相生次第由果因集讚故世尊放光而天龍等集由集眾之多故佛以眾數問文殊文殊懷疑發問如來答出昔事是則問答釋疑由現相集眾現相集眾由果因集讚逆順生起鈎鎖相連若秪如此翻覆緣起正同光宅因緣一釋未周而約教本迹觀心了無趣向矣須知三序序正中四一果因集讚及所集眾敘人一現瑞敘理一果因交讚文殊疑念敘行一問答敘教一此因緣釋也若約教者此序序正非三藏通別乃是序於圓正耳若約本迹自地藏元初不可說劫前迨至今日天宮受囑任運各作四一觀心可知不復記問法華經王得作四一今經何可擬同答如來金口親讚地藏智慧神通等皆不可思議大師云妙名不可思議那不許作四一序耶若準妙玄本迹各論十妙正應約本迹各明十不思議但末代樂簡故存而不論須知圓經勿作餘釋今初分二初同來集會爾時十方無量世界不可說不可說一切諸佛及大菩薩摩訶薩皆來集會爾時者正如來為聖母說法時也諸佛既多難別剎土故統云十方無量世界無量者量不可得有何等算世為遷流界為方位東西南北上下為界過去未來現在為世有二種一眾生世界是正報二器世界是依報孔矣依正數夥不可說也此是華嚴阿僧祇品百二十五數中之一普及名一盡際名切不一名諸尊極名佛各將一大菩薩為侍故云及菩名道薩名心自行此道復能化人依勝位立勝行乃圓教大人故言大菩薩摩訶薩主與伴俱因隨果集主不異伴伴不異主即主即伴非異非同來則俱來集則共集故云皆來集會斯時如帝網珠光重重無盡行人一念冥契其中則始覺智與本覺智融通一際無明心與菩提心交互雙流則無邊剎海不隔毫端十世古今不離當念心為總持之主圓觀不可暫離請各思之二共申讚歎二初同歎釋迦難事讚歎釋迦牟尼佛能於五濁惡世現不可思議大智慧神通之力調伏剛強眾生知苦樂法釋迦姓也本起經翻能仁準長阿含昔甘蔗姓也王聽次妃讚擯四太子至雪山北自立城居以德歸人不數年間為強國父王遣使往召四子辭過不還父王三歎我子釋迦因此命氏牟尼字也本行經翻寂默以諸釋種憍慢多言及見太子悉皆默然王云宜字牟尼姓從慈悲利物故不住涅槃字取智慧冥理故不住生死首歎能字即此意也五濁惡世譬如清水投之塵土容貌泪然名之為濁濁相有五所謂劫濁劫濁無別體約四濁立名見濁五利使為體煩惱濁五鈍使為體眾生濁攬見慢果報立名命濁連持色心為體而此五濁煩惱見為根本從此二濁成於眾生從眾生有連持命此四經時謂為劫濁劫濁亂時眾生垢重慳貪嫉妬成就諸不善根故名惡世悲華經寂意菩薩問今我世尊何因何緣處斯不淨五濁惡世之中成阿耨菩提說三乘法何緣不取清淨世界遠離五濁惡世佛告寂意菩薩以本願故取淨妙國亦本願故取不淨土菩薩成就大悲取斯弊惡不淨土耳是故我以本願處此不淨穢惡世界成阿耨菩提云云大論云諸佛大悲徹於骨髓不以世界好醜隨應度者而教化之如慈母愛子子雖沒在廁溷勤求拯拔不以為惡故諸佛菩薩讚歎能於五濁惡世調伏剛強眾生現者約化儀本是瓔珞長者現為弊垢之身乃寢大而施小也約佛意本是圓佛垂為三藏初成之相乃隱實而施權也大智慧神通準大論謂能降伏外道大論議師及釋梵天王故名大智慧準賢愚經降六師已洴沙王白佛六師群迷不自度量求於世尊捔試神力佛現神變妙難思議六師窮縮乃無一術投水而死徒類散解故名大神通力者佛身功德力勝於十萬白香象寶是為父母遺體力若神通功德力無量無限如此大慧通力三乘罔知人天莫測名不可思議以此慧通之力調伏剛強眾生維摩居士言此土眾生剛強難化故佛為說剛強之語以調伏之言是地獄是畜生是餓鬼乃至是愚癡是愚癡報等以難化之人心如猨猴又如象馬𢤱悷上音龍下音例𢤱悷多惡也不調如諸楚毒乃至徹骨然後調伏如是剛強難化眾生故以一切苦切之言乃可入律故我佛稱調御天人師苦樂即三藏生滅四諦以迷真重故從事受稱然苦集是一法分因果成兩道滅亦然以二是世間苦因果二是出世樂因果故但云苦樂法者軌持為義以四諦法非佛天人沙門婆羅門所作唯是過去無明顛倒心中造作諸行法爾能出今世六道苦果天然好惡不同知者即鹿苑三轉法輪時示其相云此是苦汝應知等此是小始初成先施方便以調伏三乘根性以四諦調伏聲聞以因緣調伏緣覺以六度調伏菩薩諦緣弘誓皆依四諦故通言知苦樂法此是釋迦能事故果因交讚而共歎也二各遣侍者問訊各遣侍者問訊世尊侍者親近從命承事之人長阿含稱執事即法華及諸僮僕也疏云僮僕者給侍使人譬方便知見皆已具足和光六道曲順萬機即實智之僮僕以實智主內故為能遣權智任外故為所遣問訊者問起居訊所事也如分身諸佛各遣侍者問訊曰少病少惱氣力安樂及菩薩聲聞眾悉安隱不同由應五濁惡世故以病惱氣力為問以佛示同人法也二現相集眾二初現瑞瑞秪是相密報為瑞奇異為相相何所表妙理之賾說之至難人情悠悠不能尊重應須神通發動現於瑞相密表乎理世人以蜘蛛掛則喜事來乾鵲噪則行人至小尚有徵大焉無瑞以近表遠亦應如是現瑞分二初放光明雲二出微妙音表我佛現身說法為地藏形聲張本先以神通駭動後以智辯宣揚初又二初總示是時如來含笑放百千萬億大光明雲是時者感應道交發迹顯本如來得付囑之機大士承拔濟之命今正是時者優曇華是時乃現今既得時故含笑放光含合也合口停之也準大論笑從口出一切毛孔皆開故名笑由口笑歡喜故一切毛孔皆開然佛佛皆有常光放光之別常光佛身四邊各一丈光明生便有此三十二相之一名丈光相餘界常光無量釋迦佛因眾生薄福不堪其明故受一丈今是放光即表應機設教破惑除疑從體起用也然諸經放已必收今不見收光之文者以放光照現在事收光明將來事今明地藏現事故略收光之文光明玄云婆頗婆翻光多摩翻明雲者山川之氣天之章也陰陽聚而為雲逶迤上布自然成文內經曰地氣上為雲天氣下為雨故从雨云象回轉變態之形表如來現身如雲說法如雨以雲出岫無心散空絕跡靉靆彌布甘雨霶𩃱正顯如來無分別智緣感則現身機叩則說法令眾生自然菩提芽生百千萬億言光雲數多大論云身光是諸光之本從本枝流無量無數譬如迦羅求羅蟲其身微細得風轉大光明亦如是得可度眾生轉增無限故有百千萬億須知如來之光本從智心流出則吾人一念本具三千性相百界千如如是互具百千萬億之心光與如來智光無二無別故得三乘咸會六道齊開同此一光不可思議矣二別明所謂大圓滿光明雲大慈悲光明雲大智慧光明雲大般若光明雲大三昧光明雲大吉祥光明雲大福德光明雲大功德光明雲大皈依光明雲大讚歎光明雲所謂者有指之辭就文指十種光雲約意指眾生性德欲令覩形知意目擊道存全性起修即因成果方見毗盧遮那遍一切處心佛眾生三無差別故約今家十乘觀法對釋十種光雲令修之得門見不唐捐也故四明云此之十法雖是智者像代宣揚若離此十更無修法今準其意以釋此文庶令十法成乘運歸寶所大圓滿光明雲為十光之首流出九光正對不思議境居十乘之初為九乘本大圓滿即如來果德三身與眾生一念三千具足無減即此之境無法不備故曰圓滿法華大車其在是歟故以對之大慈悲光明雲對第二真正發菩提心者既觀妙境何用發心葢此十法雖俱圓常圓人復有三根不等上根唯一法中根二或七下根方具十今中下之根觀境不悟須加發心故依妙境發無作四弘誓願憫己傷他上求下化則如來慈悲拔苦與樂即吾人所發菩提之心不合法華經文恐太煩故下竝略之大智慧光明雲對第三善巧安心止觀者因名止觀果名定慧即定之慧名大智慧大論云智慧普知無法不盡智大則光大如函大葢亦大則知果上佛智無量由因心巧安止觀果因互顯修證相成故以對之大般若光明雲對第四破法徧者謂三觀一心無惑不破此正修之以般若葢眾教諸門竝以無生為首徧破諸惑復以無生度入諸門縱橫俱破令識體徧識體徧是實相般若入諸門是觀照般若縱橫破是文字般若故以對之大三昧光明雲對第五識通塞者此正以王三昧照其四諦苦集十二因緣六蔽塵沙無明之塞莫不皆成道滅滅因緣智六度一心三觀之通通者護之塞者破之無塞不通名大三昧三昧與慧冥契何塞而不通故以對之大吉祥光明雲對第六道品調適者大師云吉祥者義利之詞現益名義當益名利大悲空智經云吉祥者謂不二智故今無作道品一一調停隨宜而入此以無漏般若導諦緣度一切萬行到薩婆若般若導行是不二智到薩婆若得義利也故以對之大福德光明雲對第七對治助開者福德即布施等是助道無漏般若是正道正道多障圓理不開須修事福助開涅槃云眾生煩惱非一種佛說無量對治門夫不信有對治之人當知此人未曉正行故以對之大功德光明雲對第八知位次者謂修行之人免增上慢葢此光雲覩者皆有滅惡之功生善之德不無觀智淺深明昧之異而上慢者謂己均佛實未證得自謂證得非唯失位却墮泥犁若知生佛體同而真似因果前後不濫則內勤三觀外加五悔免增上慢成大功德故以對之大歸依光明雲對第九能安忍者謂於逆順安然不動䇿進五品而入六根以圓觀行人初入外凡外招名利內動宿鄣因茲破敗豈能進道今見光雲示歸依之像即返還自性依憑三寶一體光嚴安住無生任運而進故以對之大讚歎光明雲對第十離順道法愛者謂莫著十信相似之道須入初住真實之理以既修離愛進入銅輪十住百界分身一多相即自然任運流入薩婆若海則三世如來莫不讚歎安慰故以對之問十種光雲果覺神通之用十乘觀法圓初修進之門以果對因修證乖矣答夫論觀法若其不用果覺為體則非圓行若其不以即覺之性為所照境則非妙境非極理也今不許初心與果覺同體則如來光雲與眾生何涉而天龍鬼神乘光普集耶若知初後不二方顯因果同涂所謂眾生性德之佛非自非他非因非果即是圓常大覺之體故知果佛圓明之體是我凡夫本具性德那言果佛光雲非圓初心之妙用耶二出微妙音二初結前起後放如是等不可說光明雲已又出種種微妙之音放等結前又等起後婆闍尼娑婆林此云聲音準魔嬈亂經梵名毗樓翻聲音後譯翻洪音拘樓秦佛弟子之名白虎通曰聲者鳴也音者飲也剛柔清濁和而相飲精薀云音者聲成文也散而布者聲也不如是則不能震動函畜有餘而不盡露者音也不如是則不能渾成呼二字而開發收閉備矣今言詮理之聲謂之音佛所出聲言辭清雅聞者無厭聽之無足能為一切作與樂拔苦因緣莫若聞聲之益即是以慈修口故有八音一極好音二柔軟音三和適音四尊慧音五不女音六不譌音七深遠音八不竭音種種微妙者佛先世種善音聲因緣故咽喉中得微妙四大能出種種妙好遠近音聲徧滿十方恒沙世界今光雲出音法爾宣流絕緣慮心之情見顯無分別之慧通互相合響曰微彼此不雜曰妙此表地藏隨類現身應機說法境既不一音亦眾多華嚴云諸光明中出妙音普遍十方一切國演說佛子諸功德能入菩提之妙道正斯之謂也二正明眾音所謂檀波羅蜜音尸波羅蜜音羼提波羅蜜音毗離耶波羅蜜音禪波羅蜜音般若波羅蜜音慈悲音喜捨音解脫音無漏音智慧音大智慧音師子吼音大師子吼音雲雷音大雲雷音宣說六度等有二意一表佛菩薩身即是法身從諸法門功德生二表佛菩薩說法不出六度等法門以大智慧作師子吼與雲震雷潤物肅眾也梵語檀那秦言布施檀為寶藏富貴安隱之福田檀能破苦得道涅槃之筏喻利益殊多故光雲首讚尸羅翻性善又翻止得謂止惡得善也若人求大善利當堅持戒如惜重寶如護身命譬如大地一切萬物之所依住戒為一切善法住處故光雲宣流羼提云忍辱有生忍法忍菩薩行生忍得無量福德行法忍得無量智慧福德智慧具足事事得如所願以故光音宣流忍度毗梨耶云精進身精進勤修善法心精進勤行善道蓋欲成佛道凡有二門一者福德即施戒忍二者智慧即實相般若入福德門除一切罪所願皆得入智慧門不厭生死不樂涅槃欲入般若要因禪定欲修禪定必須精進是故光雲弘宣起人精進度門禪那云思惟修菩薩行禪時五波羅蜜和合助成一一禪中行大慈悲拔無量劫中罪得諸法實相智故為十方諸佛大菩薩所念以故光音宣演起人禪定之門般若翻智慧照了一切諸法皆不可得而能通達一切無礙名為智慧諸菩薩從初發心求一切種智當學一切法得一切智慧所以光音宣此起眾生智慧之根六度雖通四教今是開前事理總成純圓理六度也慈悲音喜捨音此宣四無量心四教菩薩俱修能與它樂名慈心能拔他苦名悲心慶他得樂名喜心無憎無愛名捨心慈有三種一緣眾生觀一切眾生如父母親想二緣法見一切法皆從緣生三者無緣不住法相及眾生相悲亦有三名同於慈今是如來四無量心故一一名大實能與前人與樂拔苦非假想也今列二音者慈悲是佛道根本喜捨從慈悲上生故分列之以見慈悲為要耳今光音宣說正開前權小四心皆成如來無緣實大四無量心解脫音梵名目帝羅此云解脫淨名疏云一真性二實慧三方便經云諸佛菩薩有解脫名不思議若菩薩住此解脫者能以須彌之高廣內芥子等即是三種解脫不思議義何者菩薩解脫即是真性菩薩住此即是實慧須彌內芥即是方便今光流妙音正表地藏不思議方便神通妙用無漏音此中應說因緣四諦及三十七道品今以無漏該之梵語烏波或薩遮此翻有有是何義謂一切有漏法是此不約小乘生滅四諦以苦集為漏因果道滅為無漏因果今是圓無漏則七方便皆名有漏以六凡漏落有邊兩教二乘漏落空邊三教菩薩漏落二邊今光雲宣流真無漏音會七方便俱住中道永不漏落二邊也智慧音大智慧音智以窮微彰號慧以決擇立名列二音者智慧音通七方便如妙玄智妙中所列二十種智是也大智慧音是如來權實二智即法華諸佛智慧甚深無量等是也問上云梵語般若華言智慧今復列者豈不重耶答大品既云欲得道慧道種慧一切智一切種智當學般若波羅蜜則般若能生智慧故以此翻之如母能生子即以子名母之意輔行云種智般若自具諸法能具諸相則般若自具實相等三名而智慧不無因時權實等二義故不為重今光音宣此正開權小偏智無非中道如實妙智大論云三世十方諸佛身放大光明遍照十方破諸黑暗心出智慧光明破眾生無明闇冥正是此意師子吼音大師子吼音梵語僧伽翻小師子梵名僧伽彼翻師子是大師子大論云如師子王清淨種中生深山大谷中住云云吼者嚬申也以口扣地現大威勢表師子王力今謂師子音為三乘說權小法大師子吼為別圓說大乘法總表無畏新華嚴云譬如大師子吼小師子聞悉皆勇健一切禽獸遠避竄伏佛師子吼諸菩薩等若聞讚歎菩提心聲長養法身妄見眾生慚伏退散大論云譬如師子能令群獸懾伏是也今光流衍者謂欲宣六度等法必具大智慧智慧既足作師子吼眾生蒙潤故以雲雷而終之雲雷音大雲雷音法華云譬如大雲遍覆一切慧雲含潤電光晃曜雷聲遠震令眾悅豫其雨普等率土充洽雲譬應身說十二部故言慧雲身放大光口震四辯如電曜雷聲宣注法雨皆蒙利潤受益差別故雲雷不同然皆一地所生一雨所潤差別即無差別現相竟二集眾二初結前起後出如是等不可說不可說音已娑婆世界及他方國土有無量億天龍鬼神亦集到忉利天宮西域記云索訶世界三千大千國土為一佛所化攝也舊曰娑婆悲華云何名娑婆是中眾生忍受三毒及諸煩惱能忍斯惡故名忍土又劫初梵王名忍依王之名而名其土故楞伽翻能忍國土梵名剎摩正音掣多羅此云土田萬境不同亦名為剎取莊嚴差別為名國域也小曰大曰國古之王者建國居民度天地之所合定陰陽之所和故言國土然法身無像豈假地以居應物有形故隨國而化大論明四種天一名天今國王名天子周稱天王二生天即二十八天是三淨天人中聖人四淨生天欲天諸聖人須陀洹家家斯陀含色界中五種阿那含無色一種阿那含是梵名那伽此云龍鱗蟲之長能幽能明能大能小能長能短春分而登天秋分而入淵有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍未昇天曰蟠龍龍天類也故經論中天龍竝舉五分律畜生除龍能保綏國人擁護正法故也鬼神鄭玄云聖人之精氣為神賢人之精氣曰鬼此亦一往故尸子云天神曰靈地神曰祇人神曰鬼鬼者歸也古以死為歸又畏也威也自則虗怯多畏能令他畏其威神者能也力大者能移山填海力小者能隱顯變化皆鬼道攝然他方國土非我佛化境何故天龍鬼神亦集此有二意一由地藏分身化人時時不廢此輩宿世根熟法爾天性相關故覩光聞音同時來集二此輩得預法會應準乘戒四句天神同來乘戒俱急之流龍鬼亦集乘急戒緩之類竝是輕報泥犁焉得不求度脫其數莫窮故云有無量億二正集大眾三初天龍等眾二一切神眾三大鬼王眾初分二初別列三界天眾二總指八部等眾妙玄云天乘位者修十善道任運淳熟通是天因加修禪定進升上界三界天果高下不同修因必深淺異也初中分三初六欲天楞嚴云如是六天形雖出動心迹尚交自此已還名為欲界故俱舍云六受欲交抱執手笑視婬輔行釋曰地居形交忉利以風為事夜摩抱持兜率執手化樂視笑他化但視然雖取境不同均之未離情欲故通名六欲天也所謂四天王天忉利天須𦦨摩天兜率陀天化樂天他化自在天四天王天上昇之元首下界之初天居須彌山腹隣於日月帝釋外臣即四鎮王也釋名如後長阿含云四天皆有婚嫁行欲同人根相到故化生小兒在膝上如五歲小兒忉利六歲乃至他化如十歲未久自然寶器感百味食天甘露漿食訖便與諸天等量其六天身壽之量應準俱舍頌欲天俱盧舍四分一一增四分之一即半里初天長半里上五竝半里論增人間五十年下天一晝夜承斯壽五百上五倍倍增四天王壽五百以人間五十年為一日乃至它化十六千歲以人間千六百年為一日彼亦三十日為一月十二月為一歲若布施持不殺戒清淨小勝厭患家業好樂聽法供養善人生四天王天忉利如前大論云釋迦提婆因提秦言能天主人中布施加持不盜戒供養父母及其所尊心欲求勝生三十三天居須彌山頂山頂四角有三十二天已上二天單修上品十善得生其中須𦦨摩天大論云夜摩天王名秦言妙善以時時唱快樂受五欲境知時分故此由布施加持不婬戒心意柔和生夜摩天復由於人間世動少靜多命終之後於虗空中朗後安住日月光明上照不及是諸人等自有光明此空居之首天也兜率陀天新云覩史多大論云刪兜率陀天王名秦言妙足於五欲知止足故由昔布施加持不四口過好樂多聞分別好醜愛樂涅槃心著功德命終之後上昇精微不接下界諸人天境乃至劫壞三災不及此天是補處菩薩所居故佛地論名憙足後身菩薩於中教化多修憙足故則三災不及約內院說凡天外院還受三災也化樂天大論云須涅蜜陀秦言化樂自化五塵娛樂故此由布施深心持戒多聞自力生活生化樂天他化自在天梵名婆舍䟦提以此天奪他所化而自娛樂故由昔布施時清淨持戒轉深好樂多聞自貴情多不能自苦從他求樂它所思惟勤心方便化作五欲奪而自在故別行疏云是欲界頂天假它所作以成己樂即魔王也而垂裕記又云第六天上別有魔羅所居天他化天攝經論所出不同已上四天空居修上品十善兼坐未到定得生其中感通傳云帝釋為地居天主魔王為六欲天主帝釋四王欲行佛法魔不得制問地居二天主住山頂臣居山腹空居四天云何安立答準大論夜摩等諸天七寶地在虗空中有風持之令住乃至淨居亦復如是又業疏曰第四禪上雲居輕薄如星散住不同下天如雲密合則知下雖空居必依雲假風而得住持福業所致耳二色界天共有十八分為四禪初二三禪各三天四禪有九天離欲麤散未出色籠故名色界坐得禪定故得禪名正報之身是清淨色非如欲界垢染色也梵眾天梵輔天大梵天少光天無量光天光音天少淨天無量淨天徧淨天福生天福愛天廣果天無想天無煩天無熱天善見天善現天色究竟天摩醯首羅天大論云欲界心散亂行者依何地何方便得當依色界無色界諸禪定於四無量心八背捨八勝處九次第定十一切處試心知得柔軟自在如意不譬如御者試馬曲折隨意然後入陣故世出世間以此禪為根本梵者淨也無欲染故十八天皆淨無欲此當其首偏得梵名梵眾是民梵輔是臣梵輔又名梵富樓此云前益天在梵天前行恒思梵天利益故大梵即王也故次第禪門云佛於仁王說十八梵亦應有民主之異準此後亦例分民臣與王矣然法苑論諸天貴賤乃至色界之中唯局初禪三天有貴有賤大梵天是君云云自此已上諸天受報同等更無貴賤據此則上之三光三淨應是功行論優劣也大論九云梵世天者生處有三種一梵眾天諸小梵生處二梵輔天貴梵生處三大梵天中間禪生處問離欲是同何故貴賤異處答初禪三種修下禪生梵眾修中禪生梵輔修上禪生大梵慈行亦如是以第一清淨心修上慈即生大梵主領大千而作世主然通論有萬億梵王唯此是大千之中王名尸棄秦言頂髻得為大千之主此約橫論又初禪內有覺觀故外有語言主領下地為便若摩醯首羅雖稱大靜王灌頂云字威靈帝居色界頂報勝為主無統王義以上二禪無語言法是故諸禪但以報勝為主非統御也此約竪論若涅槃疏云娑婆世界主正是首羅梵王只領小千而已乃古師之說非今家正意大論云有人布施持戒修布施時其心得樂若施多樂亦多如是思惟捨五欲除五蓋入初禪乃至非有想非無想天亦如是二禪三天少光光明少故無量光光明轉增無限量故光音新云極光以光當語音故大論三十三云如經說心清淨優劣故光有上中下諸天心清淨布施持戒故身有光明復有人於闇處燃燈亦供養尊像塔寺復常修慈心徧念眾生又修念佛三昧念諸佛光明神德復修火一切入又以智慧光明教化愚闇邪見眾生以是業因緣故得心中智慧明身亦有光故阿毗曇論云諸天報身之相皆無骨肉亦無大小便利不淨身放光明無別晝夜報得五通形無障礙故知三天論光義徧前後三禪論淨其義亦然大要隨行高下歷位淺深耳三禪三天少淨離喜受樂為淨未及上位為少無量淨淨勝於前不可量故徧淨樂受最勝淨周普故是三禪何故言淨大論云緣淨故淨八色是淨法未被練不得淨今三四禪法起來觸此八色為作淨緣三四禪等此是色界極淨之色用此為緣觸八色更淨故言緣淨故淨是樂遍身受故知是三禪中淨止觀云三禪樂如泉石水自中生梵行之樂亦復如是二界中樂不過三禪夫求生天以樂為本故以樂勝名天也四禪九天三是凡天住處無想外道所居五是三果居處凡夫三天經論出沒略異如仁王云九梵三淨三光三梵五喜樂天疏出無雲為首以沒福愛今經與楞嚴皆沒無雲列福愛為第二蓋譯師互有出沒耳福生以麤重相滅淨福性生從因彰名也福愛捨心圓融勝解清淨福無遮中得妙隨順前天以捨樂為福今捨心轉勝愛樂此福與前福生淺深之別廣果凡夫之果無勝過故無想一期中間心想不行故楞嚴云從是天中有二岐路若於先心無量淨光福德圓明修證而住名廣果天若於先心雙厭苦樂身心俱滅經五百劫者名無想天此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡下無卜居故於捨心眾同分中安立居處大論名淨生天色界有五種阿那含不還是間即於彼得阿羅漢梵語首陀婆秦言淨居天何故名淨居天以四禪有八種五種是阿那含住處是淨居三種凡夫聖人共住以淨居天常憐愍眾生常勸請佛說法故無煩無見思煩惱所雜苦樂兩機鬬心不交故無熱機括獨行研交無地違順俱違離熱惱故無煩絕外境無熱絕內心淺深異耳善見十方世界妙見圓澄更無塵象見極明徹故善現精見現前陶鑄無礙形色轉勝善能變化故色究竟究竟群機窮色性性入無邊際色法最極故梵名阿迦尼吒或名阿迦尼沙此云質礙究竟即此天也摩醯首羅天大論翻大自在正云摩訶莫醯伊濕伐羅八臂三眼騎白牛然普門疏云樓炭稱為阿迦尼吒華嚴稱為色究竟天是則摩醯首羅即色究竟天今別列者如寶雨經云復有淨居天眾摩醯首羅而為上首今經別立尊其主也或有人以為第六天而諸經論多稱大自在是色界頂釋論云過是八處有十住菩薩住處亦名淨居號大自在天王大千界主十住經云大自在天光明勝一切眾生故世尊涅槃獻供大自在天最勝故知非第六天也今謂他化自在假他所作為自受用於境得大自在摩醯首羅居色界頂熏禪最勝於定得大自在一從勢力魔王自屬六天一從禪定尊極應居色頂況波旬常求世尊入滅而淨居每請如來轉輪則自在之名固同而自在之事永異非第六天斯言足徵也婆沙云凡生彼者要是進向那含身得四禪發於無漏起熏禪業或起一品乃至九品方乃得生凡夫無此熏禪業故不得生楞嚴云此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間麤人所不能見也三無色天深厭色籠修四空定生四空天名無色界以此四天只有四蘊故得名也輔行六上云從第四禪欲入空處必作方便滅三種色一可見可對色色塵二不可見可對色五根四塵三不可見無對色法入少分無表色也此之三色並在色界故滅此三然但無麤色非無細色故妙樂云無色雖無四大造色定果所為皆是墻壁法華經墻壁大師喻意識三界皆以意識維持楞嚴云是四空天身心滅盡定性現前無業果色從此逮終名無色界孤山釋云無業果色者顯有定果色也乃至非想非非想處天乃至者略辭也此中應具列四天之名以簡便故故云乃至空處天初離三種色心緣虗空既與無色相應故名虗空定識處天捨空緣識以識為處正從所緣處受名故名識處三無所有處天行者厭於識處無邊於是捨之入無所有處亦名不用處修此定時不用一切內外境界外境名空內境名識捨此二境故言不用處四非想非非想處天此定不緣識處故非想不緣不用處故非非想此第四天古多異解今取止觀者以見大師雖未見楞嚴凡所釋義與經雅合彼云識性不動以滅窮研則是非想豈非不緣識處乎於無盡中發宣盡性則是非非想豈非不緣不用處乎又云如存不存即非想也若盡不盡即非非想也故禪門云此定中不見一切相貌故言非想若一向無想如木石無異云何能知無想故言非非想如此釋義天然𭰞合若非古佛再來安能發此妙義近有以大師不見楞嚴錯解法華六根立言彈謗寧不舌爛口中耶輔行九上云若色無色二界相對則色界名禪無色界名定若總以上界望於下欲則上二界俱名定地下界為散上來所釋自四天王至非非想雖定散有差而生死無異寧免三塗之輪轉難迯七趣之升沉雖用欣厭二門快覩光雲諸瑞如鷹隼飛同集天宮也二總指八部等眾一切天眾龍眾鬼神等眾悉來集會此通指此界它方八部之眾結其來集也梵云娑婆秦言一切有二種一名字一切二實一切今二種俱收天龍鬼神假名也各具五陰實法也眾之為言多也古人以公共取義古眾字故从乑目言人所共視也天之眾有五一上界天王摩醯首羅等二遊虗空諸天日天子等三居虗空天魔王等四地居天主藏天等五地下縛囉呬天等各有無量天男天女諸眷屬也龍眾別行疏云龍有四種一守天宮不落二興雲致雨益人三地龍決江開凟四守轉輪王福藏各有龍子龍孫諸眷屬也鬼神等眾依正法念經餓鬼大數有三十六種準摩尼羅亶呪經列鬼名九十三種行因不等受報各別順正理明無財少財多財各復有三類故摭華鈔名三品九類瑜伽論謂內障外障無障各有所統眷屬今言八部者部類不同略言八種一天二龍三夜叉四乾闥婆五阿修羅此言無端正六迦樓羅此云金翅七緊那羅此云疑神以頭有角令人生疑天帝絲竹之神八摩睺羅伽此云大腹行地龍腹行也先舉天龍以其位尊而力大以鬼神該後六部見行劣而居卑所以舉此者我佛垂化道濟百靈說法利人慈育萬品出則釋天前引入乃梵王後隨左輔大將右弼金剛三乘賢聖歸投八部鬼神翊衛他方者見瑞雲而似鳥歸林此土者聞光音而如流赴壑以今感而竝來由昔緣而普集也二一切神眾復有他方國土及娑婆世界海神江神河神樹神山神地神川澤神苗稼神神夜神空神天神飲食神草木神如是等神皆來集會此等諸神各有攸司或由業以實生或因化而權示海江河皆水神也積陰之氣為水上天為雨露下地為江河大論云一切物中水為最大以大地上下四邊無不有水若護世天王不節量天龍雨又無消水珠者則天地漂沒又以水因緣故世間眾生數非眾生數皆得生長故水最大然海為百谷之王故先舉海海晦也主承穢濁其水黑如晦也故孫卿子云不積細流無以成海若唯據此四天下梵名娑竭羅此云醎海四洲皆住其中故博物志云天地四方皆海水相通地在其中戎蠻夷狄形類不同總而言之謂之四海其神曰海若山海經云朝陽之谷神曰天吳是謂水伯其為獸也十八尾八首人面八足莊子云波臣大波之神曰陽候濤之神曰靈胥江神江公也水流入中公共也又訓貢所出珍物可獻貢也下皆據震旦言之案水經及荊州記云江出岷山其源若甕口可以濫觴周官云楊州其川三江漢書地理志注云岷江為大江九江為中江徐陵為北江葢一源而三目然其神諸土難考此方若屈原錢鏐霍光等江神之小者也河神河下也隨地下流而通也乃水之伯上應天漢與江淮濟三水為四凟曰河宗者四凟之所宗也案水經注河源出崑崙之墟準西域記云贍部洲之中地者阿那婆答多池唐言無熱惱北面頗胝師子口流出徙多河繞池一匝入東北海或曰潛流地下出積石山即徙多河之流為中國之河源統紀用此說然禹貢廣覽云積石山非河源記施功之處故曰導河自積石言自積石起也又興起行經序云崑崙山者閻浮利地之中心阿耨大泉外周圍山山內平地泉處其中象口所出者則黃河是也故廣覽云河出崑崙黃河西南涵浸黃河多伏流西南涵浸是其見處余是此說以總圖傍注三字曰黃河源以池南金象口流出信度河入西南海與西南涵浸合故應指黃河為河源也神名宓妃準長阿含何緣有諸江河因日月有熱因熱有炙因炙有汗因汗成江河樹神樹者植木之總名僧祇律佛言左右有樹木與人等者便為塔廟是故神祗樂來依止四分律亦不許斫神樹正法念云大樹夜叉羅剎之所依止依樹受樂無樹則苦若持戒人勸不斫伐命終生歡樂天與天女歡樂從天命終若得人身安隱巨富其神也應推閻浮提是南洲之樹王也山神梵語勢羅唐言山逸雅訓產說文訓宣乃宣氣產生萬物也然五岳鎮地支那之書固備七金環山天竺之典能詳其神隨山而名耆闍崛山神名埤羅地神地底也其體底下載萬物也又言諦者五土所生莫不信諦也其神曰祗安也大也亦名后土主閻浮者神名堅牢也川澤神水之小者川穿也穿地而流也西征記曰故秦三川即指河洛伊水沃出為澤兗州人曰掌以水鍾聚如手掌也又訓潤潤萬物者莫過乎水其神各隨川澤立名苗稼神說文云生艸於田蒼頡云禾之未秀精蘊辯曰禾始生也从禾半出田上為意耳舊从艸非夫害嘉者艸也去之惟恐不亟从艸立類大害於義又種曰稼斂曰穡舉一苗稼百糓通收此土之神應指后稷教民稼穡之祖也神夜神者正午也聖人經天以子午卯酉為定聖人緯地以東西南北為定與夜相界朝與暮相界惟大明中天从囗指定上下左右而之界限自明後世加聿義反迂晦其神見華嚴明入地中一日之終目暗何見賴火月之為功从人舍也从火小明照室中也从月代明也其光斜暎戶內此始夜旹也地以子夜為正天玄正色乃大亨夜惟永貞其天德之周流乎其神如善財參婆珊婆演底主夜神等共有九位空神涅槃云物體質礙空性虗通小乘以明暗為體大乘以空一顯色為體其神名舜若多沇音兗疏云未見誠釋應是主空神但無麤相之身亦有微妙之色故如來光中暎令暫現天神天顯也在上高顯也又坦也坦然高而遠也五經通義云天神之大者曰昊天上帝即耀魄寶亦曰天皇大帝亦名太一其佐曰五帝東方青帝威靈仰南方赤帝赤慓怒西方白帝白招拒北方黑帝叶天紀中央黃帝含樞杻飲食神飲奄也以口奄而引咽之也食殖也所以自生殖也故佛地論云任持名食謂能任持色身長養善法身依食住命托食存其神乃竈君黃帝耳艸木神植物之弱者易生而根不固冬則盡死故但象其莖葉叢生之形而不著其根生氣所發也其德為仁中直象幹下象果氐深固上象旁枝分布凡艸木茂大必有鬼神倚附然必尊雪山忍艸菩提樹神為宗主也已上所列皆舉總名其間神數擬若河沙何況風火雷電舟車房舍衣服什物橋亭古廟閭閻丘陵故總云如是等莫不快覩光雲欣聞法雨皆來聚集天宮大會也三大鬼王眾復有他方國土及娑婆世界諸大鬼王所謂惡目鬼王噉血鬼王噉精氣鬼王噉胎卵鬼王行病鬼王攝毒鬼王慈心鬼王福利鬼王大愛敬鬼王如是等鬼王皆來集會婆沙云有威德者名貴無威德者名賤又王者名貴使者名賤今言大鬼王即有威德之貴者富足充美衣食自然身服天衣口餐天供形常優縱䇿乘輕馳任情遊戱共天何殊此由前身大行檀故得受威報復由前身諂曲不實故受鬼道也惡目鬼王梵云怛羅此翻目童子也心之神明發見於目竅開於肝睛出於腎育神於暗也然目之美惡由心之慈忍此鬼心存剛愎音闢目放惡色妙臂經云嗔目視之乃至破壞身命是也噉血鬼王正法念名食血鬼由殺生血食不施妻子受此鬼身以血塗祭方得食之如訶利鬼母最小之子名必利鹽迦羅夜叉以其惡心常食人血十輪經云十三兆藥叉恒噉諸血肉是也噉精氣鬼王梵名毗舍闍此云噉精氣噉人及五糓之精氣即顛鬼也月藏經云地精氣眾生精氣正法勝味甘露精氣是也噉胎卵鬼王胎始也婦孕三月成胎形猶未具从月台聲爾時生氣未定感於善則善感於惡則惡古有胎教保之於混沌時也卵即胞衣如世鷄卵黃白未分正同混沌之時產生之候即有無數惡鬼噉食胎衣如後行病鬼王行瘟疫之使者皆東岳府君所遣如富單那主人間熱病是也文殊寶藏陀羅尼經云於後佛法滅時惡法增長種種諸災流行於世惡鬼下降變為女身與諸眾生作種種諸雜等病是也攝毒鬼王如彌栗頭䖍伽地此云善品主於蠱毒即蛇毒生金銀毒等皆能收攝此即阿須倫王諸龍毒氣人從求願令不干人故从悳立名慈心鬼王如阿羅難陀梁言歡喜蘇泥怛羅此云妙目皆慈心鬼王之流常以樂事施與念念愛護眾生故立此嘉稱福利鬼王福與禍對利與損對此鬼每以利益之事與人不降災禍損耗鬼子母經云欲從鬼子母求願者名浮陀摩尼鉢天上天下鬼四海內船車治生財產皆屬其主摩尼鉢與佛結要受戒護人財物故有福利之名大愛敬鬼王愛即愛念敬乃敬重如妙臂經云若有行人修此法者彼一切天藥叉持明大仙乃至迦樓羅等若有見者恭敬禮拜合掌作言希有希有大慈悲者愍念一切諸有情等此善鬼王亦復如是故有此名下總結來集如是等者立名善惡不同為行慈忍有異然皆以鬼身而來聞法止觀謂乘急戒緩者以三塗身見佛聞經如華嚴涅槃鬼神龍畜皆預列眾如是因果差降升沉非一云何難言理戒得道何用事戒幸於人天受道何意苦入三塗正此經列眾之指爾三問答釋疑序二初略問答以發起二廣問答以發起初又二初問答所集眾數三初如來以眾數問爾時釋迦牟尼佛告文殊師利法王子菩薩摩訶薩汝觀是一切諸佛菩薩及天龍鬼神此世界他世界此國土他國土如是今來集會到忉利天者汝知數不爾時者正天龍鬼神畢至之時既因果𡍫塞天宮及凡聖交參法會時眾驚疑誰能發問故我覺皇悲心愍眾慈眼觀機縱目周覽誰能酬酢唯此文殊久彰大智之名堪對地藏沙劫威神之事故特告之梵名文殊師利此云妙德以了見三德佛性不縱不橫故梵名鳩摩羅伽此云童真內證真常而無取著如世童子心無染愛即法王子之號也大論云文殊師利十力四無所畏等悉具佛事故住鳩摩羅伽地什師云妙悳以身遊方莫知其所生又來補佛處故言法王子荊溪問經稱文殊為法王子其諸菩薩何人不是法王之子答有二義一於王子中德推文殊二諸經中文殊為菩薩眾首故云法王子言汝觀者非輕之也葢謂非汝文殊智眼莫能觀之乃喜而親䁥之稱一切諸佛等結上正報此世界等結上依報如是等結指眾數問其能知不耶二文殊以神力答文殊師利白佛言世尊若以我神力千劫測度不能得知大論三十三云文殊菩薩等以二種神通力果報神通修得神通住是中以福德方便力光明神足等種種因緣開度眾生今何云以我神力千劫測度不能得知耶此以眾集難知正顯地藏神力難思也問天宮雖大如何能容爾許之眾答佛與地藏有不思議神力諸天福業自然之力譬維摩之丈室容獅座以何難正法念經云譬如一室然五百燈光明不相逼迫諸天手中置五百天亦復如是不窄不妨又云彼夜摩天或一百一千共聚在一蓮華䰅同坐不隘不窄以善業故自業力故智論云第三遍淨天六十人坐一針頭而聽法不相妨礙諸天業力尚爾何況如來不思議力自應仰信也三世尊以佛眼證佛告文殊師利吾以佛眼觀故猶不盡數梵語多羅梁言眼瑜伽云屢觀眾色觀而復捨故名為眼是照燭義楞嚴云眼似蒲桃朵或云如秋泉池有五種肉天慧法佛大論云佛眼無事不知無事不聞無事不見一切法中佛眼常照今言我以佛眼觀故猶不盡數者此正抑果揚因遜己尊彼彌顯地藏所化之眾重重無盡也佛尚難知況文殊乎況餘眾乎二點示能度本尊此皆是地藏菩薩久遠劫來已度當度未度已成就當成就未成就點出歷劫度人無量度者法也亦度脫也梵語悉地此翻成就逸雅云成盛也就高也从京从尤尤高人所就之處今準禮云天子孝曰就就之為言成也天子德被天下澤及萬物始終成就則其親獲安今地藏以出世孝道令人人度生死河成涅槃道轉凡入聖為高人登高處故言成就已度已成就即十方世界不可說諸佛是當度當成就即十方世界不可說諸菩薩是未度未成就即娑婆世界十方國土無量億天龍鬼神是所謂種熟脫三時時不廢機有遲速度有前後大論云譬如搖樹取果熟者前墮若未熟者更復後搖又如捕魚前網不盡後網乃得也二廣問答以發起二初文殊設疑問因地二世尊舉因答度人此二章修行要事利生大本楞嚴云因地不真果招紆曲故創端問此乃緊要關頭初二先設詞興問二唯願下願說行願初又二初明己智信文殊師利白佛言世尊我已過去久修善根證無礙智聞佛所言即當信受假文殊發問者以諸小菩薩等怖難未除不能問佛惟文殊權謀智鑒知機知時能激揚發動成辦利益如大象擗樹使象子得飽故佛讚文殊云汝今真是三世佛母一切如來在修行地皆曾引導初發信心以是因緣十方國土成正覺者皆以文殊而為其母然今汝身以本願力現菩薩相此久修善根之證也無礙智準佛性論智有二種相一者無著見眾生界自性清淨是如理智相二者無礙能通達觀無邊世界是如量智相今既觀雲集之眾故用無礙智唐奘三藏云觀有不住有觀空不住空聞名不惑於名見相不隨於相心不能動境不能隨動隨不亂其真可謂無礙智慧葢文殊原是古佛今為輔揚法化權現童子之形故於佛所說地藏度生之事抑豈仰信諦受自然通達無礙矣二舉眾疑謗小果聲聞天龍八部及未來世諸眾生等雖聞如來誠實之語必懷疑惑設使頂受未免興謗先舉疑謗之機次顯興謗之意良由小果惟聞諦緣慧淺同於牛跡根狹罔識滄溟天龍八部雜類下機乘戒猶虧並運大道安冀深知未來眾生志性不堅業障糾纏難脫威神測度奚知故知三類之人雖聞如來誠實之語必懷狐疑惑亂反道言雖如此事豈誠然外儀似頂戴受行內心必橫生彈謗疑謗重愆必墮阿毗故須問明因地之由闡發行願之事方令三類之機一心而受則不墮闡提永階佛道矣二願說行願唯願世尊廣說地藏菩薩摩訶薩因地作何行立何願而能成就不思議事因是種義地表自心以本具三因佛性之種由了因未曾發心緣因未曾加行故性緣了同名正因即理性三因也今問此地藏菩薩創始於因地發心不審作何行門立何願念得能成就此不思議事二何字是疑辭良以四教菩薩莫不修行發願若前三教偏權行願俱屬生滅因緣若以生滅心為本修因如何圓成果地不生滅性故願廣說其因令小果等信受不興疑謗也行願如前必雙問者以願是能引行是起作若有願無行願則虗若有行無願行則孤由有願故行不孤由有行故願不虗願行相扶證果彌速所以雙問也二世尊舉因答度人二初略讚功德二廣說行願初中又二初明大小果位功德三初舉喻佛告文殊師利譬如三千大千世界所有草木叢林稻麻竹葦山石微塵一物一數作一恒河一恒河沙一沙一界一界之內一塵一劫一劫之內所積塵數盡充為劫大論問云何為三千大千世界答雜阿含中分別說千日千月千閻浮提乃至千大梵天是名小千世界名周利即小千梵名以周利千世界為一一數至千名二千中世界以二千中世界為一一數至千名三千大千世界初千小二千中第三名大千千千重數故名大千二過復千故言三千合集名百億日月乃至百億大梵天是名三千大千世界此大千世界在虗空中風上水水上地地上人其艸木等在於地上叢聚也叢木曰林稻麻竹葦喻有二種一者假以為喻二者實事為喻今為假喻以此四物叢生綢緻種類又多又人常見易於取信山石微塵亦然今於如是多多物中隨拈一物中一數作一恒河物既無量河豈能窮此約物以數河河不可盡矣又於一恒河沙有本云一恒河滿沙隨取一顆沙即有一世界沙既難窮界豈能盡此約一河沙以數界界不可盡矣又於沙界之內隨有一塵即名一劫塵既難知劫豈可測此約界塵數劫劫不可盡矣今又於一劫內所積塵數盡將此塵並充為劫歷時既久積塵自多約如是多多劫塵以數劫劫何能數劫不可思議矣如是重重喻顯正見地藏大士自發僧那始心以來若算師若算師弟子其數亦如上喻同以靈心巧手擬欲算數終莫能知之也必舉恒河者以沙多也又佛生處遊行處弟子眼見故又四河中恒河最大人皆以為福德吉河入中洗者罪垢悉除以人敬事此河皆共識知又諸河名字喜轉恒河世世不轉故以恒河為喻也問恒河中沙為有幾許答一切算數所不能知唯佛及法身菩薩能知梵語劫簸秦言分別時節有小劫中劫大劫不同今約大劫言之二正明地藏菩薩證十地果位已來千倍多於上喻何況地藏菩薩在聲聞辟支佛地此文先正喻大乘二況出小果但舉十地者略其住行向之賢位唯約聖證較之此依別教論也若約圓教自初住以至等覺共四十一位皆真因位今且從別一歡喜地從此用中道觀破一分無明顯一分三德此是見道位又無功用位百界作佛八相成道利益眾生行五百由旬初入實相無障礙土初入寶所故名歡喜二離垢三發光四焰慧五難勝六現前七遠行八不動九善慧十法雲各斷一品無明證一分中道云云而地藏菩薩證入如是若別若圓十地果位迨至今日其劫數長遠較上界劫所積塵數之劫又不翅千倍矣何況歷十住十行十迴向之大乘又何況在聲聞辟支佛地之小果耶聞苦集滅道四諦聲而證果者曰聲聞然有權實實者如常權者準十輪經地藏菩薩與八十百千那庾多頻跋羅菩薩以神通力現聲聞像從南方來禮佛讚歎約今揆昔寧不然乎梵語辟支迦羅此翻緣覺觀緣悟道故亦翻獨覺出無佛世故亦應論權實云云此中不約大小較量秪顯歷時長遠如此因地誰能測度其久近哉三結顯文殊師利此菩薩威神誓願不可思議此結降魔制外之威力神通廣度羣品之願心弘誓皆非小乘可測下地能言故十輪經佛告好疑問菩薩云如是大士功德善根一切世界天人大眾皆不能測其量淺深若如來廣說如是大士功德善根一切世間天人大眾皆生迷悶或不信受如是大士成就無量不可思議殊勝功德善能悟入如來境界於諸佛法已得自在為欲成熟一切有情所在佛國悉皆止住云云不可思議大論名不決定以不能決定其化事故名不可思議也二示聞讚供像功德若未來世有善男子善女人聞是菩薩名字或讚歎或瞻禮或稱名或供養乃至彩畵刻鏤塑漆形像是人當得百返生於三十三天永不墮惡道若者不定之辭葢行惡者多行善者少亦喜遇之言謂倘若有修善男女聞地藏菩薩名而修敬者必當永得福堂矣此不局在家二眾如十輪稱地藏為善男子則七眾三乘皆可稱之以諸惡莫作眾善奉行凡在佛法孰不遵行聞菩薩名等聞名成種有感乃應譬洪鐘在架有扣則鳴釋名如綸貫字乳化也男有室女有家而後生育从宀音綿似屋舍也从子會意也今借為名字之字古者相語名之質也周人尚之以字文矣然菩薩名字雖從德立亦假施設大品云般若波羅蜜但有名字菩薩亦但有名字是名字不在內外中間和合故有不生不滅但以世間名字故說故知此名字本來是空既知空寂則感應道交故聞是菩薩名字或以言詞而讚歎或瞻勝相而禮拜或專稱名字或䖍修供養或精施五彩而繪畫或巧斵諸木而雕鏤或假淨土而範塑或借膠漆而餝塗成其形像而恭敬之是人於當來世必得百返生三十三天永不墮三惡道處三十三天有二說準正法念經忉利翻三十三此是欲界中地居一天若於此百返而生則位卑處狹奚能顯地藏不思議威神誓願應準灌頂呪經所列三十三天始合經文所謂近際普觀快見無結愛色究竟淨光普等愛勝福愛極妙廣妙微妙守妙淨明徧淨約淨水應梵水微梵水行梵摩訶梵梵輔祿梵眾妙化自在化應聲不憍樂兜率陀鹽摩羅忉利毗沙門惟睒聞毗樓勒提頭賴叉此就欲色二天自四王而上至五淨居復从五淨居而下至四天王中間次第歷生各盡本天之壽如是百返極受天樂修因少而受報多歷時近而享福遠方顯地藏神力不可思議為若此抑豈生天受福且能永離惡道當知圓人如住胎王子一聞名塑像即生天離惡所謂十善菩薩發大心長別三界苦輪海正今經之旨也二廣說行願二初明長者求佛相好二示聖女憶母感佛初二初騰昔見佛發願二示今因位度生初又二初敘遠劫佛號文殊師利是地藏菩薩摩訶薩於過去久遠不可說不可說劫前身為大長者子時世有佛號曰師子奮迅具足萬行如來此敘最初發心之由前字可作下句之首不若為上句之末更妙大長者兩土年耆德艾之通稱如春秋末吾有鄭長者西國豪族咸稱長者法華文句具明十德一姓貴皇帝之裔貂插之家二位高輔弼丞相鹽梅阿衡三大富銅陵金谷豐饒侈靡四威猛嚴霜隆重不肅而威五智深胸如武庫權奇超拔六年耆蒼蒼稜稜物儀所伏七行淨白珪無玷所行如言八禮備節度痒序世所式瞻九上歎一人所敬十下歸四海所歸具斯十德方稱長者子者尊稱也如此方孔老稱子等非長者所生之子也師子奮迅借喻佛名非實師子如師子四足獸中獨步無畏能伏一切佛亦如是於九十六種道中一切降伏無畏故名人師子奮振也迅疾也借譬顯法如世師子奮迅為二事一為奮却塵土二能前走却走捷疾異於諸獸此三昧亦爾一則奮除障定微細無知之惑二能出入捷疾無間也具足萬行者大品云一心具萬行是也一即一切名具一切即一名足既除障定之惑出入三昧捷疾則一中具無量無量中具一故知師子奮迅三昧得能具足萬行若初心行人攬果成因如涅槃云金剛寶藏具足無減但有淺深明昧之殊二正問因發願二初問得相之因二發度生之願初又二初長者問佛時長者子見佛相好千福莊嚴因問彼佛作何行願而得此相見佛等者乃逅途中見應佛相好與止觀觀佛相好發心同所謂若見如來父母生身身相昞著相好纏絡上求下化發菩提心是也攬而可別名相觀之可愛名好相為大相海好為小相海相若無好則不圓滿好若無相則不炳著相好互嚴法身圓顯千福者以善有漏身口意業修行六度成百福德用百福德成一相以為三十二相之業因輔行云菩薩修十善各有五心謂下中上上上上中上初發五心乃至具足五心如是百心名為百福然福義多途難可定判有云大千盲人治瘥為一福等凡用三千二百福修成三十二大人相故言千福莊嚴大論云以三十二相八十隨形好莊嚴內有無量佛法功德故視之無厭見佛身者忘世五欲萬事不憶若見佛身一處愛樂無厭不能移觀佛身功德如是故長者見之極生歡喜渴仰情深因問彼佛夫此相好乃佛身報果果必由因不審作何行願能得此殊妙之相也二佛示長者時師子奮迅具足萬行如來告長者子欲證此身當須久遠度脫一切受苦眾生此示求相之法此三十二相即大悲之果報故須度脫眾生為相好本此是諸大乘經廣明菩薩歷劫修行之相既時長行遠次第隔歷即大乘別教修證之法涅槃云四諦因緣有無量相非聲聞緣覺所知故云久遠問地藏發心既別今何判教同圓答發心本圓借別為詮維摩云雖知諸佛國及與眾生空而常修淨土教化於群生諸有眾生類形聲及威儀無畏力菩薩一時能盡現等行別心圓明文在茲然分圓即別融別即圓義非一槩也二發度生之願文殊師利時長者子因發願言我今盡未來際不可計劫為是罪苦六道眾生廣設方便盡令解脫而我自身方成佛道此騰昔長者發願之辭我今二句標度生時為是罪苦句明所度機廣設四句示所發願罪苦六道者法華經云見六道眾生貧窮無福慧入生死險道相續苦不斷以雖分善惡均不免生老病死之苦廣設方便出假要事止觀云入假因緣略言有五一慈悲心重二憶本誓願三智慧猛利四善巧方便五大精進力若對今文一一具足機既不一法亦多門故須廣設方便令四門皆入解脫言盡令者如小般若云若胎卵濕化等我皆令入無餘涅槃是也普曜曰無五趣五陰六衰則是泥洹正今經之意而我方成佛道者楞嚴云自未得度先度眾生者菩薩發心也止觀五略應釋於此若如此要心雖在生死煩惱不能損我智慧遮障留難彌助化道矣二示今因位度生以是於彼佛前立斯大願於今百千萬億那由他不可說劫尚為菩薩華嚴經賢首菩薩云若有菩薩初發心誓求當證佛菩提彼之功德無邊際不可稱量無與等何況無量無邊劫具修地度諸功德十力一切諸如來悉共稱𫾻不能盡以此菩薩聞圓法起圓信立圓行住圓位以圓功德而自莊嚴以圓力用建立眾生初心尚爾況中後心故四教義云所以一家講經說法必須委釋初心若賢聖深位但點章而已學佛道者不可不知也二示聖女憶母感佛分二初騰昔行願二佛告文殊下結會古今初二初舉所行因事二顯所發弘願初又二初舉佛號劫壽又於過去不可思議阿僧祇劫時世有佛號曰覺華定自在王如來彼佛壽命四百千萬億阿僧祇劫阿僧祇或阿僧企耶此云無央數央盡也地持云一者日月晝夜歲數無量二者大劫無量名阿僧祇劫義如前然如此不思議阿僧祇劫我佛觀之猶如今日宿命智力叵思議矣如昔分和檀王與佛捔智佛告王曰海水研墨斫樹為筆寫我所知為經若海水乾盡樹枝了索吾經不盡所以爾者佛有三達之智來今往古靡不通焉是以過去塵點劫事如觀手中菴摩勒果覺華定自在王以定立名維摩云覺意淨妙華覺即本覺之性肉團心形似蓮華而有八葉即表八識心王每葉各一如來如來藏經云佛觀一切煩惱心中有如來結加趺坐儼然不動德相具足此乃天然性德含生本具迷之即凡悟之即聖彼佛因中常於三昧觀此覺華佛佛在定覺性圓顯心華頓開或於一根入正受諸根起出說或於諸根入正受一根起出說或一根雙出入或不出入或一根一塵即出入即雙出入即不出入乃至餘方亦復如是若依若正得大自在即三昧之王故號覺華定自在王如來即第一義諦名如正覺名來之報身佛也彼佛壽命等凡佛必論三身各詮量壽命法身非壽非不壽非量非不量今既論劫數則非法身矣應身數數現生現滅今既言四百萬億阿僧祇劫則非應身矣此約報身境智相應名壽智慧為命以如如智契如如境境發智為報皆冥境為受境既無量無邊常住不滅智亦如是函大葢亦大所云我智力如是久修業所得慧光照無量壽命無數劫此是詮量報身智慧之命故彼佛壽命如此久遠耳二述聖女因行二初述生前勸母正見二述死後憶母生界初又二初明聖女福厚像法之中有一婆羅門女宿福深厚眾所欽敬行住坐臥諸天衛護此騰彼佛滅後像教堅固之時像者形像肖似也韓子云象者南方大獸中國不識但見圖寫者故借義訓為形似也別作像非然相沿既久難可改張婆羅門普門疏翻淨行劫初種族山埜自閑故人以淨行稱之梵名摩那此云女處子也此句標類下句歎悳宿福深厚明往因勝大論云果報名為福略說三種一布施福與慳心相違故二持戒福與惡業相違故三修定福與欲界瞋亂相違故此聖女宿修三福深厚故致親戚宗黨家人隣里咸所欽服恭敬法華云端正有相之女宿植悳本眾人愛敬是也抑豈人所欽敬凡於四威儀中一切諸天神鬼無不翊衛擁護葢福以悲敬為初悲則哀苦趣之艱辛思拔濟而出離敬則識佛法之難遇弘信仰而澄神是則雖處少秆女品已具大士願心故感諸天衛護耳二明邪母罪重二初聖女方便勸母其母信邪常輕三寶是時聖女廣設方便勸誘其母令生正見信者心之實五常百行信則實有是理不信亡之彼既信邪正信亡矣邪者邪見心遊理外也既內執邪見故外輕三寶成一闡提造五無間純陀問佛一闡提者其義云何佛言若有四眾發麤惡言誹謗正法言無佛法眾不信因果不信業報不親善友不隨諸佛教誡名一闡提葢一闡名信提名不具信不具故名一闡提信既不具自然常輕三寶罪業深厚矣聖女知母邪行必沉苦海於是繾綣左右殷勤旦暮廣說巧法勸化誘掖必令常存正見信重三寶以免後苦葢正見八正道之首也二邪母罪重墮苦而此女母未全生信不久命終魂神墮在無間地獄梵語阿摩此云女母暫從勸誘而略信仍蹈舊習而還邪惡業既深信心自闕不久之間大命終矣夫為善生天為惡入淵惡業成熟八識魂神隨業而墮無間佛說阿鵬阿含云白衣不信佛語者便當墮泥犁中泥犁終不呼人人自循業發現耳二述死後憶母生界二初賣宅興供感空聲慰諭二受教念佛夢鬼王指示初又二初為母賣宅興供時婆羅門女知母在世不信因果計當隨業必生惡趣遂賣家宅廣求香華及諸供具於先佛塔寺大興供養知字乃救母根源夫善惡相翻罪福敵對惡名俯墜善謂清昇故罪惡之法不可弗除福善之功無宜不造弘善示天堂之快樂懲非顯地獄之苦酸無奈邪見者起斷滅之見撥因果之談此癡病為其原以愚癡之人不識因果妄起邪見破善惡法名斷善根決定當墮阿鼻地獄今聖女知母在世之時癡病既重常輕三寶計其死後必隨業而生惡趣矣梵語阿波那伽低此云惡趣此明罪母業重下明救母之法夫人之有家宅者所以為安身也今為救母何暇惜身故變賣營資廣求供物香華申供之首事表誠之初門香能辟穢華具圓因天人費氏云人中臭氣上熏於空諸天清淨無不厭之但以受佛付囑諸天不敢不來故佛法中香為佛使香華既備餚饍之陳懸旛葢以飄揚列珠瓔而縇爛於覺華定王先佛塔寺興法界廣大供養塔婆是梵名乃瘞佛骨之所寺訓為嗣治事者相嗣續於其內也亦是攝十方一切眾僧修道境界法耳二見像默念空示二初見佛興疑二空聲示處初又二初見佛禮敬見覺華定自在王如來其形像在一寺中塑畫威容端嚴畢備時婆羅門女瞻禮尊容倍生敬仰此言詣寺興供舉頭見像金容晃昱嚴顯可觀瞻禮之際敬仰倍恒須知瞻禮佛像功德難思如觀佛三昧經云過去有佛號寶威悳上王如來時有比丘與九弟子往詣佛塔見一寶像禮已讚歎後時命終悉生東方寶威悳上王佛國大蓮華中忽然化生淨修梵行得念佛三昧海佛為授記各得成佛今東方善悳佛是其師九方無憂悳佛等是九弟子又空王如來涅槃後有四比丘同學佛法煩惱覆心不能堅持多不善業當墮惡道空中有聲語比丘言汝等今可入塔觀像與佛在世等無有異聞空聲已入塔觀像眉間毫相即作念言如來在世光明色身與此何異佛大人相願除我罪由入塔觀像毫相懺悔因緣後八十億阿僧祇劫不墮惡道常見諸佛授記成佛今東方阿閦南方寶生西方無量壽北方微妙聲即四比丘是以是因緣行者應當數數觀佛故知聖女興供觀像罪母生天無疑矣二私念疑情私自念言佛名大覺具一切智若在世時我母死後儻來問佛必知處所私者內自懷念人所不知也心念佛者如大夢覺於一切法知見無礙為最第一名一切智假若佛猶住世我母已死儻來問母生處昇沉高下男女尊卑必蒙垂慈指示有以慰我也二空聲示處二初泣戀聞聲二聞聲自撲初分三初空聲慰諭時婆羅門女垂泣良久瞻戀如來忽聞空中聲曰泣者聖女勿至悲哀我今示汝母之去處初敘聖女苦心無聲出涕曰泣哭之細也瞻仰視也戀眷慕也泣久瞻戀不去者冀佛必示我母生處而度脫也決定毗尼經佛告舍利弗若除如來智慧更無餘乘而得度脫到於涅槃能示眾生解脫之道能令眾生遠離邪道示現聖道以是義故故名如來今故瞻戀冀以應我次述空聲慰諭恰當垂泣瞻戀之際倐忽之間空中有聲而慰之曰聖女勿至悲泣而哀戀也汝既行大孝傾家興供泣戀瞻依冥冀感通示母生處我名大覺具一切智者當示爾母去處何用悲哀不置乎二問空何神婆羅門女合掌向空而白空曰是何神悳寬我憂慮我自失母已來晝夜憶戀無處可問知母生界合掌向空者感之極喜之至也如失物者指之復得失路者引之再歸耳神義如題悳者固有之善直心為德性命本來之正故順天而為神皆聰明正直者寬廣也舒也昔由憶母生界憂慮如物礙膺今聞空聲示處如物出胸寬廣舒泰也三空聲告示時空中有聲再報女曰我是汝所瞻禮者過去覺華定自在王如來見汝憶母倍於常情眾生之分故來告示有聲而不現相者顯生而不生也無相而有聲者示滅而不滅也憶母倍常讚其至孝故感佛告示然母死而子憶亦分所當然者方子在胎母有十月懷躭之苦及兒既生母有三年乳哺之勞毛詩曰哀哀父母生我劬勞無父何怙無母何恃出則䘖恤入則靡至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之惠昊天罔極故曾子曰身也者父母之遺體也既與父母一體母既死而不還子寧不思母之憶我而返憶乎但聖女之捐家興供禮佛求知藉施福以薦親仗佛慈而示處固非常情所能企及故佛現空聲而告其生界嗚呼純孝動天致誠感佛觀今聖女其洵然矣二聞聲自撲二初求說母生界婆羅門女聞此聲已舉身自撲支節皆損左右扶侍良久方穌而白空曰願佛慈愍速說我母生界我今身心將死不久情發於中聲感於外舉身撲拜如太山崩急欲知母生界何暇顧惜形骸遂致支體骨節悉損壞而悶絕矣左右扶侍左者天道之所起地道之所止也近取諸身象輔手之形左不得勢因取僻遠之義右手得勢而順用力為多復加以口交相助益之意葢侍婢原不離左右者故隨即扶起而侍奉也穌者死而更生也黃庭經云臨絕呼之亦復穌俗作甦非此經家敘事下求說生界然敦逼速說者自知形殘心苦將死不久也二示返舍念佛時覺華定自在王如來告聖女曰汝供養畢但早返舍端坐思惟吾之名號即當知母所生去處早返舍者返還也約事令其速還家舍約法舍表五陰令即還觀五陰則心王智度之母直下自現故即云端坐思惟端坐者即金剛正坐或全加或半加也禪那云思惟修意令修念佛三昧故坐思我名即知母生處矣二受教念佛夢鬼王指示二初歸舍憶母念佛時婆羅門女尋禮佛已即歸其舍以憶母故端坐念覺華定自在王如來經一日一夜尋禮即歸表翻迷為悟之疾也念是觀慧覺華是心佛所以觀此者母即心母佛即心佛心也母也佛也一而三三而一者孰為吾心孰為佛母哉普賢觀云若欲懺悔者端坐念實相眾罪如霜露慧日能消除故日表聖女之悟朗照如夜表罪母之迷暝闇如夜一總表心迷悟之本罪母信邪無明覆心合塵背覺也聖女興供正智入心合覺背塵也心本是一迷悟分岐也二到獄知母生處問佛不即示生處必令聖女親到地獄者何也答良由世人為無明所覆不識善惡因果故借聖女目擊苦事以警世之愚頑也如阿含正行經佛坐思念人癡故有生死何謂癡本從癡中來今生為人復癡心不解不開不知死所趣向見佛不問見經不讀見沙門不承事見父母不敬不念世間苦不知泥犁中拷治劇是名癡故有生死不止於是特假聖女親到獄中方知惡不可作善不可不作也文分為三初身到獄海二鬼王迎讚三問答獄處初文二初見獄海惡相二念佛力無懼初又二初惡獸飛馳食噉忽見自身到一海邊其水涌沸多諸惡獸盡復銕身飛走海上東西馳逐見諸男子女人百千萬數出沒海中被諸惡獸爭取食噉此明定中見冥界之相自到海邊神從定出海水涌沸惡獸飛馳皆識心似境循業而發此由眾生事識造罪致斯苦報楞伽云譬如巨海浪斯由猛風起洪波鼓溟壑無有斷絕時得非藏海鼓風起浪今感業海涌如沸湯惡獸夜义亦由業感以生前縱貪瞋癡具造殺盜婬妄故至地獄境界自現若達境心空海亦自寂心境俱寂事無不照猶如大海無風森羅煥然明白寶積經云一切法虗妄如夢以唯念故故知若達唯心諸境如幻化矣二夜叉形異畏視又見夜义其形各異或多手多眼多足多頭口牙外出利刃如劒駈諸罪人使近惡獸復自搏攫頭足相就其形萬類不敢久視夜义名疾捷即地獄鬼其頭如牛馬獅象虎豹豺狼形形各異或有二手而至千手者或有一眼而至千眼者頭足例之口牙扠出向外唇皮倒縮露根銛利如刃鋒𨦵似劒法苑云牛頭惡眼獄卒凶牙是也駈罪近獸令其食噉也搏伯各切从甫與从專不同手擊也攫丘縛切匡入聲又厥縛切義同爪持也撲取也莊子云左手攫之此言夜义等不惟驅罪人近惡獸令噉復以手擊爪持令罪人頭足相就為團縮之形然於罪人戱弄其身或時令大或時令小或按蹙而短或扯拽令長擲拋竪倒頃刻萬類可久視乎此乃從心變起無有真實如正法念經云閻羅罪人非是眾生罪人見之謂是眾生手中執持𦦨然銕鉗彼地獄人惡業既盡不復見於閻羅獄卒如油炷盡則無有燈業盡亦爾不復見於閻羅獄卒今眾生惡業未盡自然無中妄見也二念佛力無懼時婆羅門女以念佛力故自然無懼以因也因念佛之力雖見眾形自然無懼葢知諸境由心心由境現心既本空境亦何有心境既亡懼自何生心地觀佛告文殊云譬如叢林蒙密茂盛師子白象虎狼惡獸潛住其中毒發害人逈絕行跡時有智者以火燒林諸大惡獸無復遺餘心空見滅亦復如是又摩訶衍寶嚴經云譬如畵師作鬼神像即自恐懼如是迦葉諸凡愚人自造色聲香味細滑之法輪轉生死不知此法亦復如是今聖女了一切法從意生形因心現相知心如幻無有定儀所見差殊隨心生滅既知如幻亦奚畏懼乎二鬼王迎讚有一鬼王名曰無毒稽首來迎白聖女曰善哉菩薩何緣來此毒害也世有害人艸名荼莽冶葛之屬法之害人者名三毒此鬼存心愍物權現鬼身心無毒害彰此嘉名然前有攝毒後有惡毒毒名雖同用意各別原其利人無有異也禮云姁之嫗之春夏所以生長也霜之雪之秋冬所以成熟也莫非天之教也稽首以首至地稽留少頃鬼王拜迎者觀其形相非凡威儀出類諒非負罪而來必是乘通而至故言善哉菩薩何緣來此梵名娑度此翻善哉乃歡喜王菩薩法門若行人日日於佛前稱念千遍得心清淨得一切如來稱讚所有諸法皆得成就詳於施食詮次香乳記三問答獄處二初通問地獄有無二正問我母生界初中二初略問答時婆羅門女問鬼王曰此是何處無毒答曰此是大銕圍山西面第一重海先聖女問是何處者驚疑之詞以異乎平時之所見也次鬼王答梵語柘迦羅翻輪山舊云銕圍圍即輪義準長阿含起世經等四洲地心即是須彌山山外別有八山乃至其外醎海廣於無際海外有山即是大銕圍山依立世阿毗曇論云大醎海外有山名曰銕圍入水三百十二由旬出水亦然廣亦如是從閻浮提南際取銕圍山三億六萬六百六十三由旬從銕圍山水際極西銕圍山水際逕度十二億二千八百二十五由旬銕圍山水際周廻三十六億八千四百七十五由旬第一重海在其中也或云別有三重業海余所未詳俟載考二廣問答二初問答地獄有無二問答地獄何在初又三初問答獄事實不聖女問曰我聞銕圍之內地獄在中是事實不無毒答曰實有地獄初聖女問我聞經中說銕圍山內有地獄實耶不耶次鬼王答此真實非虗良由地獄本虗人自實之耳如銕城泥犁經佛誡諸沙門言我以天眼視天下人生死好醜得好道者得惡道者人於世間身作惡口言惡心念惡常好烹殺祠祀鬼神者身死當入泥犁中豈非自實地獄乎二問答我何到獄聖女問曰我今云何得到獄所無毒答曰若非威神即須業力非此二事終不能到初聖女驚疑自念地獄者拘罪人之狴牢也吾自揣於心敬信三寶一身無罪何緣我今亦到此獄處耶次鬼王答凡到此者有二種人一有威德神通者或為救度或為遊觀二或有惡業成熟應受地獄是故到此除是兩端終無有能到此者三問答獄海苦境二初約境疑問聖女又問此水何緣而乃涌沸多諸罪人及以惡獸此述初到海邊所見境界海水是總問何緣是疑詞一疑何緣此水涌沸二疑何緣水中多諸罪人三疑何緣海邊水內多諸惡獸準首楞嚴皆是彼諸眾生自業所感造十習因受六交報水之涌沸由於慢習發於相恃馳流不息故有騰逸奔波積波為水亦由誑習交欺致有沒溺騰擲飛墜漂淪諸事惡獸由觸報招引惡果故致神識見大銕城火蛇火狗虎狼師子等是也二據事直答三初正答無毒答曰此是閻浮提造惡眾生新死之者經四十九日後無人繼嗣為作功德救拔苦難生時又無善因當據本業所感地獄自然先渡此海閻浮提者長阿含經云須彌山南有天下名閻浮提其土南狹北廣縱廣七千由旬有大樹王名閻浮提圍七由旬高百由旬枝葉四布五十由旬起世經小異造惡眾生即具造十惡者梵語鳩那羅此云惡人亦不好人能滅諸根名死故涅槃云死者捨所受身有二種一者命盡死有三一命盡非是福盡二福盡非是命盡三福命俱盡二者外緣死亦有三一非分自害死二橫為他死三俱死復有三種死一放逸死二破戒死三壞命根死四十九日等準瑜伽論人死中有身中有即中陰身若極善者即生淨土及與天上極惡即入地獄皆不經中陰若善惡不定即受中陰經冥司也若未得生緣極七日住死而復生如是展轉生死至七七日決定得生若有生緣即不定釋氏要覽云今人亡每七日必營齋追福謂之齋七令中有種子不轉生惡趣也今既經七七之後畢竟無人繼續承嗣為作功德令其滅惡生善其誰救拔苦難此言死者無人為追冥福必致墮苦次言死者生時自不修毫善必致墮苦以致冥王考校善惡據定本時所作之業應墮地獄者必至地獄矣那先比丘所問經云人所作善惡隨人如形影隨身人死但亡其身不亡其行譬如然火夜書火滅字存火至復成今世作行後世成之是也自然者略無假借勉強之意閻王責罪人云罪自由汝今當受之正法念云汝邪見愚癡癡罥所縛人今墮此地獄在於大苦海故曰自然先渡此海二指類海東十萬由旬又有一海其苦倍此彼海之東又有一海其苦復倍前言銕圍西面第一重海已含此二重也其苦倍倍增者泥犁經云醎水泥犁縱橫數千里水醎水如鹽熱沸踊躍水中有鳥喙如銕生啄人肌齩人骨人不能忍是痛便度水去守泥犁鬼言死惡人汝何等求索人言我苦饑渴鬼即以鉤鉤其上下齗音銀齒根肉口皆挓開復以消銅灌入口中唇舌咽腹皆燋盡銅便下去其人不能復忍還入沸醎水中其人平生於世間作惡甚故求解不得解隨波上下迴澓沉沒其苦倍增可勝言哉三結名三業惡因之所招感共號業海其處是也三業惡因即身口意三之十惡業也由此因故招報獄海然招者自招感者自感興起行經云先世自造此緣要當受之無可逃避處此對亦非父作母作王作天作亦非沙門婆羅門所作本我自造今自受之故佛教眾生有二要一者作是得是二者不作是不得是三界五道罪垢苦惱不離於作一切無橫所作罪福如影隨形如響應聲不失如毛髮者也故此三處皆號業海聖女昔所耳聞今身到其處也二問答地獄何在聖女又問鬼王無毒曰地獄何在無毒答曰三海之內是大地獄其數百千各各差別所謂大者具有十八次有五百苦毒無量次有千百亦無量苦初聖女問既言銕圍山內實有地獄今何唯見業海不審地獄又在何處次鬼王答曰三海之內即是大地獄豈捨此而別有耶既由眾生從藏海鼓風起三毒波浪故感地獄即在三海之內然考諸經論地獄以三類攝盡一熱二寒三邊八熱獄在閻浮洲下重累而住受熱苦惱八寒獄在銕圍山底仰向居止受寒凍苦邊獄有三山間水間曠野受別業報此應寒熱雜受今既言大獄十八又言五百千百何耶葢是約定處如上所明約不定處不妨邊正同舉寒熱雜受不然地獄正邊何以別乎三海等是總標八寒八熱各有十六遊增略則各百三十六廣則數有百千各各差別者作業各有輕重重者遍歷中者不遍下者復減經劫亦有長短故也所謂下別釋大者十八有二釋一準問地獄經云十八王者即主領十八地獄是一迦延典泥犁乃至十八觀身典洋銅則獄名典主局定十八之數若觀佛三昧海經云阿鼻地獄有十八小地獄小地獄中各有十八寒冰地獄黑暗小熱乃至飲銅各有十八如是阿鼻大地獄中有此十八地獄一一獄中別有十八隔統紀是鬲郎的切鼎屬始從寒冰乃至飲銅總一百四十二隔地獄今謂彼經以阿鼻為最大故以各有十八為小今云大者具有十八或不對阿毗故各名大例如世間諸王不對天子各稱大王若對至尊則稱小王矣經出不同不須強釋次有五百亦是定數而觀佛三昧經乃云五百億劒林地獄刺林銅柱銕機銕網各五百億則兩經之數逈別亦不須強會也苦毒無量者準泥犁經佛言欲知勤苦最不可忍者獨有泥犁泥犁者極苦不可具言如世逆賊為長吏所捕將至王前被三百矛寧毒痛不比丘答曰人被一瘡舉身皆痛何況被三百瘡佛言泥犁中痛與矛瘡痛億億萬倍尚不如泥犁痛地獄之中獄鬼加痛毒無不至也千百獄亦無量苦者較五百獄其苦稍減比世間苦萬分不及苦有無量矣通問地獄有無竟二正問我母生界二初聖女問母生趣聖女又問大鬼王曰我母死來未久不知魂神當至何趣四分律云一切諸世界無有不老死眾生是常法生生皆歸死我母死雖未久竟不知魂神今至何趣祭義曰氣也者神之盛魂也者鬼之盛道經云魂者氣之神魄者精之神陽神日魂陰神月魄吾教指第八識法句經云是身為死物精神無形法自作受苦樂身死神不喪識神造三界善不善三處陰行而默至所往如響應故知必隨業而趣矣二鬼王徵其來歷二初問答行業二初問二答鬼王問聖女曰菩薩之母在生習何行業聖女答曰我母邪見譏毀三寶設或暫信旋又不敬死雖日淺未知生處行名進趣業謂造作即三業搆造善惡事也法句云隨其所造業罪福有果報惡業墮地獄善業生天上高行生善道得無漏涅槃不審菩薩之母於此三業作何業耶聖女答言我母著於邪見譏毀三寶成論云寧止不行勿行邪道身壞命終墮於惡趣且又存心不恒立性無定偶爾聽勸而暫信忽焉循邪而譏毀今死雖日淺計必隨業墮苦故吾急欲求知生處而未能也二問答姓氏二初問無毒問曰菩薩之母姓氏何等姓者所以繫統百世使不別也氏者所以別子孫之所由生也印土族姓四流一剎帝利王種也二婆羅門淨行也三吠奢舊云毗舍商賈也四戌陀羅舊云首陀眾人也前二是貴後二是賤今不審菩薩之母何姓何氏為賤為貴姓氏明而稽查易故必問乎姓氏也二答二初聖女直答姓氏聖女答曰我父我母俱婆羅門種父號尸羅善現母號悅帝利父甫也始生己也母冐也含生己也既俱婆羅門種自然執邪謗正西天外道專執婆羅門種第一最尊如梵志頞波羅延問種尊經云本初起地上人時皆是我曹婆羅門種我曹種最尊初從口中出世人從下出我種是第七梵天子孫佛反言天下一種持我曹種與剎利田家工師種等我曹死皆生梵天佛反持我曹與凡人等佛言我經中以施行為本施行善者最為大種其天下尊貴者皆施行善得不以種得也尸羅是梵語翻性善好行善道不自放逸故善現是華言梵名須菩提悅帝利未詳其名號均好存心各邪智論云邪見罪重故雖持戒身口業好皆隨邪見惡心如種苦種皆作苦味邪見之人雖持戒精進皆成惡法不如不執而行惠施何況內執邪見外行譏毀乎然鬼王問母姓氏聖女先舉父者以婦必隨夫彰名也二鬼王委說生天二初正說其由三初願聖者返本無毒合掌啟菩薩曰願聖者却返本處無至憂憶悲戀合掌乃慶慰之儀返本處者此非菩薩所應住也始則為母而來今既知之應即退還本所住處不須憂憶而悲戀也二明罪女生天悅帝利罪女生天以來經今三日云承孝順之子為母設供修福布施覺華定自在王如來塔寺鬼王答曰我初不知何人若悅帝利罪女已脫苦生天三日矣下示生天之由云承孝順之子為設供修福於如來塔寺之故也善事父母曰孝百行之先良心最真切者吾身非從天降地生故於親親自不容己祖師云父母非我親誰是最親者順者不逆也曾子云孝子之養親也樂豫其心不違其志樂其耳目安其寢食故梵網云孝順至道之法孝經援神契曰元氣混沌孝在其中故愛敬之情藹然可匊然皆訓乎男子非教女子也今聖女始勸母以正信中興供而感佛終承福已生天可謂能諭母於道而救母於苦世出世間事備一身孝順之名允乎遍法界而不磨流沙劫而不泯也三示同罪受樂非唯菩薩之母得脫地獄應是無間罪人此日悉得受樂俱同生訖無間大獄銕城幽閉窅窅冥冥難期恩赦今因施福力資己母生天此際善緣澤及同人得樂孝思至矣福力廣矣洵報母之標榜誠資冥之樣子也二言畢而退鬼王言畢合掌而退言畢合掌敬慕之至孝之感人深矣行因事竟二顯所發弘願婆羅門女尋如夢歸悟此事已便於覺華定自在王如來塔像之前立弘誓願願我盡未來劫應有罪苦眾生應設方便使令解脫尋仍也俄也即史尋復其舊之尋俄爾仍如夢歸也夢是眠中現境無明葢也然眠夢之涂因心而動動由內識境由外熏今因想母生界故致感佛現神然既悟夢感而道心頓發故即從本尊像前便立四弘誓願從今日始盡未來際應有造罪受苦之人無論怨親廣設方便之法盡令解脫沉淪此是最初之弘願為下正宗之弄引二結會古今佛告文殊師利時鬼王無毒者當今財首菩薩是婆羅門女者即地藏菩薩是財乃人所共寶以無財則貧古云甚矣貧之為病也但世寶凡俗所貴招憂致患唯有法寶終始獲安淨名云富有七財寶教授以滋息七財者一信二戒三多聞四捨五慧此五為寶六慚七愧此二為守財人然此七財以信為首信故持戒善由多聞聞故能捨捨則生慧故信為財首昔以無毒為名固行十善之道今彰財首之號允登十信之階若準瓔珞六輪對位銕輪對十信銅輪對十住銀輪對十行金輪對十向瑠璃輪對十地摩尼輪對等妙合尊摩尼為首是則財首等覺之流歟何以得知準觀佛三昧經昔過去有佛號釋迦牟尼滅度後有王子名金幢憍慢邪見不信佛法有比丘名定自在語王子言世有佛像極為可愛可暫入塔觀佛形像王子即共入塔見像相好白言佛像端嚴如此況佛真身比丘言汝見像不禮當合掌稱南無佛王子即合掌稱佛還宮念像後夜夢見歡喜捨邪歸依三寶由入塔稱佛善根命終值九百萬億那由它佛得甚深念佛三昧諸佛現前為其授記從是已來經百萬阿僧祇劫不墮惡道乃至今日獲得甚深首楞嚴定昔王子者今財首菩薩是佛既言獲得甚深首楞嚴定非等覺而何耶昔婆羅門女由廣行孝道成地藏之身是故孝行置之而塞乎天地敷之而橫於四海施之後世而無朝夕放之東海而準西南北方亦復如是以故上自帝王下至民庶貴賤雖殊行孝一等如地為萬物之所依止如藏為萬人之所受用故知地藏之名全是孝順之目此由文殊問地藏因地略舉梗槩如此類例胡能盡說也哉第二大章正說分為四段初分身集會一品明能化主二業緣業感問獄三品明所化機三如來讚歎利益存亡閻羅讚歎三品明度脫緣四稱佛較施兩品明成佛因今初先品題分身集會品第二二品文二初地藏來儀二釋迦詔告初分二初敘分身地藏爾時百千萬億不可思不可議不可量不可說無量阿僧祇世界所有地獄處分身地藏菩薩俱來集在忉利天宮爾時者正如來含笑放光光雲出音天龍鬼神同集之時葢十方沙界分身地藏既覩光聞音即與眾偕來但言不頓彰故前後別說非問答已竟方來也百千萬億數目也震旦算經始自黃帝數法有十等億兆京秭垓壤溝㵎正載風俗通云千生萬萬生億億生兆兆生京京生秭秭生垓垓生壤壤生溝溝生㵎㵎生正正生載載地不能載也今四數竝明者以億分四等一十萬為億二百萬為億三千萬為億四萬萬為億今是第四億數乃百千萬之億如是之數尚難窮究況又言百千萬億不可思議量說之無量阿僧祇世界中凡所有地獄之處一獄一分身皆來集會猗歟盛哉此正顯世界難量愈見地獄之夥地獄既多彌彰分身莫測為下問答之張本此是大菩薩不思議事尚非聲聞緣覺所知況下地凡夫能測識者哉若廣輿所載唐至德間有新羅國僧曰金地藏者渡海而來止於直隸池州府青陽縣九華山嘗取巖間白土雜飯食之人以為異年九十九忽召徒眾告別坐化函中後三載開視顏色如生𢍉之骨節俱動亦分身之一也俱集天宮者如心地觀經云以身常處於地獄非不親近大慈尊以身常處於輪迴非不親聞微妙法以是因緣諸佛子繫心常念天人師由是如胡麻來集𡍫塞忉利天宮實為敻古未聞奇特事也二敘業道眾機三初率眾同來供佛以如來神力故各以方面與諸得解脫從業道出者亦各有千萬億那由他數共持香華來供養佛上以訓因下以訓與因世尊雲音普遍神通之力故各與四方地面所化之眾而來集也解脫有小大之別據下不退阿耨菩提竝是不思議大解脫耳持香華供養者梵語健達此云香準戒悳香經有根香枝香華香不同梵語布瑟波此云華準大品經有天華生華心華不同今持供者期具足菩薩之道願成就如來之香清遠潛通果因一契也準十輪經供養有三一利益以四事等二敬心將華表情三修行若有持說即為供養皆所以表誠敬也二因化不退菩提彼諸同來等輩皆因地藏菩薩教化永不退轉於阿耨多羅三藐三菩提此出供養意所以持香華供養者皆因地藏菩薩教化我等永不退轉於阿耨菩提故也不退轉如後阿耨等阿翻無耨多羅翻上三藐翻正三徧也等也菩提翻覺孤山曰極果超因云無上正則正觀中道等則雙照二邊葢果上三智也悲華經四云願我得首楞嚴三昧以三昧力故化作地獄之身入地獄中與地獄眾生說微妙法勸令發菩提心彼眾聞是法已尋發菩提之心即便命終生於人中隨所生處常得值佛聽法即得不退轉地乾闥婆乃至人非人等天龍鬼神乃至畜生餓鬼等眾亦復如是皆令發菩提心正地藏所化業道之眾不退轉菩提之流也三至天心喜觀佛是諸眾等久遠劫來流浪生死六道受苦暫無休息以地藏菩薩廣大慈悲深誓願故各獲果證既至忉利心懷踊躍瞻仰如來目不暫捨文分三節初明六道流轉以背此覺心也葢此覺心是諸佛所證妙道是眾生所迷本源則凡夫久遠劫來流浪生死者由不發此心也其流有四一見流三界見二欲流欲界諸惑除見及癡三有流上二界諸惑除見及癡四無明流三界癡梵語闍提闍此云生死勝鬘云生者新諸根生死者故諸根滅由此風浪長淪生死故涅槃云我昔與汝等不見四真諦是故久流轉生死大苦海準大論眾生有三苦一身苦老病死二心苦貪瞋癡三後苦獄鬼畜於是三種苦中求暫休息胡可得耶次因地藏獲證此言六道眾生在昔則萬彚沉迷居三道而流轉在今則十力超悟證三身以圓通是誰之功歟此皆地藏無緣慈悲無作誓願之力耳三出感佛恩深既承如來神力得隨地藏偕來內心深懷踊躍外儀瞻仰殷勤瞻者相好微妙看視無厭仰者智慧深遠景慕有期大論云佛坐師子座現最勝身光明色像威悳巍巍以此神力感動眾生其有信者皆至阿耨菩提是以瞻之仰之不能暫捨也二釋迦詔告二初如來摩頂付囑二地藏合身領教初二初經家敘通爾時世尊舒金色臂摩百千萬億不可思不可議不可量不可說無量阿僧祇世界諸分身地藏菩薩摩訶薩頂如來以一母陀羅臂一兜羅綿手遍摩所集無量阿僧祇分身地藏菩薩之頂乃聖如意通中轉變神力故一臂能遍摩無量之頂以慰勞安撫也大論云手中悳字縵網莊嚴當以此手安慰眾生令無所畏是此謂也二發言付囑二初明已所化眾二付囑未調眾初又二初總示化門調機而作是言吾以五濁惡世教化如是剛強眾生令心調伏捨邪歸正十有一二尚惡習在此言佛調濁世眾機如賢愚經散闍調象師言佛世尊者二種性生一者智慧二者大悲勤行六事所謂六波羅蜜功悳智慧悉具足已號之為佛既自能調亦調眾生故云我是無上調御師轉正法論周世界化度無量諸眾生當知由悟心地觀故能調伏剛強眾生即示以四諦教以三學以戒調伏其身以定慧調伏其心既修三學自斷二惑輔行云昔無信鉤致造重罪如狂象無鉤不可控制今以慚愧鉤鉤無慚心象故云令心調伏捨邪歸正者一切法高王經云大比丘眾一千二百五十人其先悉是辮髮梵志諸漏已盡無復煩惱一切心得自在到第一彼岸文皆捨邪歸正已授記作佛此明已調伏者十中有七八矣其有惡習深重難於調伏者十中猶有一二焉如法華初開五千起去之流及調達弟子螺髻梵王等習者習氣正使雖斷餘習尚在身雖調伏心猶未調伏也二別明分身度脫二初略明吾亦分身千百億廣設方便或有利根聞即信受或有善果勤勸成就或有暗鈍久化方歸或有業重不生敬仰此與地藏分身方便度生形擊故言吾亦等梵動經云如來自知生死已盡所以有身為欲福度諸天人故若其無身則諸天世人無所恃怙猶如多羅樹斷其頭者則不復生佛亦如是已斷生死永不復生文今所以分身者正顯如來從法垂應被大小機現勝劣身從一派出有無量身攝用歸體不離一性大論三十云若依禪定得四無量背捨勝處神通辯才等諸甚深功悳悉皆具得隨意所為無不能作化為種種禽獸之身而不受其法或時身滿虗空或時身若微塵或輕如鴻毛或重若泰山如是等神通變化力皆從禪得此是身輪現通廣設方便即是意輪鑒機施無謀巧用觀十界性相乃以口輪說種種法令熟者脫未熟者熟未種者種故大論云釋迦牟尼佛一世界中常化作種種身種種方便以度眾生此總示分身方便下別明調機難易根是根性屬於過去今世根性利鈍總由宿障重輕若約四生論利鈍者如處胎經佛告喜見菩薩如我今日在母胎中與諸十方神通菩薩說不退轉難有之法亦以神通入天四生地獄四生餓鬼四生畜生四生於四生中胎化二生盡漏得疾濕卵二生盡漏稍遲化生胎生是利根人濕生卵生是鈍根人故大論云諸佛先觀知有人一切方便不可度或有難度或易化或復有遲或有疾或以光明或神足種種因緣度眾生是也若約四洲論利鈍者如天人費氏云北天一洲少有佛法餘三天下佛法大弘東西天下少有黠慧煩惱難化南方一洲雖多犯罪化令從善心易調伏是也準止觀利根是法行機鈍根是信行機如聞一切眾生本有佛性當下即信信即思修三慧頓成是利根人或聞善果勤勸成就則是仰信此理思惟而修之三慧漸進是鈍根人大論云若眾生欲作重罪善教不從以苦言諫之雖起瞋恚後得安隱此正教鈍根者善根的指菩提心如身子輩極鈍根者具歷五時頓發三因授記是也暗鈍久化方歸如莎伽陀此云小路邊生等業重不敬仰者如調達等大論二十六云如死人種種莊嚴轉轉爛壞終不可令活提婆達亦如是佛日日種種教化惡心轉劇惡不善法日日轉增乃至作三逆罪又云舍衛城中九億家三億家眼見佛三億家耳聞有佛三億家不見不聞佛在舍衛二十五年而此眾生不聞不見何況遠者又如貧老母無度因緣不得見佛若得多信利益無窮我佛化門調機尚爾則知地藏分身非易故特以己形擊彌顯其神力之難思也二廣示二初結前起後此由眾機利鈍不同信毀不等故我分身度脫是結上文亦由眾生各各差別故我分身現男女等是起下文如是等輩眾生各各差別分身度脫分身度脫者如處胎經佛告智積菩薩我宿命所行戒德究具得成佛身變化自在無所不入亦入於金翅鳥亦入於龍子亦入於魚鼈黿鼉所化如是故佛問彌勒心有所念幾念幾相識耶彌勒言舉手彈指之頃三十二億百千念念念成形形形皆有識識念極微細不可執持佛之威神入彼微識皆令得度此識教化非無識也故曰導師出現世非緣不降神要度未度者示現無為城如來分身可思議乎哉二普現色身或現男子身或現女人身或現天龍身或現神鬼身或現山林川原河池泉井利及於人悉皆度脫或現天帝身或現梵王身或現轉輪王身或現居士身或現國王身或現宰輔身或現官屬身或現比丘比丘尼優婆塞優婆夷身乃至聲聞羅漢辟支佛菩薩等身而以化度非但佛身獨現其前此示眾機關佛慈悲以王三昧力不動法性而往應之如處胎經佛告諸來會者吾從無數阿僧祇劫能大能小入細無礙或在天上劫數教化或在人中代彼受苦或在畜生餓鬼地獄教化無所不入此正顯如來化身妙用也初現男子身男者丈夫壯而有室也人生不可無所事事故取力田為男職分所當為子者親之枝也子有生義天開於子靜極而動也次現天龍悲華經云若有眾生事摩醯首羅天我願化身如摩醯首羅事八臂者化為八臂天身事日月梵天亦化為日月梵天而教化之令住善法智論云如菩薩本身曾為大力毒龍又龍王名馬堅是大菩薩以本願故生於龍中次現神鬼身如穢跡大權神王大力明王等如現大鬼伏曠野鬼等山林川原河池泉井此現依報度人如悲華經云佛因中為救閻浮提人民饑餓思惟捨身體血肉中路有山名水愛護自投其身即成肉山高一由旬乃至高千由旬云云天帝如昔為帝釋與羅呵阿修羅戰以慈忍力勝之昔為梵王坐度樹下成道梵名斫迦羅伐辣底曷羅闍此云轉輪王施設足說金銀銅銕輪應別如其次逆次能王領一二三四洲準處胎經無數阿僧祇劫作大梵帝釋輪王各三十六返所度眾生無墮二乘惡趣迦羅越翻居士愛談名言清淨自居凡多積財貨居業豐盈皆受此稱國王粟散王也諸侯所封之地曰國从曰而加或其中以明各有分地世守毋相侵也王者三才之主从音輥一之轉也貫三立天地人之道也如大光明王捨頭月光王捨眼迦尸王破胸出心堅意王捨手等宰主也烹也調和膳羞之名周禮冢宰能調和眾官故名宰輔者兩傍夾車木朝堂有四輔官左輔右弼前殿後丞所以主宰群辟夾輔王化如周官太師太傅太保為三公書云惟茲三公論道經佛曾作劬嬪大臣分閻浮提為七分息諍官者宦也公也屬者官僚部曲也群辟之職統於三公漢魏已來三師皆開府置寮屬也已上皆未受道者此下皆受道之機比丘名乞士清淨活命故淨名疏翻除饉出家戒行是良福田能生物善除因果之饉乏也尼者女也大論云尼得無量律儀應次比丘優婆塞優婆夷西域記云鄔波索迦唐言近事男鄔波斯迦云近事女謂親近承事諸佛法故阿羅漢翻殺賊應供不生若阿音䟦云應真瑞應云真人盡以無生釋羅漢也聲聞等如前而以化度句貫上諸文非但佛身句反顯不一謂豈止佛身獨現眾機之前隨其所感普現色身寶雨經云如來成就無量色身若諸有情應以如來色身而教化者如來即能於一剎那名極少時極少或一臘縛即迦羅一千六百剎那名一迦羅一牟呼栗多六十迦羅名莫呼律多各各於彼有情之所示現如來色身之相若應見種種別類有情身相如來即於一剎那乃至示現種種別類有情色身之相正今文之謂皆是諸佛神智所感也二付囑未調眾二初勅觀累劫度生汝觀吾累劫勤苦度脫如是等難化剛強罪苦眾生此佛自言於菩薩地三大阿僧祇劫勤苦無量大經云我於往昔種種苦行今得如是無上方便為汝等故無量劫中捨身手足頭目髓腦疏云夫身命者誰所不重吾輕生忽死經無量劫指山指地骸骨倍多指海指江髓腦非喻況復妻子國城捐棄無量如是恩悳但為汝等放逸無慚繫在囹圄上音陵領也下音語禦也言領囚禁禦也不得解脫豈非累劫勤苦端為度說如是等難化剛強罪苦眾生如央掘魔羅受邪師教佛以神力化之即捨出家梵王讚云奇哉調御天人師如來善調央掘魔譬如毒蛇見呪師吹氣放毒不怖畏是也罪苦大論明二種杖楚寒熱等名身苦餘殘名心苦諸聖人以智慧力無憂愁嫉妬瞋恚等心苦有老病饑渴寒熱等身苦舍利弗風熱苦畢陵伽婆蹉眼痛苦羅婆那䟦提痔病苦於身苦中亦復薄少如人知負他債償之不以為苦凡夫人不憶負債故身心俱受現苦後世復有三塗之苦故云罪苦眾生二令憶天宮付囑其有未調伏者隨業報應若墮惡趣受大苦時汝當憶念吾在忉利天宮殷勤付囑令娑婆世界至彌勒出世已來眾生悉使解脫永離諸苦遇佛授記初四句指上業重之輩隨業等五母子經云世間人不知有後世生但言死耳作善自得福作惡自得殃入惡道中悔無所及魂神空去隨其施行業報受苦如影隨形是也汝當下正申付囑謂我滅後此輩墮落受苦時汝當思憶想念吾疇昔在忉利天宮親蒙世尊殷勤叮嚀付囑於我令娑婆世界第十小劫彌勒出世成道已來中間或曾受化或未受化悉使解脫惡道永離三塗八難之苦機緣成熟遇佛授記自應拳拳服膺不致失墜也彌勒西域記云梅哩麗耶唐言慈氏因過去為王名曇摩流支此云法希亦曰法樂慈育國人自爾至今常名慈氏彌勒下生經云彌勒成道已準處處經云彌勒未下若當來下餘有五十億七千六百萬歲無量千萬億眾生見世苦惱皆於佛法中出家彌勒見諸大眾作是念言是諸眾生皆於佛法中種諸善根釋迦牟尼佛遣求付我我今受之善哉釋迦牟尼佛能善教化如是等百千萬億眾生今至我所如是三稱讚釋迦牟尼佛然後為說四諦聞者同時得道時華林園初會說法九十六億人得阿羅漢第二會說法九十四億人得阿羅漢第三會說法九十二億人得阿羅漢故處胎經佛告彌勒云汝所三會人是吾先所化九十六億人受吾五戒者次是三歸人九十二億者一稱南無佛皆得成佛道是也梵語和伽那此云授記聖言說與名授果與心期曰記即初住之應記也此皆我佛於天宮付囑地藏以待彌勒出世之人爾二地藏合身領教二初地藏正領二如來讚喜初分三初敘合身宗本爾時諸世界分身地藏菩薩共復一形涕淚哀戀十輪經云安忍不動猶如大地今地藏大士發願於塵沙劫前受囑於彌勒道後忍斯濁穢化度泥犁其猶地乎合分身為一形者一為諸身之本故合末以宗本此由地藏行般若時修神通波羅蜜受種種如意事變一身為無數身無數身還為一身隱顯自在然亦不著是如意神通以自性空故離故無生故無有住處內外大小以禪定力疾遍諸身還復亦速長阿含十二舍利弗云神足證者隨三昧心作無數神力變一身為無數身以無數身合為一身稱是神力者卑陋下劣凡夫所行非是賢聖之所修習於諸世間愛色不愛色二俱捨已修平等護專念不忘斯乃名曰賢聖神足文小乘尚爾況大菩薩乎一月影臨一切水一切水月一月攝正分身合身之旨涕淚哀戀有四意一悲六道造業不悛二悲眾生剛強難化三悲如來慧日將沉四悲天宮付囑事大故知涕淚哀戀誠有不得已也二申化事受旨二初佛引使獲通慧白其佛言我從久遠劫來蒙佛接引使獲不可思議神力具大智慧此地藏自陳所獲通慧與佛通慧形擊謂吾之通慧乃久遠劫來蒙佛接濟引掖使我獲得即佛之通慧也今付末世眾生於我自應如佛接引於我而接引之令其亦獲此通慧正我分內事自應仰攀玄根俯提弱喪者矣二化身沙界利生二初分身度人我所分身遍滿百千萬億恒河沙世界每一世界化百千萬億身每一身度百千萬億人令歸敬三寶永離生死至涅槃樂此中文含二意分身沙界明不思議神力度人證果明不思議智慧神力智慧乃分身度人之本也十輪經略云此善男子成就不可思議諸功德法堅固誓願勇猛精進為欲成就諸有情故於十方界或時現作大梵王身乃至或作地獄獄卒諸有情身現作是等無量無數異類之身為諸有情如應說法隨其所應安置三乘不退轉位云云故大論云具足神通者於十方恒沙世界中一時能變化無量身供養諸佛聽法說法度眾生是等除佛無能及者是為末後身菩薩故能廣度多人歸敬三寶歸以返還為義令其返邪歸正敬以專誠為義令其去妄歸真三寶乃却惡之前陣入道之初章越苦海之舟航到涅槃之要道故須歸依永離等則二種生死俱斷五住煩惱盡亡三悳秘藏同圓證矣五母子經云拔其根株便可得脫如人不種但當泥洹泥洹快樂是也二小善獲利但於佛法中所為善事一毛一渧一沙一塵或毫髮許我漸度脫使獲大利佛法中為善有勝劣不同今所為者善之劣也一毛甚輕一渧極少一沙甚微一塵極小毫髮許善之更輶矣然我亦令脫生死獲大利也賢愚經佛告阿難若有眾生於三寶福田中種少少之善得無極果此正會人天之小善歸廣大之一乘即同法華徧開六道低頭舉手彈指散華本是人天之福今開即是緣因佛種使獲大利復何疑哉三慰世尊勿慮唯願世尊不以後世惡業眾生為慮如是三白佛言唯願世尊不以後世惡業眾生為慮慰勿慮者明己能任事也葢謂一切煩惱六十二見等皆是如來之種即一闡提人亦不斷性善儻遇法緣善根復發一善若起萬惡全消譬星火燒萬頃之薪七毒喪多人之命如十輪經云隨所住處若諸有情貪瞋癡等皆猛利故造作十惡業道有能志心稱名念誦歸敬供養地藏菩薩者一切煩惱悉皆消滅遠離十惡成就十善於諸眾生起慈悲心及利益心此善男子成就如是功悳妙定威神之力勇猛精進於一食頃能於無量無數佛土一一土中以一食頃皆能度脫無量無數殑伽沙等所化有情令離眾苦皆得安樂隨其所應安置生天涅槃之道故不復以後世惡業眾生為憂慮也二如來讚喜爾時佛讚地藏菩薩言善哉善哉吾助汝喜汝能成就久遠劫來發弘誓願廣度將畢即證菩提地藏既領囑慰佛如來即讚善助喜雙讚善哉者一以能體佛心敬承嚴命二以分身利物毫福不遺所以喜之者以遂我心滿爾願也廣度兩言我佛縱許之辭亦自知其時耳若普曜經云不處生死不住泥洹便受菩提決文是則地藏久矣證大菩提何待廣度將畢耶
