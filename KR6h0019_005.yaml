body:
  text: 古鹽匡菴青蓮苾芻靈乘父輯二顯成佛助道者既稱佛名正行已成何須復明布施為助道耶準大論以生死輪轉利益之業無過布施所以者何好施之人聲譽流布八方信樂無不愛敬處大衆中無所畏難死時無悔我以財物植良福田人天中樂涅槃之門我必得之非但開三樂而已乃能開無量佛道之處以六波羅蜜是佛道檀為初門餘行皆悉隨從如是等布施有無量功德故佛説布施是初助道因緣以人命無常財物如電若人不乞猶尚應與何況乞而不施以是應施作助道因緣故須較量布施之緣助開佛道也初品題較量布施功德緣品第十二品文二初地藏請較施福二如來對衆較量初中二初經家敘儀爾時地藏菩薩摩訶薩承佛威神從座而起胡跪合掌如文二地藏疑請白佛言世尊我觀業道衆生校量布施有輕有重有一生受福有十生受福有百生千生受大福利者是事云何唯願世尊為我説之業道者殺害等罪行名黑黑業及不善業布施等福行名白白業及以善業今於善業中明施福一事故云我觀等布施多種財施法施俗施道施輕重較量如綸貫受福二字世出世間最要事皆由布施而得大士此問實為出苦良方成佛法根也是事云何句正疑施因是等受福何故不同問為地藏真不知耶為衆生疑耶答實知不實知非凡情所測若準雜藏經昔有人至波羅提木叉寺得菴羅樹華其色如金持入佛塔見釋迦牟尼佛像相好續念佛功德心熱毛豎即以華上佛出問一道人一華散佛得幾許福答如此深事我不能知當問讀經者即往問之曰我無天眼神通不能知見果報可問坐禪六通羅漢即便往問阿羅漢即為觀之見其捨身次第受天上人中福德乃至八萬大劫福猶不盡過是不復能知即遣化人詣彌勒所問得幾許果報彌勒言不能知正使恆河沙等一生補處菩薩尚不能知況我一身佛有無量功德福田甚良種種果報無盡待我將來成佛乃能知之據此即不實知誰曰不然故仰願世尊為我説之使後世知布施之福有如是耶二如來對衆較量三初誡聽許説爾時佛告地藏菩薩吾今於忉利天宮一切衆會説閻浮提布施較量功德輕重汝當諦聽吾為汝説此正答在問處以閻浮提人能行布施者必報生天上故於天宮衆前説布施功德輕重當諦聽者夫布施之業乃衆行之源且財物無常五家爭奪凡愚吝惜靡有捨心遂使妻兒角目兄弟鬩墻眷屬乖離親朋隔絶如是之實由慳貪為本故須諦實聽宣施福也二因疑願聞地藏白佛言我疑是事願樂欲聞三正申較量二初正較二結示初二初王臣施福二男女施福初又二初正較多少二結向成佛正較中四初施卑劣根闕福乃至第四施老病産婦福初分二初明施人尊又二初能施主佛告地藏菩薩南閻浮提有諸國王宰輔大臣大長者大剎利大婆羅門等等者等居士也大論三十二云若有人布施及持戒故生剎利家若著於智慧經書而不惱衆生布施持戒故生婆羅門家居士者小人而巨富此由前施福今感富貴報也二所施田若遇最下貧窮乃至癃殘瘖啞聾癡無目如是種種不完具者此即悲田尤宜種福最下貧窮舉人中最卑劣者此即作惡不施之後身故大愛道經云有財不施世世受貧以前世或許施貧者令他歡喜後悔不與故招最下貧窮之報癃殘等癃罷病平原傳臣不幸有疲癃之疾又背凸曰癃如周公隆其背又膀胱不利亦曰癃殘則肢體不全瘖啞則口不能言聾則不聞癡則不別無目則不覩物乃人中最可憐者此由前世見乞者來面目顰蹙惡口罵詈或時鞭撲或自無信施見他行施不能隨喜反生毀呰令他不信或家中財物妻子共感多人有分於中獨吝偏用有過不肯惠施障人修福惡深罪重故感此報也經云要觀前世因今生受者是要知後世因今生作者是福報如影響不可不知也二顯施福勝二初正明能施慈悲是大國王等欲布施時若能具大慈悲下心含笑親手遍布施或使人施軟言慰喻是國王等所獲福利如布施百恆河沙佛功德之利具大慈悲標施本也本有與拔名具向行善施名能不揀高下名大須達經云乃至於一衆生行於慈悲至𤚼牛頃此得福多文此能調心慈悲愍物隨所施為皆成大善若視相修福內粗外細唯成雜業矣下心等顯慈悲實處下心則降尊貴而就卑劣含笑則示喜捨而無吝情地持云若施下流不起輕想是也親手等忘己富貴愍人貧賤而等施之如佛告須達應至心施信心施隨時施自手施如法施軟言慰諭含二意一使人代施時以軟言慰諭當為我好施毋輕慢也二自施它施皆用軟言慰諭前人所謂惟願仁者不生恨心也處胎經云供養諸福田不選必遇聖行施作福業不選擇高下此福聖所譽最尊為第一故所獲利如布施百恆河沙佛功德之利以心平等無分別故如維摩居士語善德長者云若施主等心施一最下乞人猶如如來福田之相無所分別等於大悲不求果報是則名曰具足法施正合今文二轉釋所施卑劣何以故緣是國王等於是最貧賤輩及不完具者發大慈心是故福利有如此報百千生中常得七寶具足何況衣食受用初文明所施如法是故下顯得報殊勝地持云菩薩自量財物多少隨其所應而行惠施見來求者有二種人一者非是貧下孤獨無所依怙二者貧苦孤焭下賤無所依怙作是念言若我財多當令俱足若財少者先當周給貧苦下賤無依恃者文此慈心偏緣苦惱衆生乃施門周急之意是故所得福報百千生中七寶尊貴者尚能常得具足況尋常衣食受用乎良由能施之人有智愚之別所施之境有悲敬之殊悲是貧華敬是三寶悲是田劣而心勝敬是田勝而心劣若取心勝施佛不如施貧故像法決疑經云有諸衆生見他聚集作諸福業但求名聞傾家財物以用布施及見貧苦孤窮呵罵驅出不濟一毫名為顛倒作善不正作福如此人等甚可憐愍用財甚多獲福甚少文今既憐愍之心生於悲田自然報施之福獲乎後世矣二施塔寺聖像福二初明能所施復次地藏若未來世有諸國王至婆羅門等遇佛塔寺或佛形像乃至菩薩聲聞辟支佛像躬自營辦供養布施初能施之人遇佛塔下所施之田塔瘞舍利寺供聖像裝塑之福經論廣明今乃遇像興供植福敬田東晉名臣陶侃字士行建旟南海有漁人每夕見海濱光因白侃遣尋俄見金像凌波趣船檢背銘乃阿育王所造文殊菩薩像昔育王既統此洲學鬼王制獄酷毒尤甚文殊現處鑊中火熾水清生青蓮華王心感悟即日毀獄造八萬四千塔建立形像此其一也沙門慧遠迎供東林閣上隋末賊發一老僧辭像像曰爾年老但住時寇入山索金僧曰無乃以火炙曰僧受炙死穢臰伽藍何如寺外賊將出欲煞曰行年七十不負佛教待正念申頸可下刀賊見申頸即斫刀反刺心刃出己背羣賊奔走至遠師墓時天清朗忽有雲屯黑下布雷電四繞霹賊六人由是賊徒不敢入山瑞像靈應一何巍巍智論比丘問佛孫陀羅難陀出家證果事佛告比丘過去毗婆尸佛涅槃後難陀時為大長者於辟支佛塔廟中青黛塗壁畫作辟支佛像因發願世世生尊貴家身相金色值佛得道從是九十一劫不墮惡道天上人中身體端正有三十相豪尊富貴今日與我同生出家得道文如是供施辟支佛功德尚爾況菩薩像乎況如來像乎犀因玩月紋生角象被雷驚華入牙感應之道物理如然儻遇福田毋庸空過二顯所施福二初三劫受帝釋樂是國王等當得三劫為帝釋身受勝妙樂國王等遇塔寺佛像等供感生帝釋梵王者如法華若人於塔廟畫像之文大師約諸塵供養明天業故感帝釋梵王也中含比丘白佛何因緣名釋提桓因佛告比丘本為人時沙門婆羅門貧窮困苦施以飲食錢財燈明等以堪能故名釋提桓因今既供施佛形像等則感生無疑三劫三小劫也據因而感唯佛能知受勝妙樂詳世記經忉利天品正法念經云三十三天受五欲樂喻如金輪王所受之樂比於天樂十六分中不及其一云云二十劫為大梵王若能以此布施福利回向法界是大國王等於十劫中常為大梵天王凡修行必回向者如回聲入角音則大杯水投海則不涸少物上王得報多故須回向也有三意一回事向理元由理具方有事用今回此心向於實際二回自向他昔迷理遍善嚴自身今順本性回向衆生三回因向果三業毫善皆成緣了二因因必顯果同歸究竟三德梵名達磨馱都此云法界今回我修向法界者如經云竊惟我所修施等諸善根皆依法界流是諸佛所行準妙玄即是十法界體是三諦以十數皆依法界法界外更無復法能所合稱故言十法界回事向理即真諦空界十法界皆空故回自向他即俗諦假界十法界皆假故回因向果即中諦中界十法界皆中故故知此十皆即法界攝一切法清涼所謂法界者一切衆生身心之本體空即假中無一二三統該萬有即是一心故須回向法界也下明感果大國王等指能施人以善修布施不貪著其事故施事雖同而施報有異由回向與不回向也十劫為大梵天者準阿毗曇論初梵壽半劫梵福樓天壽一劫大梵劫半據法苑云欲界中壽一劫是小劫初禪三天壽劫是中劫二禪已去壽劫是大劫準此今之十劫乃是中劫展轉色天受梵福也大論云第一清淨心故生大梵天中阿含明四梵福若有信人能起偷婆塔也者是初受梵天之福若有補治故寺者是第二梵福若有能和合聖衆者是第三梵福若佛初轉法輪諸天世人勸請者是第四梵福比丘白言梵天之福竟為多少佛言閻浮里地衆生所有功德如是展轉行從四天下至他化自在天之福不如一梵天之福故知布施回向與前逈別矣若能了三輪本寂四相原空無住生心生心無住則與般若相應能具足檀波故曰無不從此法界流無不還歸此法界必成佛無疑也三施修補經像福二初明修因二顯施福初中二初自修補經像復次地藏若未來世有諸國王至婆羅門等遇先佛塔廟或至經像毀壞破落乃能發心修補梵名窣堵波此云廟廟者貌也倣佛佛菩薩等之形貌也安塔廟有三意一表人勝二令他信三為報恩所以寶塔蘊其光明精舍圖其形像建苦海之舟航為信根之枝幹覩則發心見便忘返益福生善惟此為先今毀壞破落者因年代日遠法教衰替寺像雖立敬福罕儔若不修餝日就衰羸故須發心致誠修補像法決疑經云造新不如修故作福不如避禍然欲修造理須如法造作雖少得福無量若不依法縱多無益百緣經載一大富長者生兒端正殊妙為天人愛敬漸大見佛得阿羅漢此因過去毗婆尸佛舍利塔小毀有童子入塔見此破處和顏悅色集喚衆人共塗治塔發願而去緣是功德九十一劫不墮三塗天上人中受福無極今值於我出家得道準僧祇律佛於拘薩羅國遊行時婆羅門耕見世尊過持牛杖拄地禮佛佛見便笑比丘白佛何因故笑佛言是人今禮二佛禮我杖下有迦葉佛塔諸比丘願見佛令從婆羅門索地與之佛即現出七寶塔高一由延廣半由延婆羅門見已便白佛言我姓迦葉是我迦葉土埠佛於彼處作迦葉塔諸比丘白佛得授泥不佛言得授即説偈言真金百千擔持用行布施不如一團泥敬心治佛塔時世尊敬過去佛便自作禮比丘亦禮佛言人等百千金持用行布施不如一善心恭敬禮佛塔華手經云若見塔廟毀壞當加修治若泥若塊乃至一磚終不退轉無上菩提故知修補佛塔經像功德不可思議也二勸布施結緣是國王等或自營辦或勸他人乃至百千人等布施結緣國王自修勸人可謂深知罪福如佛説自愛經佛告舍衛國王云夫為國王宜有明導率民以道請求來福王曰誠如佛教夫不種栽無緣獲其果故正法念經云若有衆生識於福田見有佛塔風雨所壞若僧房舍以福德心塗餝治補復教他人令治故塔命終生白身天其身鮮白入珊瑚林與諸天女五欲自娛業盡退還若生人中其身鮮白成論同妙玄云第四箜篌天有十住處五名白身籤云塔福最多白為色本今國王等善業上行德風下偃君民同修十善自他共報千生故知布施之報如執券取物不爽毫髮者也二顯施福二初自他千生為王是國王等百千生中常為轉輪王身如是他人同布施者百千生中常為小國王身國王等行施自合上升何復報為人王耶如五道罪福經云人而豪貴國王長者從禮事三寶中來為人大富財物無限從布施中來故知若不於佛法中修行布施終不能獲斯勝報今由小王而報轉輪聖王由臣民而轉小國王身位既高深福亦崇厚矣妙玄云皆是散心持戒兼以慈心勸他為福故報為人主飛行皇帝四方歸德神寶自然應也釋籤云夫輪王者先行七法一給施貧乏二敬民孝養三四時八節以祭四海四時修忍辱五六七除三毒然後沐浴受齋發誓神寶自應大論云一切人中轉輪聖王最為第一小國王者如粟散布四方總為金輪所統故能勸者為大王所勸者為小王宿行隨身福報如影響也二回向盡成佛道更能於塔廟前發回向心如是國王乃及諸人盡成佛道以此果報無量無邊捐資修補塔寺復回向者何須知上所行者皆是事施報感人天非涅槃因如達磨大師初到大梁武帝問曰朕即位已來造寺度僧有何功德磨曰實無功德此是人天小果有漏之因帝曰如何是真功德磨曰淨智妙圓體自空寂如是功德不於世求準此深意必須回事向理方與般若實智相應故知修補塔寺復加回向咸超三有盡成五智以回向所感果報無可測量靡有邊際回向為大利蓋謂此也四施老病産婦福二初能所施人復次地藏未來世中有諸國王及婆羅門等見諸老病及生産婦女無常經佛告諸苾芻有三種法於諸世間是不可愛是不光澤是不可念是不稱意何者為三謂老病死若老病死世間無者如來不出於世為諸衆生説所證法及調伏事故老病産婦最是悲田植福處老則根熟氣喘飲食須人老而無子目為獨夫西天邠坻首給東土文王先哀以其無歸也病則百骸酸痛一命絲懸若無奉事待斃奚辭故我佛誨勑看病為第一福田在世之時自亦巡僧寮看病以其可憐也産婦初行分娩惡露盈身若不時施飲食母子相與俱亡以其極苦也故此三類尤仁人所應動心而周給者也二所施因果二初修因若一念間具大慈心布施醫藥飲食臥具使令安樂準毗曇論明時節合有十二重第一名剎那翻為一念可謂時之最少也於此具大慈者約與樂邊論以樂是一切衆生所愛重故然既遇悲田應生大悲何言大慈如大論云若説慈則已説悲喜捨又慈是真無量慈為如王餘如人民所以者何先以慈心欲令衆生得樂見有不得樂者故生悲心以慈能具悲故言大既言一念即同體慈也醫藥等民生四事日用急需病者非藥餌莫療身命非飲食不立臥具衾襆綩綖之類尤是老病産婦之要物衣服該臥具中如是布施方使身安心樂故大論云若人飢渴給足飲食感恩則深佛説施遠行人遠來人病人看病人風寒衆難時施是為時施病者施藥飢渴與飲食起少病業因緣故得兩腋下滿相最上味相好衣服臥具金銀珍寶施故得金色身相薄皮相故知如來相業咸從施得也二獲果如是福利最不思議一百劫中常為淨居天主二百劫中常為六欲天主畢竟成佛永不墮惡道乃至百千生中耳不聞苦聲布施名福必得三利故言福利最不思議者軍前曰最乃前軍第一人此言不可思議中第一不思議也然薩婆多論云房舍臥具飲食湯藥是世間法非是離世難得之法文今何云最不思議耶此由正行施時一念具大慈心便是成佛根本則知生欲色天先報世樂畢竟成佛施福方終故知最不思議正應畢竟成佛句百劫為淨居天者大論云慈心好修善修福極遍淨天三界中遍淨最為樂故言極遍淨準此應在色界三淨天中今為淨居天主者何也以慈心是清淨心施故此中百劫據大劫説二百劫為六欲天主者準大論説衆生緣慈是有漏但緣欲界故報生六欲天中言二百劫據小劫也問欲天頻遭劫火何能永享六天之福乎答準長阿含三災壞世界而不壞人次第修禪上生色界欲天既成又還來展轉受樂矣問同一慈心行施何乃感報逈別耶答行施之時慈有勝不勝心有淨不淨故感欲色兩界不同壽命長短有異如大論三十三云未離欲布施生人中富貴及六欲天中若離欲心布施生梵世天上乃至廣果若離色心布施生無色天中離三界布施為涅槃故得聲聞道布施時厭惡憒閙好樂間靜得辟支佛布施時起大悲心欲度一切第一甚深畢竟清淨智慧得成佛道諸佛法不可思議隨衆生應度者作如是説然千山勢止嶽邊萬派聲消海上正意在畢竟成佛耳而於行施未成佛間永不墮三惡道常在人天受福於百千歲中耳尚不聞苦聲況乎身歷惡道正法念經云若見病困餘命未盡施其漿飲或施其財以續彼命命終生深水天如帝釋快樂從天命終不墮三途得受人身從生至生不遭病苦無有惱亂二結向成佛分二初結回施報復次地藏若未來世中有諸國王及婆羅門等能作如是布施獲福無量更能回向不問多少畢竟成佛何況釋梵轉輪之報文分二節初結上施福更能下結前回向能作等猶言布施不可不作也如賢愚經長者須達共身子捉繩經精舍身子欣然含笑達問何笑曰汝始於此經地六欲天中宮殿已成即借道眼悉見六天嚴淨宮殿復更徙繩身子慘然憂色問何憂色曰汝見此地中蟻子耶梵名臂𢍉履也曰已見身子言汝於過去毗婆尸佛亦於此地起立精舍而此蟻子在此中生乃至七佛已來汝皆為佛起立精舍而此蟻子亦在中生至今九十一劫受一種身不得解脫生死長遠唯福為要不可不種此唯人天之福猶在生死之裏若不為自求人天福報盡回向法界衆生則不問施之多少畢竟成佛矣何況句反顯也謂佛果尚能剋就況釋梵輪王人天小果有不成就者哉妙玄四下云輪王是人主位釋梵是天主位皆約報果明位果義既有優劣修因必有淺深五道罪福經云賢者好布施天神自扶將施一得萬倍安樂壽命長今日大布施其福不可量皆當得佛道度脫於十方果報不可思議矣二勑普勸學是故地藏普勸衆生當如是學當如是者誡勉勸進之意謂必當普勸衆生當依上來布施回向而學之也如堅意經佛告阿難廣為説布施種生死糧譬如種隨種而生未有不種而獲果實種善得福福自歸身故勑地藏普勸衆生應當如是而學之也較王臣施福竟二男女施福三初標佛法中福利復次地藏未來世中若善男子善女人於佛法中種少善根毛髮沙塵等許所受福利不可為喻何故於佛法中種少福多大論云雖有種種福田佛為第一福田以無量佛法具足是故獨説植於佛田佛田能獲無量果報餘者雖言無量而有差降長阿含佛告究羅檀頭婆羅門天及世間人唯佛為最上欲求大福者當供養三佛蓋由衆生於無始世界中不知於三寶布施故皆盡滅是三寶有無量法是故施亦不盡必得涅槃也故大經云若於佛法僧供養一香燈乃至獻一華生不動國此即淨土常嚴不為三災所動妙樂云人天之善並可開為緣因今經欲收無始微善咸趣菩提若已發心隨有毫善莫非緣因今地藏本願正開未來毫善得福也不可喻者諸佛成就無盡功德故於中植福福亦無盡大論云佛田清淨拔愛等諸煩惱穢草淨戒為平地大慈悲為良美除諸惡邪鹹土三十七品為溝塍十力四無所畏四無礙智為垣墻能出生三乘涅槃果報植種於此無上無比田者其福無盡文故所受福利不可譬喻也二較佛法中福利三初施供聖像福二施供大乘福三施修經典福今初又二初直明施福復次地藏未來世中若有善男子善女人遇佛形像菩薩形像辟支佛形像轉輪王形像布施供養得無量福常在人天受勝妙樂初標能施人次明所施田布施供養修殊勝之因常在人天受微妙之果以佛菩薩等教人出苦是衆生敬田輪王雖生死未出其以十善化世兼有水土乃黎氓恩田故有布施供養均得無量之福大論云財為惡心因緣常應自捨何況施得大福而不布施慳為凶衰相為之生憂畏洗之以施水則為生福利故得福無量也常在人天等正得福處何故經文前後必説人天受樂準大論以人中結使薄厭心易生天中智慧利故二處易得道餘道不爾復次言天則攝一切天言人則攝一切地上生者何以故天上則天大地上則人大是故前後舉人天也一往則在人中天中受樂究竟指菩提涅槃覺法寂滅之樂故光明疏以人表三十賢位天表十地聖位受第一義天之樂大論云人修布施者名聞滿十方智者所愛敬入衆無所畏命終生天上久必得涅槃是也二回向叵喻若能回向法界是人福利不可為喻大論云佛説二種施中法施為第一以財施果報有量法施果報無量財施欲界報法施三界報亦出三界報若不求名聞財利力勢但為學佛道弘大慈悲心度衆生老病死苦是名清淨法施若不爾者為市易法復次菩薩知諸法實相如涅槃不盡福德入諸法實相故而亦不盡故福利不可為喻也二施供大乘福二初直明施福復次地藏未來世中若有善男子善女人遇大乘經典或聽聞一偈一句發殷重心讚歎恭敬布施供養是人獲大果報無量無邊遇者遘也慶幸之語以佛法難聞難遇今此一旦遇之如飢者之遇王膳鼓腹而歌旱苗之遇甘雨勃然而興其樂為何如哉大乘者即方等諸經準起信論有三一體大謂一切法真如平等不增減故二相大謂如來藏具足無量性功德故三用大能生一切世間出世間善因果故一切諸佛本所乘故一切菩薩皆乘此法到如來地故既為出世大人所乘名大乘也聽聞等者涅槃經云聽法因緣則得近於大般涅槃以開法眼故世有三人一無目譬凡夫人常不聞法二一目譬聲聞雖暫聽法其心不住三二目譬菩薩專心聽法如聞而行以聽法故得知世間如是三人今既聞是章句信心清淨則生實相法眼即使一偈一句亦復增進菩提故須發殷勤尊重之心讚歎人法而恭敬之布施人法而供養之故善恭敬經佛告阿難若有從他聞一四句偈或書之竹帛所有名字於若干劫取彼和尚阿闍黎等荷擔肩上或背負頂戴常將一切音樂之具供養是師尚不能具報師恩若於和尚所起不敬心恆説於過我説愚癡極受多苦於當來世必墮惡道是故我教汝等常行恭敬尊重之心愛重三寶甚深之法必獲無量無邊之大果矣二回向叵喻若能回向法界其福不可為喻付法藏經云一切衆生欲出三界生死大海必假法船方得度脫法是衆生真善知識作大利益濟諸苦惱所以然者一切衆生志性無定隨所染習近善則善近惡則惡若近惡友便造惡業流轉生死無有邊際若近善友起諸敬心聽受妙法必能令離三塗苦惱由此功德受最勝樂如昔婆羅門詣華氏城衒賣髑髏諸優婆塞即以銅筯穿耳徹過者多價半徹者少價不通者不與直婆羅門問故答曰徹者此人生時聽法智慧高勝相與多價半者雖聽經法未善分別故與少直全不通者都不聽法故不與價持此全徹髑髏起塔供養尚得生天況能至心聽受經法供養恭敬持經人者此之福報實難窮盡未來必當成無上道故佛説堅意經佛告阿難其有好心善意之人聞佛明法一心而聽能一日可不能一日半日可不能半日一時可不能一時半時可不能半時須臾可其福不可量不可訾也文是故智者欲得無上安隱快樂應當至心勤聽經法今既自聽大乘經典復更讚歎恭敬供養大乘人法總回向法界其所得福當與十方虗空同量故不可譬喻也三施修經典福二初自他修福復次地藏若未來世中有善男子善女人遇佛塔寺大乘經典新者布施供養瞻禮讚歎恭敬合掌若遇故者或毀壞者修補營理或獨發心或勸多人同共發心大乘經典即黃卷赤軸寶篋琅函若新裝潢者則當布施於人供養令其瞻禮讚歎恭敬合掌即名法施也若遇毀損破壞者即當修治補完經營料理昔賢云或開閉箱篋蟲蠹朽爛或挽脫漏訛紙墨破裂自不修理不肯流傳未免得罪法寶有違佛制若不能修治不可燒化如五百問云戒律不用流落可燒不答不得不知有罪燒捨墮若知燒有罪故燒犯決斷與方便破僧同亦如燒父母故目得迦云諸餘葉紙佛經磨滅應拭故者更可書新明文昭晰勿蹈重愆此明自發心修理下乃勸人同發若如是為之即菩薩人矣二自他獲報如是等輩三十生中常為諸小國王檀越之人常為輪王還以善法教化諸小國王受勸者為小王以附化能勸者作輪王而統御四自侵經云能施與者今世後世長得安隱為生死糧世世豪富皆蒙得安有布施者邊人助喜得福無量況其施主手自斟酌後世所生福隨身報若影隨形響之應聲矣檀越者內傳云梵云陀那鉢底譯為施主陀那是施鉢底是主而云檀越者本非正譯略去那字取上陀音轉名為檀更加越字意道由行檀捨自可越度貧窮妙釋雖然終乖正本準大論檀有多名世間檀凡夫人施聖人作有漏心施是出世間檀聖人雖有漏心施以結使斷故為出世聖人所稱譽檀出世淨檀聖人所不稱譽檀即世間檀佛菩薩檀知諸法實相故施聲聞檀功德不具足但得少許分其間有淨不淨云云還以善法教化小國王者金輪化世必以同行十善為本例昔有五王往來友善其最大者字普安王習菩薩行餘四小王常習邪行大王欲度呼來上殿七日娛樂四王告別大王憐愍語小王言各説所樂悅樂之情一王願春月樹木榮華遊戲原野為樂一王願常作國王出入行來為樂一王願婦兒端正極情快意為樂一王願父母眷屬常共美食素琴為樂大王言此非久樂四王言王樂云何大王言我樂不生不死不苦不樂不飢不渴不寒不熱存亡自在此是我樂四王言此樂何處大王言吾師號佛近在祗桓諸王歡喜同詣佛所作禮退坐大王跪白我等今得為人暗鈍無知深著世樂不知罪福願為我等説其苦諦佛為廣説八苦四王聞已心開意悟即得須陀洹道白普安王言大王真是大權菩薩化導我等令得道迹大王之恩我本觀諸宮殿心情愛著不能遠離今覩宮殿如視穢廁無可樂者即捨位付弟各出家為道此輪王教化小王之例詳如長阿含金輪王統化四洲以十善也三結向法界功德二初指修善事復次地藏未來世中若有善男子善女人於佛法中所種善根或布施供養或修補塔寺或裝理經典乃至一毛一塵一沙一渧此皆結上之文然每言佛法中者蓋奉事餘道不出生死徒自勤苦非涅槃因故福田經佛告天帝九十六種道中佛道最尊九十六種法中佛法最真九十六種僧中佛僧最政所以者何由如來從阿僧祇劫發願誠諦殞命積德誓為衆生六度四等衆善普備得慧成滿三界天尊無能及者其有衆生發一敬心向如來者勝獲大千世界珍寶施矣是為最尊無上之道故教善男女等必須於佛法中種善根也準大論有三善根無貪無瞋無癡一切諸善法皆從三善根生增長今言善根因緣供養之具所謂華香燈明及法供養持戒誦經等以善心供養故名為善根布施非即是福但能破慳貪開善法門善根名為福故不間毛塵沙渧並取乎心心大則大心小則小若心冥法界即福等虗空如大論佛與阿難從舍婆提城乞食時婆羅門王立制若與佛食與語當罰金錢五百文佛與阿難空鉢而出見一老婢持破瓦器盛臭潘淀上音番淅米汁下音殿淺水也猶言米汁不多耳出門棄之見佛空鉢心念欲施佛知申鉢從乞婢即淨心施佛佛語阿難此婢因施十五劫中天上人間受福快樂不墮惡道後得男身出家成辟支佛當時佛邊一婆羅門即言汝是淨飯王之太子何故為食而作妄語佛即出舌覆面上至髮際而語之言汝頗見如此舌人作妄語不彼即生信心言我不解小施報多佛言汝頗曾見希有事不答言我曾見尼拘陀樹蔭覆五百乘車佛問樹種大小曰大如芥子三分之一佛言誰信汝彼言實爾佛言我見此女淨心施佛得大果報亦如此樹因少報多時婆羅門心開意解向佛懺悔佛為説法得須陀洹果即大唱聲言一切衆人甘露門開如何不出諸人聞已皆送五百金錢與王請佛供養王與羣臣亦歸依佛佛為説法悉獲道果故經云可以為施不限多少是也二示回向法二初向理千生受樂如是善事但能回向法界是人功德百千生中受上妙樂初句通指已上所修善事雖有上中下別既回向法界亦何間於大小是以百千生中修因不替施福常存資法身而五果皆常益慧命而四德咸顯上妙法樂受用靡窮如雜藏經目連見一天女坐一蓮華上縱廣百由旬此華獨妙殊於餘者所欲資生之具宮殿飲食隨念欲得盡從華出進止隨身目連問言作何善行受報如此答言迦葉佛滅度後遺零舍利諸弟子輩建七寶塔高廣四十里時我作女人出見塔佛像信敬情發念佛功德脫頭上華奉獻於像以是因緣故受報獨妙如此是則華因小善得報如斯其修塔寺回向法界自應百千生受上妙樂矣二向已三生受福如但回向自家眷屬或自身利益如是之果即三生受樂捨一得萬報初二句翻其不能回向之心使福果局限有盡眷屬者天性相愛更相臣順也才言自家便不能念及它人胞與之義乖矣自家眷屬者五苦章句經云父子夫婦兄弟家室知識奴婢有五因緣一怨家父子互相殺害二債主父母財子散用三償債子財供給父母四本願先世發願善心歡喜五真友先世以道共相承事今凡夫之人罔識來源不計無常而反貪愛言有父母兄弟妻子中外親族疾病忽至困劣著牀曉語親族分取吾痛皆言不能疾者乃覺五種親戚謂當益己當助汝等勤勞治生隨時給足使身隨貪自縛自侵憂念九族妨廢善行壞亂善心老病死來善惡苦樂獨自當之無有代者未得道者皆有此念不能施與守道為德嗚呼今世人至死之際猶復彌留而不察者如來深為憐愍故特點逗此言令人回施故言若為眷屬自身秪得三生受人天福果福盡還墮故永嘉云住相布施生天福猶如仰箭射虗空勢力若盡還墮地招得來生不如意經説住相布施名第三生怨正此謂也捨一得萬報者如舊雜譬喻經云昔舍衛城外有婦人清信佛自至門乞食婦以飯著佛鉢中却行作禮佛言種一生十種十生百種百生千種千生萬種萬生億得見諦道其夫不信默於後聽佛呪願夫曰言何過甚施一鉢飯乃得爾福復見諦道佛言汝見尼拘陀樹高幾許耶答高四五里歲下數萬斛問其核大小答如芥子佛言汝語過甚何有種一芥子乃高四五里下數十萬子答實如是佛言地是無知其報力尚爾何況人是有情歡喜以一鉢飯上佛其福甚大夫婦心開意解即得須陀洹道此出如來金口寧不信耶然以未回法界得果秪三生與萬報耳較竟二結示是故地藏布施因緣其事如是此結示因果總歎不盡以完地藏較量業道施福之問故總指王臣男女等所修之因所得之果故云其事如是無奈世人信者施不盡力不信者全不能行今舉事證之譬喻經説昔有二比丘俱得須陀洹果一人常行教化乞丐以用作福一人但直坐禪自守不樂作福語乞者言何不坐禪空自勤苦修福者言佛常説比丘當行布施後俱命終生長者家作福者為長者子奴婢承給衣食自然快樂無極坐禪者生為婢子在地獨坐飢渴啼哭俱知宿命時長者子語婢子言我本語汝當布施不肯用語是汝自過何為啼哭後時俱求出家皆得阿羅漢長者子常直端坐人皆競送衣食來與其婢子者在外乞求人無與者常受飢渴以是因緣行道之人不但持戒禪誦亦當布施作福大愛道經云今世滅罪後世得申有財不施世世受貧故入道必以智慧為本智慧必以福德為基譬之鳥備二翼倏舉萬尋車足兩輪一馳千里緣了之資成正因事度之助開佛性不可不信也正説竟大章第三流通二初別流通二總流通初分三初地神護法流通二見聞利益流通三囑纍人天流通流名下注通名不壅欲使正法之水從今以注當聖教筌不壅於來世以如來説法秪益現機必假結集流傳令羣生取為修行方軌如耳提面命證果無遺以見我佛慈隆即世悲臻後劫故須流通也今先護法流通初品題地神護法品第十一二品文二初堅牢歎德二教主述成歎德中二初通明昔遇爾時堅牢地神白佛言世尊我從昔來瞻視頂禮無量菩薩摩訶薩皆是大不可思議神通智慧廣度衆生爾時者説四章方竟時也梵名涅哩鋤此翻堅牢有二義一約事取力能承載發生資益地味養育萬民安立羣品二約法以智度法門常無改變常也能荷山川樂也能生萬物淨也地力自在我也具此四德稱神禹貢言底績者皆地耳覃懷底績是也以具事法二義故名堅牢地神問地神男耶女耶答女神也準長阿含二十佛告比丘有四大天神一地神二水神三風神四火神昔者地神惡見言地中無水火風佛言地中有水火風但地大多故地大得名次第説法地神歡喜佛為説四諦地神即遠塵離垢得法眼淨白言我今歸依佛法僧盡形壽不殺乃至不飲酒聽我於正法中為優婆夷水火風神亦然故知是女神也釋題中以坤母配夫主乾父非臆説歟白佛者意道弘經必藉地轉法須賴食地固由我主之食亦由我生之若吾不護持其何以流通哉故於天宮大會之前無量地神之內毅然任護法之重擔故越班而陳白也先標我從昔來顯已發心匪朝伊夕瞻視頂禮等顯所值聖流之多皆非聊爾之人大不可思議神智之褒美通慧乃度生器具即三密妙輪如散脂大將云我現見不可思議智境光疏云若境可以智知可以口説者境則非密不可智知不可識識不可名不可説是名不可思議密境今諸菩薩皆以三密廣度衆生故皆是大不可思議之通慧也二別讚今聞二初讚地藏德三初歎誓願深重是地藏菩薩摩訶薩於諸菩薩誓願深重世尊是地藏菩薩於閻浮提有大因緣總標地藏誓願偏與閻浮有緣皆在下文二舉大士例顯如文殊普賢觀音彌勒亦化百千身形度於六道其願尚有畢竟文殊普賢彌勒如前觀音如後準十輪經除文殊普賢觀音等諸大菩薩餘皆不及地藏今地神併謂文殊等悉遜一籌非謂功德有優劣正以誓願有畢竟不畢竟耳亦化等如大論云遍吉菩薩一一毛孔常出諸佛世界及諸佛菩薩遍滿十方以化衆生文殊分身變化入五道中或作聲聞緣覺或作佛身如首楞嚴三昧經中説文殊過去作龍種尊佛七十二億作辟支迦佛文殊師利般涅槃經佛告跋陀羅曰此文殊師利有大慈悲生於此國多羅聚落梵德婆羅門家生時宅化蓮華從母右脅出身紫金色墮地能語寶蓋隨覆於佛所出家住首楞嚴定佛涅槃後四百五十歲當至雪山為五百仙人宣揚十二部經化令住不退已至本生空野澤尼拘樓陀樹下入首楞嚴三昧毛孔出金色光遍照十方世界度有緣者身如紫金山正長丈六圓光嚴顯面各一尋圓光內五百化佛一一化佛有五化菩薩以為侍者是文殊師利有無量神通變現不可具説又五臺辨聰入京有老僧附書使於城北尋勃荷投之既至廣慈河側聞小兒呼勃荷以書投之急食忽人立而化始知老僧為文殊勃荷乃普賢也此屠者趙氏所畜十五年矣唯食勃荷故名寒山拾得其類也觀音如普門品三十二應及諸傳記所載尤多彌勒如傅大士布袋僧之類此據近者言耳慧上菩薩經云昔拘樓秦佛時有比丘名無垢間居山窟近有五神仙有一女人遇雨入窟雨晴出去五仙見之各言比丘姦穢無垢聞之即踊身虗空五仙投地伏罪即是慈氏以諸大士應現無方故總云亦化百千身形等然其願念皆有盡時非不畢竟也者三顯教化難量是地藏菩薩教化六道一切衆生所發誓願劫數如千百億恆河沙如前二護供養人二初塑像供讚得利益二讀經供像銷橫事初分三初修因世尊我觀未來及現在衆生於所住處於南方清潔之地以土石竹木作其龕室是中能塑畫乃至金銀銅鐵作地藏形像燒香供養瞻禮讚歎真智靡方不局東西南北法身無像豈假銅鐵金銀然地乃供像之所像為起敬之門被俗之儀不壞假名談實相闡性之法必由假相悟真容故依處而作相也然言於所住處亦地神據迹之言若論其本何所論處四智無以辨其端五眼罔能窺其奧如十輪經好疑問菩薩白佛言此善男子從何而來所居佛國去此遠近佛言如是大士隨所止住諸佛國土隨所安住諸三摩地云云據此豈局一方一處耶今言南方作室者按起世經當閻浮洲南二鐵圍山外有閻摩王宮殿住處地藏偏現身地獄作幽冥教主故就垂形之處作室於南即大集會中從南方世界現香雨華雲而來之意蓋以午為中道離為南方為正為日為明麗離中虗故明像諸法空則智日當陽遍照天下故據迹處作室供像正令人人出坎陷之幽途升離明之陽地以陰主死而陽主生也清潔地者準密部諸儀作壇法必須穿去穢土取下淨土於空間幽林或河邊淨地作之方稱如法故今亦云於清潔地龕枯含切龍窟也從合取蟄而坯戶之意靜之極也夫龍為純陽之精天道之變化備矣陽首潛龍乃以不見成德何哉正見天道渾渾無聲無臭龍潛弗潛混沌穿漏庶以見現而不現隱而不隱會陰陽而一致泯修性以同源斯即諦觀不別絶學之法門也餘如文二得益二初標示十利是人居處即得十種利益此顯人尊處勝蓋既聞地藏菩薩不思議誓願威神即能信解而復作室塑像供養禮讚初則一念信解次則兼行六度既是尊重弟子住處隨所住地並名吉祥故每萃休徵有十種利益也二徵列十名何等為十一者土地豐壤二者家宅永安三者先亡生天四者現存益壽五者所求遂意六者無水火災七者虗耗辟除八者杜絶惡夢九者出入神護十者多遇聖因初句徵一者下列次第相生則有十利首相土地以立其居次明家宅以安其身乃至鬼神護助以終遇聖因豐壤者豐盛大也豐則祭當備物故取豆大而滿為豐從孚容切生意滿盈也盛而又盛也按禹貢厥土惟白壤注云無塊柔土曰壤白以見其色之純壤以見其性之美周官大司徒辨十有二壤之物而知其種以教稼穡樹藝然辨土宜有二以色以性大槩五色好土皆種藝豐壤如云厥土黑墳厥土赤墳等故周禮地官注壤赤土以萬物自生則言土以人所耕藝則曰壤壤和綏也逸雅訓瀼取肥濡之意世記經云閻浮提所有國名曰沃壤豐樂多出珍寶林水清淨是也準長阿含閻浮提地南狹北廣縱廣七千由旬人面像此地形既得豐壤之土地則家宅可永安矣家從宀從乑衆字則父子兄弟夫婦同室而和樂矣宅從宀從乇托字則擇吉託處休徵著而災眚殄矣生者既安福資祖禰音你亦蒙善業並得生天先亡尚爾況作室嚴像乎例如金光明云若有衆生為供養經典故莊嚴屋宅乃至張懸一幡一蓋及以一衣欲界六天已有自然七寶宮殿是人命終即得生彼各各自然有七天女共相娛樂日夜常受不可思議微妙快樂今亦云然不惟先亡生天亦使現在益壽光明云閻浮提內藥草樹木根莖枝葉華果滋茂美色香味皆悉具足衆生食已增長壽色力辨安六情諸根具足通利是也既有壽已而諸事不諧曷足貴乎今凡所祈求莫不遂意從志曰遂亦稱也所謂隨意所用受於快樂種種飲食衣服臥具宮殿屋宅樹木林苑河池井泉悉皆具足無不遂意是也遂意在內災祥在外若所謂水火者民生不可一日闕者也蓋水流濕潤乎萬物故居北方坎位火就燥熯乎萬物故居南方離位水火既濟則萬物生成儻火水不時則萬物焦爛何況商羊現舞回祿潛臨則災禍非淺矣按白澤圖火之精名必方狀如鳥一足以其名呼之則去水之精名罔象狀如小兒赤目黑色大耳長爪以索縛之則可得烹之吉內外雖獲安寧又須辟除虗耗耗説文云稻屬呂氏春秋云飯之美者玄山之木南海之耗是也若荀子云多而亂曰耗則是減損虗耗董仲舒策云察天下之息耗是也注息生也耗虗也俗謂正月十六日為耗磨日官司不開倉庫光明云若此國土有諸衰耗種種艱難以我等力故令如是種種百千衰耗之事悉皆滅盡是也晝既諸緣順適夜須眠夢安祥今百凡惡夢如木之根皮杜塞而不申如之頭緒斷絶而不續也日居月諸坐享貞吉晝出夜入尤望安寧今修福善出入神護光明云我等四王二十八部諸鬼神等及無量百千鬼神以淨天眼過於人眼常觀擁護此閻浮提是也已上九種皆世間利益第十聖因乃出世利益聖正也乃出世正聖之修因也如聞法悟道修齋布施塑像修塔補治經像之類涅槃經云善知識者令人漸遠惡法增長善法本未有定慧解脫解脫知見即便有之未具足者則得增廣如是聖因恆多值遇若不因修供大士曷克臻此十利乎三結成世尊未來世中及現在衆生若能於所住處方面作如是供養得如是利益通結修因得益二文十輪經云善男子假使有人於其彌勒及妙吉祥并觀自在普賢之類而為上首殑伽沙等諸大菩薩所於百劫中至心歸依稱名念誦禮拜供養求諸所願不如有人於一食頃至心歸依地藏菩薩令諸有情所願滿足如如意寶亦如伏藏如是大士為欲成熟諸有情故久修堅固大願大悲勇猛精進過諸菩薩是故汝等應當供養偈曰假使百劫中讚説其功德猶尚不能盡故皆當供養所以供養者得如是之利益故也二讀經供像銷橫事復白佛言世尊未來世中若有善男子善女人於所住處有此經典及菩薩像是人更能轉讀經典供養菩薩我常日夜以本神力衛護是人乃至水火盜賊大橫小橫一切惡事悉皆銷滅初明經像住處次明力護滅惡此見地神護法之心與光明會上發願護經同彼云若隨是經典所流布處我當在中常作宿衛是也水火銷滅即上六七八三事大橫如藥師經九橫死小橫如九橫經一切惡事如光明所謂以是經故惡夢蠱道五星諸宿變異災禍一切惡事消滅無餘無量鬼神及諸大士晝夜精勤擁護四方令無災禍永離諸苦應心適意隨其所樂豈非惡事銷而善事萃災橫滅而禎祥集者乎世有不信之人謂是誘進之語豈不聞積善之家必有餘慶積不善之家必有餘殃又不聞出言善千里之外應之出言不善千里之外違之言行乃君子之樞機動天地感鬼神得不敬且慎乎二教主述成二初讚德又二初直讚神力佛告堅牢地神汝大神力諸神少及大神力即指下文諸神即是同類如善財參安住地神時百萬地神各放光明謂此等地神僉不及爾之神力也二轉釋主物何以故閻浮土地悉蒙汝護乃至草木沙石稻竹葦穀米寶貝從地而有皆因汝力初二句總釋乃至下別釋光明會上地神自言而此大地深十六萬八千由旬從金剛際至海地上悉得衆味增長具足豐壤肥濃過於今日草木等然世界初成之後草木稻等種子從何而有準長阿含有大亂風從不敗世間吹種子來生此國一根子二莖子三節子四疐音帝與蒂同棗李曰疐之中子五子子是為五子固因地神威力亦由衆生業感準業報差別經云復有十業能令衆生得外惡報若有衆生於十不善業多修習故感諸外物悉不具足云云若修十善業與上相違此因衆生惡業熾盛以致地神不護減損萬物若多修德增其威力萬物加美故地神云是金光明若廣説時我及眷屬所得功德倍過於常增長身力心進勇鋭世尊我服甘露無上法味已閻浮提地豐壤倍常如此大地衆生所依悉能增長一切所須之物令諸衆生隨意所用受於快樂今故讚云閻浮土地乃至寶貝凡是地所有者皆因汝力而致之也貝海介也其物甚瑣其質天然有文背穹而渾天之陽也腹平而開地之陰也象其腹行古之民也朴貨貝而寶龜故制字從貝為母一聽民便後世始鑄泉泉行而貝廢權歸於君矣然於利民用德又下衰造楮以厲民終莫之能行也二述事二初述成稱揚利益事又常稱揚地藏菩薩利益之事汝之功德及以神通百千倍於常分地神稱揚讚歎乃普賢十願中第二門蓋一念稱揚萬德自具故諸佛子凡來法會初見久聞宣流梵唄今地神不惟能主閻浮提物復更讚揚地藏利益之事則為護法地神其福業慧業自然深廣功德神通亦叵思議較餘地神超過萬倍何也良由大士威德神通不可思議譬之諸天甘露不問貴賤長幼若有嘗者無不長生而不死也者二述成讀供擁護事二初男女供像讀經若未來世中有善男子善女人供養菩薩及轉讀是經但依地藏本願經一事修行者初明人法但依下令專修即制心一處無事不辦也梵語膩地此云依依憑也憑此經功出離苦海也涅槃明四依此即依了義經不依不了義經之指古語云千羊之皮不如一狐之腋故知衆典不及此經以人有思議不思議經有開顯未開顯今專讀不思議開顯之經罪頓消而功速成何事多求雜亂心志此即南嶽有相安樂行也言修行者謂如説而行若聞而不行如説食數寶何濟飢貧諺云説得一丈不如行得一寸是真實訓世語耳二擁護除災證果二初地神擁護除災汝以本神力而擁護之勿令一切災害及不如意事輒聞於耳何況令受勑地神擁護者以此善信若佛現在足稱四信今於滅後可當五品以讀經是第二品供養乃第四兼行六度品始由一念信解以至深信觀成當知五品觀行為如佛故令擁護也本神力者約事指主地為本約法指四德為本由此本故神力倍餘擁護者如光明堅牢白佛言説法比丘坐法座時我常晝夜衛護不離隱蔽其形在法座下頂戴其足一切災害等所謂我等諸王及諸鬼神既捨離已其國當有種種災異彗星現怪流星崩落五星失度兩日並現日月薄蝕惡虹數現大地震動暴風惡雨此災既起侵害人民故云災害又云穀米湧貴飢饉凍餓怨賊侵掠人民多苦其地無有可愛樂處此不如意事也今既供像讀經唯依本願修行此等災害不如意事尚不輒聞於耳況眼見身受耶二諸天擁護證樂二初示擁護人非但汝獨護是人故亦有釋梵眷屬諸天眷屬擁護是人初句謂不但汝地神獨護若果如上修為亦有梵釋諸天眷屬皆來擁護矣如四天王白佛言是人若得聞是經典能得未來現在種種無量功德我當隱蔽不現其身為聽法故當至所止講法之處大梵天王釋提桓因大辨天神功德尊天散脂鬼神大將軍等二十八部鬼神大將摩醯首羅摩尼跋陀鬼神大將鬼子母及五百鬼子無量百千萬億那由他鬼神諸天如是等衆為聽法故悉自隱蔽不現其身至是人所止講法之處金光明方等圓經天龍神鬼擁護若斯況今開顯最上之典其梵釋天等擁護之力奚俟更言哉二釋擁護意何故得如是聖賢擁護皆由瞻禮地藏形像及轉讀是本願經故自然畢竟出離苦海證涅槃樂以是之故得大擁護初句徵聖謂真正賢名善直又主者名聖眷屬名賢以正直者為天為神耳皆由下釋釋中三意初二句正釋意自然二句示獲益言苦海者準長阿含四大海水醎苦有三因緣一有自然雲遍滿虗空至光音天周遍降雨洗濯天宮滌蕩天下從梵迦夷天宮乃至八萬天下諸山須彌山王皆洗濯滌蕩其中穢惡醎苦諸不淨汁下流入海合為一味二昔有大仙人禁呪海水長使醎苦人不得飲三雜衆生居其身長大或百由旬至七百由旬呼吸吐納大小便中故海水醎苦今指業海苦有萬端既由禮讀出離無難言自然則不加勉強説畢竟則到底不虗是故行者應當至心若至心者所求必獲出苦證樂此正教主天宮付囑之心亦地藏幽途化人之念切在專行因果不爽如毛髮者也以是二句結護意如文
