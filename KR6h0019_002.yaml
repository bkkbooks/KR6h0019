body:
  text: 古鹽匡菴青蓮苾芻靈乘父輯大章第二明所化機通論則六道別明惟三塗的指在地獄即是身口意三具造上品十惡以招地獄苦耳文分為三初示業緣差別二示業感差別三示業報差別如次對惑業苦三道為所化之機也今初品題觀衆生業緣品第三二品文二初聖母啓問爾時佛母摩耶夫人恭敬合掌問地藏菩薩言聖者閻浮衆生造業差別所受報應其事云何聖母因聞衆生各各差別故如來分身度脫復聞地藏云不以後世惡業衆生為慮故承機發問然聖母首問者以如來升天宮端為聖母況我佛之母是應居先也梵語阿離野此翻聖者事無不通謂之聖孔子對魯哀公云所謂聖人者智通大道應變不窮測物之情性者也今地藏以不思議方便應變無方故稱聖者閻浮衆生下正申疑詞一切衆生隨自業轉有上中下差別不同占察經地藏菩薩云所觀三世果報善惡之相有一百八十九種須者自檢二地藏敬答二初通示諸界業緣地藏答言千萬世界乃及國土或有地獄或無地獄或有女人或無女人或有佛法或無佛法乃至聲聞辟支佛亦復如是非但地獄罪報一等夫主賓酬唱如砧磓相扣今之答問不合何也此因聖母問詞意不相到蓋世界無邊國土無量衆生無盡業果無涯今秖問閻浮衆生業報差別無乃太局乎首答千萬世界意可知矣有地獄如娑婆等無地獄如極樂等阿閦佛國雖有女人無邪欲想極樂國土及八陽神呪經八吉祥經八佛名號經各各東方八佛皆無女人國中無女人最為清淨智論云菩薩觀欲種種不淨於諸衰中女衰最重火刀雷電霹𮦷怨家毒蛇之屬猶可暫近女人慳妬瞋諂妖穢鬬諍貪嫉不可親近故也有佛法無佛法者大論問何以貴有佛世界賤無佛國土答佛是莊嚴世界主若諸佛不出世則無三乘涅槃之道若世有佛衆生得出三界牢獄衆生知有罪福受三歸五戒八齋及出家五衆等種種善法若無佛之國乃至天人不能修善故也乃至聲聞等超略之詞準悲華經或有世界純諸菩薩無聲聞緣覺之名或有聲聞辟支佛乘或有無佛菩薩聲聞緣覺或五濁弊惡或清淨微妙或卑陋不淨或嚴淨妙好或壽命無量或壽命短促種種不同故言乃至等故知聖母之問大有不盡者也二的示閻浮惡趣二初聖母重白摩耶夫人重白菩薩且願聞於閻浮罪報所感惡趣且者粗略不竟之詞謂我非不欲聞諸國土事我今既聞閻浮衆生罪報且問南洲所感惡趣為何如耳二地藏載答二初彼此謙恭地藏答言聖母唯願聽受我粗説之佛母白言願聖者説願聽受者寄聖母以厲衆生也粗説有二一者獄名叢雜苦事絲棼若欲廣明一劫不盡二者説空無相等名柔軟語説地獄等名粗語願説者謂我正願説此等事奚俟固謙為也二答明罪報二初地藏詳示二聖母禮退初分二初總示爾時地藏菩薩白聖母言南閻浮提罪報名號如是如文二別明二初正答閻浮罪報二重問無間獄名正答中二初別明罪報分五一不孝二親若有衆生不孝父母或至殺害當墮無間地獄千萬億劫求出無期初舉所作罪當墮下示所感報後倣此首舉不孝父母見罪之極大極重蓋以父母猶天地也恩重經云人生在世父母為親非父不生非母不育故難報經云左肩持父右肩持母經歷千年便利背上猶不能報父母之恩且為子盡孝天理之常人倫之本使子而不孝則父母不復望於子夷狄禽獸之不若安可言人乎故正法念經云有四種恩甚為難報一母二父三如來四説法師若有供養此四種人得無量福現在為人讚歎未來能得菩提今既不能供養報恩已失子職況敢行大逆以至殺害乎噫嘻父母何人也殺害何名也夫殺者誅也有罪而戮死法所在也害者傷也有怨有必報情不堪也今父母何罪何怨而至殺害乎未生怨經阿闍世王將欲害父王曰汝每有疾吾為焦心欲以身命救危代汝親之仁恩唯天為上汝懷何心忍為逆惡夫殺親者死入泰山故經云不孝之罪衆罪之上自應墮無間獄中受苦千萬億劫求出無期也二不敬三寶若有衆生出佛身血毀謗三寶不敬尊經亦當墮於無間地獄千萬億劫求出無期出佛身血如提婆達多推山壓佛金剛力士即耆闍山神名埤羅以金剛杵而遙擲之碎石迸來傷佛足指火車來迎生入地獄若世人焚燒經像擬同此罪毀謗三寶由無信故十輪經四云有剎帝利旃荼羅王宰官居士長者沙門婆羅門等隨惡友行善根微少諂曲愚癡懷聰明慢於三寶所無淳淨心不見不畏後世惡果自謂聰敏於我所説聲聞緣覺及大乘法毀呰誹謗不聽衆生受持讀誦下至一頌如是等人名為謗毀佛正法者挑壞無量衆生法眼是人不久便當肢體廢缺結舌不言受諸苦毒痛切難忍命終定生無間大獄不敬尊經者如事佛吉凶經云有人事佛不敬佛經持著弊篋衣服不淨之中或著妻子牀上不淨之處或持挂壁上無有座席恭敬之心與世間凡書無異阿難請戒律論云僧尼白衣等讀經律論行語手執翻卷者依忉利天歲數犯重突吉羅傍報二億歲墮麞鹿中恆被摺脊苦痛難忍無記戲言捉經律論亦招前報或安經像房堂簷前者依忉利天歲數八百歲犯重突吉羅傍報二億歲墮豬狗中若得人身一億歲作客捿屑不得自在故云亦當墮於無間地獄等三侵損淫污若有衆生侵損常住點污僧尼或伽藍內恣行淫欲或殺或害如是等輩當墮無間地獄千萬億劫求出無期常住者梵語僧祇此云四方僧物律鈔明四種常住一常住常住謂衆僧寺舍樹木田園僕畜等體局當處不通餘界但得受用不通分賣故重言常住二十方常住僧家供僧常食體通十方唯局本處此二名僧祇物三現前現前得施之物唯施此處現前僧四十方現前亡五衆物未羯磨從十方僧得罪已羯磨望現前僧得罪此二名現前僧物十輪經云若有四方僧物資生雜物等持戒破戒如是人等悉不與之命終已後皆墮阿鼻地獄點污僧尼點與玷同小黑也比丘尼式叉摩那沙彌尼乃佛姨母之裔貪欲之人不知罪福強行點污千佛出世不通懺悔梵名僧伽藍譯為衆園僧史略云為衆人園圃生植之所佛弟子則生植道芽聖果也四分云云何於清淨法中行不淨耶身壞命終墮三惡道餓鬼報應經一鬼問目連言我常男根瘡爛何罪所致答言汝為人時於塔廟處行淫今受華報果在地獄觀此惡可縱恣乎或殺害者或因淫欲致殺身害命或貪淫欲殺害生靈如唐洛州景德寺比丘尼任五娘死後其妹每聽靈座有呻吟聲因問之靈曰我在世在房非為好食肉殺害衆生又將活魚作鱠被殺衆生索命受刀劒地獄身上有折刀七枚痛入骨髓望妹將我生前戶資變賣求淨土寺寶獻大師寫金剛經七卷對佛懺悔妹依囑賣物寫經一卷抽去一刀經圓抽盡生靈各出善道五娘亦離地獄觀此可因淫欲而殺害乎下示報云云四破戒誑人若有衆生偽作沙門心非沙門破用常住欺誑白衣違背戒律種種造惡如是等輩當墮無間地獄千萬億劫求出無期沙門準瑜伽論有四一勝道沙門即佛等二説道沙門謂説正法者三活道沙門謂修諸善品者四污道沙門謂諸邪行者偽者詭詐也外現修行之狀內藏瑕穢之情即污道也下四句釋何以謂偽以破用常住物等故也此是律儀戒大論云是律儀戒能令諸惡不得自在以戒禁約之毗尼翻律律法也斷割重輕開遮持犯非法不定一切出家人之所依仗到涅槃之初因緣故佛告僧護比丘云持戒最為樂身不受諸惱睡眠得安隱寤則心歡喜今既違背則人天路絶地獄門開故云當入無間等然天人費氏云南方一洲雖多犯罪從善易調佛臨涅槃親受付囑並令守護不使魔撓若不守護如是破戒誰有行我之法教者雖見毀禁愍而護之見有一善萬過不咎事等忘瑕不存往失韋將軍三十二將之中最多弘護多有魔子魔女輕弄比丘道力微者並為惑亂將軍悽惶奔赴應機剪除以修童真行護正法故五偷常住物若有衆生偷竊常住財物米飲食衣服乃至一物不與取者當墮無間地獄千萬億劫求出無期偷竊皆盜也從涎古涎字從皿取鼠垂涎皿上之意謂不與取灼然不與取名劫潛盜不與取名盜物者資生之什物凡生天地間有貌象聲色者皆物也今夫財物僧之使用者米飲食僧之活命者衣服僧之遮體者或灼然劫取或潛行盜取其罪重矣觀佛三昧經云盜僧鬘物者過殺八萬四千父母華聚菩薩云五逆四重我亦能救盜僧物者我不能救蓋以隨盜一物即望十方凡聖隨境無邊還結無邊等罪微細尚可知數此罪不可測量故偏重也下示報如濟龍品諸龍自念過業於佛法中或為俗人或復聽法來往因緣所有信心捨施種種華果飲食共諸比丘依次而食及噉四方衆僧華果飲食等彼業因緣於地獄中經無量劫猛火燒煮飲洋銅吞鐵丸從地獄出墮畜生餓鬼惡業未盡生此龍中常受苦惱佛告諸龍此之惡業與盜佛物等無差別烏呼今之狂瀾滔滔尤甚其誰能砥柱乎二結顯墮苦地藏白言聖母若有衆生作如是罪當墮五無間地獄求暫停苦一念不得上來五種業總是十惡上品故地持經廣明十惡之業必墮地獄餓鬼畜生得生人中各有二種餘業之報一一惡各明五報云云故地藏菩薩答聖母言若閻浮提衆生作上來如是等罪者皆當墮無間獄千萬劫中求暫停酸楚之苦即一念極促之時胡可得乎大論引佛言我世世曾作小蟲惡人漸漸集諸善本得大智慧今自致作佛神力無量最上最大一切衆生亦可得爾云何空受勤苦而墮小處自應努力勤修各求出離也二重問無間獄名二初聖母問摩耶夫人重白地藏菩薩言云何名為無間地獄由上文多番説當墮無間地獄不審無間之名取何義而立耶二地藏釋二初總示諸獄地藏白言聖母諸有地獄在大鐵圍山之內其大地獄有一十八所次有五百名號各別次有千百名號亦別諸有通謂凡諸所有然的指二十五有因果不忘也法句經云所作善惡皆有因果經久不忘二十五有頌四洲四惡趣六欲并梵天四禪四空處無想五那含故下云不問男子女人乃至罪行業感悉同受之故二十五有凡所造罪即有地獄皆在鐵圍山內餘如前二別明無間三初正明業報二重示業感三廣説不盡初中二初正明二結示初又二初示獄城出名無間獄者其獄地周匝八萬餘里其城純鐵高一萬里城上火聚小有空缺其獄城中諸獄相連名號各別獨有一獄名曰無間準問地獄經閻羅王城之四面列諸地獄人命終時已捨死陰未及生陰乘中陰身入泥犁城梁言寄條城又言閉城未受罪之間共聚是處巧風所吹隨業輕重受大小身臭風所吹成就罪人粗醜之形香風所吹成就福人微細之體準此在城受苦者皆粗醜之形生人天者並微細之體諸獄相連即等活等七大獄及第八無間名八熱地獄各有眷屬等獄互相連貫也獨有一獄正示無間故俱舍論云以於其中受苦無間非如餘七大捺落迦受苦非恆故名無間故以獨有一獄點示之二明獄相顯報二初示相二顯報示相中二初示二結初又二初獄火相其獄周匝萬八千里獄墻高一千里悉是鐵為上火徹下下火徹上鐵蛇鐵狗吐火馳逐獄墻之上東西而走鐵名黑金性剛而冷表惡人殘忍性剛而心冷故感報處悉以鐵為火上下者起世經云以不善報故東方有大火聚出生南西北方四維上下各各如是從東壁出大火𦦨直射西壁到已而住西壁出火射北壁北壁出火射南壁從下於上自上於下縱橫相接上下交射故徹下徹上也鐵蛇鐵狗觀佛三昧海云鐵城二隔間有八萬四千鐵蟒大蛇吐毒火中身滿城內其蛇哮吼如天震雷雨大鐵丸四角有四大銅狗廣長四十由旬眼如掣電牙如劒樹齒如刀山舌如鐵刺一切身毛皆然猛火其煙臭惡既吐毒火復爭馳相逐於獄墻之上東西急走使諸罪人畏避無所二獄牀相獄中有牀遍滿萬里一人受罪自見其身遍臥滿牀千萬人受罪亦各自見身滿牀上如下鐵牀二結衆業所感獲報如是十輪經云有五逆罪為最極惡故心殺父母殺阿羅漢破壞聲聞和合僧事乃至惡心出佛身血是名五逆復有四種大罪同於四逆犯根本罪殺辟支佛是名殺生犯根本罪淫阿羅漢比丘尼是名邪淫犯根本罪若人捨財與佛法僧主掌此物而輒用之是名盜犯根本罪若人倒見破壞比丘僧是名破僧犯根本罪其人既犯逆罪又犯根本罪譬如鐵丸雖擲空中終不暫住速疾投地如是五逆犯四重禁及二種衆生毀壞正法誹謗賢聖如是等十一種人犯一一罪者身壞命終皆墮無間獄中豈非衆業所感而獲報如是耶二顯報三初標又諸罪人備受衆苦長阿含云其中罪人舉目所見但見惡色耳聞惡聲鼻聞臭氣舌嘗惡味身觸苦痛意念惡法彈指之頃無不苦時名無間地獄故罪人到彼無不備嬰衆苦也二釋二初夜叉惡鬼報苦千百夜叉及以惡鬼口牙如劒眼如電光手復銅爪拖拽罪人復有夜叉執大鐵戟中罪人身或中口鼻或中腹背拋空翻接或置牀上夜叉即鬼復言惡鬼者蓋比夜叉惡尤甚焉泥犁經名獸鬼五苦章句名阿旁牛頭人手兩腳牛蹄力壯排山持鋼鐵叉觀佛三昧經云獄卒八頭六十四角角頭火然化成刀輪在火焰間滿阿鼻城口牙等明相狀之惡銅爪等明身力之猛然由業力生此法善現大德云心常懷忿毒好集諸惡業見他苦生悅死作琰魔卒新婆沙問諸地獄卒為是有情數為是非情數耶答若以鐵鎖繫縛初生地獄往琰魔所者是有情數若以種種苦具於地獄中害有情者非有情數妙樂云有情非情並是共業所感而為心變此正楞嚴所謂觸報招引惡果神識自見牛頭獄卒馬頭羅剎手執鎗矟驅入無間也銅爪拖拽不足以苦罪人復以鐵戟刺身使受極痛之苦戟兵器也單枝為戈雙枝為戟戟格也旁有枝格也兩邊橫刃長六寸中刃長七寸半橫刃接柄處長四寸半並廣寸半今言大鐵戟則長大燒赤非世戟可比其所中處痛毒難忍又將罪人拋擲空中翻手接之置於鐵牀之上準楞嚴由於怨習交嫌發於銜恨二習相吞故有投擲擒捉擊射拋撮諸事循業發現也二鐵鷹蛇報苦復有鐵鷹啖罪人目復有鐵蛇繳罪人頸百肢節內悉下長釘拔舌耕犁抽腸銼斬洋銅灌口熱鐵纏身鷹鷙鳥也一名鷞鳩泥犁經云泥犁有鳥𭉨如鐵生啄人頭噉人腦毒痛不可忍鐵蛇如前觀佛三昧云此由愚癡衆生毀辱布施言施無報勸人藏積向國王大臣一切衆生説施無因亦無果報故感生此獄如冥報記唐曹州城武人方山開少好遊獵所殺無數貞觀十一年死經一宿穌云初死之時二人引上一山登梯至頂忽有一大白鷹鐵為觜爪飛來攫左頰而去又一黑鷹攫右肩而去二人即引南行至一城非常嶮峻二人扣城北門即開城中總是猛火門側有數箇毒蛇皆長十餘丈頭大如五斗塊口中吐火射人山開恐懼唯叩頭念佛門即自閉乃見官人欲遣受罪侍者諫曰未合即死但恐一入此城不可得出未若且放令修功德官人放之須臾即穌爪迹極深終身不滅後捨妻子出家以宅為佛院恆以讀誦為業然鷹蛇噉繳嬰苦劇矣下更衆苦競集逼切奚堪肢節悉下長釘者長阿含云鐵釘地獄獄卒撲之偃熱鐵上舒卷其身以釘釘手足周遍身體盡五百釘苦毒號吟猶不復死拔舌耕犁如後抽腸銼斬此是抽腸拔肺地獄所謂長叉拄肋肝心碓搗裂膽抽腸屠身膾肉銼之斬之形如虀粉此皆妄語所致及餘惡業所感洋銅灌口如下熱鐵纏身即鐵鎞地獄燒熱鐵鎞表裏洞徹纏裹其身內灌洋銅外裹熱鐵餘業未盡猶不死耳三結二初生死萬千萬死千生業感如是罪人在地獄中或被惡鬼燒煮斬斫而死或罪人手生鐵爪相摑肉墮而死或獄卒唱生或冷風吹活如是生死千萬靡窮故起世經云若人身口意選業作已入於惡道中經歷無數千億歲死已須臾還復活怨讐各各相報對由此衆生更相殺然其中受苦者隨其作業各有輕重經劫數等其最重處一日一夜八萬四千生死經劫無量作上品五逆十惡者感此道身二苦報億劫動經億劫求出無期此界壞時寄生他界他界次壞轉寄他方他方壞時展轉相寄此界成後還復而來動與靜對心體本靜人自動之起信云不知真如法一故動動則有苦果不離因故此業相初動漸至起惑造業受報字書云力重為動凡夫業力甚深故動成地獄億劫之壽起世經云佛言如憍薩羅國斛量胡滿二十斛高盛不槩有一丈夫滿百年已取一胡如是次第滿百年已復取一粒擲著餘處擲滿二十斛胡盡已我説其壽猶未畢盡如是二十額浮陀壽為一泥羅浮陀壽乃至二十波頭摩壽為一中劫此界下釋疑謂地獄既在閻浮洲下劫火壞初禪時地獄先壞罪人又藏何處釋曰火災起時罪業未滿者寄他界受之又疑它界亦有火起不審又置何處又釋儻它界以次而壞又轉寄它方不壞獄中又所寄處火災又起更何所寄復釋儻它方火災亦起仍前展轉寄不壞處復覆難云若此方世界既成所寄罪人還來此間不耶更釋此界既成自然還來大獄受苦此據罪未畢者説若長阿含云火災起時從他獄死皆生人中修第二禪從人中死皆生光音天水風二災亦然此據罪已畢者説故大品云是人毀呰三世諸佛一切智起破法業因緣故集無量百千萬億歲墮大地獄中從一大地獄至一大地獄若火劫起時至他方大地獄中如是遍十方獄乃至還來是間大地獄中從一大地獄至一大地獄故言動經億劫即欲求出恐恩赦之無期也二結示無間罪報其事如是如是二字情詞慘淡所以結指者冀人及早畏而修善也二重示業感二初標舉又五事業感故稱無間五無間業如前無間八熱獄之最下者依薩婆多部有八大地獄一等活二黑繩三衆合四叫喚五大叫喚六熱七衆熱八名無擇亦名無間一投苦火永無樂間既苦無間何所可擇此八地獄在閻浮洲下重纍而住依三法度論前二有主治次三少主治後三無主治新婆沙問何故最下大者名無間耶答彼處恆受苦受無喜樂間故名無間問餘地獄中豈有歌舞飲食受喜樂異熟間耶答餘地獄中雖無異氣喜樂而有等流喜樂如等活地獄中有時涼風所吹血肉還生有時唱言等活歘然還活如是血肉生時及還活時暫喜樂間苦受故不名無間也二徵釋二初徵何等為五二釋分五一時無間一者日夜受罪以至劫數無時間絶故稱無間受苦皆遍間無暫樂動轉不得纏縛甚嚴東西交過上下通徹如是經無量劫名時無間也二形無間二者一人亦滿多人亦滿故稱無間觀佛三昧經云復有衆生犯四重禁虗食信施誹謗邪見不識因果斷學般若毀十方佛偷僧祇物淫泆無道逼掠淨戒尼姊妹親戚造衆惡事此人罪報經八萬四千大劫復入東方十八隔中如前受苦南西北方亦復如是身滿阿鼻獄四肢復滿十八隔中地獄不大此身不小準正法念其身長大五百由旬造四逆人四百由旬乃至造一逆人一百由旬一人既爾多人亦然各見身形無間斷處名形無間也三苦無間三者罪器叉棒鷹蛇狼犬碓磨鋸鑿銼斫鑊湯鐵網鐵繩鐵驢鐵馬生革絡首熱鐵澆身飢吞鐵丸渴飲鐵汁從年竟劫數那由它苦楚相連更無間斷故稱無間此言苦具無物不備故泥犁翻苦具楞嚴云詐習交誘發於相調引起不住故有杻械枷鎖鞭杖檛棒諸事鷹蛇狼犬鐵驢鐵馬此由觸報招引如前如後碓磨鋸鑿此由枉習瞋習所感碓即搗碓地獄立世阿毗曇云是時獄卒謂其伴言我今共汝一彈指頃舂搗罪人即捉諸罪人內熱鐵艚中以熱鐵杵搗碎其身一彈指頃當人中五百年壽磨鋸銼斫俱如後罪業報應經信相菩薩白佛言今有受罪衆生為諸獄卒銼斫斬身從頭至足乃至其頂斬之已訖巧風吹活而復斬之何罪所致佛言以前世時坐不信三尊不孝父母屠兒魁膾斬截衆生故獲斯罪鑊湯如後鐵網獄中有七重鐵網羅覆其上獄卒取熱鐵網纏絡其身燒熱焦爛鐵繩長阿含云獄卒捉彼罪人撲熱鐵上以熱鐵繩拼之使直以熱鐵斧逐繩道斫罪人作百千段復以鐵繩拼鋸鋸之復縣熱鐵繩交橫無數驅迫罪人使行繩間惡風暴起吹諸鐵繩歷絡其身燒皮徹肉焦骨沸髓生革絡首長阿含云獄卒捉罪人剝取其皮纏罪人身著火車上輪碾熱地周回往反身體碎爛皮肉墮落既以生革絡首復以鐵汁澆身使令疾馳飢吞鐵丸等者準起世經云從五叉小地獄出詣向飢餓地獄中守獄者即問汝等何欲答言我等飢餓守獄者即便取地獄衆生撲著熾然熱鐵地上令其仰臥便以鐵鉗開張其口用熱鐵丸擲著口中唇口應時燒然次第燒舌燒齶乃至經過小腸向下而出其丸尚赤從飢餓地獄出詣向焦渴地獄中守獄者問言汝等今何所須答言我今甚渴即取撲著熱鐵地上在猛焰中仰而臥之便取鐵鉗開張其口融赤銅汁灌其口中唇口即便焦爛乃至燒腸燒胃直破小腸向下而出由往昔所造若人非人身中一切惡業於獄中次第而受毒痛不可忍泥犁中如是勤苦經那由他劫略無絲毫樂間名苦無間也四果無間四者不問男子女人羌胡夷狄老幼貴賤或龍或神或天或鬼罪行業感悉同受之故稱無間老者年高而衰也七十曰老制字根於愛親故從孝轉注以匕古化字既憂其衰又憂其且死愛日之誠能自已乎幼少而又少也血氣未充故從力於堯切小也從兩小而又小為意人生十年曰幼正父母愛憐時也貴尊而位高也賤貴之反也俱從貝者人所共寶也貴從中又從一在中間如人負荷形持中而負貝人所共尊故貴而高也若持戈爭貝人所共憎故賤而下矣龍鬼神本屬四趣墮獄無怪天亦墮者何大論云非有想非無想天中死墮阿鼻地獄中正法念經云帝釋復觀業果於殿中叫喚大地獄十八隔處殺生偷盜邪淫妄語業墮此地獄具受衆苦故不間乎天也成論問生天者離惡積善何故報盡即入三塗答凡夫無始已來惡業無窮一日貪瞋尚受千形況惡既多暫休結生報福既盡昔業時熟還墮三塗何所致惑涅槃云雖復得梵天之身乃至非想非非想天命終之後還墮三惡道中既果報不間名果無間也五命無間五者若墮此獄從初入時至百千劫一日一夜萬死萬生求一念間暫住不得除非業盡方得受生以此連綿故稱無間觀佛三昧經云地獄一日一夜受罪如閻浮提六十小劫如是一大劫此等罪人經八萬四千大劫長阿含經云久受苦已從無間出乃至寒冰地獄爾乃命終為重罪行生惡趣業故墮無間地獄受苦不可稱計準楞嚴由思報招引惡果結觸則為一日中萬死萬生於一切時無有須臾暫受安樂如彈指頃故云一念暫住不得業盡受生者乃遠約之辭準鐵城泥犁經從第一泥犁出乃至展轉入第八泥犁復從第八反入第七乃至第一阿鼻摩泥犁來遙見鐵城皆歡喜大呼萬歲閻羅即呼罪人前若非怨今汝去當復為人作子當孝順當事長年當畏帝王禁戒當承事沙門道人端心端口端身得阿羅漢者諸泥犁道皆為閉塞於是從泥犁出皆生善道故言業盡受生既從初以至業盡生死連綿故名命無間也三廣説不盡地藏菩薩白聖母言無間地獄粗説如是若廣説地獄罪器等名及諸苦事一劫之中求説不盡何故罪器等事一劫説之不盡由諸罪人在生惡心遍布晝夜相續致墮地獄循業發現自然罪器苦事多廣難盡也烏呼人更泥犁醜毒萬端各自思惟亦可為善矣二聖母禮退摩耶夫人聞已愁憂合掌頂禮而退此經家敘聖母聞退愁罪人受苦靡窮憂己力救援未逮合掌表自心不散頂禮謝地藏能宣且退本座以潛思猶冀後緣之載演二示業感差別先品題閻浮衆生業感品第四品題見綸貫第閻浮樹乃南洲樹王故載考之以備觀覺長阿含云所以名閻浮者下有金山高三十由旬由閻浮樹故名為閻浮金樹有五大柧音姑木四方為稜八稜三稜為柧四面四柧上有一柧果大如摩伽陀國一斛之甕摘其果時汁隨流出色白如乳味甘如蜜其東柧果乾闥婆所食其南柧者七國人所食一拘樓此云不正叫二拘羅婆云叫喚三毗提云不正體四善毗提云賢五漫陀云善賢六婆羅云牢七婆梨云勝西柧果海蟲所食北柧果禽獸所食上柧果星宿天所食觀佛三昧云閻浮提果無以為譬其形團圓滿半由旬婆羅門食即得仙道五通具足壽命一劫凡夫食之得四沙門果三明六通無不悉備立世阿毗曇云此樹生在閻浮提地北邊在泥民陀羅河南岸是樹株本正洲中央從樹株中央取東西角並一千由旬生長具足形容可愛枝葉相覆久住不雕次第相覆高百由旬下本洪直都無瘤節五十由旬方有枝條樹身徑刺廣五由旬圍十五由旬枝橫出五十由旬中間亘度一百由旬周圍三百由旬其果甘美無比其核如世間閻浮子大上有鳥獸之形根悉金沙所覆春雨不漏夏則不熱冬無風寒乾闥婆及藥叉神依樹而住然穢樹之名前已略釋今更解之立世云一人乘通欲行至閻浮提樹辭佛北行經過七山至第七金邊山登山頂向北聳身遠望惟見黑暗怖畏而返佛言此黑暗色即閻浮樹此取黑暗為穢又其果香氣能染人心發顛狂此取染污為穢長阿含云何緣月有黑影以閻浮樹影在於月中故月有影豈非月宮本自光明因樹故現黑影穢樹之名得非取此義乎準今兩處所釋則庶乎其不差矣故載詳出請證諸賢次品文二初地藏重述付囑二當機王問大願重述中二初大士述事二如來示意初又二初述二慰述中二初昔承佛力分化爾時地藏菩薩摩訶薩白佛言世尊我承佛如來威神力故遍百千萬億世界分是身形救拔一切業報衆生若非如來大慈力故即不能作如是變化聖母才問無間獄竟之時而地藏復重述者蓋前付囑事猶未盡而聖母即問獄報正針線貫攝今更復述俾義理錯綜世尊復示性識無定以致五道輪轉尤見前文業感無間義意連屬由此二品鉤鎖如環不可杜斷故於業緣之後業感之前重述以起下文也先正述佛力分身威即四無畏神即六神通力即十力佛十力之智內充故對外緣無恐廣起神通化度衆生此是諸佛法菩薩未得今亦能分身沙界皆如來慈力所與非己之能故曰我承等然分身救拔衆生是四攝中同事攝由菩薩法眼明見衆生根緣隨有同欣之者即分形散影普和其光同彼事業各使霑益因是生親愛心故能救拔業報下反顯己力難化如大論云諸菩薩修苦行事難辦難成故欲懈怠佛安慰言無得疲厭當勤精進行是十力當得無量果報故言若非如來大慈之力即不能作如是變化更移互換曰變無而歘有名化此是一切行禪中無記化化禪能現八種變化一能作小二能作大三能作輕四能作自在五能有主六能遠到七能動地八隨意所作亦名八自在我此由菩薩善住和敬之法與一切猶如水乳欲生物希有之心故現大神通力如化人所作化事本無有實故大品云一切法皆是化於是法中有聲聞辟支菩薩諸佛法變化有煩惱法變化有業因緣法變化若不生不滅無誑相涅槃是法非變化以一切平等故今言作變化者依生滅隨情説耳二今蒙佛囑度生我今又蒙佛付囑至阿逸多成佛已來六道衆生遣令度脫今字與無央數劫叫應阿逸多此云無能勝彌勒之姓淨名疏云有言阿逸多是名既不親見正文未可定執準下生經云時修梵摩即與子立字名曰彌勒則阿逸多是姓審矣二慰唯然世尊願不有慮唯𭙲速之辭今佛不喚何須速𭙲乃西域口辭也二如來示意二初生性無定二汝既畢是下汝願度罪初分三初法示爾時佛告地藏菩薩一切衆生未解脫者性識無定惡習結業善習結果為善為惡逐境而生輪轉五道暫無休息動經塵劫迷惑障難初句是付囑本解脫有二若云得阿羅漢者諸泥犁道皆為閉塞小乘解脫也若云我皆令入無餘涅槃而滅度之大乘解脫也性識下釋未脫之由以性識無定故無定者無堅住之定性四自侵經云學者猶豫心不專恆或進或退故使迷惑往來不絶是也惡習下釋所以習者熏習占察云衆生以無明癡暗熏習因緣現妄境界文由惡習熏則造殺盜等惡業則結三途惡果善習熏造施戒等善業則結人天善果惡因略果善果略因長阿含云彼天眼淨見諸衆生死此生彼從彼生此形色好醜善惡諸果尊卑貴賤隨所造業報應因緣皆悉知之此人身行惡口言惡意念惡誹謗賢聖信邪倒見身敗命終墮三惡道此人身行善口言善意念善不謗賢聖見正信行身壞命終生天人中以天眼淨見諸衆生隨所業緣往來五道此示由惑造業業是心思身口以心為主故經云諸法心為本諸法心為勝離心無諸法唯心身口名以依心故善惡業成結者惑業相資如巾挽結若欲解之必抽中心故忠國師云迷時結性成心悟時釋心成性得本之言也為善二句正明無定以善惡業皆逐境生善心生則種種善法生惡心生則種種惡法生故密嚴經云阿賴耶識從無始世來為戲論熏習諸業所繫輪回不已如海因風起諸識浪恆生恆滅不斷不常而諸衆生不自覺知隨於自識現衆境界蓋由真如不守自性隨染淨緣不合而合故輪轉五道也大論問經説有五道云何言六道答佛去久遠經法流傳五百年後部別不同或言五道於佛經回文説五或言六道於佛經回文説六今言五者如佛説五苦章句經云三界五道生死不絶凡有五苦一曰諸天苦二曰人道苦三曰畜生苦四曰餓鬼苦五曰地獄苦是也如是五道如汲井輪轆轤上下故言輪轉蓋善惡業相無能轉者於億千萬世隨逐不捨如債主隨人得因緣具足便與果報令五道中受生駛疾於箭故言暫無休息動經塵劫迷惑障難者迷惑指十使以十使中五利使屬見五鈍使屬思因此十使令人起見起思昏迷惑亂也障即三障難即八難由無始時來流轉生死不能斷漏得出世果致令十使煩惱能障四真諦理復造業障障出世法業成招苦報生八難經塵劫而難出矣故正法念云三界如輪轉業繫輪不斷是故捨愛欲離欲得涅槃各宜聞此而思修之矣二喻顯如魚遊網將是長流脫入暫出又復遭網魚譬五道網譬三界長流譬業果脫入等譬生死輪轉魚乃水族之動物正喻衆生性識無定群魚貪食而遭密網衆生因愛而入魔網日明菩薩經云又如密網衆魚投之刳腸俎几四自侵經云身若畫瓶內滿不淨不知內外身當歸盡常以彩色脂粉莊嚴自謂端正顏貌無雙斯等之人羅網所纏莫能觀身故大論云淫羅彌網人皆投身此由業感果以對苦諦將是長流將隨也是字指阿賴耶識以此識中善惡種子熏其現行令造善惡業果連綿不斷亦如魚隨長流去而不返故唯識云如瀑流水上下魚草等物隨流不捨此識亦爾與內習氣外觸等法恆相續轉阿賴耶識無始時來與作意觸受想思五心所恆常相應此由惑造業以對集諦光明文句亦以水對集以水體潤生如集能資苦長流者一業若成罪無邊際百千萬生受報不盡也脫入暫出從三塗而升出人天又復遭網從人天而復墮三塗故五苦章句云三惡道者是為一切衆生之家暫得為天暫得為人譬如作客作客日少歸家日多學者思之勉力精進可得脫苦正斯謂也三合明以是等輩吾當憂念佛言人身難得六情難具口辨難中才聰難致壽命難獲明人難遭直信難有大心難發經法難聞如來難值世間有樹名優曇鉢但有實無有華如來出世乃有華耳已得人身六情完具口辨才聰壽命延長遭值明人發菩薩心直信不還具聞法經遇如來世此皆宿行履福德人從明入明尋如來迹纍行不止會於道場無毀其根亡失前功一失道意動有劫數故如來憂之念之蓋佛觀大地衆生猶同一子憂其性識無定重結善惡業果念其暫出人天復遭三塗密網故我殷勤付囑救護解脫也二汝願度罪汝既畢是往願纍劫重誓廣度罪輩吾復何慮罪輩準上文通指五道吾所憂念者端為是輩汝既畢願度之吾復何憂何慮焉問諸天清升精修禪定七衆端肅恭秉律儀何亦名罪輩耶答天上亦有諸苦同是輕報泥犁又人中不學解者恆迷道法雖修諸善不除邪報故俱舍論云在家由取五塵故起鬬爭出家由取諸見故起鬬爭成論云若人持戒取為清淨名戒取結即謂所取以為真實餘皆妄語名見取結此二是出家人鬬爭根本又戒取是出家人縛諸欲是在家人縛是則戒取等唯是世善招生死果故名隨苦非真道法愚人多迷妄執生罪準此罪輩奚辭故知內教七衆有執俱非外道六師無著皆正若了諸法原空一真本寂入平等門遊無為舍一切無礙人一道出生死則罪輩之名何有於我哉二當機正問誓願二初自在問纍劫發何願二天王問何更立誓願初二初以地藏各發何願問説是語時會中有一菩薩摩訶薩名定自在王白佛言世尊地藏菩薩纍劫已來各發何願今蒙世尊殷勤讚歎唯願世尊略而説之初敘名定自在王者此大士人中之龍世間有愛皆遠離之繫縛解脫諸漏已盡那伽常在定無有不定時於定自在名定自在王白佛下正問適聞世尊謂地藏菩薩畢是往願纍劫重誓不審於纍劫中各發何願今蒙世尊於大會中詞不置口而讚歎耶唯願下請説纍劫之願願略舉之佛説法有廣略二門今請略説也二約衆生業感發心答二初誡聽許説爾時世尊告定自在王菩薩諦聽諦聽善思念之吾當為汝分別解説誡以諦聽善思者佛法洪深願門廣大唯信力能受大論云專視聽法如渴飲一心入於語義中踊躍聞法心悲喜如是之人應為説以諦聽善思能成三慧也下許説一切諸法本不可説不生不滅法如涅槃今以因緣故為分別而解説之二騰昔願事二初正明昔願利益二定自在王下結顯神力通經初二初述昔誓願二示今利益述願中二初小國王所發願二復於過去下光目女所發願初分三初述王佛劫號乃往過去無量阿僧祇那由他不可説劫爾時有佛號一切智成就如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其佛壽命六萬劫初敘劫久遠爾時下舉佛名號號古從口從丂音考若加虎音毫虎之怒聲又大呼也號咷也今古積訛殊難改矣梵名薩婆若多般舟名薩雲秦言一切智相以一心中得三智故既得如實智慧成就則乘此來成正覺故名一切智成就如來應受諸天世人最上供養名應供正名諸法不動不壞遍名不為一法二法以悉知一切法無餘不盡名正遍知明謂三明如後行者菩薩從初發意乃至金剛三昧身業口業清淨隨意行名明行足如先佛所去處佛亦如是去第一上升永不復還名善逝解即是知知世間衆生界一切種煩惱及清淨名世間解諸法中涅槃無上衆生中佛為無上以無所斷名無上士佛能調伏衆生善護根門長阿含云善御六觸護持調伏猶如平地駕四馬車善調御者執鞭持控使不失轍若云調女人則不尊重故名調御丈夫佛度餘道衆生少度人天衆生多故名天人師一切智慧成就知衆生非衆生數常無常等法故名佛具上十號世所共尊故名世尊壽命六萬劫清淨國土勝應之佛壽歟然約時數劫有四種一別劫二成劫三壞劫四大劫若更舒之別有六劫一別二成三住四壞五空六大若更束之則有三劫一小二中三大從人壽十歲漸至八萬歲經多時八萬歲又漸減至十歲為一別劫對總名別即增減劫小即別劫中則成壞隨一大則總成與壞合八十別劫為一大劫今云六萬劫應例同極樂佛壽長遠不當依此土三劫定判然唯佛與佛乃能知之耳二騰昔王願事二初敘二王友善未出家時為小國王與一鄰國王為友同行十善饒益衆生賢愚經云若聽人民若自己身出家入道功德無量非譬為比高於須彌深於巨海廣於虗空由出家故畢成佛道大師明四種出家一形心俱不出二形出心不出三形不出心出觀行出家四形心俱出能見佛性出二死家方真出家昔王正第四人故能成佛㕛者合志也志合則交相助益故取上下二又以見協力之意同行二句正釋㕛道志同道同也十善十惡之反凡四輪王俱以十善化民成俗以十善乃生天之本今小王同行十善均有普慈之心矣事佛吉凶經云十惡怨家十善厚㕛安神得道皆從善生有能守信福報自然從善至善非神授與故頒宣法教示現人民為作福田信者得植後生無憂如是饒益黎民不失仁王之化矣二述二王發願二初出願本其鄰國內所有人民多造衆惡二王議計廣設方便人民國之本也民衆生也天地生人之初其外朴野其中真純人各全一混沌開天之天是為天民開而之人凡民也已故曰人民衆惡即具造十惡業大與十善反也事佛吉凶經云既不燒香然燈禮拜恆懷狐疑瞋恚罵詈惡口嫉賢又不六齋殺生趣手不敬佛經若疾病者便呼巫師卜問解奏祠祀邪神此從宿行惡道中來現世罪人死入泥犁被拷掠治酷不可言皆由積惡其行不善故二王商議計校畢竟如何廣設方宜便巧之法救此衆惡之民不失君師之化也哉二正發願二初一王自先成佛二一王先度衆生原作二科今合釋者取文便也一王發願早成佛道當度是輩令使無餘一王發願若不先度罪苦令是安樂得至菩提我終未願成佛大論云成就衆生有二種有先自成功德然後度衆生者有先成就衆生後自成功德者正二王發願之旨以成佛乃度生根本能廣化道故願成佛故經言一人出世多人蒙慶福樂饒益佛世尊也故先自成方能度是惡輩皆入滅度使無遺餘此正初發心時便成正覺一王作念自未得度先度衆生方是菩薩發心豈應先為己耶如大論云佛説我以清淨天眼見諸衆生死此生彼隨善惡業受諸果報我今應先度脫罪輩令其得無上涅槃之樂寧使長在生死誓終未願成佛此正發僧那於始心終大悲於赴難故二王發願似有不同也三結二王今古佛告定自在王一王發願早成佛者即一切智成就如來是一王發願永度罪苦衆生未願成佛者即地藏菩薩是人王發願成道如執券取物故云法性如大海不説有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌驗此國王其洵然矣然塵沙劫事宛如今日者乃是佛眼無法不知無事不見也二光目女所發願二初述佛號劫壽復於過去無量阿僧祇劫有佛出世名清淨蓮華目如來其佛壽命四十劫佛出世者以今釋迦例同古佛如因果經云菩薩功行滿足位登十地在一生補處生兜率天期運將至當下作佛即觀五事一觀生熟與未熟二觀時至與未至三觀何國處中四觀何族貴盛五觀過去因緣誰為父母觀已下生以今揆古亦猶然耳清淨蓮華目三十二相之一如寶女問佛如來有三十二大人之相前世宿命行何功德而致是相遍布於體佛云如來瞳子如紺青色大人相者乃往古世常以慈目察衆人故如來之眼如月初生大人相者乃往古世無粗暴志心性和順故彼佛即以所得之相以立其名所謂面如淨滿月目若青蓮華蓋報佛稱為淨滿諸惡都盡衆德悉圓故得天然妙目如清淨蓮華也二騰羅漢度生二初敘昔願事二結會古今敘事中二初罪母墮苦二孝女發願初又二初舉能度羅漢像法之中有一羅漢福度衆生像法居正末二法之間乃塔寺堅固之時以惟修有為福事乃下文塑畫形像之伏案也羅漢因名乞士果成應供一切法高王經云四行四得八富伽羅應受世間天人供養合掌恭敬無上福田故長阿含堅固念轉輪王告太子云汝土境所有沙門履行清貞功德具足獨到涅槃仁惠無厭衣食知足持鉢乞食以福衆生故言福度衆生二述所遇孝女三初出名因次教化遇一女人字曰光目設食供養如來既已滅度羅漢次第教人化惡為善革凡成聖字言光目者準靈樞經五藏六府之精氣皆上注於目而為之精睛同精之窠為眼骨之精為瞳子筋之精為黑眼蓋目形類丸瞳神居中而前如日月之麗東南而晦西北也然目能發光者以藏府之精皆秉受脾土脾為諸陰之首目乃血氣之宗故脾虗則五藏精氣皆失所司不能歸明於目矣今聖女既能孝順二親恭敬三寶自然有神膏神水神光真氣真血真精滋目之液光發異常若約法論目表定光表慧因定發慧慧光注目立此嘉稱也設食供養食乃衆生之外命人持飯食施人有五功德令得道一施命二施色三施力四施安五施辨是為五福若施羅漢福百倍矣如那律昔以一飯施辟支佛遂感九十一劫無貧之報又得道果故須供養也二問願羅漢問之欲願何等佛世應供常儀食竟必問所願如迦葉問貧母言母今意中所願何等世間豪富轉輪聖王及四天王釋梵諸天若復欲得須陀洹果乃至三佛者悉可得果其願是也三白事二初孝女陳事光目答言我以母亡之日資福救拔未知我母生處何趣亡者去也不存也從入從隱音隱謂入於隱處也然母亡資福乃孝子正事父母生我身依斯乳哺長大成人此恩此德歷劫難酬涅槃經云知恩者大悲之本不知恩者甚於畜生今光目女欲知母託生之處可謂知恩得本越度恆情矣二羅漢入定二初述定中見母羅漢愍之為入定觀見光目女母墮在惡趣受極大苦愍其為孝倍常故為入定觀母見字屬上句末顯能觀之慧眼女母乃所觀之苦境此準大師釋法華我以佛眼觀見六道衆生偈擘見字屬上科云明佛有能見眼六道衆生明所見五濁彼經五字伽陀尚擘下字屬上況今一連之文寧不作此讀耶不然即以觀見二字為下句首尤通以智境合明也極大苦者無間大地獄也問準大論慧眼不見衆生盡滅一異相不受一切法慧眼不能度衆生無所分別故生法眼今羅漢慧眼了知空寂如何能見其母受苦耶答慧眼知空謂於境不著豈如生盲全無所見耶故大品云慧眼菩薩無法不見無法不知無法不識是為慧眼淨明文可據也況乃因次教化已有菩薩出假之意蓋阿羅漢既與別教十行同除四住自能進斷界內塵沙故四明云亦有法緣慈悲隨世利物也二述出定問答二初問行業羅漢問光目言汝母在生作何行業今在惡趣受極大苦作者造作如佛所説三界五道罪垢苦惱不離於作一切無橫非天授與乃自作而自受也行以遷流為義五陰中心所法因過去無明之惑起於三業造作諸法名為行業業成報現故在惡趣受極大之苦也二答所習二初述事求救光目答言我母所習惟好食噉魚鱉之肉所食魚鱉多食其子或炒或煮恣情食噉計其命數千萬復倍尊者慈愍如何哀救所習指習性習氣惡習種子內熏現行轉習於惡矣下明作業惟之為言獨也好者愛而不釋也女子性柔而滯有所好則愛而不釋今光目之母獨好食噉魚鱉之子而情有所不能釋也埤雅云鱉以眼聽穹脊連脅甲蟲也一名神守鱉滿三百六十龍為引飛出水內鱉則不去古今注名河伯從事會稽陶歇菴放生詩有從事愁見拘波臣苦遭蕩之句詩云炮鱉鮮魚謂鮮魚中鱠者也炮鱉膾鯉言熟則有炮鱉腥則有鱠鯉也光目之母習好於斯乎此明殺生下明食法惟好魚鱉之子炒煮恣食則令子母俱亡然母命是一子之命不知其幾幾矣自有家至死習以為常所殺母子之命非可計算故云千萬復倍此乃博求衆命以資一膳不惟忍心亦且損福東坡云刀𠠪音彎削也魚鱉以為饈膳食者甚美死者甚苦周顒云性命之於彼極切滋味之在我可賖此皆仁人痛怛之詞也情者天真感物發動性之欲也人欲不可謂之情氣質妄動則遁天倍情人常拘檢猶恐放之儻一縱恣不可遏絶矣故傅大士云獨自情其實離聲名推檢四運并無生荊棘叢林何處生可謂善制妄情而循天真也已尊者下求慈救謂我母既業深罪重受此大苦今懇尊者慈悲憐愍畢竟如何哀矜而救拔之二方便度脫三初念佛塑像羅漢愍之為作方便勸光目言汝可志誠念清淨蓮華目如來兼塑畫形像存亡獲報念佛塑像即哀救之法心所主持曰志從心從止像深沉堅定之意實德曰誠性命之根天得之以成天地得之以成地人得之而自成不誠是為自壞折却性命之根崩陷吾天地也從成立意直指人真心復從言者以散吾之誠莫如言之漏泄天元修詞立誠無事不實發於言行皆吾誠之運致一之功也念清淨蓮華目如來者正所以吐邪倒之根拔貪瞋之本修念佛之因證見佛之果故佛告比丘我滅度後若稱我名所獲福德無量無邊故教令稱本師佛名也塑畫形像埏土象物曰塑繪施五彩曰畫如優填王問佛言若佛滅後其有衆生作佛形像當得何福佛告王曰若當有人作佛形像功德無量不可稱計世世所生不墮惡道天上人中受福快樂乃至作大梵王端正無比後皆得生無量壽佛國作大菩薩最尊第一當得成佛入泥洹道今故勸行二事令存亡獲報也二畫像供禮光目聞已即捨所愛尋畫佛像而供養之復恭敬心悲泣瞻禮畫像供養人所易行即捨所愛人所難作今既捨愛畫像恭敬泣禮藉佛救母以道報親純孝之心照耀千古矣三夜夢見佛二初孝女見佛告語二罪母托生婢家初又二初女見勝相忽於夜後夢見佛身金色晃曜如須彌山放大光明夜夢佛身者雜寶藏經云佛法寬廣濟度無涯至心求道無不獲果乃至戲笑福不唐捐故孝女捨愛畫像悲泣瞻禮佛即現身復放光明至人應感慈赴物機色相光明夢慰悲懇準善見律夢有四種一四大不和夢見山崩飛空虎狼賊逐等二先見夢晝見黑白男女夜剋夢見三天人夢天人現善惡夢令人得善惡事四想夢前身或有福罪障今現善惡夢前二不實後二真實今是後二夢也出生菩提心經云若有夢見佛形像諸相具足莊嚴身衆生見者應歡喜念當必作調御師今光目所夢豈非純以出世大孝感格第一義天致斯瑞應耶金色等者大須彌東面及小須彌七山純是黃金佛身晃曜亦如彼山更放光明色相愈妙矣二佛告生處而告光目汝母不久當生汝家才覺飢寒即當言説夢佛身放光告母生處絶奇之事矣生汝家慰其生處即言説潛示求救也二罪母托生婢家二初生後求救其後家內婢生一子未滿三日而乃言説稽首悲泣告於光目生死業緣果報自受吾是汝母久處暗冥自別汝來纍墮大地獄蒙汝福力方得受生為下賤人又復短命壽年十三更落惡道汝有何計令吾脫免文分三節初述敘生緣生死下述訴苦境蒙汝下述謝求救婢子者奴婦所生之子也梵名馱索迦此云奴説文云男入罪曰奴女入罪曰婢婢女之卑者長阿含云生子墮地能言故名聲王如今初生有能言者人皆怖畏名為可畏今小兒生三日即稽首泣告亦事之變怪也佛力使之令不昧宿緣耳生死二句情理慘淡昔賢云死生亦大矣豈不痛哉業緣十惡之因果報三塗之處十地論云殺得三果一異熟果謂三惡道二等流果謂生人中多病短命三增上果謂感外物皆少光澤不久住故樹提經云何物最穢濁生死最穢濁何物落地獄十惡落地獄自作自受無代受者經云作是得是皆行所致無橫與者其事明白故總傷歎之久處暗冥者五苦章句經云但坐慳貪食故墮黑繩城鐵圍兩山間窈窈何冥冥神識墮其中不覩日月精展轉不相見但聞叫呼聲是也自別等者自從也無常偈云親知咸棄捨任彼繩牽去將至琰魔王隨業而受報惡業墮泥犁造業苦切身故從一大地獄至一大地獄矣蒙汝下先敘福力脫過去罪後方求救脫將來苦福力即稱名塑像脫獄受生下賤短命重業輕報更落惡道餘殃未盡也梵名薩拘盧楴此云賣姓即下賤人四人出現經云或有人生卑賤家及餘貧賤家無有飲食雖復得食臭穢難嘗生如此家彼身口意行惡故也短命者世壽有三品下方六十中方八十上方百二十今下壽猶減非短命而何命者準大集歌羅邏時即有三事一命二暖三識出入息者名之為命此識之種即是命根依心假立命為能依心為所依今既生下賤又復短命更落惡道三果備集豈不苦哉故即求計脫免也二審問業行二初正問本罪二轉徵獄報初又二初以作何行業徵光目聞説知母無疑哽咽悲啼而白婢子既是我母合知本罪作何行業墮於惡道先敘事既聞上説事實情真審知是母無待更疑故聲塞而哽咽號泣而悲啼也既是下徵問既説文訓已已是我母合知本所造罪矣載審問者恐詿訛耳二以殺罵受報答婢子答言以殺害毀罵二業受報若非蒙福救拔吾難以是業故未合解脫先直答本業受報惟以殺生毀罵身口二業致斯地獄之報故賢愚經蘇曼女告諸子曰殺生之罪當入地獄受諸苦惱數千萬歲常為鹿頭兔頭諸禽獸頭阿傍獄卒之所獵射無央數歲雖思解脫其何由乎荀子云與人善言暖於布帛傷人之言深於矛戟況毀罵乎故成論云若人惡口種種罵詈隨語受報故此二業僉報地獄若非下反顯福救解脫殺生居衆罪之上毀罵在萬惡之先若非我女蒙羅漢指示稱名塑像福利以救拔吾難則吾殺罵二業之報何有解脫之期二轉徵獄報光目問言地獄罪報其事云何婢子答言罪苦之事不忍稱説百千歲中卒白難竟初光目問次婢子答不忍者甚言不能出諸口耳即欲説之亦不能形容一二卒盡也竟終也縱於百千歲中盡白罪苦之事恐難終窮也二孝女發願二初光目聞苦為母發願分二初泣向空界陳母苦報又二初願脫現生報光目聞已啼淚號泣而白空界願我之母永脫地獄畢十三歲更無重罪及歷惡道號大哭也內心痛裂外哭號咷哭久吞聲名之為泣含悲白空界云願我故母永脫地獄畢此一十三齡之短銷其一十八獄之長更不載歷惡道受苦無量也二願脫後生報十方諸佛慈哀愍我聽我為母所發廣大誓願若得我母永離三塗及斯下賤乃至女人之身永劫不受者求十方現命現住河沙世界諸佛者一顯誓心廣大二懇現佛慈哀三塗下賤如心地觀云或有以貪多財而為恐怖自己財寶恆求積聚而不受用何況能施貧乏衆生於己財寶深生貪著於他財寶欲令損減以是因緣命終之後墮大地獄受無量苦如是苦報名為第一正感之果從地獄出受畜生身身常勞苦水草不足經多時中酬損他財如是衆生名為第二正感之果受是罪已生餓鬼中因飢渴苦無量千劫不聞漿水飲食之名其咽如針其腹如山縱得飲食隨變為火如是苦身名為第三正感之果畢是罪已來生人間貧窮下賤為它所使於諸財寶所求難得於一切時而不自在如是餘報名相似果與今正合者字牒上諸事謂若得脫我母現身生後之報我即對佛發廣大度生之願矣二願對本佛發我誓心願我自今日後對清淨蓮華目如來像前却後百千萬億劫中應有世界所有地獄及三惡道諸罪苦衆生誓願救拔令離地獄惡趣畜生餓鬼等如是罪報等人盡成佛竟我然後方成正覺自今日後標始心也蓋萬里之剋離初步而不登三祇之功非始心而罔就故舊婆沙云若離初心則不成無上道一切功德皆在初心故知此經明地藏發心前後四番後却是前今是最初故曰自今對佛像前所依之主也千百億劫所歷之時也應有世界括盡依土也地獄等者苦衆皆度也如是下正顯度盡衆生然後自成正覺番番發願莫不皆然故知最初發心功德億劫稱揚不盡者矣二空佛感孝讚願告生二初印證前願發是願已具聞清淨蓮華目如來而告之曰光目汝大慈愍善能為母發如是大願具俱也足也備聞其言也大慈愍遍緣法界也善能為母發願者讚其發心黠慧若但為母發心何善何能乃以曠濟之心求畢母罪譬如大水而滅小火豈有不滅者乎故讚其既善且能也二告轉後報二初轉現為梵志二轉後成佛果今二科合釋者由文斷而意聯也吾觀汝母十三歲畢捨此報已生為梵志壽年百歲過是報後當生無憂國土壽命不可計劫後成佛果廣度人天數如恆河沙離下賤家生淨行種易短命子為長壽仙此孝女念佛塑像發心之力也梵志正翻淨裔是淨梵苗裔承習梵天法自云從梵天口生故獨取梵名唯五天竺有餘國即無長阿含稱為婆羅門一子求佛發心其母三報俱轉初生下賤以轉前報次生梵志以轉現報後成佛果以轉後報無憂國土即指極樂轉憂為樂也蓋初生地獄以燒煮為憂次生婢家以下賤為憂畢十三歲以更墮惡道為憂後生梵志以邪行自大為憂今諸憂並息故生無憂國土彼佛人民壽命無量無邊阿僧祇故云壽命不可計劫廣度人天者昔為罪母乃地獄所度之死囚將作如來乃人天能化之大覺發心塑像功莫與京故一切法高王經佛告舍利弗初發菩提之心菩薩摩訶薩即發心日已是一切聲聞緣覺衆生福田一切衆生皆於菩薩中生菩薩所化故其所化之衆如恆沙之多也二結會古今佛告定自在王爾時羅漢福度光目者即無盡意菩薩是光目母者即解脫菩薩是光目女者即地藏菩薩是昔成小果今作大人回小向大也無盡意廣如別行疏明今準記云願行皆無盡故皆無作故得無盡名皆即法界皆含一切佛法故解脫菩薩者昔墮鐵城備經辛苦次生婢家又復短命後為梵志終墮邪流今展轉而為不思議大解脫士佛果可期矣然光目由羅漢之指示女母因光目而超升今於我佛垂化將終上升忉利之候能所畢至子母俱來敻隔沙劫一會儼然打鼓弄琵琶還來共一家其斯之謂歟二示今利益二初結指大願此節似結上文今作下科首者乃結其大願而指示之正為未來造惡衆生歸供脫苦之張本立科針線之妙後賢不可不知過去久遠劫中如是慈愍發恆河沙願廣度衆生發心之始付囑之後劫數長遠胡可籌量如是慈愍句略結上來四番廣指恆沙劫願妙玄引大經云若有人問誰是一切諸善根本當言慈是慈若不具佛十力四無所畏三十二相者是聲聞慈若具足者是如來慈即大法聚即大涅槃慈力弘深具一切福德莊嚴今地藏菩薩以大涅槃心修於聖行得無畏地具二十五王三昧無方大用是真梵行故才言慈愍功德具足矣二讚勸歸敬二初惡者歸敬脫報未來世中若有男子女人不行善者行惡者乃至不信因果者邪淫妄語者兩舌惡口者毀謗大乘者如是諸業衆生必墮惡趣若遇善知識勸令一彈指間歸依地藏菩薩是諸衆生即得解脫三惡道報文初分列惡衆若遇下歸依轉報善惡二法意內生成譬之水火異途施化故經言善業應修惡行應離善福追人如影逐形不可得離罪福之事亦皆如是勿作狐疑自墮惡道罪福分明諦信不迷所在長安佛語至誠終不欺人不信因果者即一闡提如弊宿婆羅門常懷異見言無他世亦無更生無善惡報常為人言沙門異見言殺生乃至邪見者身壞命終皆入地獄言不殺生乃至不邪見者身壞命終皆生天上初未曾見死者還來説所墮處故我不信有後世及善惡報此蓋不了業報差殊故揚撥無因果之談乃至者惡事多端非一二可槩但不信罪重故特點出邪淫者身三惡端也非謂干犯外色為邪但一起心則淫泆失正良由世人不知舉身不淨妄著妖艷乖梵天道障菩提業為四生因成三塗果潤業偏重故聖制居首妄語者虗妄不實也準正法念妄語惱人失實功德常如黑暗有命同死語刀自割其舌勝於炎火毒蛇命終墮獄口出膿血等兩舌者一口説兩般話似有兩箇舌頭經云太喜多言語增貪令他畏口過自誇誕兩舌第一處惡口者粗惡罵詈人等法句經云雖為沙門不攝身口粗言惡説多所中傷衆所不愛智者不惜身死神去輪轉三塗自死自生苦惱無量諸佛聖賢所不愛惜假令身雖無過不慎口業亦墮惡道大論説一鬼頭似豬頭臭蟲從口出身有金色光明是鬼宿世作比丘惡言罵詈客比丘身持淨戒故有光明口有惡言故臭蟲從口出故增一云寧以利劒截割其舌不以惡言粗語墮三惡道毀謗大乘如前如後如是諸業衆生是總結不行善等必墮惡趣結成罪處若遇善知識去明解脫若者不定之辭惡中儻有毫善或能遇之不則難遇矣文句云或言知祗是識或言聞名為知見形為識今教一彈指頃歸依地藏菩薩是真善知識以即得脫三惡報故也準僧祇律二十念為一瞬二十瞬名一彈指依新婆沙壯士彈指頃經六十四剎那然歸依祗一彈指而惡道千生解脫歸依之力莫可涯量故勸之也二志心奉事受福若能志心歸敬及瞻禮讚歎香華衣服種種珍寶或復飲食如是奉事者未來百千萬億劫中常在諸天受勝妙樂若天福盡下生人間猶百千劫常為帝王能憶宿命因果本末先明供養初句總標志心等如文香華準密部説香是能悅懌三昧以此供養即得如來無礙之智華是寶莊嚴三昧以此供養速得如來四八妙相梵語震越此翻衣服衣依也所以庇寒暑遮醜陋也種種珍寶故佛地論有無量七寶之説飲食半者蒲善尼唐言五噉食謂飯餅等此名正食自辰至午隨意噉之過中不得食矣半者珂但尼此云五嚼食謂根莖葉華果等此名不正食齋後不食果菜是也如是奉事句結上供養而牒定之未來下示福報正明生天受福若天下顯有餘福如百緣經採華人供佛因緣命終生忉利天又栴檀香比丘生時身諸毛孔出栴檀香口出優鉢華香此由以栴檀香供養毗婆尸佛塔故德象天地稱帝仁義所生稱王如此方五帝三王也憶宿命等得宿命智如阿摩經佛言彼以心定清淨無穢柔軟調伏便能憶識宿命無數若干種事能憶一生至無數生劫數成敗死此生彼名姓種族飲食好惡壽命長短所受苦樂形色相貌皆悉憶識文故雖從天下降而為帝王了了憶識百千劫前初由瞻禮地藏之因感生天上之果最初生天之本及今為王之末無不憶識而洞知也譬如有人從己村落至他國邑在於彼處行住語默復從彼國至於餘國如是展轉更還本土不勞心力盡能憶識所行諸國從此到彼從彼到此行住語默皆悉憶之是則地藏威神之力可思議乎哉明利益竟二結顯神力通經二初如來結顯定自在王如是地藏菩薩有如此不可思議大威神力廣利衆生汝等諸菩薩當記是經廣宣流布如是句結能度人有如句顯所施用如此不思議人法之經可不記之心胸而廣宣流布哉二當機承命二初慰佛通經定自在王白佛言世尊願不有慮我等千萬億菩薩摩訶薩必能承佛威神廣演是經於閻浮提利益衆生佛法應流沙界利益不局閻浮但南洲之人性識無定惡業偏多故煩佛菩薩等偏向贍部洲也二白已敬退定自在王菩薩白世尊已合掌恭敬作禮而退如文定自在王問答竟二天王問何更立誓願三初天王躡前疑問分三初經家敘儀爾時四方天王俱從座起合掌恭敬擁護四洲地面防邏惡鬼侵凌故云四方天王準世記經須彌山王四出埵高四萬二千由旬四天大王所居宮殿有七重寶城欄楯羅網行樹寶鈴各有七重無數衆鳥相和而鳴東方黃金埵王名提頭賴吒此翻持國護持國土故領乾闥婆此云尋香行天帝俗樂神富單那此云臭餓鬼中勝者主熱病南方琉璃埵王名毗留勒叉此翻增長令自它善根增長故領鳩槃荼此翻甕形是厭寐鬼薜荔多此云祖父鬼餓鬼最劣者西方白銀埵王名毗留博叉此翻雜語能作種種語故領毗舍闍此云噉精氣鬼亦云顛狂鬼毒龍眼毒聲毒氣毒觸毒北方水精埵王名毗沙門此翻多聞福德之名聞四方故領夜叉此云輕捷飛空疾捷故羅剎此云可畏亦名暴惡四王各有九十一子皆字因陀羅有大神力然此四天毗沙門為尊若王念及三方天王即嚴駕詣毗沙門天王於一面立故北方天王統領三方從座而起欽承法要渴仰在心故合掌恭敬也二天王述疑白佛言世尊地藏菩薩於久遠劫來發如是大願云何至今猶度未絶更發廣大誓言因聞四番弘誓躡前起疑而問也蓋謂大士既於久遠劫來發是大願自應度盡衆生已今既不盡而重發者為願力有未至耶果衆生之難度耶故曰云何三願佛為説唯願世尊為我等説為我等説者事有相關也以我等正護四方而南洲偏多惡業彼雖負大士救拔之心我亦抱護持世界之失故願説之出我等於疑城慰衆生於未來也二如來為後答釋三初讚許佛告四天王善哉善哉吾今為汝及未來現在天人衆等廣利益故説地藏菩薩於娑婆世界閻浮提內生死道中慈哀救拔度脫一切罪苦衆生方便之事雙讚天王者一以善巧發問一以善護世間言娑婆則包括大千舉閻浮則偏向南洲也生死道中者以六道皆有生老病死今以生該老以死攝病故説前後以略中間升沉互換苦樂相通生死循環曾無休息故地藏菩薩以無緣大慈救濟拯拔罪苦衆生者佛言一切衆生常在長獄十二重城圍之三重棘籬籬之六拔刀賊伺之能於其中得脫出者甚難甚難長獄謂三界十二重城謂十二因緣三重棘籬謂三毒也今地藏因是衆生方便度脫令其解三界空不習三有則度脫三界知十二因緣起滅能度癡本則出十二重城知淫怒癡三垢無纏意不復著則拔三重棘籬曉了六情皆無本末則離六拔刀賊此皆大士曲垂方便度脫之事也二願聞四天王言唯然世尊願樂欲聞華嚴解脫月菩薩云相視咸恭敬一心悉專仰如蜂念好蜜如渴思甘露今亦如是故言願樂欲聞三正告二初略示重發願意佛告四天王地藏菩薩久遠劫來迄至於今度脫衆生猶未畢願慈愍此世罪苦衆生復觀未來無量劫中因蔓不斷以是之故又發重願初述前慈願次示重發意慈愍此世等阿難分別經云佛恩非不大罪由衆生故世濁多惡人還自墮顛倒自作衆罪本命盡往無擇刀劒解身形洋銅沃其口遭逢衆厄難毒痛不可言若生還為人下賤貧窮中故大士慈愍而度脫也復觀未來等如經云傷生杌命其罪莫大怨對相報無有斷絶現世不安數逢災凶死入地獄出離人形當墮畜生為人屠割以肉供人未有竟時世世為怨還相報償神同形異罪深如是既由業緣展轉相因譬如葛藟音壘纍於樛音鳩木縈牽不斷蔓葛屬如葛蔓延左傳云無使滋蔓蔓難圖也今業纍繫身直如葛之覃延於中谷唯見其葉之萋萋何有斷絶哉此由惑滋業由業潤生生還造業業復墮苦以是之故復勞地藏大士又發極重之願亦如葛之覃兮施音異移也中谷而莫莫也二廣明隨機説法二初明大士度脫二勸天王擁護初又二初總示方便如是菩薩於娑婆世界閻浮提中百千萬億方便而為教化化光通被應遍及於娑婆悲願弘宣却偏流於贍部妙玄云菩薩三業無非利物今但云示身説法不云意者用彼二業不差物機即意之善巧故今以方便該身意二輪現通鑑機下句正口輪説法也百千萬億者期心業用不同施化方便各別如大論十七云法身菩薩變化無量身為衆生説法而菩薩心無所分別如阿修羅琴常自出聲隨意而作無人憚者無散心無攝心福德報生故隨人意出聲法身菩薩亦如是無所分別亦無散心亦無説法相是無量福德禪定智慧故種種法音隨意而出故十輪讚云現作種種身為衆生説法具足施功德悲愍諸衆生是也二別明説法二初正明隨機説化二結示業感差別夫能説法者有軟語苦語之異所施教者有真諦俗諦之殊以由機雜行差致使法殊化別也問此苦業報既非善事寧不直爾説善令習何須稱情説苦業耶答善惡因果法須相對若不説其貪等是過何由顯施等是善若不宣三塗是苦無由顯人天等樂是故須説凡夫罪行令人識知厭離歸善若鈍根者聞是苦業生厭離時即求世樂因此轉心修諸福業若利根者聞此苦業生厭離時即求解脫因此轉心能修道觀便於惑中得起出因故經説言一切煩惱皆是佛種故知苦業厭離之本起善之緣是故須説若不説此惡業罪行衆生不識常行不斷雖稱情説諸過惡然心外無別業苦以愚未解須定説罪故依俗諦説苦切語而教化之今初四天王地藏菩薩若遇殺生者説宿殃短命報若遇竊盜者説貧窮苦楚報若遇邪淫者説鴿鴛鴦報先舉十惡報殺盜淫身三惡也殺生罪重故先舉之夫人人愛命物物貪生蠢動含靈皆有佛性殺而食者即殺諸佛常在三塗受無量苦若得為人諸根不具壽命損減如鬼問目連我生男女而皆早死念之斷絶何罪所致答言汝為人時見兒殺生助其歡喜共噉其肉殺故短命喜故痛毒竊盜者荀子云竊貨曰盜錢財玉帛是外所依幡華僧物是內供養竊外可懺盜內難救常在三塗受無量苦若得為人貧窮困苦諸天捨離則外無依怙內無福德故致貧窮苦楚燈指經云當知貧窮比於地獄貧窮苟生與死無別辛苦荼毒世所無偶經有數千言廣歎貧窮苦楚邪淫如前梵名摩由邏此云孔性妬忌自矜尾不必匹偶亦與蛇交物之淫者也梵名迦逋唐言鴿鴿最喜合凡鳥皆雄乘雌此鳥雌乘雄故孔四時有子鴿逐月有子梵名斫迦邏婆此云鴛鴦匹鳥也止則相耦飛則相雙雄雌未嘗相離人得其一一思而死故曰鵲好外反鴛好內思俗云雄鳴曰鴛雌鳴曰鴦若生人中得二種果報親厚鬬訟王法所加若遇惡口者説眷屬鬪諍報若遇毀謗者説無舌瘡口報此示口四報惡口當一毀謗攝三以毀謗時具妄言等後生人中有二餘報常聞惡聲恆有諍訟故也故報恩經云佛告阿難人生世間禍從口出當護於口甚於猛火猛火熾然燒世間財惡口熾然燒七聖財一切衆生禍從口出毀身之斧滅身之禍正此謂也毀謗者毀辱而誹謗也大方廣總持經云謗法之人極大重業墮三惡道難可出離以謗他故七十劫中受大苦惱況彼愚人實無所知而自貢高乃至誹謗一四句偈定墮地獄永不見佛得無眼無舌之報故不可不慎也若遇瞋恚者説醜陋癃殘報若遇慳吝者説所求違願報若遇飲食無度者説飢渴咽病報此示意三報分別善惡所起經云人於世間常喜瞋恚不別善惡死入太山數千萬歲出生為人面目常惡今見惡色人皆宿命瞋恚所致慳吝者前經云人得財産慳貪不肯布施不愛視諸家貧窮者不給與不供事沙門道士不與乞兒病人食飲不敢自飽衣被不敢自完人呼守財奴恆荷慚愧死墮餓鬼見水走飲便化消銅膿血出生為人貧窮凍餓胸不能得今有貧窮乞人皆宿世慳貪癡種所致飲食固人生不可闕者然必有時度九橫經不量食瑜伽論食過量皆致橫死故須撙節無度即癡荀子云偷儒憚事無廉耻而嗜乎飲食則可謂惡少者矣五苦章句云食無節度飲酒貪味是汝重擔不捨擔者後入地獄據此則飢渴咽病猶華報耳咽喉咽字因堅切咽喉二竅同出一腕音管胃府異途施化喉在前主出為氣息出入之要道咽在後主吞為飲食糧運之關津咽病之咽於歇切塞也即噎膈病此三焦氣化不行故致氣逆胸膈之間飲食難進咽喉大寶積云如咽塞病即能斷命誠餓鬼之前相也若遇畋獵恣情者説驚狂喪命報若遇悖逆父母者説天地災殺報若遇燒山林木者説狂迷取死報若遇前後父母惡毒者説返生鞭撻現受報若遇網捕生雛者説骨肉分離報次明雜業報畋獵始於宓羲氏因天下多獸故教民以獵驅逐禽獸為田除害故春搜夏苗秋獮冬狩皆稱為獵今惟為利與口體恣情殺害故墮三塗出生人中得驚狂喪命之報如墮河落塹馬踏車傷等是也昔有富長者生惟一子娶方七日為妻採華墮樹而死長者問故佛言昔有一兒挾弓射雀傍有三人助喜此兒乃前世射雀之人今父母與妻昔之助喜三人也梵名塢波弟鑠此云父母古悖字子逆也從子從出不顧父母也夫孝本吾所生仁自此始是曰順德亡本弗愛其親謂之逆德非人道也既行悖逆自應遭天誅之災殺矣歸心録載齊時相州何君平母裴氏少年誕平後更不孕父母愛同眼目年至二十不聽別室父因使出外母憐共私後父還家共母殺父埋之後園天雷霹父尸出後霹平身具題因緣親鄰告官聞徹天聽敕殺裴氏不聽收埋此乃淫母殺父悖理逆倫犯上罪之豬狗故表而出之燒山林木傷生多矣梵網云若佛子以惡心故放火焚燒山林曠野一切有生物不得故燒但一切世人心懷慘毒焚燒山野或因風放火惱害一切故得狂迷取死之報昔衢州杜司馬初為洛陽尉城南午橋有民家被火焚煞數人忽一人踉蹌至縣門馳出復入杜執而詢之首云某即殺午橋居民者結伴五人劫財物數百千因縱火焚之時欲脫走足不能前晨出南行有火遮之因此北走復有火爇心驅入縣門自知不免杜悉捕賊黨送郡殺之準三法度論哭地獄即焚燒曠野及熏燒穴居衆生果報處也前後父母即繼父母也因非己出之子故以惡毒加之如大舜閔損之後母是也返生鞭撻現受者毋謂造化回薄輪運轂轉責報它生即現生中或失手致死受罪公廷或子情極返行鞭撻何可定也今人不識此理恣情鞭朴恐現報之不爽也網捕生雛雛鳥子也鳥初生能自啄者曰雛或網取或手捕皆招骨肉分離之報以人鳥身異母子情同也新淦有楊生者以網捕禽雀為業一日有寒雀棲於樹上生裝黏竿登枝枝折而墜頭刺於竿透其腦出血淋漓而死故大小乘均制其事耳若遇毀謗三寶者説盲聾瘖啞報若遇輕法慢教者説永處惡道報若遇破用常住者説億劫輪回地獄報若遇污梵誣僧者説永在畜生報此明三寶中報佛如醫王法如良藥僧如瞻病人今毀謗者無信心也十輪經云若有剎利旃陀羅於三寶所起於惡心一切諸佛所不能救常墮地獄餓鬼畜生若得為人盲聾瘖啞烏呼盲則永不見三寶相矣聾則永不聞三寶名矣瘖啞則永不能讚三寶德矣雖生猶死冥如長夜故經云寧吞然炭無謗三尊也輕法慢教者如堅意經佛告阿難我今禪定憐傷世人不知佛道真正弘深而以淺偽輕薄之言欲説嫉心謗毀道根或壞道法輕毀沙門及優婆塞惡口妄言當明此人為罪所牽故勝天子經云若有法師流通此經此地即是如來所行於彼法師當生善知識心尊重之心猶如佛心我若住世一劫若減一劫説是流通此經法師功德不能究盡今既輕法慢教則其誰救護永處三惡道中受千萬億苦惱欲得人身如盲龜值浮木孔矣破用常住如前污梵如前誣僧以無根波羅夷謗彼比丘如俱伽離謗身子目連行不淨行遂感身生惡瘡墮大蓮華地獄出其大舌五百釘釘之五百具犁耕之則永在畜生猶獄鬼之餘報也若遇湯火斬斫傷生者説輪回遞償報若遇破戒犯齋者説禽獸飢餓報若遇非理毀用者説所求闕絶報若遇吾我貢高者説卑使下賤報若遇兩舌鬬亂者説無舌百舌報若遇邪見者説邊地受生報此明雜業報湯火斬斫殺生法也以湯燖毛用火炙體或斬其頭或斫其足經云以人食羊羊死為人互相吞噉無有窮已故曰輪回遞償破戒者若破律儀粗罪易見似持戒相細惡難知十住毗婆沙佛告迦葉有四種破戒比丘似如持戒一有比丘於戒經中盡能具行而説有我二有誦持經律守護戒行於身見中不動不離三有具行十二頭陀而見諸法定有四有緣衆生行慈心聞諸行無生相心則驚怖是名破戒似如持戒犯齋如佛答舍利弗非時食者是破戒人是犯盜人與者亦然非我弟子是名盜食非法之人盜與盜受片鹽片酢皆死墮燋腸地獄吞熱鐵丸從地獄出生豬狗中食諸不淨又生惡鳥人怪其聲乃至餓鬼食糞人中貧賤準正法念受遮吒迦鳥身恐是斑鳩之梵語俟載考唯飲天雨仰口而承不得更飲餘水是故常困飢渴也非理毀用用者器用或因氣自毀或惡心損人良由器用人所必需耕有犁鋤工有斧鑿家有動用器皿路有傘蓋行具舟車有篙槳軛軌上音厄軾也下音月車轅端持衡曲木也今忽無端毀之自感需求闕絶之報矣昔太倉沙頭沈姓者鄰家有網罟車犁之類必借而陰壞之一日子婦歸寧行未一里忽雷雨大作一龍入其家席捲震蕩了無所遺一家長幼俱死吾我貢高者吾我身自謂也貢公去聲獻也下獻物於上曰貢必高舉而獻之今執我自大者自高卑彼如獻物狀乃生死之根也故大寶積云一切見中唯有我見即時能斷於智慧命五苦章句云自大種姓貢高驕慢恃智懱愚輕邈他人是汝重擔不捨擔者後入地獄故其從地獄出儻得為人必生卑使下賤之家荀卿有云橋泄者人之殃也橋泄嫚也於斯驗矣兩舌鬬亂者以曲為直以直為曲向彼説此向此説彼鬬搆是非壞亂綱常十輪云有無量種鬬訟違諍互相欺陵粗惡乖離誣誷矯亂生時既以兩舌鬬亂它世自感無舌百舌之報邪見者一切違理起者悉是邪見今別指者由此見最惡能斷善根故中論明二種一破世間樂言無罪福聖賢等二破涅槃道貪著於我分別有無均名邪見故感餘報生於邊疆五苦章句云邊地無義理父子相嘻音戲笑聲又音絰齧也汝家室互相賣屬人為奴婢恆當給驅使動靜加杖楚雖得為人形畜生共同侶故大乘行人尚畏邊地受生也然首舉殺生衆惡之大本終結邪見業流之巨壑故耳二結示業感差別如是等閻浮提衆生身口意業惡習結果百千報應今粗略説如是等閻浮提衆生業感差別地藏菩薩百千方便而教化之初句總標能造惡者身口意業明業因惡習句明習果百千報應明報果身口等者凡夫造業乃有多種有心與身口相稱有身口與心相違者凡動身口皆由心使故三業皆以心為根本也惡習結果者準彌勒問經有三種一果報果生地獄等二習氣果出生人中依殺生有短命果乃至依邪見故癡心增上薩婆多論云牛呞比丘牛中來以鏡自照淫女中來目連戲跳獼猴中來等三增上果依彼十種不善業道一切外物無有氣勢等百千報應者準優婆塞戒經衆生造業有四種報一現報今身作業今身即受二生報今身造業次後身受三後報今生造業更二三生已去方受四無報猶無記等業無報復有四種一時定報不定此於三時決定不改由業有可轉故報不定二報定時不定由業力定報不可改然時有可轉故時不定三時報俱定業定故時亦定四時報俱不定由業不決定故時報俱不定又涅槃明煩惱餘報等如是百千報應今唯粗略説之耳如是下正結差別由衆生作業有具不具若先念後作名作具足若先不念直造作者名作不具足復有作不具足者謂作業已果報不定復有作已亦具足者時報俱定既衆生業感差別故菩薩教化亦設百千方便如十輪經佛告堅淨信菩薩云此善男子發心以來不可思議阿僧祇劫久已能度薩婆若海但依本願故化應十方而於五濁惡世化益偏厚亦依本願力所熏習及衆生應受化業故從十一劫來莊嚴此世界成熟衆生是故在斯會中身相端嚴威德殊勝唯除如來無能過者又所起化業唯除遍吉觀音等諸大菩薩皆不能及以是菩薩本誓願力速滿衆生一切所求能滅衆生一切重罪除諸障礙現得安隱又名為善安慰説者巧演深法能善開導初學發意求大乘者令不怯弱以如是因緣衆生受化得度百千方便教化為若此也二勸天王擁護是諸衆生先受如是等報後墮地獄動經劫數無有出期是故汝等護人護國無令是諸衆業迷惑衆生初示所護意何故勸天王擁護以諸衆生先受上來所説華報次墮地獄以受果報故也優婆塞戒經云有人不解如是業緣無量世中流轉生死雖生非想非非想處壽八萬劫福盡還墮三惡道故動經千劫無出期者如舊雜譬喻經昔有六人為伴造罪俱墮地獄佛見之笑目連問何故笑佛言六人墮獄共在一釜各欲説本罪熱湯沸涌各一語便回下一言沙者世間六十億萬歲泥犁始為一日何時當竟二言那者無有出期不知何時得脫三言特者咄咄我當用治生不能自制意奪五家分供養三尊愚貧無足今悔何益四言涉者言我治生亦不致誠財産屬它為得苦痛五言姑者誰當保我從地獄出便不犯道禁得生天樂六言陀羅者是事上頭本不為心計譬如御車失道折軸車壞悔無所及文故動經塵劫無出地獄之期也是故下正勸以二字承接示勸護意護人等準光明疏觀心釋護世四天王云東集南苦西道北滅四諦理是四天觀四諦智為四王護四諦境名護國護心數是護衆生世者他也為他説心數名護他衆生若不照四諦理見思二惑侵害心王毀損境界心王亡境國敗心數人民迸散境智俱為鬼神所惱能觀苦集控御見思則國安民寧能為他説四諦是護他國土遮彼見思使彼安樂是為觀心護世四天王也若不如是何能令衆生於是業不迷惑耶央掘云護真實法名為護世是也三天王聞已悲退四天王聞已涕淚悲歎合掌而退此由聞上業感差別之相入心冥契了本空寂聞即無聞是名心聞故云聞已其奈衆生不了妄作妄愛故涕淚也三際無時十方非界六道不知動有劫數故悲歎也於是自心合一不妄流動退藏祕密靜待法音故合掌而退故知能以力以法自護護人稱護世四天王也
